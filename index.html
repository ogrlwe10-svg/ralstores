            const [currentPage, setCurrentPage] = useState('home');

            useEffect(() => {
                const handleScroll = () => {

                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                setSelectedVariant(0);
            }, [selectedProduct]);

            // ============================================================================
            // ANALYTICS
            // ============================================================================
            const trackEvent = (eventName, eventData = {}) => {
                if (window.gtag) {
                    window.gtag('event', eventName, eventData);
                }
            };

            // ============================================================================
            // FONCTIONS DE GESTION DU PANIER
            // ============================================================================
            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                if (existingItem) {
                    setCart(cart.map(item =>
                        item.id === product.id
                            ? { ...item, quantity: item.quantity + 1 }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
                trackEvent('add_to_cart', {
                    product_id: product.id,
                    product_name: product.name,
                    product_price: product.price,
                    product_category: product.category
                });
            };

            const removeFromCart = (productId) => {
                setCart(cart.filter(item => item.id !== productId));
            };

            const updateQuantity = (productId, newQuantity) => {
                if (newQuantity === 0) {
                    removeFromCart(productId);
                } else {
                    setCart(cart.map(item =>
                        item.id === productId
                            ? { ...item, quantity: newQuantity }
                            : item
                    ));
                }
            };

            const getTotalPrice = () => {
                return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
            };

            const getTotalItems = () => {
                return cart.reduce((total, item) => total + item.quantity, 0);
            };

            const validateEmail = (email) => {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            };

            const handleCheckoutEmail = (value) => {
                setCheckoutEmail(value);
                if (value && !validateEmail(value)) {
                    setEmailError('Adresse email invalide');
                } else {
                    setEmailError('');
                }
            };

            // PAIEMENT PAYPAL.ME
            // ============================================================================

                const link = SITE_CONFIG.paypalMeLink.trim();
                if (!link || link.includes('TON_PSEUDO')) return '';

                const amount = getTotalPrice().toFixed(2);
                return `${link.replace(/\/$/, '')}/${amount}`;
            };

            const handlePayPalMeCheckout = (requireEmail = false) => {
                if (requireEmail && (!checkoutEmail || !validateEmail(checkoutEmail))) {
                    setEmailError('Adresse email invalide');
                    alert('Veuillez entrer une adresse email valide avant de payer.');
                    return;
                }

                const paypalUrl = getPayPalMeUrl();
                if (!paypalUrl) {
                    alert('Ajoute ton lien PayPal.Me dans paypalMeLink avant de lancer les paiements.');
                    return;
                }

                const a = document.createElement('a');
                a.href = paypalUrl;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setOrderConfirmed(true);
                setCurrentPage('confirmation');
                trackEvent('paypalme_redirect', {
                    value: getTotalPrice(),
                    currency: 'EUR',
                    items: cart.map(item => ({
                        item_id: item.id,
                        item_name: item.name,
                        quantity: item.quantity,
                        price: item.price
                    }))

                return name

                    .slice(0, 2)

                                        <svg width="20" height="15" viewBox="0 0 24 18" fill="currentColor"><path d="M20.317 1.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 00-.079.036c-.21.369-.444.85-.608 1.23a18.565 18.565 0 00-5.487 0 12.36 12.36 0 00-.617-1.23.077.077 0 00-.079-.036A19.736 19.736 0 003.677 1.492a.07.07 0 00-.032.027C.533 5.834-.32 10.027.099 14.172a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
                                        Discord Support
                                    </a>
                                </div>

                                {/* Stats horizontales */}
                                <div className="hero-stats-row">
                                    <div className="hero-stat">
                                        <span className="hero-stat-num">32+</span>
                                        <span className="hero-stat-lbl">Produits</span>
                                    </div>
                                    <div className="hero-stat-divider"></div>
                                    <div className="hero-stat">
                                        <span className="hero-stat-num">24/7</span>
                                        <span className="hero-stat-lbl">Support</span>
                                    </div>
                                    <div className="hero-stat-divider"></div>
                                    <div className="hero-stat">
                                        <span className="hero-stat-num">100%</span>
                                        <span className="hero-stat-lbl">Sécurisé</span>
                                    </div>
                                    <div className="hero-stat-divider"></div>
                                    <div className="hero-stat">
                                        <span className="hero-stat-num">Discord</span>
                                        <span className="hero-stat-lbl">Livraison</span>
                                    </div>
                                </div>
                            </div>

                            {/* Colonne droite – visuel animé */}
                            <div className="hero-visual" aria-hidden="true">
                                <div className="visual-ring visual-ring-1"></div>
                                <div className="visual-ring visual-ring-2"></div>
                                <div className="visual-center-logo">
                                    <div className="vcl-hexagon">RΔL</div>
                                </div>
                                <div className="visual-panel visual-panel-main">
                                    <span className="visual-kicker">RΔL Store</span>
                                    <strong>Premium Access</strong>
                                    <small>Discord ticket ready</small>
                                </div>
                                <div className="visual-panel visual-panel-top">
                                    <span>32+</span>
                                    <small>Produits</small>
                                </div>
                                <div className="visual-panel visual-panel-bottom">
                                    <span>24/7</span>
                                    <small>Support</small>
                                </div>
                                <div className="visual-panel visual-panel-right">
                                    <span className="vpr-dot"></span>
                                    <small>En ligne</small>
                                </div>
                            </div>
                        </div>

                        {/* Flèche scroll */}
                        <div className="hero-scroll-hint">
                            <div className="scroll-arrow"></div>
                        </div>
                    </section>

                    {/* Features */}
                    <div className="page-content">
                        <section className="features">
                            <div className="feature-card">
                                <div className="feature-icon">⚡</div>
                                <h3>Commande rapide</h3>
                                <p>Choisissez vos produits, validez votre panier, puis ouvrez un ticket Discord</p>
                            </div>
                            <div className="feature-card">
                                <div className="feature-icon">🛡️</div>
                                <h3>Suivi par ticket</h3>
                                <p>Chaque commande est traitée proprement avec un échange direct sur Discord</p>
                            </div>
                            <div className="feature-card">
                                <div className="feature-icon">📦</div>
                                <h3>Qualité garantie</h3>
                                <p>Tous nos produits sont testés et fonctionnels</p>
                            </div>
                            <div className="feature-card">
                                <div className="feature-icon">👥</div>
                                <h3>Support 24/7</h3>
                                <p>Une équipe dédiée à votre service</p>
                            </div>
                        </section>

                        {/* Popular Products Preview */}
                        <section className="popular-section">
                            <div className="section-header">
                                <h2>Produits populaires</h2>
                                <button className="link-btn" onClick={() => setCurrentPage('products')}>
                                    Voir tout <ChevronRight size={18} />
                                </button>
                            </div>
                            <div className="product-grid">
                                {PRODUCTS.filter(p => p.popular).slice(0, 4).map(product => (
                                    <ProductCard key={product.id} product={product} />
                                ))}
                            </div>
                        </section>

                        {/* Testimonials Section */}
                        <section className="testimonials">
                            <div className="section-header">
                                <h2>Avis clients</h2>
                                <p>Ce que disent nos clients satisfaits</p>
                            </div>
                            <div className="testimonials-grid">
                                <div className="testimonial-card">
                                    <div className="testimonial-stars">⭐⭐⭐⭐⭐</div>
                                    <p>"Service exceptionnel, livraison instantanée. Je recommande !"</p>
                                    <div className="testimonial-author">
                                        <div className="author-avatar">A</div>
                                        <span>Client satisfait</span>
                                    </div>
                                </div>
                                <div className="testimonial-card">
                                    <div className="testimonial-stars">⭐⭐⭐⭐⭐</div>
                                    <p>"Qualité premium, exactement comme décrit. Parfait !"</p>
                                    <div className="testimonial-author">
                                        <div className="author-avatar">B</div>
                                        <span>Acheteur régulier</span>
                                    </div>
                                </div>
                                <div className="testimonial-card">
                                    <div className="testimonial-stars">⭐⭐⭐⭐⭐</div>
                                    <p>"Support réactif et produits de qualité. 5 étoiles !"</p>
                                    <div className="testimonial-author">
                                        <div className="author-avatar">C</div>
                                        <span>Utilisateur premium</span>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );

            // PAGE CATALOGUE
            const ProductsPage = () => (
                <div className="page-content">
                    <div className="page-header">
                        <h1>Catalogue complet</h1>
                        <p>Explorez tous nos produits digitaux premium</p>
                    </div>

                    <div className="catalog-showcase" aria-hidden="true">
                        <div className="showcase-line"></div>
                        <div className="showcase-pill">RΔL MARKET</div>
                        <div className="showcase-line"></div>
                    </div>

                    {/* Filtres de catégories */}
                    <div className="category-filter">
                        {Object.entries(CATEGORIES).map(([key, cat]) => (
                            <button
                                key={key}
                                className={`category-btn ${selectedCategory === key ? 'active' : ''}`}
                                onClick={() => setSelectedCategory(key)}
                            >
                                {cat.name}
                            </button>
                        ))}
                    </div>

                    {/* Grille de produits */}
                    <div className="product-grid">
                        {filteredProducts.map(product => (
                            <ProductCard key={product.id} product={product} />
                        ))}
                    </div>

                    {filteredProducts.length === 0 && (
                        <div className="empty-state">
                            <p>Aucun produit dans cette catégorie</p>
                        </div>
                    )}
                </div>
            );

            // CARTE PRODUIT
            const ProductCard = ({ product }) => (
                <div className="product-card" onClick={() => {
                    setSelectedProduct(product);
                    setCurrentPage('product-detail');
                }}>
                    {product.popular && (
                        <div className="popular-badge">
                            <Star size={14} />
                            Populaire
                        </div>
                    )}
                    <ProductImage product={product} />
                    <StockBadge product={product} />
                    <h3 className="product-name">{product.name}</h3>
                    <p className="product-description">{product.description}</p>
                    <div className="product-footer">
                        <div className="product-price">
                            <span className="price-amount">{product.variants ? `À partir de ${Math.min(...product.variants.map(v => v.price))}€` : `${product.price}€`}</span>
                        </div>
                        <button
                            className="btn-add-cart"
                            disabled={!product.inStock}
                            onClick={(e) => {
                                e.stopPropagation();
                                if (!product.inStock) return;
                                if (product.variants) {
                                    setSelectedProduct(product);
                                    setCurrentPage('product-detail');
                                } else {
                                    addToCart(product);
                                }
                            }}
                        >
                            <ShoppingCart size={18} />
                        </button>
                    </div>
                </div>
            );

            // PAGE DÉTAIL PRODUIT
            const ProductDetailPage = () => {
                if (!selectedProduct) return null;

                return (
                    <div className="page-content">
                        <button className="back-btn" onClick={() => setCurrentPage('products')}>
                            ← Retour au catalogue
                        </button>

                        <div className="product-detail">
                            <div className="product-detail-image">
                                <ProductImage product={selectedProduct} large />
                                {selectedProduct.popular && (
                                    <div className="popular-badge-large">
                                        <Star size={20} />
                                        Produit populaire
                                    </div>
                                )}
                            </div>

                            <div className="product-detail-info">
                                <h1>{selectedProduct.name}</h1>
                                <StockBadge product={selectedProduct} />
                                <p className="product-detail-description">{selectedProduct.description}</p>

                                <div className="product-features">
                                    <h3>Caractéristiques</h3>
                                    <ul>
                                        {selectedProduct.features.map((feature, idx) => (
                                            <li key={idx}>
                                                <Check size={18} />
                                                {feature}
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {selectedProduct.variants && (
                                    <div className="product-variants">
                                        <h3>Choisissez une option</h3>
                                        {selectedProduct.variants.map((variant, index) => (
                                            <label key={index} className="variant-option">
                                                <input
                                                    type="radio"
                                                    name="variant"
                                                    value={index}
                                                    checked={selectedVariant === index}
                                                    onChange={() => setSelectedVariant(index)}
                                                />
                                                {variant.label} - {variant.price}€
                                            </label>
                                        ))}
                                    </div>
                                )}

                                <div className="product-detail-footer">
                                    <div className="product-detail-price">
                                        <span className="price-label">Prix</span>
                                        <span className="price-amount-large">{selectedProduct.variants ? selectedProduct.variants[selectedVariant].price : selectedProduct.price}€</span>
                                    </div>
                                    <button
                                        className="btn-primary btn-large"
                                        disabled={!selectedProduct.inStock}
                                        onClick={() => {
                                            if (!selectedProduct.inStock) return;
                                            const productToAdd = {
                                                id: selectedProduct.variantIds ? selectedProduct.variantIds[selectedVariant] : selectedProduct.id,
                                                name: selectedProduct.name,
                                                price: selectedProduct.variants ? selectedProduct.variants[selectedVariant].price : selectedProduct.price,
                                                imageUrl: selectedProduct.imageUrl,
                                                variantLabel: selectedProduct.variants ? selectedProduct.variants[selectedVariant].label : null
                                            };
                                            addToCart(productToAdd);
                                            setCurrentPage('cart');
                                        }}
                                    >
                                        <ShoppingCart size={20} />
                                        Ajouter au panier
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // PAGE PANIER
            const CartPage = () => (
                <div className="page-content">
                    <div className="page-header">
                        <h1>Votre panier</h1>
                        <p>{getTotalItems()} article{getTotalItems() > 1 ? 's' : ''}</p>
                    </div>

                    {cart.length === 0 ? (
                        <div className="empty-cart">
                            <ShoppingCart size={64} />
                            <h2>Votre panier est vide</h2>
                            <p>Découvrez nos produits et commencez vos achats</p>
                            <button className="btn-primary" onClick={() => setCurrentPage('products')}>
                                Voir les produits
                            </button>
                        </div>
                    ) : (
                        <div className="cart-content">
                            <div className="cart-items">
                                {cart.map(item => (
                                    <div key={item.id} className="cart-item">
                                        <ProductImage product={item} compact />
                                        <div className="cart-item-info">
                                            <h3>{item.name}{item.variantLabel ? ` (${item.variantLabel})` : ''}</h3>
                                            <p>{item.price}€ / unité</p>
                                        </div>
                                        <div className="cart-item-quantity">
                                            <button onClick={() => updateQuantity(item.id, item.quantity - 1)}>-</button>
                                            <span>{item.quantity}</span>
                                            <button onClick={() => updateQuantity(item.id, item.quantity + 1)}>+</button>
                                        </div>
                                        <div className="cart-item-total">
                                            {(item.price * item.quantity).toFixed(2)}€
                                        </div>
                                        <button
                                            className="cart-item-remove"
                                            onClick={() => removeFromCart(item.id)}
                                        >
                                            <X size={20} />
                                        </button>
                                    </div>
                                ))}
                            </div>

                            <div className="cart-summary">
                                <h2>Résumé de commande</h2>
                                <div className="summary-line">
                                    <span>Sous-total</span>
                                    <span>{getTotalPrice().toFixed(2)}€</span>
                                </div>
                                <div className="summary-line">
                                    <span>Frais de service</span>
                                    <span className="free-tag">Gratuit</span>
                                </div>
                                <div className="summary-divider"></div>
                                <div className="summary-total">
                                    <span>Total</span>
                                    <span>{getTotalPrice().toFixed(2)}€</span>
                                </div>
                                <button
                                    className="btn-primary btn-large btn-checkout"
                                    onClick={() => handlePayPalMeCheckout(false)}
                                >
                                    <CreditCard size={20} />
                                    Payer par PayPal
                                </button>
                                <div className="secure-badge">
                                    <Lock size={16} />
                                    Paiement PayPal puis récupération via Discord
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            // PAGE CHECKOUT
            const CheckoutPage = () => {
                return (
                    <div className="page-content">
                        <div className="page-header">
                            <h1>Paiement PayPal</h1>
                            <p>Payez votre commande, puis rejoignez le Discord pour récupérer votre produit</p>
                        </div>

                    <div className="checkout-container">
                        <div className="checkout-form">
                            <div className="checkout-section">
                                <h2>Informations de contact</h2>
                                <p className="section-description">
                                    Cette adresse permet au support de retrouver votre commande si besoin.
                                </p>
                                <div className="form-group">
                                    <label>Adresse email</label>
                                    <input
                                        type="email"
                                        placeholder="votre@email.com"
                                        value={checkoutEmail}
                                        onChange={(e) => handleCheckoutEmail(e.target.value)}
                                        className={`input-field ${emailError ? 'input-error' : ''}`}
                                    />
                                    {emailError && <p className="error-message">{emailError}</p>}
                                </div>
                            </div>

                            <div className="checkout-section">
                                <h2>Méthode de paiement</h2>
                                <div className="discord-order-box">
                                    <div className="discord-order-icon">
                                        <CreditCard size={28} />
                                    </div>
                                    <div>
                                        <h3>PayPal</h3>
                                        <p>Cliquez sur le bouton pour ouvrir PayPal.Me et payer le montant de votre commande.</p>
                                    </div>
                                </div>
                                <button className="paypalme-btn" onClick={() => handlePayPalMeCheckout(true)}>
                                    <CreditCard size={20} />
                                    Payer par PayPal
                                </button>
                                <p className="payment-info">
                                    <Shield size={14} />
                                    Après le paiement, rejoignez le Discord et ouvrez un ticket.
                                </p>
                            </div>
                        </div>

                        <div className="checkout-summary">
                            <h2>Votre commande</h2>
                            <div className="checkout-items">
                                {cart.map(item => (
                                    <div key={item.id} className="checkout-item">
                                        <span>{item.name} x{item.quantity}</span>
                                        <span>{(item.price * item.quantity).toFixed(2)}€</span>
                                    </div>
                                ))}
                            </div>
                            <div className="summary-divider"></div>
                            <div className="checkout-total">
                                <span>Total de la commande</span>
                                <span className="total-amount">{getTotalPrice().toFixed(2)}€</span>
                            </div>
                            <div className="delivery-info">
                                <Lock size={16} />
                                <span>Paiement à finaliser sur PayPal.Me</span>
                            </div>
                        </div>
                    </div>
                </div>
                );
            };

            // PAGE CONFIRMATION
            const ConfirmationPage = () => (
                <div className="page-content">
                    <div className="confirmation-container">
                        <div className="confirmation-icon">
                            <div className="success-checkmark">
                                <Check size={48} />
                            </div>
                        </div>
                        <h1 className="confirmation-title">Paiement ouvert sur PayPal</h1>
                        <p className="confirmation-message">
                            Finalisez le paiement sur PayPal.Me, puis {SITE_CONFIG.discordMessage}
                            {checkoutEmail && <> Utilisez l'adresse <strong>{checkoutEmail}</strong> si le support vous demande une confirmation.</>}
                        </p>

                        <div className="confirmation-details">
                            <div className="detail-card">
                                <Users size={24} />
                                <h3>Rejoindre le Discord</h3>
                                <p>Entrez sur le serveur RΔL</p>
                            </div>
                            <div className="detail-card">
                                <Package size={24} />
                                <h3>Ouvrir un ticket</h3>
                                <p>Envoyez le detail de votre commande</p>
                            </div>
                            <div className="detail-card">
                                <Shield size={24} />
                                <h3>Recevoir le produit</h3>
                                <p>Le support vous accompagne jusqu'a la livraison</p>
                            </div>
                        </div>

                        <div className="confirmation-actions">
                            <button className="btn-primary" onClick={() => {
                                setCurrentPage('home');
                                setOrderConfirmed(false);
                            }}>
                                Retour à l'accueil
                            </button>
                            <button className="btn-secondary" onClick={() => setCurrentPage('products')}>
                                Continuer mes achats
                            </button>
                        </div>
                    </div>
                </div>
            );

            // ============================================================================
            // NAVIGATION ET HEADER
            // ============================================================================
            return (
                <div className="app">
                    {/* Navigation */}
                    <nav className={`navbar ${isScrolled ? 'scrolled' : ''}`}>
                        <div className="nav-container">

                                radial-gradient(circle at 92% 36%, rgba(80, 10, 18, 0.38), transparent 30rem),
                                linear-gradient(180deg, #040406 0%, #08080d 48%, #050508 100%);
                            color: var(--text);
                            overflow-x: hidden;
                            min-height: 100vh;
                            text-rendering: geometricPrecision;
                        }

                        .app {
                            min-height: 100vh;
                            position: relative;
                        }

                        .app::before {
                            content: '';
                            position: fixed;
                            inset: 0;
                            pointer-events: none;
                            background-image:
                                linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
                                linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
                            background-size: 64px 64px;
                            mask-image: linear-gradient(to bottom, black, transparent 78%);
                            opacity: 0.5;
                        }

                        .app::after {
                            content: '';
                            position: fixed;
                            inset: 0;
                            pointer-events: none;
                            background:
                                linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.035) 48%, transparent 58%),
                                radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.14), transparent 28rem);
                            mix-blend-mode: screen;
                            opacity: 0.55;
                            animation: ambientSweep 12s ease-in-out infinite;
                        }

                        @keyframes ambientSweep {
                            0%, 100% { transform: translateX(-4%) scale(1); opacity: 0.35; }
                            50% { transform: translateX(4%) scale(1.03); opacity: 0.62; }
                        }

                        /* ============================================
                           NAVIGATION
                        ============================================ */
                        .navbar {
                            position: fixed;
                            top: 14px;
                            left: 50%;
                            right: auto;
                            width: min(1400px, calc(100% - 48px));
                            transform: translateX(-50%);
                            z-index: 1000;
                            background: rgba(7, 7, 12, 0.72);
                            backdrop-filter: blur(24px);
                            border: 1px solid rgba(255, 255, 255, 0.11);
                            border-radius: 14px;
                            transition: all 0.3s ease;
                            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
                        }

                        .navbar.scrolled {
                            background: rgba(8, 8, 13, 0.92);
                            border-color: rgba(248, 113, 113, 0.18);
                            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
                        }

                        .nav-container {
                            max-width: none;
                            margin: 0 auto;
                            padding: 0.72rem 1rem;
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                        }

                        .nav-logo {
                            display: flex;
                            align-items: center;
                            cursor: pointer;
                            transition: transform 0.25s ease, filter 0.25s ease;
                        }

                        .nav-logo:hover {
                            transform: scale(1.06);
                            filter: drop-shadow(0 0 10px rgba(220,38,38,0.5));
                        }

                        .nav-logo-img {
                            width: 48px;
                            height: 48px;
                            object-fit: contain;
                            border-radius: 50%;
                        }

                        .discord-nav-btn {
                            display: flex;
                            align-items: center;
                            gap: 0.45rem;
                            background: rgba(88,101,242,0.15);
                            border: 1px solid rgba(88,101,242,0.38);
                            color: #bdbfff;
                            font-size: 0.88rem;
                            font-weight: 700;
                            padding: 0.5rem 1rem;
                            border-radius: 10px;
                            cursor: pointer;
                            text-decoration: none;
                            transition: all 0.25s ease;
                        }

                        .discord-nav-btn:hover {
                            background: rgba(88,101,242,0.28);
                            border-color: rgba(88,101,242,0.6);
                            color: #fff;
                            transform: translateY(-2px);
                        }

                        .nav-links {
                            display: flex;
                            gap: 0.35rem;
                            padding: 0.28rem;
                            border: 1px solid rgba(255, 255, 255, 0.08);
                            border-radius: 12px;
                            background: rgba(255, 255, 255, 0.035);
                        }

                        .nav-links a {
                            color: var(--muted);
                            text-decoration: none;
                            font-weight: 700;
                            font-size: 0.92rem;
                            cursor: pointer;
                            transition: all 0.2s ease;
                            position: relative;
                            padding: 0.58rem 0.9rem;
                            border-radius: 9px;
                        }

                        .nav-links a:hover {
                            color: #fff;
                            background: rgba(255, 255, 255, 0.075);
                        }

                        .nav-links a::after {
                            display: none;
                        }

                        .nav-actions {
                            display: flex;
                            align-items: center;
                            gap: 1rem;
                        }

                        .cart-btn {
                            position: relative;
                            background: rgba(255, 255, 255, 0.075);
                            border: 1px solid rgba(255, 255, 255, 0.13);
                            color: #e4e4e7;
                            width: 42px;
                            height: 42px;
                            padding: 0;
                            border-radius: 10px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                        }

                        .cart-btn:hover {
                            background: rgba(239, 68, 68, 0.15);
                            border-color: rgba(248, 113, 113, 0.38);
                            transform: translateY(-2px) scale(1.04);
                        }

                        .cart-badge {
                            position: absolute;
                            top: -6px;
                            right: -6px;
                            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
                            color: white;
                            font-size: 0.7rem;
                            font-weight: 700;
                            padding: 0.2rem 0.4rem;
                            border-radius: 999px;
                            min-width: 20px;
                            text-align: center;
                        }

                        .mobile-menu-btn {
                            display: none;
                            background: none;
                            border: none;
                            color: #e4e4e7;
                            cursor: pointer;
                            padding: 0.5rem;
                        }

                        /* ============================================
                           MAIN CONTENT
                        ============================================ */
                        .main-content {
                            padding-top: 0;
                            min-height: 100vh;
                        }

                        .page-content {
                            max-width: 1400px;
                            margin: 0 auto;
                            padding: 3rem 2rem;
                            position: relative;
                            z-index: 1;
                            animation: pageFade 0.45s ease both;
                        }

                        @keyframes pageFade {
                            from { opacity: 0; transform: translateY(12px); }
                            to { opacity: 1; transform: translateY(0); }
                        }

                        .page-header {
                            position: relative;
                            text-align: center;
                            margin: 0 auto 3.25rem;
                            max-width: 880px;
                            padding: 2.75rem 1rem 1.5rem;
                        }

                        .page-header::before {
                            content: '';
                            position: absolute;
                            inset: 0;
                            z-index: -1;
                            background: radial-gradient(circle at center, rgba(239, 68, 68, 0.15), transparent 62%);
                            filter: blur(8px);
                        }

                        .page-header h1 {
                            font-size: clamp(2.25rem, 4vw, 4rem);
                            line-height: 1;
                            margin-bottom: 1rem;
                            letter-spacing: 0;
                        }

                        .page-header p {
                            color: var(--muted);
                            font-size: 1.08rem;
                            line-height: 1.6;
                        }

                        /* ============================================
                           HERO SECTION — PLEIN ÉCRAN
                        ============================================ */
                        .hero {
                            position: relative;
                            min-height: 100vh;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            overflow: hidden;
                            padding: 0;
                        }

                        .hero-orb {
                            position: absolute;
                            border-radius: 50%;
                            pointer-events: none;
                            filter: blur(80px);
                        }

                        .hero-orb-1 {
                            width: 600px;
                            height: 600px;
                            top: -150px;
                            left: -100px;
                            background: radial-gradient(circle, rgba(220,38,38,0.32) 0%, transparent 70%);
                            animation: orbPulse 9s ease-in-out infinite;
                        }

                        .hero-orb-2 {
                            width: 500px;
                            height: 500px;
                            bottom: -100px;
                            right: 10%;
                            background: radial-gradient(circle, rgba(153,27,27,0.22) 0%, transparent 70%);
                            animation: orbPulse 11s ease-in-out infinite reverse;
                        }

                        .hero-orb-3 {
                            width: 300px;
                            height: 300px;
                            top: 30%;
                            right: 30%;
                            background: radial-gradient(circle, rgba(80,10,18,0.28) 0%, transparent 70%);
                            animation: orbPulse 7s ease-in-out infinite 2s;
                        }

                        @keyframes orbPulse {
                            0%, 100% { transform: scale(1); opacity: 0.7; }
                            50% { transform: scale(1.18); opacity: 1; }
                        }

                        .hero-grid-overlay {
                            position: absolute;
                            inset: 0;
                            pointer-events: none;
                            background-image:
                                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
                            background-size: 60px 60px;
                            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
                        }

                        .hero-inner {
                            position: relative;
                            z-index: 2;
                            max-width: 1400px;
                            margin: 0 auto;
                            padding: 0 2rem;
                            width: 100%;
                            display: grid;
                            grid-template-columns: 1fr min(45vw, 560px);
                            gap: 4rem;
                            align-items: center;
                            min-height: 100vh;
                        }

                        .hero-content {
                            position: relative;
                            z-index: 2;
                            display: flex;
                            flex-direction: column;
                            gap: 0;
                        }

                        .hero-badge {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.6rem;
                            background: rgba(220, 38, 38, 0.1);
                            border: 1px solid rgba(248, 113, 113, 0.3);
                            padding: 0.45rem 1.1rem;
                            border-radius: 999px;
                            color: #fca5a5;
                            font-size: 0.85rem;
                            font-weight: 600;
                            margin-bottom: 2.2rem;
                            width: fit-content;
                            animation: fadeInDown 0.7s ease both;
                        }

                        .hero-badge-dot {
                            width: 7px;
                            height: 7px;
                            border-radius: 50%;
                            background: #ef4444;
                            box-shadow: 0 0 8px rgba(239,68,68,0.8);
                            animation: blink 2s ease-in-out infinite;
                        }

                        @keyframes blink {
                            0%, 100% { opacity: 1; }
                            50% { opacity: 0.3; }
                        }

                        @keyframes fadeInDown {
                            from { opacity: 0; transform: translateY(-16px); }
                            to { opacity: 1; transform: translateY(0); }
                        }

                        .hero-title {
                            display: flex;
                            flex-direction: column;
                            margin-bottom: 1.8rem;
                            animation: fadeInUp 0.8s ease 0.1s both;
                        }

                        @keyframes fadeInUp {
                            from { opacity: 0; transform: translateY(24px); }
                            to { opacity: 1; transform: translateY(0); }
                        }

                        .hero-title-ral {
                            font-size: clamp(4rem, 9vw, 9rem);
                            font-weight: 900;
                            line-height: 0.92;
                            letter-spacing: -0.04em;
                            background: linear-gradient(135deg, #ef4444 0%, #dc2626 40%, #991b1b 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                            filter: drop-shadow(0 0 40px rgba(220,38,38,0.4));
                        }

                        .hero-title-sub {
                            font-size: clamp(1.6rem, 3.5vw, 3.2rem);
                            font-weight: 700;
                            color: #f5f5f7;
                            line-height: 1.15;
                            letter-spacing: -0.02em;
                            margin-top: 0.3rem;
                        }

                        .hero-description {
                            color: #a8a8b3;
                            font-size: 1.1rem;
                            line-height: 1.7;
                            max-width: 520px;
                            margin-bottom: 2.5rem;
                            animation: fadeInUp 0.8s ease 0.2s both;
                        }

                        .hero-cta {
                            display: flex;
                            gap: 1rem;
                            flex-wrap: wrap;
                            margin-bottom: 3rem;
                            animation: fadeInUp 0.8s ease 0.3s both;
                        }

                        .btn-discord-hero {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.5rem;
                            background: rgba(88,101,242,0.14);
                            border: 1px solid rgba(88,101,242,0.4);
                            color: #c5c8ff;
                            font-size: 0.97rem;
                            font-weight: 700;
                            padding: 0.82rem 1.6rem;
                            border-radius: 12px;
                            cursor: pointer;
                            text-decoration: none;
                            transition: all 0.25s ease;
                        }

                        .btn-discord-hero:hover {
                            background: rgba(88,101,242,0.28);
                            border-color: rgba(88,101,242,0.65);
                            color: #fff;
                            transform: translateY(-3px);
                            box-shadow: 0 8px 28px rgba(88,101,242,0.25);
                        }

                        /* Stats row */
                        .hero-stats-row {
                            display: flex;
                            align-items: center;
                            gap: 2rem;
                            animation: fadeInUp 0.8s ease 0.4s both;
                        }

                        .hero-stat {
                            display: flex;
                            flex-direction: column;
                            gap: 0.1rem;
                        }

                        .hero-stat-num {
                            font-size: 1.5rem;
                            font-weight: 800;
                            color: #ef4444;
                            line-height: 1;
                        }

                        .hero-stat-lbl {
                            font-size: 0.75rem;
                            color: #71717a;
                            font-weight: 600;
                            text-transform: uppercase;
                            letter-spacing: 0.06em;
                        }

                        .hero-stat-divider {
                            width: 1px;
                            height: 32px;
                            background: rgba(255,255,255,0.1);
                        }

                        /* Hero visual */
                        .hero-visual {
                            position: relative;
                            width: 100%;
                            height: 440px;
                            animation: heroVisualFloat 7s ease-in-out infinite;
                        }

                        @keyframes heroVisualFloat {
                            0%, 100% { transform: translateY(0); }
                            50% { transform: translateY(-16px); }
                        }

                        .visual-ring {
                            position: absolute;
                            border-radius: 50%;
                            border: 1px solid rgba(248,113,113,0.2);
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                        }

                        .visual-ring-1 {
                            width: 340px;
                            height: 340px;
                            animation: ringRotate 20s linear infinite;
                            box-shadow: 0 0 60px rgba(220,38,38,0.1) inset;
                        }

                        .visual-ring-2 {
                            width: 240px;
                            height: 240px;
                            border-color: rgba(248,113,113,0.12);
                            animation: ringRotate 14s linear infinite reverse;
                        }

                        @keyframes ringRotate {
                            to { transform: translate(-50%, -50%) rotate(360deg); }
                        }

                        .visual-ring-1::before, .visual-ring-1::after,
                        .visual-ring-2::before {
                            content: '';
                            position: absolute;
                            width: 10px;
                            height: 10px;
                            border-radius: 50%;
                            background: #ef4444;
                            box-shadow: 0 0 16px rgba(239,68,68,0.9);
                        }

                        .visual-ring-1::before { top: 5%; left: 15%; }
                        .visual-ring-1::after { bottom: 8%; right: 10%; }
                        .visual-ring-2::before { top: -5px; left: 50%; transform: translateX(-50%); }

                        .visual-center-logo {
                            position: absolute;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            z-index: 3;
                        }

                        .vcl-hexagon {
                            width: 120px;
                            height: 120px;
                            background: linear-gradient(135deg, #ef4444 0%, #7f1d1d 100%);
                            border-radius: 18px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 2rem;
                            font-weight: 900;
                            color: white;
                            box-shadow: 0 0 60px rgba(220,38,38,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
                            border: 1px solid rgba(248,113,113,0.5);
                            letter-spacing: -0.03em;
                            animation: hexPulse 3s ease-in-out infinite;
                        }

                        @keyframes hexPulse {
                            0%, 100% { box-shadow: 0 0 40px rgba(220,38,38,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
                            50% { box-shadow: 0 0 80px rgba(220,38,38,0.7), inset 0 1px 0 rgba(255,255,255,0.2); }
                        }

                        .visual-panel {
                            position: absolute;
                            z-index: 4;
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            background: rgba(9, 9, 15, 0.85);
                            backdrop-filter: blur(18px);
                            border-radius: 10px;
                            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
                            color: #fff;
                            padding: 0.85rem 1.1rem;
                        }

                        .visual-panel-main {
                            left: 0%;
                            top: 22%;
                            width: 210px;
                            animation: cardBreathe 4.5s ease-in-out infinite;
                        }

                        .visual-panel-main .visual-kicker { color: #f87171; font-size: 0.72rem; font-weight: 800; display: block; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }
                        .visual-panel-main strong { font-size: 1.1rem; display: block; margin-bottom: 0.2rem; }
                        .visual-panel-main small, .visual-panel-top small, .visual-panel-bottom small, .visual-panel-right small { color: #71717a; font-size: 0.75rem; }

                        .visual-panel-top {
                            right: 0%;
                            top: 12%;
                            min-width: 110px;
                            text-align: center;
                            animation: miniFloat 5.5s ease-in-out infinite;
                        }

                        .visual-panel-bottom {
                            left: 8%;
                            bottom: 8%;
                            min-width: 110px;
                            text-align: center;
                            animation: miniFloat 5.5s ease-in-out infinite 1.5s;
                        }

                        .visual-panel-right {
                            right: 2%;
                            bottom: 22%;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            animation: miniFloat 6s ease-in-out infinite 0.8s;
                        }

                        .vpr-dot {
                            width: 8px;
                            height: 8px;
                            border-radius: 50%;
                            background: #22c55e;
                            box-shadow: 0 0 8px rgba(34,197,94,0.8);
                            animation: blink 2s ease-in-out infinite;
                        }

                        .visual-panel-top span, .visual-panel-bottom span {
                            display: block;
                            color: #f87171;
                            font-size: 1.4rem;
                            font-weight: 800;
                            margin-bottom: 0.15rem;
                        }

                        @keyframes cardBreathe {
                            0%, 100% { transform: translateY(0) scale(1); border-color: rgba(255,255,255,0.1); }
                            50% { transform: translateY(-8px) scale(1.03); border-color: rgba(248,113,113,0.35); }
                        }

                        @keyframes miniFloat {
                            0%, 100% { transform: translateY(0) scale(1); }
                            50% { transform: translateY(-10px) scale(1.05); }
                        }

                        /* Scroll hint */
                        .hero-scroll-hint {
                            position: absolute;
                            bottom: 2.5rem;
                            left: 50%;
                            transform: translateX(-50%);
                            z-index: 3;
                            opacity: 0.5;
                        }

                        .scroll-arrow {
                            width: 22px;
                            height: 22px;
                            border-right: 2px solid #ef4444;
                            border-bottom: 2px solid #ef4444;
                            transform: rotate(45deg);
                            animation: scrollBounce 1.6s ease-in-out infinite;
                        }

                        @keyframes scrollBounce {
                            0%, 100% { transform: rotate(45deg) translateY(0); }
                            50% { transform: rotate(45deg) translateY(8px); }
                        }
                        

                        .btn-primary {
                            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 55%, #7f1d1d 100%);
                            color: white;
                            border: none;
                            padding: 1rem 2rem;
                            border-radius: 8px;
                            font-size: 1rem;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            transition: all 0.3s ease;
                            box-shadow: 0 14px 34px rgba(220, 38, 38, 0.34);
                            position: relative;
                            overflow: hidden;
                        }

                        .btn-primary::before {
                            content: '';
                            position: absolute;
                            top: 0;
                            left: -120%;
                            width: 80%;
                            height: 100%;
                            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.34), transparent);
                            transform: skewX(-20deg);
                            transition: left 0.65s ease;
                        }

                        .btn-primary:hover {
                            transform: translateY(-3px) scale(1.02);
                            box-shadow: 0 15px 40px rgba(220, 38, 38, 0.4);
                        }

                        .btn-primary:hover::before {
                            left: 130%;
                        }

                        .btn-primary:disabled,
                        .btn-add-cart:disabled {
                            cursor: not-allowed;
                            opacity: 0.45;
                            filter: grayscale(0.35);
                            transform: none;
                            box-shadow: none;
                        }

                        .btn-secondary {
                            background: rgba(255, 255, 255, 0.06);
                            border: 1px solid rgba(255, 255, 255, 0.14);
                            color: #e4e4e7;
                            padding: 1rem 2rem;
                            border-radius: 8px;
                            font-size: 1rem;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            transition: all 0.3s ease;
                        }

                        .btn-secondary:hover {
                            background: rgba(255, 255, 255, 0.1);
                            transform: translateY(-3px) scale(1.02);
                        }

                        .hero-stats {
                            display: grid;
                            grid-template-columns: repeat(3, minmax(0, 1fr));
                            gap: 1rem;
                            justify-content: start;
                            margin-top: 4rem;
                            max-width: 900px;
                            position: relative;
                            z-index: 2;
                        }

                        .stat-card {
                            text-align: left;
                            padding: 1.35rem 1.5rem;
                            background: rgba(255, 255, 255, 0.045);
                            border: 1px solid rgba(255, 255, 255, 0.09);
                            border-radius: 8px;
                            backdrop-filter: blur(10px);
                            transition: all 0.3s ease;
                        }

                        .stat-card:hover {
                            background: rgba(255, 255, 255, 0.07);
                            border-color: rgba(248, 113, 113, 0.32);
                            transform: translateY(-7px) scale(1.025);
                        }

                        .stat-number {
                            font-size: 2.5rem;
                            font-weight: 800;
                            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }

                        .stat-label {
                            color: #a1a1aa;
                            font-size: 0.9rem;
                            margin-top: 0.5rem;
                        }

                        /* ============================================
                           FEATURES
                        ============================================ */
                        .features {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                            gap: 2rem;
                            margin: 4rem 0;
                        }

                        .feature-card {
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.072), rgba(255, 255, 255, 0.026)),
                                linear-gradient(135deg, rgba(239, 68, 68, 0.07), transparent 45%);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 2rem;
                            text-align: left;
                            transition: all 0.3s ease;
                            position: relative;
                            overflow: hidden;
                            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.22);
                        }

                        .feature-card::before {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background: radial-gradient(circle at top left, rgba(239, 68, 68, 0.18), transparent 46%);
                            opacity: 0;
                            transition: opacity 0.3s ease;
                        }

                        .feature-card:hover {
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.038)),
                                linear-gradient(135deg, rgba(239, 68, 68, 0.12), transparent 45%);
                            border-color: var(--line-red);
                            transform: translateY(-8px) scale(1.02);
                            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35), 0 0 34px rgba(220, 38, 38, 0.11);
                        }

                        .feature-card:hover::before {
                            opacity: 1;
                        }

                        .feature-icon {
                            width: 60px;
                            height: 60px;
                            margin: 0 0 1rem;
                            background:
                                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 40%),
                                linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
                            border: 1px solid rgba(248, 113, 113, 0.48);
                            border-radius: 10px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                        }

                        .feature-card h3 {
                            font-size: 1.25rem;
                            margin-bottom: 1rem;
                        }

                        .feature-card p {
                            color: #a1a1aa;
                            line-height: 1.6;
                        }

                        /* ============================================
                           TESTIMONIALS
                        ============================================ */
                        .testimonials {
                            margin: 4rem 0;
                        }

                        .section-header {
                            text-align: center;
                            margin-bottom: 3rem;
                        }

                        .section-header h2 {
                            font-size: 2.5rem;
                            margin-bottom: 1rem;
                        }

                        .section-header p {
                            color: #a1a1aa;
                            font-size: 1.1rem;
                        }

                        .testimonials-grid {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                            gap: 2rem;
                        }

                        .testimonial-card {
                            background: var(--surface);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 2rem;
                            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
                        }

                        .testimonial-stars {
                            display: flex;
                            gap: 0.25rem;
                            color: #dc2626;
                            margin-bottom: 1rem;
                        }

                        .testimonial-card p {
                            color: #a1a1aa;
                            font-style: italic;
                            margin-bottom: 1.5rem;
                            line-height: 1.6;
                        }

                        .testimonial-author {
                            display: flex;
                            align-items: center;
                            gap: 1rem;
                        }

                        .author-avatar {
                            width: 40px;
                            height: 40px;
                            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                            font-weight: bold;
                        }

                        /* ============================================
                           PRODUCTS
                        ============================================ */
                        .popular-section {
                            margin: 4rem 0;
                        }

                        .catalog-showcase {
                            display: grid;
                            grid-template-columns: 1fr auto 1fr;
                            align-items: center;
                            gap: 1rem;
                            max-width: 920px;
                            margin: -1rem auto 2rem;
                            color: #f87171;
                            font-size: 0.78rem;
                            font-weight: 900;
                        }

                        .showcase-line {
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(248, 113, 113, 0.45), transparent);
                        }

                        .showcase-pill {
                            padding: 0.5rem 0.85rem;
                            border-radius: 999px;
                            background: rgba(220, 38, 38, 0.12);
                            border: 1px solid rgba(248, 113, 113, 0.28);
                            box-shadow: 0 0 28px rgba(220, 38, 38, 0.13);
                        }

                        .link-btn {
                            background: none;
                            border: none;
                            color: #dc2626;
                            cursor: pointer;
                            font-weight: 600;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            transition: color 0.2s ease;
                        }

                        .link-btn:hover {
                            color: #b91c1c;
                        }

                        .product-grid {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                            gap: 1.25rem;
                            margin-top: 2rem;
                        }

                        .product-card {
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.072), rgba(255, 255, 255, 0.026)),
                                radial-gradient(circle at 15% 0%, rgba(239, 68, 68, 0.1), transparent 40%);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 1.45rem;
                            cursor: pointer;
                            transition: all 0.3s ease;
                            position: relative;
                            overflow: hidden;
                            min-height: 265px;
                            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.22);
                        }

                        .product-card::after {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.09), transparent);
                            transform: translateX(-120%);
                            transition: transform 0.65s ease;
                            pointer-events: none;
                        }

                        .product-card:hover {
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.038)),
                                radial-gradient(circle at 15% 0%, rgba(239, 68, 68, 0.16), transparent 45%);
                            transform: translateY(-8px) scale(1.018);
                            border-color: var(--line-red);
