                        transform:translateY(-6px) scale(1.015);
                        border-color:rgba(220,38,38,.38);
                        box-shadow:0 22px 60px rgba(0,0,0,.5),0 0 0 1px rgba(220,38,38,.14),0 0 50px rgba(220,38,38,.09);
                    }
                    .pcard-out{opacity:.58}
                    .pcard-popular{
                        position:absolute;top:.8rem;left:.8rem;z-index:2;
                        display:flex;align-items:center;gap:.28rem;padding:.28rem .65rem;border-radius:99px;
                        font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
                        background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
                        box-shadow:0 2px 12px rgba(245,158,11,.4);
                    }
                    .pcard-out-overlay{
                        position:absolute;inset:0;z-index:3;
                        background:rgba(3,3,6,.6);backdrop-filter:blur(3px);
                        display:flex;align-items:center;justify-content:center;
                        font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;
                        color:rgba(252,165,165,.8);letter-spacing:.12em;text-transform:uppercase;
                        border-radius:var(--radius-lg);
                    }
                    .pcard-img-wrap{height:180px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.02)}
                    .prod-img{
                        width:100%;height:100%;position:relative;
                        background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;
                    }
                    .prod-img img{width:100%;height:100%;object-fit:cover;transition:transform .38s ease}
                    .pcard:hover .prod-img img{transform:scale(1.08)}
                    .prod-img.no-img img{display:none}
                    .prod-img-fallback{
                        position:absolute;font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:900;
                        color:rgba(255,255,255,.12);letter-spacing:.04em;pointer-events:none;user-select:none;
                    }
                    .prod-img:not(.no-img) .prod-img-fallback{display:none}
                    .prod-img.large{height:320px}
                    .prod-img.compact{width:72px;height:72px;flex-shrink:0;border-radius:var(--radius)}
                    .prod-img.compact img{border-radius:var(--radius)}

                    .pcard-body{padding:1rem 1.1rem 1.1rem;display:flex;flex-direction:column;flex:1;gap:.55rem}
                    .pcard-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
                    .pcard-cat{font-size:.88rem;color:var(--muted);width:24px;height:24px;display:flex;align-items:center;justify-content:center}
                    .stock-pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:600;letter-spacing:.03em;padding:.22rem .6rem;border-radius:99px}
                    .stock-pill.in{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:rgba(134,239,172,.9)}
                    .stock-pill.out{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);color:rgba(252,165,165,.85)}
                    .stock-dot-pulse{width:5px;height:5px;border-radius:50%;background:currentColor}
                    .stock-pill.in .stock-dot-pulse{animation:stockPulse 2s ease-in-out infinite}
                    @keyframes stockPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 4px rgba(34,197,94,0)}}
                    .pcard-name{
                        font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;line-height:1.3;color:var(--text);
                        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
                    }
                    .pcard-desc{
                        font-size:.8rem;color:var(--text2);line-height:1.5;
                        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;
                    }
                    .pcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.55rem;border-top:1px solid var(--border)}
                    .pcard-price{
                        font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .pcard-btn{
                        width:34px;height:34px;border-radius:var(--radius-sm);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);transition:all .2s ease;
                    }
                    .pcard-btn:hover:not(:disabled){background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 16px rgba(220,38,38,.4);transform:scale(1.1)}
                    .pcard-btn:disabled{opacity:.3;cursor:not-allowed}

                    /* ================================================================
                       CATEGORY FILTER
                    ================================================================ */
                    .cat-filter{
                        display:flex;flex-wrap:wrap;gap:.5rem;
                        margin-bottom:0;
                    }
                    .cat-btn{
                        display:flex;align-items:center;gap:.45rem;
                        padding:.45rem 1rem;border-radius:99px;
                        font-size:.83rem;font-weight:500;
                        background:var(--surface);border:1px solid var(--border);
                        color:var(--text2);
                        transition:all .2s ease;
                    }
                    .cat-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
                    .cat-btn.active{
                        background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.4);
                        color:#fff;box-shadow:0 0 20px rgba(220,38,38,.15);
                    }
                    .cat-icon{font-size:.85rem;line-height:1}

                    /* ================================================================
                       TESTIMONIALS
                    ================================================================ */
                    .testi-grid{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;
                    }
                    .testi-card{
                        padding:1.6rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:1rem;
                        transition:all .25s ease;
                    }
                    .testi-card:hover{
                        border-color:rgba(220,38,38,.2);
                        box-shadow:0 8px 30px rgba(0,0,0,.3);
                        transform:translateY(-3px);
                    }
                    .testi-stars{display:flex;gap:.2rem;color:var(--gold)}
                    .testi-text{font-size:.92rem;color:var(--text2);line-height:1.65;font-style:italic;flex:1}
                    .testi-author{display:flex;align-items:center;gap:.8rem;margin-top:auto}
                    .testi-avatar{
                        width:36px;height:36px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;flex-shrink:0;
                        font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;
                        background:linear-gradient(135deg,rgba(220,38,38,.3),rgba(185,28,28,.5));
                        border:1px solid rgba(220,38,38,.3);color:#fff;
                    }
                    .testi-name{font-weight:600;font-size:.88rem}
                    .testi-role{font-size:.78rem;color:var(--muted)}

                    /* ================================================================
                       CTA BAND
                    ================================================================ */
                    .cta-band{
                        margin:2rem 0;
                        background:linear-gradient(135deg,rgba(220,38,38,.12) 0%,rgba(185,28,28,.08) 100%);
                        border-top:1px solid rgba(220,38,38,.15);
                        border-bottom:1px solid rgba(220,38,38,.15);
                        padding:3.5rem 0;
                    }
                    .cta-band-inner{
                        display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;
                    }
                    .cta-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.4rem,3vw,2rem);
                        font-weight:800;letter-spacing:-.03em;margin-bottom:.4rem;
                    }
                    .cta-sub{font-size:.95rem;color:var(--text2)}

                    /* ================================================================
                       PAGE LAYOUT
                    ================================================================ */
                    .page-wrap{padding:140px 0 6rem;min-height:100vh}

                    /* ================================================================
                       HOW IT WORKS
                    ================================================================ */
                    .hiw-section{
                        background:linear-gradient(180deg,transparent,rgba(220,38,38,.03),transparent);
                    }
                    .hiw-grid{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;
                        position:relative;
                    }
                    .hiw-card{
                        position:relative;padding:2rem 1.6rem;
                        border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        transition:all .28s ease;overflow:hidden;
                    }
                    .hiw-card::before{
                        content:'';position:absolute;inset:0;border-radius:inherit;
                        background:linear-gradient(135deg,rgba(220,38,38,.08) 0%,transparent 60%);
                        opacity:0;transition:opacity .3s;
                    }
                    .hiw-card:hover{border-color:rgba(220,38,38,.3);transform:translateY(-5px);box-shadow:var(--shadow-red)}
                    .hiw-card:hover::before{opacity:1}
                    .hiw-number{
                        font-family:'Syne',sans-serif;font-size:4rem;font-weight:900;
                        color:rgba(220,38,38,.08);line-height:1;
                        position:absolute;top:.8rem;right:1.2rem;
                        pointer-events:none;user-select:none;
                    }
                    .hiw-icon-wrap{
                        width:52px;height:52px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);margin-bottom:1.2rem;
                    }
                    .hiw-title{
                        font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;
                        margin-bottom:.6rem;
                    }
                    .hiw-desc{font-size:.88rem;color:var(--text2);line-height:1.65}
                    .hiw-arrow{
                        position:absolute;top:50%;right:-1.3rem;
                        transform:translateY(-50%);
                        font-size:1.3rem;color:rgba(220,38,38,.4);
                        z-index:2;pointer-events:none;
                    }

                    /* ================================================================
                       FAQ
                    ================================================================ */
                    .faq-section{padding-bottom:6rem}
                    .faq-list{
                        max-width:720px;margin:0 auto;
                        display:flex;flex-direction:column;gap:.65rem;
                    }
                    .faq-item{
                        border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .25s;
                    }
                    .faq-item.open{border-color:rgba(220,38,38,.3)}
                    .faq-q{
                        width:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem;
                        padding:1.1rem 1.3rem;text-align:left;
                        font-size:.93rem;font-weight:600;color:var(--text);
                        transition:background .2s;
                    }
                    .faq-q:hover{background:rgba(255,255,255,.03)}
                    .faq-item.open .faq-q{color:var(--red2)}
                    .faq-a-wrap{
                        overflow:hidden;transition:max-height .38s cubic-bezier(.25,.46,.45,.94);
                    }
                    .faq-a{
                        padding:.1rem 1.3rem 1.2rem;
                        font-size:.88rem;color:var(--text2);line-height:1.7;
                        border-top:1px solid rgba(255,255,255,.05);
                    }
                    .page-header{text-align:center;margin-bottom:3rem}
                    .page-title{
                        font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);
                        font-weight:900;letter-spacing:-.04em;margin-bottom:.5rem;
                    }
                    .page-sub{font-size:1rem;color:var(--text2)}

                    .back-btn{
                        display:inline-flex;align-items:center;gap:.5rem;margin-bottom:2.5rem;
                        font-size:.85rem;font-weight:500;color:var(--text2);
                        padding:.4rem .9rem;border-radius:var(--radius-sm);
                        border:1px solid var(--border);background:var(--surface);
                        transition:all .2s ease;
                    }
                    .back-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
                    .empty-state{
                        text-align:center;padding:4rem 2rem;
                        color:var(--muted);font-size:.95rem;
                    }

                    /* ================================================================
                       PRODUCT DETAIL
                    ================================================================ */
                    .detail-layout{
                        display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;align-items:start;
                        margin-bottom:3rem;
                    }
                    .detail-img-wrap{
                        border-radius:var(--radius-xl);overflow:hidden;
                        border:1px solid var(--border);position:relative;
                    }
                    .detail-popular-badge{
                        position:absolute;bottom:1rem;left:1rem;
                        display:flex;align-items:center;gap:.4rem;
                        padding:.4rem 1rem;border-radius:99px;
                        background:linear-gradient(135deg,#f59e0b,#d97706);
                        color:#fff;font-size:.78rem;font-weight:700;letter-spacing:.04em;
                        box-shadow:0 4px 16px rgba(245,158,11,.4);
                    }
                    .detail-meta-cards{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-top:1rem;
                    }
                    .detail-meta-card{
                        display:flex;align-items:center;gap:.7rem;
                        padding:.8rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .dmc-icon{
                        width:30px;height:30px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);
                        background:rgba(220,38,38,.1);color:var(--red2);
                    }
                    .dmc-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
                    .dmc-val{font-size:.82rem;font-weight:600;color:var(--text);margin-top:.1rem}

                    .detail-info-col{display:flex;flex-direction:column;gap:1.5rem}
                    .detail-header{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
                    .detail-category{
                        font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
                        color:var(--muted);padding:.25rem .7rem;border-radius:99px;
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .detail-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1.1;
                    }
                    .detail-desc{font-size:.98rem;color:var(--text2);line-height:1.7}
                    .detail-features-title{
                        font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
                        color:var(--muted);margin-bottom:.8rem;
                    }
                    .detail-features-list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
                    .detail-feat-item{
                        display:flex;align-items:center;gap:.7rem;
                        font-size:.92rem;color:var(--text2);
                    }
                    .feat-check{
                        width:22px;height:22px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:50%;background:rgba(34,197,94,.12);
                        border:1px solid rgba(34,197,94,.22);color:rgb(74,222,128);
                    }
                    .detail-variants{display:flex;flex-direction:column}
                    .variant-list{display:flex;flex-direction:column;gap:.5rem}
                    .variant-opt{
                        display:flex;align-items:center;justify-content:space-between;
                        padding:.75rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                        cursor:pointer;transition:all .2s ease;
                    }
                    .variant-opt:hover{border-color:var(--border2);background:var(--surface2)}
                    .variant-opt.active{
                        background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.4);
                    }
                    .variant-label{font-size:.9rem;font-weight:500}
                    .variant-price{
                        font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;
                        color:var(--red2);
                    }
                    .detail-buy{
                        display:flex;align-items:center;gap:1.5rem;
                        padding-top:1rem;border-top:1px solid var(--border);
                    }
                    .detail-price-wrap{display:flex;flex-direction:column}
                    .detail-price-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.15rem}
                    .detail-price{
                        font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;letter-spacing:-.04em;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }

                    .detail-extra-grid{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;
                        margin-top:3rem;
                    }
                    .detail-extra-card{
                        padding:1.5rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .detail-extra-card:hover{border-color:rgba(220,38,38,.2)}
                    .detail-extra-card h3{
                        font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;
                        margin-bottom:.7rem;
                    }
                    .detail-extra-card p{font-size:.87rem;color:var(--text2);line-height:1.65}

                    /* ================================================================
                       CART
                    ================================================================ */
                    .cart-layout{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
                    .cart-items-col{display:flex;flex-direction:column;gap:.75rem}
                    .cart-item{
                        display:grid;grid-template-columns:auto 1fr auto auto auto;
                        align-items:center;gap:1rem;
                        padding:1rem 1.2rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .cart-item:hover{border-color:var(--border2)}
                    .ci-info{flex:1}
                    .ci-name{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;margin-bottom:.2rem}
                    .ci-unit{font-size:.8rem;color:var(--muted)}
                    .ci-qty{
                        display:flex;align-items:center;gap:.5rem;
                        background:var(--surface);border:1px solid var(--border);
                        border-radius:var(--radius-sm);padding:.2rem;
                    }
                    .ci-qty button{
                        width:28px;height:28px;display:flex;align-items:center;justify-content:center;
                        border-radius:5px;font-size:1.1rem;font-weight:500;
                        color:var(--text2);transition:all .15s;
                    }
                    .ci-qty button:hover{background:var(--surface2);color:var(--text)}
                    .ci-qty span{font-weight:700;min-width:24px;text-align:center;font-size:.9rem}
                    .ci-total{
                        font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;
                        min-width:60px;text-align:right;
                    }
                    .ci-remove{
                        width:30px;height:30px;display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);color:var(--muted);transition:all .15s;
                    }
                    .ci-remove:hover{background:rgba(239,68,68,.12);color:var(--red2)}

                    .cart-summary-col{position:sticky;top:100px}
                    .cart-summary-card{
                        padding:1.6rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:1rem;
                    }
                    .summary-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
                    .summary-row{
                        display:flex;justify-content:space-between;align-items:center;
                        font-size:.9rem;color:var(--text2);
                    }
                    .free-badge{
                        font-size:.75rem;font-weight:700;padding:.2rem .6rem;border-radius:99px;
                        background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);
                        color:rgb(74,222,128);
                    }
                    .summary-sep{height:1px;background:var(--border);margin:.2rem 0}
                    .summary-total{
                        font-weight:700;color:var(--text);font-size:1rem;
                    }
                    .secure-note{
                        display:flex;align-items:center;gap:.5rem;
                        font-size:.78rem;color:var(--muted);
                        padding:.7rem;border-radius:var(--radius-sm);
                        background:rgba(255,255,255,.03);border:1px solid var(--border);
                    }
                    .empty-cart{
                        text-align:center;padding:5rem 2rem;
                        display:flex;flex-direction:column;align-items:center;gap:1.2rem;
                    }
                    .empty-icon{
                        width:80px;height:80px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:var(--surface);border:1px solid var(--border);
                        color:var(--muted);
                    }
                    .empty-cart h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
                    .empty-cart p{color:var(--muted)}

                    /* ================================================================
                       CHECKOUT
                    ================================================================ */
                    .checkout-layout{display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start}
                    .checkout-form-col{display:flex;flex-direction:column;gap:1.25rem}
                    .checkout-card{
                        padding:1.8rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .checkout-section-title{
                        font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;
                        margin-bottom:.35rem;
                    }
                    .checkout-hint{font-size:.84rem;color:var(--muted);margin-bottom:1.2rem;line-height:1.5}
                    .form-group{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}
                    .form-group:last-child{margin-bottom:0}
                    .form-label{font-size:.82rem;font-weight:600;color:var(--text2)}
                    .optional{color:var(--muted);font-weight:400}
                    .form-input{
                        padding:.75rem 1rem;border-radius:var(--radius);
                        background:rgba(255,255,255,.04);border:1px solid var(--border);
                        color:var(--text);font-size:.9rem;outline:none;
                        transition:border-color .2s,box-shadow .2s;
                    }
                    .form-input:focus{border-color:rgba(220,38,38,.5);box-shadow:0 0 0 3px rgba(220,38,38,.08)}
                    .form-input.input-error{border-color:rgba(239,68,68,.5)}
                    .form-error{font-size:.78rem;color:var(--red2)}
                    .payment-method-box{
                        display:flex;align-items:center;gap:1rem;
                        padding:1rem;border-radius:var(--radius);margin-bottom:1.2rem;
                        background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);
                    }
                    .pmb-icon{
                        width:40px;height:40px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);background:rgba(220,38,38,.15);color:var(--red2);
                    }
                    .pmb-name{font-weight:700;font-size:.92rem}
                    .pmb-desc{font-size:.8rem;color:var(--muted)}
                    .pmb-check{
                        margin-left:auto;width:22px;height:22px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:50%;background:rgba(34,197,94,.15);color:rgb(74,222,128);
                    }
                    .payment-note{
                        display:flex;align-items:center;gap:.45rem;
                        font-size:.8rem;color:var(--muted);margin-top:.8rem;
                    }

                    .checkout-summary-col{position:sticky;top:100px}
                    .checkout-summary-card{
                        padding:1.6rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:.7rem;
                    }
                    .co-item{
                        display:flex;justify-content:space-between;align-items:center;
                        font-size:.88rem;padding:.35rem 0;
                    }
                    .co-name{color:var(--text2)}
                    .co-price{font-weight:700;color:var(--text)}
                    .co-total-row{
                        display:flex;justify-content:space-between;align-items:center;
                        padding:.3rem 0;
                    }
                    .co-total-price{
                        font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:900;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .co-note{
                        display:flex;align-items:center;gap:.45rem;
                        font-size:.78rem;color:var(--muted);
                        padding:.6rem;border-radius:var(--radius-sm);
                        background:rgba(255,255,255,.03);border:1px solid var(--border);
                    }

                    /* ================================================================
                       CONFIRMATION
                    ================================================================ */
                    .confirm-box{
                        max-width:700px;margin:0 auto;
                        text-align:center;
                        padding:3rem 2rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .confirm-icon{
                        width:72px;height:72px;border-radius:50%;margin:0 auto 1.5rem;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(34,197,94,.12);border:2px solid rgba(34,197,94,.3);
                        color:rgb(74,222,128);
                        box-shadow:0 0 30px rgba(34,197,94,.15);
                        animation:confirmPop .5s cubic-bezier(.25,1.5,.5,1) both;
                    }
                    @keyframes confirmPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
                    .confirm-title{
                        font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;
                        letter-spacing:-.04em;margin-bottom:.8rem;
                    }
                    .confirm-msg{font-size:.93rem;color:var(--text2);line-height:1.7;margin-bottom:1.5rem}

                    .order-id-box{
                        max-width:440px;margin:0 auto 2rem;
                        padding:1.5rem;border-radius:var(--radius-lg);
                        background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.3);
                        text-align:center;
                    }
                    .oid-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem}
                    .oid-value{
                        font-family:'Syne',monospace;font-size:1.8rem;font-weight:900;
                        letter-spacing:.08em;color:var(--red2);user-select:all;
                        margin-bottom:.5rem;
                    }
                    .oid-hint{font-size:.8rem;color:var(--muted);line-height:1.55;margin-bottom:1rem}
                    .btn-copy{
                        padding:.4rem 1.2rem;border-radius:var(--radius-sm);
                        background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.3);
                        color:#fff;font-size:.82rem;font-weight:600;
                        transition:all .2s;
                    }
                    .btn-copy:hover{background:rgba(220,38,38,.3);border-color:rgba(220,38,38,.5)}

                    .confirm-steps{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;
                        margin:2rem 0;text-align:center;
                    }
                    .confirm-step{
                        padding:1.2rem;border-radius:var(--radius-lg);
                        background:rgba(255,255,255,.03);border:1px solid var(--border);
                    }
                    .cs-icon{
                        width:44px;height:44px;border-radius:50%;margin:0 auto .8rem;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);
                    }
                    .cs-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;margin-bottom:.3rem}
                    .cs-desc{font-size:.8rem;color:var(--muted)}
                    .confirm-actions{
                        display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;
                    }

                    /* ================================================================
                       TOAST
                    ================================================================ */
                    .toast{
                        position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:9999;
                        display:flex;align-items:center;gap:.6rem;
                        padding:.8rem 1.6rem;border-radius:var(--radius);
                        font-weight:600;font-size:.9rem;white-space:nowrap;
                        backdrop-filter:blur(20px);
                        animation:toastIn .35s cubic-bezier(.25,1.5,.5,1) both;
                        box-shadow:var(--shadow);
                    }
                    .toast.success{
                        background:rgba(22,101,52,.3);border:1px solid rgba(34,197,94,.35);
                        color:rgb(187,247,208);
                    }
                    .toast.error{
                        background:rgba(127,29,29,.3);border:1px solid rgba(239,68,68,.35);
                        color:rgb(254,202,202);
                    }
                    @keyframes toastIn{
                        from{transform:translateX(-50%) translateY(20px);opacity:0}
                        to{transform:translateX(-50%) translateY(0);opacity:1}
                    }

                    /* ================================================================
                       FOOTER
                    ================================================================ */
                    .footer{
                        position:relative;padding:5rem 0 2rem;
                        background:linear-gradient(180deg,transparent,rgba(0,0,0,.3));
                        border-top:1px solid var(--border);margin-top:6rem;
                        overflow:hidden;
                    }
                    .footer-glow{
                        position:absolute;top:0;left:15%;right:15%;height:1px;
                        background:linear-gradient(90deg,transparent,rgba(220,38,38,.4),transparent);
                    }
                    .footer-grid{
                        display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;
                        margin-bottom:3rem;
                    }
                    .footer-logo{
                        font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900;
                        background:linear-gradient(135deg,#fff 30%,var(--red2) 100%);
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        margin-bottom:.8rem;
                    }
                    .footer-tagline{font-size:.88rem;color:var(--text2);line-height:1.6;margin-bottom:1.2rem}
                    .footer-discord{
                        display:inline-flex;align-items:center;gap:.5rem;
                        padding:.5rem 1rem;border-radius:var(--radius-sm);
                        font-size:.83rem;font-weight:600;
                        background:rgba(88,101,242,.12);border:1px solid rgba(88,101,242,.25);
                        color:rgba(255,255,255,.8);transition:all .2s;
                    }
                    .footer-discord:hover{background:rgba(88,101,242,.22);color:#fff}
                    .footer-col-title{
                        font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
                        color:var(--muted);margin-bottom:1.1rem;
                    }
                    .footer-link{
                        display:block;font-size:.86rem;color:var(--text2);margin-bottom:.55rem;
                        cursor:pointer;background:none;border:none;text-align:left;
                        transition:color .15s ease,padding-left .15s ease;
                    }
                    .footer-link:hover{color:var(--text);padding-left:4px}
                    .footer-badges{display:flex;flex-wrap:wrap;gap:.5rem}
                    .footer-badge{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.3rem .75rem;border-radius:99px;
                        font-size:.76rem;font-weight:500;color:var(--text2);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .footer-bottom{
                        padding-top:2rem;border-top:1px solid var(--border);
                        display:flex;justify-content:space-between;align-items:center;
                        font-size:.82rem;color:var(--muted);
                    }

                    /* ================================================================
                       CUSTOMER PANEL — CSS complet
                    ================================================================ */

                    /* Header */
                    .cph-header{
                        display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
                        padding:2rem;border-radius:var(--radius-xl);
                        background:linear-gradient(135deg,rgba(220,38,38,.08) 0%,rgba(255,255,255,.03) 100%);
                        border:1px solid rgba(220,38,38,.2);
                        margin-bottom:2rem;
                    }
                    .cph-avatar{
                        width:68px;height:68px;flex-shrink:0;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.12);border:2px solid rgba(220,38,38,.3);
                        color:var(--red2);
                        box-shadow:0 0 30px rgba(220,38,38,.15);
                    }
                    .cph-info{flex:1}
                    .cph-greeting{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem}
                    .cph-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1.05;
                    }
                    .cph-title em{font-style:normal;background:linear-gradient(135deg,var(--red2),var(--red3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
                    .cph-sub{font-size:.88rem;color:var(--text2);margin-top:.3rem}
                    .cph-stats{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-left:auto}
                    .cph-stat-item{display:flex;flex-direction:column;align-items:center;padding:.8rem 1.4rem}
                    .cph-stat-sep{width:1px;height:40px;background:var(--border)}
                    .cph-stat-n{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--text)}
                    .cph-stat-l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.1rem}

                    /* Tabs */
                    .cph-tabs{
                        display:flex;gap:.4rem;flex-wrap:wrap;
                        padding:.5rem;border-radius:var(--radius-lg);
                        background:rgba(255,255,255,.03);border:1px solid var(--border);
                        margin-bottom:1.5rem;
                    }
                    .cph-tab{
                        display:flex;align-items:center;gap:.5rem;flex:1;
                        padding:.65rem 1rem;border-radius:var(--radius);
                        font-size:.85rem;font-weight:600;color:var(--text2);
                        transition:all .2s ease;justify-content:center;
                        min-width:120px;
                    }
                    .cph-tab:hover{background:rgba(255,255,255,.05);color:var(--text)}
                    .cph-tab.active{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.3);color:#fff}

                    /* Panel container */
                    .cph-panel{animation:phFadeIn .35s ease both}

                    /* Empty state */
                    .cph-empty{
                        text-align:center;padding:4rem 2rem;
                        display:flex;flex-direction:column;align-items:center;gap:1rem;
                    }
                    .cph-empty-icon{
                        width:80px;height:80px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:var(--surface);border:1px solid var(--border);color:var(--muted);
                    }
                    .cph-empty h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800}
                    .cph-empty p{font-size:.9rem;color:var(--muted);max-width:440px}
                    .cph-empty-hint{
                        display:flex;align-items:center;gap:.5rem;
                        font-size:.82rem;color:var(--text2);
                        padding:.8rem 1.2rem;border-radius:var(--radius);
                        background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.15);
                    }

                    /* Orders list */
                    .cph-orders-list{display:flex;flex-direction:column;gap:.9rem}
                    .cph-orders-head{
                        display:flex;align-items:center;justify-content:space-between;
                        font-size:.82rem;color:var(--muted);padding:0 .25rem .5rem;
                    }
                    .cph-clear-btn{
                        font-size:.78rem;color:var(--muted);padding:.25rem .6rem;
                        border:1px solid var(--border);border-radius:var(--radius-sm);
                        background:none;cursor:pointer;transition:all .2s;
                    }
                    .cph-clear-btn:hover{border-color:rgba(239,68,68,.4);color:var(--red2)}
                    .cph-order-card{
                        border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .2s;
                        animation:cardReveal .45s ease both;
                    }
                    .cph-order-card:hover{border-color:rgba(220,38,38,.25)}
                    .cph-oc-top{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem .75rem;flex-wrap:wrap}
                    .cph-oc-id{display:flex;align-items:center;gap:.5rem}
                    .cph-oc-id-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.15rem .5rem;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
                    .cph-oc-id-val{font-family:'Syne',monospace;font-size:.95rem;font-weight:800;color:var(--red2);letter-spacing:.04em}
                    .cph-oc-status{
                        display:inline-flex;align-items:center;gap:.4rem;
                        font-size:.72rem;font-weight:700;padding:.25rem .75rem;border-radius:99px;
                        margin-left:auto;
                    }
                    .cph-oc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
                    .cph-oc-products{
                        display:flex;flex-direction:column;gap:.35rem;
                        padding:0 1.2rem .75rem;
                    }
                    .cph-oc-item{
                        display:flex;align-items:center;justify-content:space-between;gap:1rem;
                        font-size:.85rem;color:var(--text2);padding:.4rem .7rem;
                        border-radius:var(--radius-sm);background:rgba(255,255,255,.02);
                    }
                    .cph-oc-item-price{color:var(--muted);font-size:.78rem;white-space:nowrap;flex-shrink:0}
                    .cph-oc-footer{
                        display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
                        padding:.6rem 1.2rem;border-top:1px solid var(--border);
                        font-size:.78rem;color:var(--muted);
                    }
                    .cph-oc-total{margin-left:auto;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:var(--text)}
                    .cph-oc-actions{
                        display:flex;gap:.5rem;padding:.75rem 1.2rem;
                        border-top:1px solid rgba(255,255,255,.04);
                    }
                    .cph-oc-action-btn{
                        display:inline-flex;align-items:center;gap:.4rem;
                        padding:.38rem .9rem;border-radius:var(--radius-sm);
                        font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;
                    }
                    .cph-oc-action-btn.discord{background:rgba(88,101,242,.12);border:1px solid rgba(88,101,242,.25);color:rgba(148,166,255,.9);text-decoration:none}
                    .cph-oc-action-btn.discord:hover{background:rgba(88,101,242,.22);color:#fff}
                    .cph-oc-action-btn.copy{background:var(--surface);border:1px solid var(--border);color:var(--text2)}
                    .cph-oc-action-btn.copy:hover{background:var(--surface2);color:var(--text)}

                    /* Lookup tab */
                    .cph-lookup-wrap{
                        max-width:560px;margin:0 auto;text-align:center;
                        display:flex;flex-direction:column;align-items:center;gap:1.2rem;
                        padding:2rem 0;
                    }
                    .cph-lookup-icon-big{
                        width:72px;height:72px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:2px solid rgba(220,38,38,.25);
                        color:var(--red2);box-shadow:0 0 30px rgba(220,38,38,.12);
                    }
                    .cph-lookup-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:-.03em}
                    .cph-lookup-sub{font-size:.9rem;color:var(--text2);line-height:1.6}
                    .cph-lookup-box{display:flex;gap:.6rem;width:100%}
                    .cph-lookup-input{flex:1;min-width:0;font-family:'Syne',monospace;letter-spacing:.04em}
                    .cph-spinner{
                        width:16px;height:16px;border-radius:50%;
                        border:2px solid rgba(255,255,255,.2);border-top-color:#fff;
                        animation:spin .7s linear infinite;display:inline-block;
                    }
                    @keyframes spin{to{transform:rotate(360deg)}}
                    .cph-lookup-result{
                        width:100%;border-radius:var(--radius-lg);padding:1.3rem;text-align:left;
                        animation:phFadeIn .35s ease both;
                    }
                    .cph-lookup-result.found{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.22)}
                    .cph-lookup-result.not-found{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);text-align:center;display:flex;flex-direction:column;align-items:center;gap:.6rem}
                    .clr-header{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem;flex-wrap:wrap}
                    .clr-check{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(34,197,94,.15);color:rgb(74,222,128);flex-shrink:0}
                    .clr-title{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
                    .clr-id{font-family:'Syne',monospace;font-size:1rem;font-weight:800;color:var(--red2)}
                    .clr-detail{display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.82rem;color:var(--text2)}
                    .clr-notfound-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.12);color:var(--red2)}
                    .clr-notfound-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800}
                    .clr-notfound-title + p{font-size:.85rem;color:var(--text2);line-height:1.6}
                    .cph-lookup-tip{
                        display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--muted);
                        padding:.7rem 1rem;border-radius:var(--radius-sm);
                        background:rgba(255,255,255,.03);border:1px solid var(--border);width:100%;
                    }

                    /* Support tab */
                    .cph-support-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
                    .cph-support-col{display:flex;flex-direction:column;gap:1rem}
                    .cph-sub-title{
                        display:flex;align-items:center;gap:.5rem;
                        font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:.2rem;
                    }
                    .cph-faq-list{display:flex;flex-direction:column;gap:.5rem}
                    .cph-faq-item{
                        border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .2s;
                    }
                    .cph-faq-item[open]{border-color:rgba(220,38,38,.25)}
                    .cph-faq-q{
                        padding:.85rem 1rem;font-size:.88rem;font-weight:600;cursor:pointer;
                        list-style:none;transition:background .2s;color:var(--text);
                    }
                    .cph-faq-q:hover{background:rgba(255,255,255,.03)}
                    .cph-faq-item[open] .cph-faq-q{color:var(--red2)}
                    .cph-faq-a{padding:.5rem 1rem 1rem;font-size:.85rem;color:var(--text2);line-height:1.65;border-top:1px solid rgba(255,255,255,.05)}
                    .cph-support-links{display:flex;flex-direction:column;gap:.6rem}
                    .cph-support-link{
                        display:flex;align-items:center;gap:.9rem;padding:1rem 1.1rem;
                        border-radius:var(--radius-lg);text-decoration:none;transition:all .2s;
                    }
                    .cph-support-link.discord{background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.22);color:rgba(148,166,255,.9)}
                    .cph-support-link.discord:hover{background:rgba(88,101,242,.18);color:#fff}
                    .cph-support-link strong{display:block;font-size:.88rem;font-weight:700}
                    .cph-support-link span{display:block;font-size:.76rem;opacity:.65;margin-top:.1rem}
                    .cph-message-form{display:flex;flex-direction:column;gap:.9rem}
                    .cph-textarea{resize:vertical;min-height:100px;line-height:1.55}
                    .cph-msg-note{font-size:.76rem;color:var(--muted);display:flex;align-items:center;gap:.4rem}
                    .cph-sent-box{
                        text-align:center;padding:2.5rem 1rem;
                        display:flex;flex-direction:column;align-items:center;gap:.8rem;
                        border-radius:var(--radius-xl);background:var(--surface);border:1px solid var(--border);
                    }
                    .cph-sent-icon{
                        width:60px;height:60px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(34,197,94,.12);border:2px solid rgba(34,197,94,.3);
                        color:rgb(74,222,128);
                    }
                    .cph-sent-box h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
                    .cph-sent-box p{font-size:.86rem;color:var(--text2)}

                    /* Settings tab */
                    .cph-settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
                    .cph-settings-card{
                        padding:1.5rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:.8rem;
                        transition:border-color .2s;
                    }
                    .cph-settings-card:hover{border-color:rgba(220,38,38,.2)}
                    .cph-settings-icon{
                        width:40px;height:40px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.18);color:var(--red2);
                    }
                    .cph-settings-card h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800}
                    .cph-settings-card p{font-size:.84rem;color:var(--text2);line-height:1.6}
                    .cph-settings-card em{color:var(--muted);font-style:normal}
                    .cph-notif-row{display:flex;gap:.6rem}
                    .cph-notif-row .form-input{flex:1;min-width:0}
                    .cph-danger-btn{border-color:rgba(239,68,68,.25)!important;color:var(--red2)!important}
                    .cph-danger-btn:hover{background:rgba(239,68,68,.08)!important;border-color:rgba(239,68,68,.5)!important}
                    .cph-privacy-pills{display:flex;gap:.5rem;flex-wrap:wrap}
                    .cph-privacy-pill{
                        display:inline-flex;align-items:center;gap:.35rem;
                        font-size:.72rem;font-weight:600;padding:.25rem .65rem;border-radius:99px;
                        background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:rgb(74,222,128);
                    }

                    /* Nav panel button */
                    .nav-panel-btn{
                        display:flex;align-items:center;gap:.45rem;
                        padding:.42rem 1rem;border-radius:var(--radius-sm);
                        font-size:.85rem;font-weight:500;color:var(--text2);
                        background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.18);
                        transition:all .2s ease;
                    }
                    .nav-panel-btn:hover,.nav-panel-btn.active{background:rgba(220,38,38,.15);color:var(--text);border-color:rgba(220,38,38,.35)}
                    .drawer-link-badge{margin-left:auto;font-size:.65rem;font-weight:700;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:.15rem .5rem;border-radius:99px}

                    /* Responsive panel */
                    @media(max-width:900px){
                        .cph-support-grid{grid-template-columns:1fr}
                        .cph-settings-grid{grid-template-columns:1fr}
                    }
                    @media(max-width:768px){
                        .nav-panel-btn span:not(:last-child){display:none}
                        .cph-header{flex-direction:column;text-align:center}
                        .cph-stats{margin-left:0;width:100%}
                        .cph-stat-item{flex:1}
                        .cph-tab{font-size:.78rem;padding:.55rem .6rem;min-width:80px}
                        .cph-lookup-box{flex-direction:column}
                        .cph-notif-row{flex-direction:column}
                    }
                        display:flex;align-items:center;gap:.45rem;
                        padding:.42rem 1rem;border-radius:var(--radius-sm);
                        font-size:.85rem;font-weight:500;color:var(--text2);
                        background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.18);
                        transition:all .2s ease;position:relative;
                    }
                    .nav-panel-btn:hover,.nav-panel-btn.active{
                        background:rgba(220,38,38,.15);color:var(--text);border-color:rgba(220,38,38,.35);
                    }
                    .nav-panel-badge{
                        font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
                        background:linear-gradient(135deg,#f59e0b,#d97706);
                        color:#fff;padding:.1rem .4rem;border-radius:99px;
                    }
                    .drawer-link-badge{
                        margin-left:auto;font-size:.65rem;font-weight:700;
                        background:linear-gradient(135deg,#f59e0b,#d97706);
                        color:#fff;padding:.15rem .5rem;border-radius:99px;
                    }

                    /* ================================================================
                       CUSTOMER PANEL
                    ================================================================ */
                    .cp-hero{
                        text-align:center;padding:2rem 0 3rem;
                        display:flex;flex-direction:column;align-items:center;gap:1.2rem;
                    }
                    .cp-hero-badge{
                        display:inline-flex;align-items:center;gap:.5rem;
                        padding:.4rem 1.1rem;border-radius:99px;
                        background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
                        font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
                        color:rgba(251,191,36,.9);
                    }
                    .cp-badge-dot{
                        width:6px;height:6px;border-radius:50%;background:#f59e0b;
                        box-shadow:0 0 8px rgba(245,158,11,.7);
                        animation:pulse 2s ease-in-out infinite;
                    }
                    .cp-title{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(2.5rem,6vw,4rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1;
                    }
                    .cp-title em{
                        font-style:normal;
                        background:linear-gradient(135deg,var(--red2),var(--red3));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .cp-subtitle{
                        font-size:1rem;color:var(--text2);max-width:520px;line-height:1.7;
                    }

                    /* Order lookup card */
                    .cp-lookup-card{
                        display:flex;align-items:flex-start;gap:1.2rem;
                        max-width:640px;width:100%;
                        padding:1.8rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        margin-top:.5rem;text-align:left;
                    }
                    .cp-lookup-icon{
                        width:48px;height:48px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius);
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);
                    }
                    .cp-lookup-content{flex:1;display:flex;flex-direction:column;gap:.7rem}
                    .cp-lookup-content h3{
                        font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;
                    }
                    .cp-lookup-content p{font-size:.85rem;color:var(--text2)}
                    .cp-lookup-form{display:flex;gap:.6rem}
                    .cp-lookup-input{flex:1;min-width:0}
                    .cp-status-result{
                        display:flex;align-items:flex-start;gap:.8rem;
                        padding:1rem;border-radius:var(--radius);
                        background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);
                        animation:phFadeIn .35s ease both;
                    }
                    .cp-status-icon{
                        color:#f59e0b;margin-top:.1rem;flex-shrink:0;
                    }
                    .cp-status-label{font-size:.83rem;font-weight:600;margin-bottom:.3rem}
                    .cp-status-value{font-size:.8rem;color:var(--text2);line-height:1.55}

                    /* Features grid */
                    .cp-section-head{text-align:center;margin:3.5rem 0 2rem}
                    .cp-section-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.5rem,3vw,2.2rem);
                        font-weight:900;letter-spacing:-.03em;margin-top:.4rem;
                    }
                    .cp-features-grid{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;
                        margin-bottom:3rem;
                    }
                    .cp-feat-card{
                        padding:1.5rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:.7rem;
                        position:relative;overflow:hidden;
                        animation:cardReveal .5s ease both;
                        transition:border-color .25s,transform .25s;
                    }
                    .cp-feat-card:hover{border-color:rgba(220,38,38,.25);transform:translateY(-3px)}
                    .cp-feat-card::before{
                        content:'';position:absolute;inset:0;
                        background:linear-gradient(135deg,rgba(220,38,38,.05) 0%,transparent 60%);
                        opacity:0;transition:opacity .25s;
                    }
                    .cp-feat-card:hover::before{opacity:1}
                    .cp-feat-top{display:flex;align-items:center;justify-content:space-between}
                    .cp-feat-icon{
                        width:42px;height:42px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.18);
                        color:var(--red2);
                    }
                    .cp-soon-badge{
                        font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
                        padding:.2rem .55rem;border-radius:99px;
                        background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);
                        color:rgba(251,191,36,.85);
                    }
                    .cp-feat-title{
                        font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;
                    }
                    .cp-feat-desc{font-size:.82rem;color:var(--text2);line-height:1.6;flex:1}
                    .cp-feat-bar{
                        height:3px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;
                        margin-top:.3rem;
                    }
                    .cp-feat-bar-fill{
                        height:100%;border-radius:99px;
                        background:linear-gradient(90deg,var(--red),var(--red3));
                        transition:width .8s cubic-bezier(.25,.46,.45,.94);
                    }
                    .cp-feat-progress{font-size:.7rem;color:var(--muted)}

                    /* Timeline */
                    .cp-timeline-card{
                        padding:2.5rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        margin-bottom:2rem;
                    }
                    .cp-timeline{
                        display:flex;align-items:flex-start;gap:0;
                        position:relative;
                    }
                    .cp-tl-item{
                        flex:1;display:flex;flex-direction:column;align-items:center;
                        position:relative;text-align:center;
                    }
                    .cp-tl-dot{
                        width:36px;height:36px;border-radius:50%;z-index:1;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);
                        color:var(--muted);margin-bottom:1rem;
                        transition:all .3s;
                    }
                    .cp-tl-item.done .cp-tl-dot{
                        background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:rgb(74,222,128);
                    }
                    .cp-tl-item.active .cp-tl-dot{
                        background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.5);
                        box-shadow:0 0 20px rgba(220,38,38,.3);
                    }
                    .cp-tl-pulse{
                        width:10px;height:10px;border-radius:50%;background:var(--red2);
                        animation:pulse 1.5s ease-in-out infinite;
                    }
                    .cp-tl-line{
                        position:absolute;top:18px;left:calc(50% + 18px);
                        width:calc(100% - 36px);height:2px;
                        background:linear-gradient(90deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
                    }
                    .cp-tl-item.done .cp-tl-line{background:rgba(34,197,94,.3)}
                    .cp-tl-content{display:flex;flex-direction:column;gap:.25rem;padding:0 .5rem}
                    .cp-tl-phase{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
                    .cp-tl-label{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:var(--text)}
                    .cp-tl-item.active .cp-tl-label{color:var(--red2)}
                    .cp-tl-desc{font-size:.78rem;color:var(--text2);line-height:1.5}

                    /* Discord CTA */
                    .cp-discord-cta{
                        display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
                        padding:2rem;border-radius:var(--radius-xl);
                        background:rgba(88,101,242,.08);border:1px solid rgba(88,101,242,.2);
                        margin-bottom:4rem;
                    }
                    .cp-discord-icon{
                        width:56px;height:56px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius);background:rgba(88,101,242,.15);
                        border:1px solid rgba(88,101,242,.3);color:rgba(148,166,255,.9);
                    }
                    .cp-discord-cta h3{
                        font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:.3rem;
                    }
                    .cp-discord-cta p{font-size:.85rem;color:var(--text2)}
                    .cp-discord-cta .btn-primary{margin-left:auto;flex-shrink:0}

                    /* Responsive for customer panel */
                    @media(max-width:768px){
                        .nav-panel-btn span:not(.nav-panel-badge){display:none}
                        .cp-features-grid{grid-template-columns:1fr 1fr}
                        .cp-timeline{flex-direction:column;gap:1.5rem}
                        .cp-tl-item{flex-direction:row;text-align:left;gap:1rem;align-items:flex-start}
                        .cp-tl-dot{margin-bottom:0;flex-shrink:0}
                        .cp-tl-line{display:none}
                        .cp-discord-cta{flex-direction:column;text-align:center}
                        .cp-discord-cta .btn-primary{margin-left:0;width:100%;justify-content:center}
                        .cp-lookup-form{flex-direction:column}
                        .cp-lookup-card{flex-direction:column}
                    }
                    @media(max-width:480px){
                        .cp-features-grid{grid-template-columns:1fr}
                    }
                    @media(max-width:1200px){
                        .product-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
                    }
                    @media(max-width:1024px){
                        .features-grid{grid-template-columns:repeat(2,1fr)}
                        .testi-grid{grid-template-columns:repeat(2,1fr)}
                        .footer-grid{grid-template-columns:1fr 1fr}
                        .detail-layout{grid-template-columns:1fr}
                        .detail-meta-cards{grid-template-columns:repeat(3,1fr)}
                        .cart-layout{grid-template-columns:1fr}
                        .cart-summary-col{position:static}
                        .checkout-layout{grid-template-columns:1fr}
                        .checkout-summary-col{position:static}
                        .hiw-grid{grid-template-columns:1fr;gap:1rem}
                        .hiw-arrow{display:none}
                    }
                    @media(max-width:768px){
                        :root{ --nav-bottom: 96px; }
                        .ticker-bar{height:24px}
                        .ticker-item{font-size:.63rem;padding:0 1.4rem}
                        .navbar{top:36px;width:calc(100% - 1.2rem);border-radius:16px}
                        .nav-links{display:none}
                        .nav-burger{display:flex}
                        .nav-discord span{display:none}
                        .hero{padding:120px 1.2rem 3rem}
                        .hero-stats{flex-wrap:wrap}
                        .hero-stat-item{padding:.65rem 1rem}
                        .hero-actions{flex-direction:column;align-items:stretch}
                        .hero-actions .btn-primary,.hero-actions .btn-ghost{justify-content:center}
                        .section{padding:3.5rem 0}
                        .testi-grid{grid-template-columns:1fr}
                        .features-grid{grid-template-columns:repeat(2,1fr)}
                        .product-grid{grid-template-columns:repeat(2,1fr);gap:1rem}
                        .detail-extra-grid{grid-template-columns:1fr}
                        .detail-meta-cards{grid-template-columns:1fr}
                        .confirm-steps{grid-template-columns:1fr;gap:.75rem}
                        .footer-grid{grid-template-columns:1fr;gap:2rem}
                        .footer-bottom{flex-direction:column;gap:.5rem;text-align:center}
                        .cta-band-inner{flex-direction:column;text-align:center}
                        .cart-item{grid-template-columns:auto 1fr;grid-template-rows:auto auto auto}
                        .ci-qty,.ci-total,.ci-remove{grid-column:span 2}
                        .page-wrap{padding:110px 0 5rem}
                        .ph-title{font-size:1.8rem}
                        .products-grid-wrap{padding:1.5rem 0 4rem}
                    }
                    @media(max-width:480px){
                        :root{ --nav-bottom: 88px; }
                        .product-grid{grid-template-columns:1fr 1fr;gap:.7rem}
                        .pcard-img-wrap{height:145px}
                        .features-grid{grid-template-columns:1fr}
                        .confirm-box{padding:1.5rem 1rem}
                        .faq-list{padding:0 .25rem}
                        .hero-brand{font-size:5.5rem}
                        .cat-filter{flex-wrap:nowrap;overflow-x:auto;padding-bottom:.25rem}
                        .cat-filter::-webkit-scrollbar{height:0}
                    }
                `}</style>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalShop/>);
</script>
</body>
</html>
