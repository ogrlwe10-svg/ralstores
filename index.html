                        .product-detail-footer {
                            display: flex;
                            align-items: center;
                            gap: 2rem;
                            margin-top: 2rem;
                            padding-top: 2rem;
                            border-top: 1px solid rgba(255,255,255,0.07);
                        }
                        .product-extra-info {
                            display: grid;
                            grid-template-columns: repeat(3, minmax(0, 1fr));
                            gap: 1rem;
                        }
                        .product-extra-card {
                            background: var(--grad-surface);
                            border: 1px solid var(--line);
                            border-radius: var(--r-md);
                            padding: 1.25rem 1.2rem;
                        }
                        .product-extra-card h3 {
                            font-size: 1rem;
                            margin-bottom: 0.7rem;
                        }
                        .product-extra-card p {
                            color: var(--text-2);
                            font-size: 0.93rem;
                            line-height: 1.7;
                        }
                        .price-label {
                            font-size: 0.78rem;
                            font-weight: 600;
                            text-transform: uppercase;
                            letter-spacing: 0.06em;
                            color: var(--muted);
                            display: block;
                            margin-bottom: 0.25rem;
                        }
                        .price-amount-large {
                            font-size: 2.2rem;
                            font-weight: 800;
                            letter-spacing: -0.05em;
                            background: linear-gradient(135deg, #ffffff 0%, #fca5a5 50%, #ef4444 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }

                        /* ====================================================
                           CART
                        ==================================================== */
                        .empty-cart {
                            text-align: center;
                            padding: 6rem 2rem;
                            color: var(--muted);
                        }
                        .empty-cart h2 {
                            font-size: 1.8rem;
                            margin: 1.5rem 0 0.75rem;
                            color: var(--text-2);
                        }
                        .empty-cart p { margin-bottom: 2.5rem; }

                        .cart-content {
                            display: grid;
                            grid-template-columns: minmax(0, 1fr) 360px;
                            gap: 2rem;
                            align-items: start;
                        }
                        .cart-items {
                            display: flex; flex-direction: column; gap: 1rem;
                        }
                        .cart-item {
                            display: grid;
                            grid-template-columns: auto 1fr auto auto auto;
                            gap: 1.2rem;
                            align-items: center;
                            background: var(--grad-surface);
                            border: 1px solid var(--line);
                            border-radius: var(--r-md);
                            padding: 1.4rem;
                            box-shadow: var(--shadow-sm);
                            transition: all 0.28s ease;
                        }
                        .cart-item:hover {
                            border-color: var(--line-red-soft);
                            transform: translateY(-3px);
                            box-shadow: var(--shadow), var(--shadow-red);

                        .cart-item-info h3 { font-size: 0.98rem; margin-bottom: 0.2rem; }

                            display: flex;

                            background: none; border: none;

                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;

                            font-weight: 700;
                            transition: background 0.2s ease;
                        }
                        .cart-item-quantity button:hover { background: rgba(255,255,255,0.1); }
                        .cart-item-quantity span { font-weight: 700; min-width: 24px; text-align: center; }
                        .cart-item-total { font-weight: 700; color: #fca5a5; font-size: 1.05rem; }
                        .cart-item-remove {
                            background: none; border: none;
                            color: rgba(239,68,68,0.6);
                            cursor: pointer;
                            padding: 0.45rem;
                            border-radius: 7px;
                            transition: all 0.2s ease;
                            font-size: 1rem;

                        .cart-item-remove:hover {
                            background: rgba(239,68,68,0.1);

                        /* Cart summary */
                        .cart-summary {
                            position: sticky;
                            top: 100px;
                            background:
                                var(--grad-surface),
                                radial-gradient(circle at top, rgba(220,38,38,0.1), transparent 55%);

                            border-radius: var(--r-lg);

                            color: var(--muted);

                            display: flex;
                            justify-content: space-between;

                        .btn-checkout { width: 100%; margin-bottom: 0.85rem; justify-content: center; }
                        .secure-badge {
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.5rem;
                            color: var(--muted);
                            font-size: 0.8rem;

                        /* ====================================================
                           CHECKOUT
                        ==================================================== */
                        .checkout-container {
                            display: grid;
                            grid-template-columns: minmax(0, 1fr) 360px;
                            gap: 2rem;
                            align-items: start;

                        .checkout-form { display: flex; flex-direction: column; gap: 2rem; }

                                var(--grad-surface),

                            box-shadow: var(--shadow-sm);
                            position: relative;
                        }

                            content: '';

                            background: linear-gradient(90deg, transparent, rgba(220,38,38,0.4), transparent);

                        .checkout-section h2 { margin-bottom: 0.5rem; font-size: 1.2rem; }

                            margin-bottom: 0.55rem;

                            font-size: 0.9rem;
                            color: var(--text-2);

                        .input-field {
                            width: 100%;
                            background: rgba(0,0,0,0.3);

                        .input-error { border-color: rgba(239,68,68,0.6) !important; }

                        .discord-order-box {
                            display: grid;
                            grid-template-columns: auto 1fr;
                            gap: 1.2rem;
                            align-items: start;
                            padding: 1.2rem;
                            margin-bottom: 1.25rem;
                            background: rgba(220,38,38,0.08);
                            border: 1px solid rgba(220,38,38,0.2);
                            border-radius: 12px;

                            background: var(--grad-red);
                            display: flex;
                            align-items: center;
                            justify-content: center;

                            box-shadow: 0 4px 14px rgba(220,38,38,0.3);

                            width: 100%;

                            color: white;
                            border: none;
                            padding: 1rem;
                            border-radius: 11px;
                            font-size: 1rem;
                            font-weight: 700;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.6rem;
                            transition: all 0.25s ease;
                            box-shadow: 0 8px 24px rgba(220,38,38,0.28);
                        }

                            transform: translateY(-2px);

                        .paypalme-btn {
                            width: 100%;
                            min-height: 54px;
                            border: none;
                            border-radius: 12px;
                            background:
                                linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 45%),
                                var(--grad-red);
                            color: white;
                            font-size: 1rem;
                            font-weight: 800;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.6rem;
                            box-shadow: 0 18px 45px rgba(220,38,38,0.3);
                            transition: all 0.28s ease;
                            position: relative;
                            overflow: hidden;
                            letter-spacing: -0.01em;
                        }
                        .paypalme-btn::before {
                            content: '';
                            position: absolute; inset: 0;
                            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
                            transform: translateX(-130%) skewX(-20deg);
                            transition: transform 0.8s ease;
                        }
                        .paypalme-btn:hover {
                            transform: translateY(-3px) scale(1.01);
                            box-shadow: 0 24px 60px rgba(220,38,38,0.4);
                        }
                        .paypalme-btn:hover::before { transform: translateX(130%) skewX(-20deg); }

                        .payment-info {
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.5rem;
                            color: var(--muted);
                            font-size: 0.84rem;
                            margin-top: 1rem;
                        }
                        .payment-warning {
                            background: rgba(251,191,36,0.08);
                            border: 1px solid rgba(251,191,36,0.2);
                            color: #fde68a;
                            padding: 0.9rem 1.1rem;
                            border-radius: 10px;
                            margin: 0.75rem 0;
                            font-size: 0.88rem;
                            line-height: 1.5;
                        }

                        .checkout-summary {
                            position: sticky;
                            top: 100px;
                            background:
                                var(--grad-surface),
                                radial-gradient(circle at top right, rgba(220,38,38,0.1), transparent 55%);
                            border: 1px solid var(--line);
                            border-radius: var(--r-lg);
                            padding: 2rem;
                            box-shadow: var(--shadow);
                        }
                        .checkout-items { margin-bottom: 1.5rem; }
                        .checkout-item {
                            display: flex;
                            justify-content: space-between;
                            gap: 1rem;
                            margin-bottom: 0.75rem;
                            color: var(--muted);
                            font-size: 0.9rem;
                        }
                        .checkout-total {
                            display: flex;
                            justify-content: space-between;
                            font-size: 1.25rem;
                            font-weight: 800;
                            margin-bottom: 1rem;
                            letter-spacing: -0.03em;
                        }
                        .total-amount {
                            background: linear-gradient(135deg, #fca5a5 0%, #ef4444 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }
                        .delivery-info {
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            color: var(--muted);
                            font-size: 0.86rem;
                        }

                        /* ====================================================
                           CONFIRMATION
                        ==================================================== */
                        .confirmation-container {
                            max-width: 760px;
                            margin: 0 auto;
                            text-align: center;
                            padding: 4.5rem 2.5rem;
                            background:
                                var(--grad-surface),
                                radial-gradient(circle at top, rgba(16,185,129,0.1), transparent 50%),
                                radial-gradient(circle at bottom, rgba(220,38,38,0.08), transparent 55%);
                            border: 1px solid var(--line);
                            border-radius: var(--r-xl);
                            box-shadow: var(--shadow-lg);
                        }
                        .confirmation-icon { margin-bottom: 2rem; }
                        .success-checkmark {
                            width: 110px; height: 110px;
                            margin: 0 auto;
                            background:
                                linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 45%),
                                linear-gradient(135deg, #10b981 0%, #047857 100%);
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                            font-size: 2.5rem;
                            animation: scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1), successGlow 3s ease-in-out infinite;
                            box-shadow: 0 0 50px rgba(16,185,129,0.3);
                        }
                        @keyframes scaleIn {
                            from { transform: scale(0); }
                            to { transform: scale(1); }
                        }
                        @keyframes successGlow {
                            0%,100% { box-shadow: 0 0 40px rgba(16,185,129,0.25); }
                            50% { box-shadow: 0 0 70px rgba(16,185,129,0.4); }
                        }
                        .confirmation-title {
                            font-size: clamp(1.8rem, 3vw, 2.8rem);
                            margin-bottom: 1rem;
                        }
                        .confirmation-message { color: var(--muted); font-size: 1.05rem; line-height: 1.7; margin-bottom: 3rem; }
                        .order-reference { display: block; margin-top: 1rem; color: #fca5a5; font-size: 0.9rem; font-weight: 700; }

                        .confirmation-details {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                            gap: 1.5rem;
                            margin-bottom: 3rem;
                        }
                        .detail-card {
                            background: rgba(255,255,255,0.045);
                            border: 1px solid var(--line);
                            border-radius: var(--r-md);
                            padding: 1.75rem;
                            transition: all 0.28s ease;
                        }
                        .detail-card:hover {
                            transform: translateY(-5px);
                            border-color: var(--line-red-soft);
                        }
                        .detail-card h3 { font-size: 1.05rem; margin-bottom: 0.5rem; margin-top: 0.75rem; }
                        .detail-card p { color: var(--muted); font-size: 0.88rem; }
                        .confirmation-actions {
                            display: flex;
                            gap: 1rem;
                            justify-content: center;
                            flex-wrap: wrap;
                        }

                        /* ====================================================
                           FOOTER
                        ==================================================== */
                        .footer {
                            background:
                                linear-gradient(180deg, transparent, rgba(0,0,0,0.2)),
                                rgba(5,3,9,0.6);
                            border-top: 1px solid rgba(255,255,255,0.06);
                            padding: 5rem 2rem 2.5rem;
                            margin-top: 6rem;
                            backdrop-filter: blur(20px);
                            position: relative;
                        }
                        .footer::before {
                            content: '';
                            position: absolute;
                            top: 0; left: 15%; right: 15%;
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(220,38,38,0.35), transparent);
                        }
                        .footer-content {
                            max-width: 1380px;
                            margin: 0 auto;
                            display: grid;
                            grid-template-columns: 2fr repeat(3, 1fr);
                            gap: 3rem;
                            margin-bottom: 3rem;
                        }
                        .footer-section h3 {
                            font-size: 1.35rem;
                            margin-bottom: 0.6rem;
                            background: linear-gradient(135deg, #ffffff 0%, #fca5a5 60%, #ef4444 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }
                        .footer-section > p { color: var(--muted); font-size: 0.9rem; line-height: 1.65; }
                        .footer-section h4 { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-2); margin-bottom: 1.25rem; }
                        .footer-section a {
                            display: block;
                            color: var(--muted);
                            text-decoration: none;
                            margin-bottom: 0.65rem;
                            font-size: 0.9rem;
                            transition: all 0.22s ease;
                        }
                        .footer-section a:hover { color: var(--text); padding-left: 4px; }
                        .payment-icons { display: flex; gap: 0.75rem; margin-bottom: 0.85rem; font-size: 1.4rem; }
                        .footer-secure { color: var(--muted); font-size: 0.85rem; }
                        .footer-bottom {
                            max-width: 1380px;
                            margin: 0 auto;
                            padding-top: 2rem;
                            border-top: 1px solid rgba(255,255,255,0.05);
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                            color: var(--muted-2);
                            font-size: 0.84rem;
                        }

                        /* ====================================================
                           MISC / UTILS
                        ==================================================== */
                        .empty-state {
                            text-align: center;
                            padding: 5rem 2rem;
                            color: var(--muted);
                        }
                        .loading { text-align: center; padding: 50px; font-size: 18px; }

                        .hero-stats { display: none; }

                        /* ====================================================
                           RESPONSIVE
                        ==================================================== */
                        @media (max-width: 1100px) {
                            .footer-content { grid-template-columns: 1fr 1fr; }
                        }

                        @media (max-width: 768px) {
                            .navbar { top: 10px; width: calc(100% - 20px); border-radius: 14px; }
                            .nav-container { padding: 0.6rem 0.8rem; }
                            .nav-links { display: none; }
                            .mobile-menu-btn { display: flex; }
                            .discord-nav-btn span { display: none; }

                            .nav-links.open {
                                position: absolute;
                                top: calc(100% + 0.6rem);
                                left: 0; right: 0;
                                background: rgba(6,4,10,0.96);
                                backdrop-filter: blur(24px);
                                flex-direction: column;
                                padding: 0.6rem;
                                border: 1px solid rgba(255,255,255,0.09);
                                border-radius: 14px;
                                box-shadow: var(--shadow-lg);
                                display: flex;
                            }

                            .hero-inner {
                                grid-template-columns: 1fr;
                                min-height: 100vh;
                                padding: 100px 1.5rem 3rem;
                                gap: 3rem;
                            }
                            .hero-visual { display: none; }
                            .hero-title-ral { font-size: clamp(4rem, 18vw, 7rem); }
                            .hero-title-sub { font-size: clamp(1.5rem, 5.5vw, 2.2rem); }
                            .hero-stats-row { gap: 0.9rem; flex-wrap: wrap; }
                            .hero-cta { flex-direction: column; align-items: stretch; }

                            .page-content { padding: 2rem 1rem; }
                            .page-content-with-back { padding-top: 7rem; }
                            .product-detail-page { padding-top: 7.4rem; }
                            .features { grid-template-columns: 1fr; }
                            .product-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
                            .product-detail { grid-template-columns: 1fr; gap: 2rem; }
                            .product-extra-info { grid-template-columns: 1fr; }
                            .cart-content, .checkout-container { grid-template-columns: 1fr; gap: 1.5rem; }
                            .cart-summary, .checkout-summary { position: static; }
                            .cart-item { grid-template-columns: auto 1fr; }
                            .cart-item-quantity, .cart-item-total, .cart-item-remove { grid-column: span 2; width: fit-content; }
                            .confirmation-actions { flex-direction: column; }
                            .footer-content { grid-template-columns: 1fr 1fr; gap: 2rem; }
                            .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
                            .section-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; text-align: left; }
                            .category-filter { justify-content: flex-start; }
                        }

                        @media (max-width: 480px) {
                            .footer-content { grid-template-columns: 1fr; }
                            .product-grid { grid-template-columns: 1fr 1fr; gap: 0.85rem; }
                            .product-card { padding: 1.1rem; min-height: 230px; }
                            .product-image { height: 120px; }
                            .testimonials-grid { grid-template-columns: 1fr; }
                        }

                    `}</style>
                </div>
            );
        }

        // Rendu de l'application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DigitalShop />);
    </script>
</body>
</html>
