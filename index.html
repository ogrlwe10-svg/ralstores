<script>
    // Custom cursor
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{
        mx=e.clientX;my=e.clientY;
        dot.style.left=mx+'px';dot.style.top=my+'px';
    });
    function animRing(){
        rx+=(mx-rx)*.14;ry+=(my-ry)*.14;
        ring.style.left=rx+'px';ring.style.top=ry+'px';
        requestAnimationFrame(animRing);
    }
    animRing();

    // Loader removal
    window.addEventListener('load',()=>{
        setTimeout(()=>{
            document.getElementById('ral-loader').classList.add('hidden');
        },1500);
    });

    // Ticker
    const tickerItems = [
        '36+ Produits Premium','Livraison via Discord','Paiement PayPal Sécurisé',
        'Support 24/7','Accès Instantanés','Netflix · Spotify · VPN · Gaming · IA',
        'Satisfaction Garantie','Commandez en 2 minutes','Nouveau — Catégorie Gaming',
    ];
    const track = document.getElementById('ticker-track');
    if(track){
        const doubled = [...tickerItems,...tickerItems];
        doubled.forEach(item=>{
            const span=document.createElement('span');
            span.className='ticker-item';
            span.innerHTML=`<span class="ticker-dot"></span>${item}`;
            track.appendChild(span);
        });
    }

    // Card 3D tilt
    document.addEventListener('mousemove', e=>{
        document.querySelectorAll('.pcard').forEach(card=>{
            const rect=card.getBoundingClientRect();
            const x=e.clientX-rect.left, y=e.clientY-rect.top;
            if(x>=0&&x<=rect.width&&y>=0&&y<=rect.height){
                const cx=rect.width/2, cy=rect.height/2;
                const rx_=((y-cy)/cy)*6;
                const ry_=-((x-cx)/cx)*6;
                card.style.transform=`translateY(-6px) scale(1.01) perspective(600px) rotateX(${rx_}deg) rotateY(${ry_}deg)`;
            } else {
                card.style.transform='';
            }
        });
    });

    // Magnetic buttons
    function initMagnetic(){
        document.querySelectorAll('.btn-primary').forEach(btn=>{
            btn.addEventListener('mousemove',e=>{
                const rect=btn.getBoundingClientRect();
                const x=(e.clientX-rect.left-rect.width/2)*.22;
                const y=(e.clientY-rect.top-rect.height/2)*.22;
                btn.style.transform=`translate(${x}px,${y}px) translateY(-2px)`;
            });
            btn.addEventListener('mouseleave',()=>{ btn.style.transform=''; });
        });
    }
    document.addEventListener('DOMContentLoaded', initMagnetic);
    window.__ralMagneticInit = initMagnetic;

    // Animated counter
    function animateCounter(el, target, duration=1200){
        const start = performance.now();
        const isFloat = String(target).includes('.');
        function step(now){
            const progress = Math.min((now-start)/duration, 1);
            const ease = 1-Math.pow(1-progress, 3);
            const val = target * ease;
            el.textContent = isFloat ? val.toFixed(1) : Math.round(val);
            if(progress<1) requestAnimationFrame(step);
            else el.textContent = target;
        }
        requestAnimationFrame(step);
    }
    window.__animateCounters = function(){
        document.querySelectorAll('[data-counter]').forEach(el=>{
            const target = parseFloat(el.dataset.counter);
            const io = new IntersectionObserver(entries=>{
                if(entries[0].isIntersecting){ animateCounter(el,target); io.disconnect(); }
            });
            io.observe(el);
        });
    };
</script>

    // SVG ICONS (inline, no emoji)
    // ============================================================================
    const IconCart = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>;

    const IconShield = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
    const IconCard = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>;

    const IconArrow = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
    const IconBack = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;

    const IconZap = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const IconPackage = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
    const IconUsers = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconDiscord = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 18" fill="currentColor"><path d="M20.317 1.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 00-.079.036c-.21.369-.444.85-.608 1.23a18.565 18.565 0 00-5.487 0 12.36 12.36 0 00-.617-1.23.077.077 0 00-.079-.036A19.736 19.736 0 003.677 1.492a.07.07 0 00-.032.027C.533 5.834-.32 10.027.099 14.172a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>;
    const IconGamepad = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="8" width="20" height="8" rx="4"/></svg>;
    const IconUser = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconClock = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconBell = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
    const IconHistory = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>;

    // ============================================================================
    // COMPOSANT PRINCIPAL
    // ============================================================================
    function DigitalShop() {
        const [currentPage, setCurrentPage] = useState('home');
        const [cart, setCart] = useState([]);
        const [selectedCategory, setSelectedCategory] = useState('all');
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [selectedVariant, setSelectedVariant] = useState(0);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [checkoutEmail, setCheckoutEmail] = useState('');
        const [emailError, setEmailError] = useState('');
        const [checkoutDiscordId, setCheckoutDiscordId] = useState('');
        const [discordIdError, setDiscordIdError] = useState('');
        const [orderConfirmed, setOrderConfirmed] = useState(false);
        const [orderId, setOrderId] = useState('');
        const [isCategoryTransitioning, setIsCategoryTransitioning] = useState(false);
        const [toast, setToast] = useState(null);
        const [isScrolled, setIsScrolled] = useState(false);
        const [customerOrderId, setCustomerOrderId] = useState('');
        const canvasRef = useRef(null);

        // Page scroll reset
        useEffect(() => {
            window.scrollTo({top:0, behavior:'instant'});
        }, [currentPage]);

        // Scroll navbar
        useEffect(() => {
            const h = () => setIsScrolled(window.scrollY > 30);
            window.addEventListener('scroll', h);
            return () => window.removeEventListener('scroll', h);
        }, []);

        // Canvas particles (hero only)
        useEffect(() => {
            if (currentPage !== 'home') return;
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let W = canvas.width = canvas.offsetWidth;
            let H = canvas.height = canvas.offsetHeight;
            const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; };
            window.addEventListener('resize', resize);

            const N = 55;
            const pts = Array.from({length:N}, () => ({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
                r: Math.random()*1.6+.4,
            }));

            let raf;
            const draw = () => {
                ctx.clearRect(0,0,W,H);
                for(let i=0;i<N;i++){
                    pts[i].x += pts[i].vx;
                    pts[i].y += pts[i].vy;
                    if(pts[i].x<0||pts[i].x>W) pts[i].vx*=-1;
                    if(pts[i].y<0||pts[i].y>H) pts[i].vy*=-1;

                    ctx.beginPath();
                    ctx.arc(pts[i].x, pts[i].y, pts[i].r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(220,38,38,.55)';
                    ctx.fill();

                    for(let j=i+1;j<N;j++){
                        const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if(dist < 110){
                            ctx.beginPath();
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.strokeStyle = `rgba(220,38,38,${(.18*(1-dist/110)).toFixed(3)})`;
                            ctx.lineWidth = .7;
                            ctx.stroke();
                        }
                    }
                }
                raf = requestAnimationFrame(draw);
            };
            draw();
            return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
        }, [currentPage]);

        useEffect(() => { setSelectedVariant(0); }, [selectedProduct]);

        const showToast = (message, type='success') => {
            setToast({message, type});
            setTimeout(() => setToast(null), 2800);
        };

        const handleCategoryChange = (key) => {
            if(key === selectedCategory) return;
            setIsCategoryTransitioning(true);
            setSelectedCategory(key);
            setTimeout(() => setIsCategoryTransitioning(false), 320);
        };

        const trackEvent = (name, data={}) => { if(window.gtag) window.gtag('event', name, data); };

        // ── CART ──
        const addToCart = (product) => {
            const existing = cart.find(i => i.id === product.id);
            if(existing) setCart(cart.map(i => i.id===product.id ? {...i, quantity:i.quantity+1} : i));
            else setCart([...cart, {...product, quantity:1}]);
            showToast(`${product.name} ajouté au panier`);
            trackEvent('add_to_cart', {product_id:product.id, product_name:product.name, product_price:product.price});
        };
        const removeFromCart = id => setCart(cart.filter(i => i.id !== id));
        const updateQuantity = (id, q) => q===0 ? removeFromCart(id) : setCart(cart.map(i => i.id===id ? {...i, quantity:q} : i));
        const getTotalPrice = () => cart.reduce((t,i) => t + i.price*i.quantity, 0);
        const getTotalItems = () => cart.reduce((t,i) => t + i.quantity, 0);

        const validateEmail = (email) => {
            const n = String(email||'').trim().toLowerCase();
            const re = /^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i;
            if(!re.test(n)) return false;
            return (n.split('@')[1]||'').split('.').pop().length >= 2;
        };
        const handleCheckoutEmail = (v) => {
            const n = String(v||'').trim();
            setCheckoutEmail(n);
            setEmailError(n && !validateEmail(n) ? 'Adresse email invalide' : '');
        };
        const validateDiscordId = (v) => /^\d{17,20}$/.test(String(v||'').trim());
        const handleCheckoutDiscordId = (v) => {
            const n = String(v||'').trim();
            setCheckoutDiscordId(n);
            setDiscordIdError(!n ? '' : validateDiscordId(n) ? '' : 'ID Discord invalide (17-20 chiffres)');
        };

        const generateOrderId = () => {
            let id = 'RAL-';
            for(let i=0;i<8;i++) id += '0123456789ABCDEF'[Math.floor(Math.random()*16)];
            return id;
        };

        const registerOrderWithBot = async (newOrderId, product, total, email, discordId) => {
            try {
                const base = String(SITE_CONFIG.botApiUrl||'').trim().replace(/\/$/,'');
                const endpoint = base ? `${base}/api/register-order` : '/api/register-order';
                const response = await fetch(endpoint, {
                    method:'POST',
                    headers:{'Content-Type':'application/json','X-API-Secret':SITE_CONFIG.botApiSecret},
                    body: JSON.stringify({orderId:newOrderId,product,total,email,discordId}),
                });
                let json = {};
                try { json = await response.json(); } catch(_) {}
                if(!response.ok) return {ok:false, status:response.status, error:json.error||`Erreur API (${response.status})`};
                return {ok:json.success===true, status:response.status, error:json.error||null};
            } catch(err) {
                return {ok:false, error:'Impossible de contacter le bot/API.'};
            }
        };

        const getPayPalMeUrl = () => {
            const link = SITE_CONFIG.paypalMeLink.trim();
            if(!link || link.includes('TON_PSEUDO')) return '';
            return `${link.replace(/\/$/,'/')}${getTotalPrice().toFixed(2)}`;
        };

        const handlePayPalMeCheckout = async () => {
            if(!checkoutEmail || !validateEmail(checkoutEmail)) {
                setEmailError('Adresse email invalide');
                alert('Veuillez entrer une adresse email valide avant de payer.');
                return;
            }
            const paypalUrl = getPayPalMeUrl();
            if(!paypalUrl) { alert('Ajoute ton lien PayPal.Me dans paypalMeLink.'); return; }

            const productSummary = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
            const total = getTotalPrice().toFixed(2);
            let newOrderId = '', registrationResult = {ok:false, error:'Erreur inconnue'};

            for(let attempt=0;attempt<5;attempt++){
                const candidateId = generateOrderId();
                const result = await registerOrderWithBot(candidateId, productSummary, parseFloat(total), checkoutEmail, checkoutDiscordId);
                if(result.ok) { newOrderId = candidateId; registrationResult = result; break; }
                if(result.status !== 409) { registrationResult = result; break; }
                registrationResult = result;
            }

            if(!newOrderId) {
                alert(`Impossible d'enregistrer ta commande. Réessaie dans quelques secondes.\n\nDétail: ${registrationResult.error||'Erreur inconnue'}`);
                return;
            }
            setOrderId(newOrderId);

            // ── Sauvegarder dans localStorage pour le panel ──
            try {
                const existing = JSON.parse(localStorage.getItem('ral_orders') || '[]');
                const newOrder = {
                    id: newOrderId,
                    date: new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
                    items: cart.map(i => ({name:i.name, price:i.price, quantity:i.quantity, variantLabel:i.variantLabel||null})),
                    total: parseFloat(total),
                    email: checkoutEmail,
                    status: 'pending',
                };
                localStorage.setItem('ral_orders', JSON.stringify([...existing, newOrder]));
            } catch(_) {}

            const a = document.createElement('a');
            a.href = paypalUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);

            setOrderConfirmed(true);
            setCurrentPage('confirmation');
            trackEvent('paypalme_redirect', {value:getTotalPrice(), currency:'EUR', items:cart.map(i=>({item_id:i.id,item_name:i.name,quantity:i.quantity,price:i.price}))});
        };

        const filteredProducts = selectedCategory === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === selectedCategory);

        const getInitials = (name) => name.replace(/[+]/g,' ').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();

        // ── PRODUCT IMAGE ──
        const ProductImage = ({product, large=false, compact=false}) => (
            <div className={`prod-img ${large?'large':''} ${compact?'compact':''}`}>
                {product.imageUrl && (
                    <img src={product.imageUrl} alt={product.name} loading="lazy"
                         onError={e => e.currentTarget.parentElement.classList.add('no-img')} />
                )}
                <span className="prod-img-fallback">{getInitials(product.name)}</span>
            </div>
        );

        // ── STOCK BADGE ──
        const StockBadge = ({product}) => (
            <div className={`stock-pill ${product.inStock ? 'in' : 'out'}`}>
                <span className="stock-dot-pulse"></span>
                {product.inStock ? `${product.stock} en stock` : 'Épuisé'}
            </div>
        );

        const IconChevron = ({size=16,open=false}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                 style={{transform:open?'rotate(180deg)':'none',transition:'transform .3s ease'}}>
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        );

        // ── FAQ SECTION ──
        const FaqSection = () => {
            const [openIdx, setOpenIdx] = useState(null);
            const faqs = [
                {q:'Comment se déroule la livraison ?', a:"Après votre achat, rejoignez notre serveur Discord et ouvrez un ticket. Notre équipe traitera votre commande rapidement et vous remettra votre accès en privé, généralement en moins de quelques minutes."},
                {q:'Quels modes de paiement acceptez-vous ?', a:"Nous acceptons uniquement PayPal via PayPal.Me pour l'instant. C'est rapide, sécurisé et universel. Le paiement s'effectue directement depuis la page de checkout."},
                {q:'Les accès sont-ils vraiment permanents (Lifetime) ?', a:"Oui, les produits étiquetés \"Lifetime\" sont des accès dont la durée de vie est indéterminée. Nous ne pouvons pas garantir à 100% que les plateformes tierces ne modifieront jamais leurs conditions, mais nous faisons tout pour maintenir ces accès le plus longtemps possible."},
                {q:"Que faire si mon accès ne fonctionne plus ?", a:"Ouvrez simplement un ticket sur notre serveur Discord en mentionnant votre ID de commande. Notre support analysera le problème et proposera une solution (remplacement, remboursement, etc.) dans les meilleurs délais."},
                {q:"Est-ce légal et sécurisé ?", a:"RΔL Store vend des accès légalement obtenus. Votre sécurité est notre priorité : nous ne stockons aucune donnée bancaire, le paiement est géré par PayPal, et les livraisons se font en ticket privé sur Discord."},
            ];
            return (
                <section className="section faq-section">
                    <div className="container">
                        <div className="section-head reveal">
                            <div className="section-label">FAQ</div>
                            <h2 className="section-title">Questions fréquentes</h2>
                            <p className="section-sub">Tout ce que vous devez savoir avant de commander</p>
                        </div>
                        <div className="faq-list reveal">
                            {faqs.map((f,i) => (
                                <div className={`faq-item ${openIdx===i?'open':''}`} key={i}>
                                    <button className="faq-q" onClick={() => setOpenIdx(openIdx===i ? null : i)}>
                                        <span>{f.q}</span>
                                        <IconChevron size={18} open={openIdx===i}/>
                                    </button>
                                    <div className="faq-a-wrap" style={{maxHeight: openIdx===i ? '300px' : '0'}}>
                                        <div className="faq-a">{f.a}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ── PRODUCT CARD ──
        const ProductCard = ({product, delay=0}) => (
            <article
                className={`pcard${product.inStock ? '' : ' pcard-out'}`}
                style={{animationDelay:`${delay}ms`}}
                onClick={() => { setSelectedProduct(product); setCurrentPage('product-detail'); }}
                aria-label={product.name}
            >
                {product.popular && <div className="pcard-popular"><IconStar size={11}/>HOT</div>}
                {!product.inStock && <div className="pcard-out-overlay">Épuisé</div>}

                <div className="pcard-img-wrap">
                    <ProductImage product={product} />
                </div>

                <div className="pcard-body">
                    <div className="pcard-top">
                        <StockBadge product={product} />
                        <span className="pcard-cat">{CATEGORIES[product.category]?.icon || '◆'}</span>
                    </div>
                    <h3 className="pcard-name">{product.name}</h3>
                    <p className="pcard-desc">{product.description}</p>
                    <div className="pcard-footer">
                        <div className="pcard-price">
                            {product.variants ? `Dès ${Math.min(...product.variants.map(v=>v.price))}€` : `${product.price}€`}
                        </div>
                        <button
                            className="pcard-btn"
                            disabled={!product.inStock}
                            onClick={e => {
                                e.stopPropagation();
                                if(!product.inStock) return;
                                if(product.variants) { setSelectedProduct(product); setCurrentPage('product-detail'); }
                                else addToCart(product);
                            }}
                            aria-label={`Ajouter ${product.name} au panier`}
                        >
                            <IconCart size={16}/>
                        </button>
                    </div>
                </div>
            </article>
        );

        // ============================================================================
        // HOME PAGE
        // ============================================================================
        const HomePage = () => (
            <div>
                {/* ── HERO ── */}
                <section className="hero">
                    <canvas ref={canvasRef} className="hero-canvas" aria-hidden="true"/>
                    <div className="hero-grid" aria-hidden="true"/>
                    <div className="hero-orb hero-orb-1" aria-hidden="true"/>
                    <div className="hero-orb hero-orb-2" aria-hidden="true"/>

                    <div className="hero-inner">
                        <div className="hero-eyebrow">
                            <span className="eyebrow-dot"/>
                            Premium Digital Market · Livraison via Discord
                        </div>

                        <h1 className="hero-h1">
                            <span className="hero-brand">RΔL</span>
                            <span className="hero-sub">Accès Digitaux<br/><em>Premium</em></span>
                        </h1>

                        <p className="hero-desc">
                            Streaming, VPN, IA, Réseaux sociaux — des accès premium
                            au meilleur prix. Commandez en ligne, récupérez sur Discord.
                        </p>

                        <div className="hero-actions">
                            <button className="btn-primary" onClick={() => setCurrentPage('products')}>
                                Explorer la boutique
                                <IconArrow size={16}/>
                            </button>
                            <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="btn-ghost">
                                <IconDiscord size={16}/>
                                Rejoindre Discord
                            </a>
                        </div>

                        <div className="hero-stats">
                            {[
                                {n:32, suffix:'+', label:'Produits'},
                                {n:24, suffix:'/7', label:'Support'},
                                {n:100, suffix:'%', label:'Sécurisé'},
                                {n:2, suffix:'min', label:'Livraison'},
                            ].map((s,i) => (
                                <div className="hero-stat-item" key={i}>
                                    <span className="hsn">
                                        <span data-counter={s.n}>{s.n}</span>{s.suffix}
                                    </span>
                                    <span className="hsl">{s.label}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                                Voir tous les produits
                                <IconArrow size={16}/>
                            </button>
                        </div>
                    </div>
                </section>

                {/* ── TESTIMONIALS ── */}
                <section className="section">
                    <div className="container">
                        <div className="section-head reveal">
                            <div className="section-label">Avis</div>
                            <h2 className="section-title">Clients satisfaits</h2>
                        </div>
                        <div className="testi-grid">
                            {[
                                {text:'"Service exceptionnel, livraison instantanée. Je recommande vraiment !"', author:'Alexandre M.', role:'Client fidèle'},
                                {text:'"Qualité premium, exactement comme décrit. Parfait, rien à redire."', author:'Benjamin R.', role:'Acheteur régulier'},
                                {text:'"Support ultra réactif et produits de qualité irréprochable. 5 étoiles !"', author:'Camille T.', role:'Utilisateur premium'},
                            ].map((t,i) => (
                                <div className="testi-card reveal" data-delay={i*90} key={i}>
                                    <div className="testi-stars">
                                        {[...Array(5)].map((_,k) => <IconStar key={k} size={14}/>)}
                                    </div>
                                    <p className="testi-text">{t.text}</p>
                                    <div className="testi-author">
                                        <div className="testi-avatar">{t.author[0]}</div>

                                            <div className="testi-name">{t.author}</div>
                                            <div className="testi-role">{t.role}</div>
                                        </div>
                                    </div>
                                </div>

                                <h2 className="cta-title">Prêt à accéder au premium ?</h2>
                                <p className="cta-sub">Commandez maintenant et récupérez sur Discord en quelques minutes.</p>
                            </div>

        // ============================================================================
        // PRODUCTS PAGE — refonte complète
        // ============================================================================
        const ProductsPage = () => {
            const catInfo = {
                all:       {emoji:'✦', desc:'Tous les accès numériques premium disponibles'},
                streaming: {emoji:'▶', desc:'Films, séries, sports — les meilleures plateformes'},
                music:     {emoji:'♫', desc:'Écoute illimitée, sans pub, partout'},
                gaming:    {emoji:'◎', desc:'Game Pass, abonnements gaming — jouez sans limites'},
                social:    {emoji:'◈', desc:'Boostez votre présence sur les réseaux'},
                ai:        {emoji:'◉', desc:'Accès aux meilleurs outils IA du marché'},
                vpn:       {emoji:'⬡', desc:'Naviguez en sécurité et sans limites'},
                education: {emoji:'◆', desc:'Apprenez et progressez avec les meilleurs outils'},
                creative:  {emoji:'❖', desc:'Suite créative pour vos projets visuels'},

            const current = catInfo[selectedCategory] || catInfo.all;
            const inStock  = filteredProducts.filter(p => p.inStock).length;

                                <div className="ph-stats">
                                    <span className="ph-stat"><strong>{filteredProducts.length}</strong> produits</span>
                                    <span className="ph-sep"/>
                                    <span className="ph-stat in"><span className="ph-dot in"/>  {inStock} en stock</span>
                                    {outStock > 0 && <>
                                        <span className="ph-sep"/>

                                            onClick={() => handleCategoryChange(key)}

                                            <span className="cat-icon">{cat.icon}</span>

            );

        // ============================================================================
        // PRODUCT DETAIL PAGE
        // ============================================================================
        const ProductDetailPage = () => {
            if(!selectedProduct) return null;
            return (
                <div className="page-wrap">
                    <div className="container">
                        <button className="back-btn" onClick={() => setCurrentPage('products')}>
                            <IconBack size={16}/> Retour au catalogue
                        </button>

                        <div className="detail-layout">
                            <div className="detail-img-col reveal-left">
                                <div className="detail-img-wrap">
                                    <ProductImage product={selectedProduct} large/>
                                    {selectedProduct.popular && (
                                        <div className="detail-popular-badge">
                                            <IconStar size={14}/> Populaire
                                        </div>
                                    )}
                                </div>
                                <div className="detail-meta-cards">
                                    {[
                                        {icon:<IconZap size={16}/>, label:'Livraison', val:'Via Discord'},
                                        {icon:<IconShield size={16}/>, label:'Qualité', val:'Garantie'},
                                        {icon:<IconLock size={16}/>, label:'Paiement', val:'PayPal sécurisé'},
                                    ].map((m,i) => (
                                        <div className="detail-meta-card" key={i}>
                                            <div className="dmc-icon">{m.icon}</div>
                                            <div>
                                                <div className="dmc-label">{m.label}</div>
                                                <div className="dmc-val">{m.val}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="detail-info-col reveal">
                                <div className="detail-header">
                                    <StockBadge product={selectedProduct}/>
                                    <span className="detail-category">{CATEGORIES[selectedProduct.category]?.name}</span>
                                </div>
                                <h1 className="detail-title">{selectedProduct.name}</h1>
                                <p className="detail-desc">{selectedProduct.description}</p>

                                <div className="detail-features">
                                    <h3 className="detail-features-title">Inclus</h3>
                                    <ul className="detail-features-list">
                                        {selectedProduct.features.map((f,i) => (
                                            <li key={i} className="detail-feat-item">
                                                <span className="feat-check"><IconCheck size={14}/></span>
                                                {f}
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {selectedProduct.variants && (
                                    <div className="detail-variants">
                                        <h3 className="detail-features-title">Choisir une option</h3>
                                        <div className="variant-list">
                                            {selectedProduct.variants.map((v,i) => (
                                                <label key={i} className={`variant-opt ${selectedVariant===i ? 'active' : ''}`}>
                                                    <input type="radio" name="variant" value={i}
                                                           checked={selectedVariant===i}
                                                           onChange={() => setSelectedVariant(i)} hidden/>
                                                    <span className="variant-label">{v.label}</span>
                                                    <span className="variant-price">{v.price}€</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="detail-buy">
                                    <div className="detail-price-wrap">
                                        <span className="detail-price-label">Prix</span>
                                        <span className="detail-price">
                                            {selectedProduct.variants ? selectedProduct.variants[selectedVariant].price : selectedProduct.price}€
                                        </span>
                                    </div>
                                    <button
                                        className="btn-primary btn-large"
                                        disabled={!selectedProduct.inStock}
                                        onClick={() => {
                                            if(!selectedProduct.inStock) return;
                                            const p = {
                                                id: selectedProduct.variantIds ? selectedProduct.variantIds[selectedVariant] : selectedProduct.id,
                                                name: selectedProduct.name,
                                                price: selectedProduct.variants ? selectedProduct.variants[selectedVariant].price : selectedProduct.price,
                                                imageUrl: selectedProduct.imageUrl,
                                                variantLabel: selectedProduct.variants ? selectedProduct.variants[selectedVariant].label : null,
                                            };
                                            addToCart(p);
                                            setCurrentPage('cart');
                                        }}
                                    >
                                        <IconCart size={18}/> Ajouter au panier
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="detail-extra-grid">
                            {[
                                {title:'Description détaillée', text:`${selectedProduct.description}. Produit digital livré via Discord avec accompagnement de l'équipe support si nécessaire. Conservez votre ID de commande pour le suivi.`},
                                {title:'Livraison & Activation', text:"Livraison rapide après confirmation. L'activation se fait en ticket privé pour garantir une prise en charge propre et sécurisée."},
                                {title:'Support Premium', text:"Support disponible 24/7 sur Discord. Notre équipe vous aide pour l'installation, l'accès et la résolution de tout problème."},
                            ].map((c,i) => (
                                <div className="detail-extra-card reveal" data-delay={i*80} key={i}>
                                    <h3>{c.title}</h3>
                                    <p>{c.text}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // CART PAGE
        // ============================================================================
        const CartPage = () => (
            <div className="page-wrap">
                <div className="container">
                    <button className="back-btn" onClick={() => setCurrentPage('products')}>
                        <IconBack size={16}/> Continuer mes achats
                    </button>
                    <div className="page-header reveal">
                        <div className="section-label">Panier</div>
                        <h1 className="page-title">Votre sélection</h1>
                        <p className="page-sub">{getTotalItems()} article{getTotalItems()>1?'s':''}</p>
                    </div>

                    {cart.length === 0 ? (
                        <div className="empty-cart reveal">
                            <div className="empty-icon"><IconCart size={40}/></div>
                            <h2>Votre panier est vide</h2>
                            <p>Découvrez nos produits premium</p>
                            <button className="btn-primary" onClick={() => setCurrentPage('products')}>
                                Voir la boutique <IconArrow size={16}/>
                            </button>
                        </div>
                    ) : (
                        <div className="cart-layout">
                            <div className="cart-items-col">
                                {cart.map(item => (
                                    <div className="cart-item" key={item.id}>
                                        <ProductImage product={item} compact/>
                                        <div className="ci-info">
                                            <h3 className="ci-name">{item.name}{item.variantLabel ? ` — ${item.variantLabel}` : ''}</h3>
                                            <p className="ci-unit">{item.price}€ / unité</p>
                                        </div>
                                        <div className="ci-qty">
                                            <button onClick={() => updateQuantity(item.id, item.quantity-1)}>−</button>
                                            <span>{item.quantity}</span>
                                            <button onClick={() => updateQuantity(item.id, item.quantity+1)}>+</button>
                                        </div>
                                        <div className="ci-total">{(item.price*item.quantity).toFixed(2)}€</div>
                                        <button className="ci-remove" onClick={() => removeFromCart(item.id)}>
                                            <IconX size={16}/>
                                        </button>
                                    </div>
                                ))}
                            </div>

                            <div className="cart-summary-col">
                                <div className="cart-summary-card">
                                    <h2 className="summary-title">Récapitulatif</h2>
                                    <div className="summary-row">
                                        <span>Sous-total</span>
                                        <span>{getTotalPrice().toFixed(2)}€</span>
                                    </div>
                                    <div className="summary-row">
                                        <span>Frais de service</span>
                                        <span className="free-badge">Gratuit</span>
                                    </div>
                                    <div className="summary-sep"/>
                                    <div className="summary-row summary-total">
                                        <span>Total</span>
                                        <span>{getTotalPrice().toFixed(2)}€</span>
                                    </div>
                                    <button className="btn-primary btn-large btn-full" onClick={() => setCurrentPage('checkout')}>
                                        <IconCard size={18}/> Procéder au paiement
                                    </button>
                                    <div className="secure-note">
                                        <IconLock size={14}/> Paiement PayPal sécurisé · Récupération Discord
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );

        // ============================================================================
        // CHECKOUT PAGE
        // ============================================================================
        const CheckoutPage = () => (
            <div className="page-wrap">
                <div className="container">
                    <div className="page-header reveal">
                        <div className="section-label">Paiement</div>
                        <h1 className="page-title">Finaliser la commande</h1>
                        <p className="page-sub">Payez via PayPal puis rejoignez Discord pour récupérer vos accès</p>
                    </div>

                    <div className="checkout-layout">
                        <div className="checkout-form-col reveal-left">
                            <div className="checkout-card">
                                <h2 className="checkout-section-title">Informations de contact</h2>
                                <p className="checkout-hint">Cette adresse permet au support de retrouver votre commande si besoin.</p>

                                <div className="form-group">
                                    <label className="form-label">Adresse email *</label>
                                    <input type="email" placeholder="votre@email.com"
                                           value={checkoutEmail}
                                           onChange={e => handleCheckoutEmail(e.target.value)}
                                           className={`form-input ${emailError ? 'input-error' : ''}`}/>
                                    {emailError && <span className="form-error">{emailError}</span>}
                                </div>

                                <div className="form-group">
                                    <label className="form-label">ID Discord <span className="optional">(optionnel)</span></label>
                                    <input type="text" inputMode="numeric"
                                           placeholder="Ex: 123456789012345678"
                                           value={checkoutDiscordId}
                                           onChange={e => handleCheckoutDiscordId(e.target.value)}
                                           className={`form-input ${discordIdError ? 'input-error' : ''}`}/>
                                    {discordIdError && <span className="form-error">{discordIdError}</span>}
                                </div>
                            </div>

                            <div className="checkout-card">
                                <h2 className="checkout-section-title">Méthode de paiement</h2>
                                <div className="payment-method-box">
                                    <div className="pmb-icon"><IconCard size={24}/></div>
                                    <div>
                                        <div className="pmb-name">PayPal</div>
                                        <div className="pmb-desc">Paiement rapide et sécurisé via PayPal.Me</div>
                                    </div>
                                    <div className="pmb-check"><IconCheck size={14}/></div>
                                </div>

                                <button className="btn-primary btn-large btn-full"
                                        onClick={handlePayPalMeCheckout}
                                        disabled={!checkoutEmail || !validateEmail(checkoutEmail)}>
                                    <IconCard size={18}/> Payer {getTotalPrice().toFixed(2)}€ par PayPal
                                </button>
                                <p className="payment-note">
                                    <IconShield size={13}/> Après le paiement, rejoignez le Discord et ouvrez un ticket.
                                </p>
                            </div>
                        </div>

                        <div className="checkout-summary-col reveal">
                            <div className="checkout-summary-card">
                                <h2 className="checkout-section-title">Votre commande</h2>
                                {cart.map(item => (
                                    <div className="co-item" key={item.id}>
                                        <span className="co-name">{item.name} ×{item.quantity}</span>
                                        <span className="co-price">{(item.price*item.quantity).toFixed(2)}€</span>
                                    </div>
                                ))}
                                <div className="summary-sep"/>
                                <div className="co-total-row">
                                    <span>Total</span>
                                    <span className="co-total-price">{getTotalPrice().toFixed(2)}€</span>
                                </div>
                                <div className="co-note">
                                    <IconLock size={13}/> Paiement à finaliser sur PayPal.Me
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ============================================================================
        // CONFIRMATION PAGE
        // ============================================================================
        const ConfirmationPage = () => (
            <div className="page-wrap">
                <div className="container">
                    <div className="confirm-box reveal-scale">
                        <div className="confirm-icon">
                            <IconCheck size={32}/>
                        </div>
                        <h1 className="confirm-title">Paiement lancé !</h1>
                        <p className="confirm-msg">
                            Finalisez le paiement sur PayPal.Me, puis {SITE_CONFIG.discordMessage}
                            {checkoutEmail && <><br/><br/>Utilisez l'adresse <strong>{checkoutEmail}</strong> si le support vous demande une confirmation.</>}
                        </p>

                        {orderId && (
                            <div className="order-id-box">
                                <p className="oid-label">Ton ID de commande</p>
                                <div className="oid-value">{orderId}</div>
                                <p className="oid-hint">Sélectionne et copie cet ID — tu en auras besoin sur Discord pour obtenir le rôle <strong>Client</strong> via <strong>"Claim Customer Role"</strong>.</p>
                                <button className="btn-copy" onClick={() => navigator.clipboard.writeText(orderId).then(() => showToast('ID copié !'))}>
                                    Copier l'ID
                                </button>
                            </div>
                        )}

                        <div className="confirm-steps">
                            {[
                                {icon:<IconUsers size={22}/>, title:'Rejoindre le Discord', desc:'Entrez sur le serveur RΔL'},
                                {icon:<IconPackage size={22}/>, title:'Claim Customer Role', desc:'Utilisez votre ID de commande'},
                                {icon:<IconShield size={22}/>, title:'Ouvrir un ticket', desc:'Le support vous livre votre produit'},
                            ].map((s,i) => (
                                <div className="confirm-step" key={i}>
                                    <div className="cs-icon">{s.icon}</div>
                                    <h3 className="cs-title">{s.title}</h3>
                                    <p className="cs-desc">{s.desc}</p>
                                </div>
                            ))}
                        </div>

                        <div className="confirm-actions">
                            <button className="btn-primary" onClick={() => { setCurrentPage('home'); setOrderConfirmed(false); setOrderId(''); }}>
                                Retour à l'accueil
                            </button>
                            <button className="btn-outline" onClick={() => setCurrentPage('products')}>
                                Continuer mes achats
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ============================================================================
        // CUSTOMER PANEL PAGE — recherche par email
        // ============================================================================
        const CustomerPanelPage = () => {
            const [emailInput,    setEmailInput]    = useState('');
            const [activeEmail,   setActiveEmail]   = useState('');
            const [allOrders,     setAllOrders]     = useState([]);
            const [filteredOrders,setFilteredOrders]= useState(null);
            const [searching,     setSearching]     = useState(false);
            const [copiedId,      setCopiedId]      = useState(null);
            const [activeTab,     setActiveTab]     = useState('orders');
            const [supportMsg,    setSupportMsg]    = useState('');
            const [supportSent,   setSupportSent]   = useState(false);

            useEffect(() => {
                try {
                    const raw = localStorage.getItem('ral_orders');
                    if (raw) setAllOrders(JSON.parse(raw));
                } catch(_) {}
                try {
                    const saved = localStorage.getItem('ral_panel_email');
                    if (saved) setEmailInput(saved);
                } catch(_) {}
            }, []);

            const copyId = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedId(text);
                    showToast('Copié !');
                    setTimeout(() => setCopiedId(null), 2000);
                });
            };

            const handleSearch = () => {
                const email = emailInput.trim().toLowerCase();
                if (!email) return;
                setSearching(true);
                setActiveEmail(email);
                try { localStorage.setItem('ral_panel_email', email); } catch(_) {}
                setTimeout(() => {
                    const matches = allOrders.filter(o => (o.email||'').toLowerCase() === email);
                    setFilteredOrders(matches);
                    setSearching(false);
                    if (matches.length > 0) showToast(`${matches.length} commande${matches.length>1?'s':''} trouvée${matches.length>1?'s':''} !`);
                }, 600);
            };

            const handleReset = () => {
                setFilteredOrders(null);
                setActiveEmail('');
                setEmailInput('');
                try { localStorage.removeItem('ral_panel_email'); } catch(_) {}
            };

            const STATUS_MAP = {
                pending:    { label:'En attente',    color:'#f59e0b', bg:'rgba(245,158,11,.12)', border:'rgba(245,158,11,.25)' },
                processing: { label:'En traitement', color:'#60a5fa', bg:'rgba(96,165,250,.1)',  border:'rgba(96,165,250,.25)' },
                delivered:  { label:'Livré',         color:'#4ade80', bg:'rgba(74,222,128,.1)',  border:'rgba(74,222,128,.25)' },
                cancelled:  { label:'Annulé',        color:'#f87171', bg:'rgba(248,113,113,.1)', border:'rgba(248,113,113,.25)' },
            };

            const displayOrders = filteredOrders !== null ? filteredOrders : [];
            const totalSpent   = displayOrders.reduce((t,o) => t+(o.total||0), 0);
            const pendingCount = displayOrders.filter(o => o.status==='pending'||o.status==='processing').length;

            // ── Écran de connexion (avant recherche) ──
            if (filteredOrders === null) {
                return (
                    <div className="page-wrap">
                        <div className="container">
                            <div className="cph-login-wrap">
                                <div className="cph-login-icon"><IconUser size={34}/></div>
                                <h1 className="cph-title">Mon <em>Espace</em></h1>
                                <p className="cph-sub">Entrez l'adresse email utilisée lors de vos commandes pour accéder à votre historique.</p>
                                <div className="cph-email-form">
                                    <input type="email" className="form-input cph-email-input"
                                        placeholder="votre@email.com"
                                        value={emailInput}
                                        onChange={e => setEmailInput(e.target.value)}
                                        onKeyDown={e => e.key==='Enter' && handleSearch()}
                                        autoFocus/>
                                    <button className="btn-primary" onClick={handleSearch} disabled={searching||!emailInput.trim()}>
                                        {searching ? <span className="cph-spinner"/> : <><IconZap size={15}/> Accéder</>}
                                    </button>
                                </div>
                                {allOrders.length === 0 && (
                                    <div className="cph-login-hint">
                                        <IconPackage size={14}/>
                                        <span>Aucune commande enregistrée sur ce navigateur. <button className="cph-inline-link" onClick={() => setCurrentPage('products')}>Découvrir la boutique →</button></span>
                                    </div>
                                )}
                                <p className="cph-login-privacy"><IconLock size={12}/> Votre email ne quitte jamais ce navigateur.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // ── Résultats ──
            return (
                <div className="page-wrap">
                    <div className="container">

                        {/* Header */}
                        <div className="cph-header">
                            <div className="cph-avatar"><IconUser size={28}/></div>
                            <div className="cph-info">
                                <div className="cph-greeting">Historique pour</div>
                                <div className="cph-email-display">{activeEmail}</div>
                                <p className="cph-sub">
                                    {displayOrders.length === 0
                                        ? 'Aucune commande trouvée pour cet email'
                                        : `${displayOrders.length} commande${displayOrders.length>1?'s':''} · ${totalSpent.toFixed(2)}€ au total`}
                                </p>
                            </div>
                            <div style={{display:'flex',gap:'.6rem',alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
                                {pendingCount > 0 && (
                                    <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="cph-pending-badge">
                                        <IconClock size={13}/> {pendingCount} en attente
                                    </a>
                                )}
                                <button className="btn-outline" style={{padding:'.42rem 1rem',fontSize:'.82rem'}} onClick={handleReset}>
                                    ← Changer d'email
                                </button>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="cph-tabs">
                            {[
                                {id:'orders', label:'Commandes', icon:<IconHistory size={15}/>, count:displayOrders.length},
                                {id:'support', label:'Support',  icon:<IconShield size={15}/>},
                            ].map(t => (
                                <button key={t.id} className={`cph-tab ${activeTab===t.id?'active':''}`} onClick={() => setActiveTab(t.id)}>
                                    {t.icon}{t.label}
                                    {t.count > 0 && <span className="cph-tab-count">{t.count}</span>}
                                </button>
                            ))}
                        </div>

                        {/* ── COMMANDES ── */}
                        {activeTab === 'orders' && (
                            <div className="cph-panel">
                                {displayOrders.length === 0 ? (
                                    <div className="cph-empty">
                                        <div className="cph-empty-icon"><IconPackage size={36}/></div>
                                        <h3>Aucune commande trouvée</h3>
                                        <p>Pas de commande associée à <strong>{activeEmail}</strong> sur ce navigateur.</p>
                                        <div className="cph-empty-hint">
                                            <IconZap size={14}/>
                                            Essayez un autre email ou contactez le support Discord.
                                        </div>
                                        <div style={{display:'flex',gap:'.7rem',flexWrap:'wrap',justifyContent:'center'}}>
                                            <button className="btn-outline" onClick={handleReset}>Changer d'email</button>
                                            <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="btn-primary">
                                                <IconDiscord size={15}/> Support Discord
                                            </a>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="cph-orders-list">
                                        <div className="cph-orders-head">
                                            <span>{displayOrders.length} commande{displayOrders.length>1?'s':''}</span>
                                            <button className="cph-clear-btn" onClick={() => {
                                                if(confirm('Effacer tout l\'historique local ?')) {
                                                    localStorage.removeItem('ral_orders');
                                                    setAllOrders([]); setFilteredOrders(null); setActiveEmail('');
                                                }
                                            }}>Effacer l'historique</button>
                                        </div>
                                        {displayOrders.slice().reverse().map((order, i) => {
                                            const s = STATUS_MAP[order.status] || STATUS_MAP.pending;
                                            const isCopied = copiedId === order.id;
                                            return (
                                                <div className="cph-order-card" key={i} style={{animationDelay:`${i*40}ms`}}>
                                                    <div className="cph-oc-top">
                                                        <div className="cph-oc-id">
                                                            <span className="cph-oc-id-label">ID</span>
                                                            <span className="cph-oc-id-val">{order.id}</span>
                                                        </div>
                                                        <div className="cph-oc-status" style={{background:s.bg,border:`1px solid ${s.border}`,color:s.color}}>
                                                            <span className="cph-oc-dot" style={{background:s.color}}/>{s.label}
                                                        </div>
                                                    </div>
                                                    <div className="cph-oc-products">
                                                        {(order.items||[]).map((item,j) => (
                                                            <div className="cph-oc-item" key={j}>
                                                                <span>{item.name}{item.variantLabel?` — ${item.variantLabel}`:''}</span>
                                                                <span className="cph-oc-item-price">×{item.quantity} · {(item.price*item.quantity).toFixed(2)}€</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="cph-oc-footer">
                                                        <span className="cph-oc-date">{order.date}</span>
                                                        <span className="cph-oc-total">{(order.total||0).toFixed(2)}€</span>
                                                    </div>
                                                    <div className="cph-oc-actions">
                                                        <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="cph-oc-action-btn discord">
                                                            <IconDiscord size={14}/> Ouvrir un ticket
                                                        </a>
                                                        <button className={`cph-oc-action-btn copy ${isCopied?'copied':''}`} onClick={() => copyId(order.id)}>
                                                            {isCopied ? <><IconCheck size={13}/> Copié !</> : 'Copier l\'ID'}
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── SUPPORT ── */}
                        {activeTab === 'support' && (
                            <div className="cph-panel">
                                <div className="cph-support-grid">
                                    <div className="cph-support-col">
                                        <h2 className="cph-sub-title"><IconShield size={18}/> Centre d'aide</h2>
                                        <div className="cph-faq-list">
                                            {[
                                                {q:'Comment récupérer mon accès ?', a:"Rejoignez notre Discord, ouvrez un ticket et donnez votre ID de commande."},
                                                {q:"Mon accès ne fonctionne plus",   a:"Ouvrez un ticket Discord avec votre ID. Remplacement ou remboursement selon les cas."},
                                                {q:"Délai de livraison ?",            a:"La plupart des accès sont livrés dans les 5 à 30 minutes après validation PayPal."},
                                                {q:"Puis-je commander plusieurs produits ?", a:"Oui, ajoutez tout au panier et payez en une fois. Tout est traité dans le même ticket."},
                                            ].map((f,i) => (
                                                <details key={i} className="cph-faq-item">
                                                    <summary className="cph-faq-q">{f.q}</summary>
                                                    <p className="cph-faq-a">{f.a}</p>
                                                </details>
                                            ))}
                                        </div>
                                        <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="cph-support-link discord" style={{marginTop:'.5rem'}}>
                                            <IconDiscord size={18}/>
                                            <div><strong>Ouvrir un ticket Discord</strong><span>Réponse rapide · Support humain</span></div>
                                        </a>
                                    </div>
                                    <div className="cph-support-col">
                                        <h2 className="cph-sub-title"><IconBell size={18}/> Votre dernière commande</h2>
                                        {displayOrders.length > 0 ? (
                                            <>
                                                {(() => {
                                                    const last = [...displayOrders].reverse()[0];
                                                    const s = STATUS_MAP[last.status] || STATUS_MAP.pending;
                                                    return (
                                                        <div className="cph-last-card">
                                                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.6rem'}}>
                                                                <span className="cph-oc-id-val">{last.id}</span>
                                                                <div className="cph-oc-status" style={{background:s.bg,border:`1px solid ${s.border}`,color:s.color}}>
                                                                    <span className="cph-oc-dot" style={{background:s.color}}/>{s.label}
                                                                </div>
                                                            </div>
                                                            <div style={{fontSize:'.82rem',color:'var(--text2)',marginBottom:'.8rem'}}>{last.date} · {(last.total||0).toFixed(2)}€</div>
                                                            <div style={{display:'flex',gap:'.5rem'}}>
                                                                <button className={`cph-oc-action-btn copy ${copiedId===last.id?'copied':''}`} onClick={() => copyId(last.id)}>
                                                                    {copiedId===last.id ? <><IconCheck size={13}/> Copié</> : 'Copier l\'ID'}
                                                                </button>
                                                                <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="cph-oc-action-btn discord">
                                                                    <IconDiscord size={14}/> Ticket
                                                                </a>
                                                            </div>
                                                        </div>
                                                    );
                                                })()}
                                                {!supportSent ? (
                                                    <div className="cph-message-form" style={{marginTop:'1rem'}}>
                                                        <label className="form-label" style={{marginBottom:'.4rem',display:'block'}}>Message au support</label>
                                                        <textarea className="form-input cph-textarea" rows={3}
                                                            placeholder="Décrivez votre problème..."
                                                            value={supportMsg} onChange={e => setSupportMsg(e.target.value)}/>
                                                        <button className="btn-primary btn-full" style={{marginTop:'.6rem'}} disabled={!supportMsg.trim()}
                                                            onClick={() => { window.open('https://discord.gg/Mm6QaTcAN','_blank','noopener'); setSupportSent(true); }}>
                                                            <IconDiscord size={15}/> Aller sur Discord
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <div className="cph-sent-box" style={{marginTop:'1rem'}}>
                                                        <div className="cph-sent-icon"><IconCheck size={22}/></div>
                                                        <h3>Discord ouvert !</h3>
                                                        <p>Ouvrez un ticket et expliquez votre problème.</p>
                                                        <button className="btn-outline" onClick={() => { setSupportSent(false); setSupportMsg(''); }}>Nouveau message</button>
                                                    </div>
                                                )}
                                            </>
                                        ) : (
                                            <p style={{fontSize:'.88rem',color:'var(--muted)'}}>Aucune commande à afficher.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        // ============================================================================
        // MAIN RENDER
        // ============================================================================
        return (
            <div className="app">
                {/* Ambient background */}
                <div className="ambient" aria-hidden="true">
                    <div className="amb-blob amb-b1"/>
                    <div className="amb-blob amb-b2"/>
                    <div className="amb-blob amb-b3"/>
                </div>

                {/* DRAWER OVERLAY (mobile) */}
                <div className={`drawer-overlay ${mobileMenuOpen?'open':''}`} onClick={() => setMobileMenuOpen(false)}/>
                <nav className={`drawer ${mobileMenuOpen?'open':''}`} aria-label="Menu mobile">
                    <div className="drawer-head">
                        <span className="drawer-logo">RΔL</span>
                        <button className="drawer-close" onClick={() => setMobileMenuOpen(false)} aria-label="Fermer"><IconX size={16}/></button>
                    </div>
                    <div className="drawer-nav">
                        {[
                            {page:'home',           label:'Accueil',      icon:<IconZap size={15}/>},
                            {page:'products',       label:'Boutique',     icon:<IconPackage size={15}/>},
                            {page:'cart',           label:`Panier ${getTotalItems()>0?`(${getTotalItems()})`:''} `, icon:<IconCart size={15}/>},
                            {page:'customer-panel', label:'Mon espace',   icon:<IconUser size={15}/>},
                        ].map(({page,label,icon,badge}) => (
                            <button key={page} className={`drawer-link ${currentPage===page?'active':''}`}
                                    onClick={() => { setCurrentPage(page); setMobileMenuOpen(false); }}>
                                <span className="drawer-link-icon">{icon}</span>
                                {label}
                                {badge && <span className="drawer-link-badge">{badge}</span>}
                            </button>
                        ))}
                    </div>
                    <div className="drawer-footer">
                        <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="drawer-discord"
                           onClick={() => setMobileMenuOpen(false)}>
                            <IconDiscord size={16}/> Rejoindre le Discord
                        </a>
                    </div>
                </nav>

                {/* NAVBAR */}
                <nav className={`navbar ${isScrolled ? 'scrolled' : ''}`}>
                    <div className="nav-inner">
                        <button className="nav-logo" onClick={() => setCurrentPage('home')} aria-label="Accueil">
                            <img src="https://i.ibb.co/TDm3Tmy9/image-2026-05-09-181103364.png" alt="RΔL" className="nav-logo-img" onError={e => { e.currentTarget.style.display='none'; e.currentTarget.nextSibling.style.display='block'; }}/>
                            <span className="nav-logo-text" style={{display:'none'}}>RΔL</span>
                        </button>

                        <div className="nav-links">
