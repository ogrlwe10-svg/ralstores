<script>
    // Custom cursor
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{
        mx=e.clientX;my=e.clientY;
        dot.style.left=mx+'px';dot.style.top=my+'px';
    });
    function animRing(){
        rx+=(mx-rx)*.14;ry+=(my-ry)*.14;
        ring.style.left=rx+'px';ring.style.top=ry+'px';
        requestAnimationFrame(animRing);
    }
    animRing();

    // Loader removal
    window.addEventListener('load',()=>{
        setTimeout(()=>{
            document.getElementById('ral-loader').classList.add('hidden');
        },1500);
    });

    // Ticker
    const tickerItems = [
        '36+ Produits Premium','Livraison via Discord','Paiement PayPal Sécurisé',
        'Support 24/7','Accès Instantanés','Netflix · Spotify · VPN · Gaming · IA',
        'Satisfaction Garantie','Commandez en 2 minutes','Nouveau — Catégorie Gaming',
    ];
    const track = document.getElementById('ticker-track');
    if(track){
        const doubled = [...tickerItems,...tickerItems];
        doubled.forEach(item=>{
            const span=document.createElement('span');
            span.className='ticker-item';
            span.innerHTML=`<span class="ticker-dot"></span>${item}`;
            track.appendChild(span);
        });
    }

    // Card 3D tilt — throttled to avoid re-render interference
    (function(){
        let tiltRaf = null;
        document.addEventListener('mousemove', e=>{
            if(tiltRaf) return;
            tiltRaf = requestAnimationFrame(()=>{
                tiltRaf = null;
                document.querySelectorAll('.pcard').forEach(card=>{
                    const rect=card.getBoundingClientRect();
                    const x=e.clientX-rect.left, y=e.clientY-rect.top;
                    if(x>=0&&x<=rect.width&&y>=0&&y<=rect.height){
                        const cx=rect.width/2, cy=rect.height/2;
                        const rx_=((y-cy)/cy)*5;
                        const ry_=-((x-cx)/cx)*5;
                        card.style.transform=`translateY(-7px) scale(1.012) perspective(700px) rotateX(${rx_}deg) rotateY(${ry_}deg)`;
                    } else {
                        if(card.style.transform) card.style.transform='';
                    }
                });
            });
        },{passive:true});
    })();

    // Magnetic buttons
    function initMagnetic(){
        document.querySelectorAll('.btn-primary').forEach(btn=>{
            btn.addEventListener('mousemove',e=>{
                const rect=btn.getBoundingClientRect();
                const x=(e.clientX-rect.left-rect.width/2)*.22;
                const y=(e.clientY-rect.top-rect.height/2)*.22;
                btn.style.transform=`translate(${x}px,${y}px) translateY(-2px)`;
            });
            btn.addEventListener('mouseleave',()=>{ btn.style.transform=''; });
        });
    }
    document.addEventListener('DOMContentLoaded', initMagnetic);
    window.__ralMagneticInit = initMagnetic;

    // Animated counter
    function animateCounter(el, target, duration=1200){
        const start = performance.now();
        const isFloat = String(target).includes('.');
        function step(now){
            const progress = Math.min((now-start)/duration, 1);
            const ease = 1-Math.pow(1-progress, 3);
            const val = target * ease;
            el.textContent = isFloat ? val.toFixed(1) : Math.round(val);
            if(progress<1) requestAnimationFrame(step);
            else el.textContent = target;
        }
        requestAnimationFrame(step);
    }
    window.__animateCounters = function(){
        document.querySelectorAll('[data-counter]').forEach(el=>{
            const target = parseFloat(el.dataset.counter);
            const io = new IntersectionObserver(entries=>{
                if(entries[0].isIntersecting){ animateCounter(el,target); io.disconnect(); }
            });
            io.observe(el);
        });
    };
</script>

<script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ============================================================================
    // CONFIGURATION
    // ============================================================================
    const SITE_CONFIG = {
        name: 'RΔL',
        tagline: 'Boutique premium',
        paypalMeLink: 'https://paypal.me/RALStore',
        discordMessage: 'Veuillez rejoindre le Discord : https://discord.gg/Mm6QaTcAN et ouvrir un ticket avec le detail de votre commande afin de recevoir votre produit.',
        // API secrets gérés côté backend seulement - ne jamais exposer au frontend
        botApiUrl: '',
    };

    // ============================================================================
    // OWNER CONFIG — Configuration sécurisée
    // ⚠️  Tous les secrets sont en variables d'environnement Vercel (jamais en frontend)
    // ============================================================================
    const OWNER_CONFIG = {
        // Les credentials sont sur le BACKEND VERCEL uniquement
        // Ici : uniquement la config UI (aucun secret)
        apiUrl:          '/api/owner-auth',
        sessionDuration: 3600000,  // 1h
        maxAttempts:     5,        // tentatives côté client (le backend a son propre rate limit)
        lockoutDuration: 900000,   // 15 min
    };

    // ── Owner token helpers — token signé par le BACKEND, lu côté client ─────
    // Le token vient de l'API, on le stocke mais on ne peut pas le falsifier
    // (il est signé avec JWT_SECRET qui n'est que sur Vercel)
    const verifyOwnerToken = (token) => {
        if (!token) return null;
        try {
            // Lire le payload JWT (partie centrale) — lecture seule, pas de vérification sig ici
            // La vraie vérification de signature se fait côté backend à chaque requête sensible
            const parts = token.split('.');
            if (parts.length !== 3) return null;
            const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
            if (!payload.email || !payload.role) return null;
            if (payload.exp && payload.exp < Math.floor(Date.now()/1000)) return null;
            return { email: payload.email, role: payload.role, iat: (payload.iat||0)*1000 };
        } catch { return null; }
    };

        const [ownerSession, setOwnerSession] = useState(() => {
            try {
                const t = sessionStorage.getItem('ral_owner_token');
                return verifyOwnerToken(t) ? t : null;
            } catch { return null; }
        });
        const [products, setProducts]     = useState(() => {
            try {
                const saved = JSON.parse(localStorage.getItem('ral_products') || 'null');
                return Array.isArray(saved) && saved.length ? saved : PRODUCTS;
            } catch { return PRODUCTS; }
        });
        const ownerData = ownerSession ? verifyOwnerToken(ownerSession) : null;
        const isOwner = !!ownerData;

        const showToast = useCallback((message, type='success') => {
            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
            setToast({message, type});
            toastTimerRef.current = setTimeout(() => {
                setToast(null);
                toastTimerRef.current = null;
            }, 2800);
        }, []);

        useEffect(() => () => {
            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        }, []);

        const ownerLogout = useCallback(async () => {
            try { await fetch(OWNER_CONFIG.apiUrl, { method:'DELETE', credentials:'same-origin' }); } catch {}
            sessionStorage.removeItem('ral_owner_token');
            setOwnerSession(null);
            setCurrentPage('home');
            showToast('Déconnecté');
        }, [showToast]);

        useEffect(() => {
            try { localStorage.setItem('ral_products', JSON.stringify(products)); } catch {}
        }, [products]);

        // Page scroll restore
        useEffect(() => {
            const top = pageScrollPositions.current[currentPage] || 0;
            requestAnimationFrame(() => window.scrollTo({top, behavior:'auto'}));
        }, [currentPage]);

        // Scroll navbar
        useEffect(() => {
            let ticking = false;
            const h = () => {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    ticking = false;
                    const next = window.scrollY > 30;
                    if (isScrolledRef.current !== next) {
                        isScrolledRef.current = next;
                        setIsScrolled(next);
                    }
                });
            };
            h();
            window.addEventListener('scroll', h, {passive:true});
            return () => window.removeEventListener('scroll', h);
        }, []);

        // Canvas particles (hero only)
        useEffect(() => {
            if (currentPage !== 'home') return;
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let W = canvas.width = canvas.offsetWidth;
            let H = canvas.height = canvas.offsetHeight;
            const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; };
            window.addEventListener('resize', resize);

            const N = 55;
            const pts = Array.from({length:N}, () => ({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
                r: Math.random()*1.6+.4,
            }));

            let raf;
            const draw = () => {
                ctx.clearRect(0,0,W,H);
                for(let i=0;i<N;i++){
                    pts[i].x += pts[i].vx;
                    pts[i].y += pts[i].vy;
                    if(pts[i].x<0||pts[i].x>W) pts[i].vx*=-1;
                    if(pts[i].y<0||pts[i].y>H) pts[i].vy*=-1;

                    ctx.beginPath();
                    ctx.arc(pts[i].x, pts[i].y, pts[i].r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(220,38,38,.55)';
                    ctx.fill();

                    for(let j=i+1;j<N;j++){
                        const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if(dist < 110){
                            ctx.beginPath();
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.strokeStyle = `rgba(220,38,38,${(.18*(1-dist/110)).toFixed(3)})`;
                            ctx.lineWidth = .7;
                            ctx.stroke();
                        }
                    }
                }
                raf = requestAnimationFrame(draw);
            };
            draw();
            return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
        }, [currentPage]);

        useEffect(() => { setSelectedVariant(0); }, [selectedProduct]);

        const handleCategoryChange = (key) => {
            if(key === selectedCategory) return;
            setSelectedCategory(key);
        };

        // ── CART ──
        const addToCart = useCallback((product) => {
            setCart(prev => {
                const existing = prev.find(i => i.id === product.id);
                return existing
                    ? prev.map(i => i.id===product.id ? {...i, quantity:i.quantity+1} : i)
                    : [...prev, {...product, quantity:1}];
            });
            showToast(`${product.name} ajouté au panier`);
            if(window.gtag) window.gtag('event','add_to_cart',{product_id:product.id,product_name:product.name,product_price:product.price});
        }, [showToast]);
        const removeFromCart = useCallback(id => setCart(prev => prev.filter(i => i.id !== id)), []);
        const updateQuantity = useCallback((id, q) => {
            if(q===0) setCart(prev => prev.filter(i => i.id !== id));
            else setCart(prev => prev.map(i => i.id===id ? {...i, quantity:q} : i));
        }, []);
        const getTotalPrice = () => cart.reduce((t,i) => t + i.price*i.quantity, 0);
        const getTotalItems = () => cart.reduce((t,i) => t + i.quantity, 0);

        const validateEmail = useCallback((email) => {
            const n = String(email||'').trim().toLowerCase();
            const re = /^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i;
            if(!re.test(n)) return false;
            return (n.split('@')[1]||'').split('.').pop().length >= 2;
        }, []);
        const handleCheckoutEmail = useCallback((v) => {
            setCheckoutEmail(v);
            setEmailError(v && !validateEmail(v) ? 'Adresse email invalide' : '');
        }, [validateEmail]);
        const validateDiscordId = useCallback((v) => /^\d{17,20}$/.test(String(v||'').trim()), []);
        const handleCheckoutDiscordId = useCallback((v) => {
            setCheckoutDiscordId(v);
            setDiscordIdError(v && !/^\d{17,20}$/.test(v.trim()) ? 'ID Discord invalide (17-20 chiffres)' : '');
        }, []);

        const generateOrderId = () => {
            let id = 'RAL-';
            for(let i=0;i<8;i++) id += '0123456789ABCDEF'[Math.floor(Math.random()*16)];
            return id;
        };

        const registerOrderWithBot = async (newOrderId, product, total, email, discordId) => {
            // ⚠️ NE JAMAIS exposer d'API secret au frontend!
            // On appelle le backend Vercel qui relaye vers l'API bot avec le secret
            try {
                const response = await fetch('/api/register-order', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    credentials:'same-origin',
                    body: JSON.stringify({orderId:newOrderId,product,total,email,discordId}),
                });
                let json = {};
                try { json = await response.json(); } catch(_) {}
                if(!response.ok) return {ok:false, status:response.status, error:json.error||`Erreur API (${response.status})`};
                return {ok:json.success===true, status:response.status, error:json.error||null};
            } catch(err) {
                return {ok:false, error:'Impossible de contacter le serveur.'};
            }
        };

        const getPayPalMeUrl = () => {
            const link = SITE_CONFIG.paypalMeLink.trim();
            if(!link || link.includes('TON_PSEUDO')) return '';
            return `${link.replace(/\/$/,'/')}${getTotalPrice().toFixed(2)}`;
        };

        const handlePayPalMeCheckout = async (emailOverride, discordOverride) => {
            const email = emailOverride || checkoutEmail;
            const discord = discordOverride !== undefined ? discordOverride : checkoutDiscordId;
            if(!email || !validateEmail(email)) {
                showToast('Adresse email invalide', 'error');
                return;
            }
            const paypalUrl = getPayPalMeUrl();
            if(!paypalUrl) { alert('Ajoute ton lien PayPal.Me dans paypalMeLink.'); return; }

            const productSummary = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
            const total = getTotalPrice().toFixed(2);
            let newOrderId = '', registrationResult = {ok:false, error:'Erreur inconnue'};

            for(let attempt=0;attempt<5;attempt++){
                const candidateId = generateOrderId();
                const result = await registerOrderWithBot(candidateId, productSummary, parseFloat(total), email, discord);
                if(result.ok) { newOrderId = candidateId; registrationResult = result; break; }
                if(result.status !== 409) { registrationResult = result; break; }
                registrationResult = result;
            }

                    setEmailErr('Adresse email invalide');

                                        placeholder="Ex: 123456789012345678"

                                        onChange={e => handleDiscordChange(e.target.value)}

        // ============================================================================
        // OWNER LOGIN PAGE — Authentification sécurisée

        // ════════════════════════════════════════════════════════════════
        // OWNER LOGIN — email + mot de passe, anti brute-force, 2 étapes
        // ════════════════════════════════════════════════════════════════
        function OwnerLoginPage() {
            const [email,    setEmail]    = useState('');
            const [password, setPassword] = useState('');
            const [error,    setError]    = useState('');
            const [loading,  setLoading]  = useState(false);
            const [locked,   setLocked]   = useState(() => {
                const until = parseInt(sessionStorage.getItem('ral_lock') || '0');
                return Date.now() < until;
            });
            const attempts = React.useRef(0);

            // Countdown lockout
            React.useEffect(() => {
                if (!locked) return;
                const t = setInterval(() => {
                    const until = parseInt(sessionStorage.getItem('ral_lock') || '0');
                    if (Date.now() >= until) { setLocked(false); sessionStorage.removeItem('ral_lock'); clearInterval(t); }
                }, 1000);
                return () => clearInterval(t);
            }, [locked]);

            const lockout = () => {
                sessionStorage.setItem('ral_lock', String(Date.now() + OWNER_CONFIG.lockoutDuration));
                setLocked(true);
            };

            const handleLogin = async () => {
                if (locked || loading) return;
                const e = email.trim().toLowerCase();
                const p = password;
                if (!e || !p) { setError('Email et mot de passe requis.'); return; }
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(OWNER_CONFIG.apiUrl, {
                        method:      'POST',
                        credentials: 'same-origin',
                        headers:     { 'Content-Type': 'application/json' },
                        body:         JSON.stringify({ email: e, password: p }),
                    });
                    const data = await res.json();
                    if (res.ok && data.ok) {
                        // Token JWT signé côté backend — stocké en sessionStorage
                        // Même si qqn le lit, il ne peut pas le modifier (signature backend)
                        const token = btoa(JSON.stringify({ email: data.email, role: data.role, iat: Date.now(), exp: data.exp }));
                        sessionStorage.setItem('ral_owner_token', token);
                        const logs = JSON.parse(sessionStorage.getItem('ral_logs')||'[]');
                        logs.push({ ts: new Date().toISOString(), email: e, action: 'login_ok' });
                        sessionStorage.setItem('ral_logs', JSON.stringify(logs.slice(-100)));
                        setOwnerSession(token);
                        setCurrentPage('owner-panel');
                        showToast('Bienvenue Owner !');
                    } else {
                        attempts.current += 1;
                        const logs = JSON.parse(sessionStorage.getItem('ral_logs')||'[]');
                        logs.push({ ts: new Date().toISOString(), email: e, action: 'login_fail' });
                        sessionStorage.setItem('ral_logs', JSON.stringify(logs.slice(-100)));
                        if (res.status === 429 || attempts.current >= OWNER_CONFIG.maxAttempts) {
                            lockout();
                            setError(data.error || 'Trop de tentatives — accès verrouillé 15 min.');
                        } else {
                            setError(data.error || 'Email ou mot de passe incorrect.');
                        }
                    }
                } catch {
                    setError('Impossible de contacter le serveur. Vérifiez votre connexion.');
                } finally {
                    setLoading(false);
                }
            };

            const lockRemaining = () => {
                const until = parseInt(sessionStorage.getItem('ral_lock') || '0');
                const ms = until - Date.now();
                if (ms <= 0) return '';
                const m = Math.floor(ms / 60000);
                const s = Math.ceil((ms % 60000) / 1000);
                return m > 0 ? `${m}m ${s}s` : `${s}s`;
            };

            return (
                <div className="page-wrap">
                    <div className="container">
                        <div className="owner-login-wrap">
                            <div className="owner-login-card">

                                {/* Icône */}
                                <div className="owner-login-icon">
                                    <IconShield size={34}/>
                                </div>

                                <h1 className="owner-login-title">Owner <em>Panel</em></h1>
                                <p className="owner-login-sub">Accès réservé — RΔL Store</p>

                                {locked ? (
                                    <div className="owner-locked-box">
                                        <IconLock size={20}/>
                                        <div>
                                            <strong>Accès verrouillé</strong>
                                            <span id="lock-countdown">{lockRemaining()}</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="owner-form">

                                        {error && (
                                            <div className="owner-error-box">
                                                <IconX size={14}/> {error}
                                            </div>
                                        )}

                                        <div className="form-group">
                                            <label className="form-label">Adresse email</label>
                                            <input
                                                type="text"
                                                inputMode="email"
                                                autoComplete="username"
                                                className={`form-input${error ? ' input-error' : ''}`}
                                                placeholder="owner@ralstore.fr"
                                                value={email}
                                                onChange={e => { setEmail(e.target.value); setError(''); }}
                                                onKeyDown={e => e.key === 'Enter' && document.getElementById('owner-pwd-input')?.focus()}
                                                disabled={loading}
                                                autoFocus
                                            />
                                        </div>

                                        <div className="form-group">
                                            <label className="form-label">Mot de passe</label>
                                            <input
                                                id="owner-pwd-input"
                                                type="password"
                                                autoComplete="current-password"
                                                className={`form-input${error ? ' input-error' : ''}`}
                                                placeholder="••••••••"
                                                value={password}
                                                onChange={e => { setPassword(e.target.value); setError(''); }}
                                                onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                                disabled={loading}
                                            />
                                        </div>

                                        <button
                                            className="btn-primary btn-full"
                                            onClick={handleLogin}
                                            disabled={loading || !email.trim() || !password.trim()}
                                        >
                                            {loading
                                                ? <span className="cph-spinner"/>
                                                : <><IconShield size={15}/> Connexion</>
                                            }
                                        </button>

                                        <button className="owner-back-link" onClick={() => setCurrentPage('home')}>
                                            ← Retour au site
                                        </button>

                                    </div>
                                )}

                                <div className="owner-login-footer">
                                    <IconLock size={11}/> Anti brute-force · Session 1h · Logs actifs
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════
        // OWNER PANEL — Architecture modulaire, zéro rerender parasite
        // Chaque onglet = composant React.memo isolé hors du parent
        // ════════════════════════════════════════════════════════════════

        // ── Modal produit — défini HORS de tout parent pour stabilité React
        const OwnerProductForm = React.memo(function OwnerProductForm({ prod, categories, onSave, onCancel }) {
            const [form, setForm] = useState(() => ({
                name:        prod.name        || '',
                category:    prod.category    || Object.keys(categories)[0] || 'streaming',
                price:       prod.price       != null ? String(prod.price) : '0',
                stock:       prod.stock       != null ? String(prod.stock) : '100',
                imageUrl:    prod.imageUrl    || '',
                description: prod.description || '',
                featText:    Array.isArray(prod.features) ? prod.features.join('\n') : '',
                popular:     !!prod.popular,
                inStock:     prod.inStock !== false,
            }));
            const set = useCallback((k, v) => setForm(f => ({ ...f, [k]: v })), []);

            useEffect(() => {
                const prev = document.body.style.overflow;
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = prev; };
            }, []);

            const handleSave = () => {
                if (!form.name.trim()) { alert('Le nom est requis'); return; }
                onSave({
                    ...prod,
                    id:          prod.id || Date.now(),
                    name:        form.name.trim(),
                    category:    form.category,
                    price:       parseFloat(form.price)  || 0,
                    stock:       parseInt(form.stock)    || 0,
                    imageUrl:    form.imageUrl.trim(),
                    description: form.description.trim(),
                    features:    form.featText.split('\n').map(s => s.trim()).filter(Boolean),
                    popular:     form.popular,
                    inStock:     form.inStock,
                });
            };

            return (
                <div className="op-form-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
                    <div className="op-form-modal" onClick={e => e.stopPropagation()}>
                        <div className="op-form-head">
                            <h3>{prod.id ? 'Modifier — ' + prod.name : 'Nouveau produit'}</h3>
                            <button className="op-close-btn" onClick={onCancel}><IconX size={18}/></button>
                        </div>
                        <div className="op-form-grid">
                            <div className="form-group">
                                <label className="form-label">Nom</label>
                                <input type="text" className="form-input" value={form.name}
                                    onChange={e => set('name', e.target.value)} placeholder="Ex: Netflix Premium"/>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Catégorie</label>
                                <select className="form-input" value={form.category} onChange={e => set('category', e.target.value)}>
                                    {Object.entries(categories).map(([k, v]) =>
                                        <option key={k} value={k}>{v.name || k}</option>
                                    )}
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Prix (€)</label>
                                <input type="number" className="form-input" min="0" step="0.01"
                                    value={form.price} onChange={e => set('price', e.target.value)}/>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Stock</label>
                                <input type="number" className="form-input" min="0"
                                    value={form.stock} onChange={e => set('stock', e.target.value)}/>
                            </div>
                            <div className="form-group" style={{gridColumn:'1/-1'}}>
                                <label className="form-label">URL Image</label>
                                <input type="text" className="form-input" placeholder="https://..."
                                    value={form.imageUrl} onChange={e => set('imageUrl', e.target.value)}/>
                                {form.imageUrl && (
                                    <img src={form.imageUrl} alt="preview"
                                        style={{width:72,height:72,objectFit:'cover',borderRadius:'var(--radius-sm)',marginTop:'.5rem'}}
                                        onError={e => e.currentTarget.style.display='none'}/>
                                )}
                            </div>
                            <div className="form-group" style={{gridColumn:'1/-1'}}>
                                <label className="form-label">Description</label>
                                <textarea className="form-input cph-textarea" rows={2}
                                    value={form.description} onChange={e => set('description', e.target.value)}/>
                            </div>
                            <div className="form-group" style={{gridColumn:'1/-1'}}>
                                <label className="form-label">Features (une par ligne)</label>
                                <textarea className="form-input cph-textarea" rows={3}
                                    value={form.featText} onChange={e => set('featText', e.target.value)}
                                    placeholder="4K Ultra HD&#10;Multi-écrans&#10;Accès immédiat"/>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Disponibilité</label>
                                <select className="form-input" value={form.inStock ? '1' : '0'}
                                    onChange={e => set('inStock', e.target.value === '1')}>
                                    <option value="1">✓ En stock</option>
                                    <option value="0">✗ Épuisé</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Vedette</label>
                                <select className="form-input" value={form.popular ? '1' : '0'}
                                    onChange={e => set('popular', e.target.value === '1')}>
                                    <option value="0">Non</option>
                                    <option value="1">⭐ Oui</option>
                                </select>
                            </div>
                        </div>
                        <div className="op-form-actions">
                            <button className="btn-outline" onClick={onCancel}>Annuler</button>
                            <button className="btn-primary" onClick={handleSave}><IconCheck size={15}/> Sauvegarder</button>
                        </div>
                    </div>
                </div>
            );
        });

        // ── Onglet Produits
        const OwnerTabProducts = React.memo(function OwnerTabProducts({ products, categories, setProducts, showToast }) {
            const [search,      setSearch]      = useState('');
            const [editingProd, setEditingProd] = useState(null);
            const [isNew,       setIsNew]       = useState(false);

            const filtered = useMemo(() => {
                const q = search.trim().toLowerCase();
                return q ? products.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    (p.category || '').toLowerCase().includes(q)
                ) : products;
            }, [products, search]);

            const handleSave = useCallback(prod => {
                setProducts(prev => {
                    const exists = prev.find(p => p.id === prod.id);
                    return exists ? prev.map(p => p.id === prod.id ? prod : p) : [prod, ...prev];
                });
                setEditingProd(null);
                setIsNew(false);
                showToast((isNew ? 'Produit ajouté : ' : 'Modifié : ') + prod.name);
            }, [setProducts, showToast, isNew]);

            const handleDelete = useCallback((id, name) => {
                if (!confirm('Supprimer "' + name + '" définitivement ?')) return;
                setProducts(prev => prev.filter(p => p.id !== id));
                showToast('Supprimé : ' + name);
            }, [setProducts, showToast]);

            const toggleStock = useCallback(id => {
                setProducts(prev => prev.map(p => p.id === id ? { ...p, inStock: !p.inStock } : p));
            }, [setProducts]);

            return (
                <div className="op-panel">
                    <div className="op-panel-topbar">
                        <input type="text" className="form-input" style={{maxWidth:260}}
                            placeholder="Rechercher un produit..."
                            value={search} onChange={e => setSearch(e.target.value)}/>
                        <button className="btn-primary" onClick={() => { setIsNew(true); setEditingProd({}); }}>
                            + Nouveau produit
                        </button>
                    </div>

                    <div className="op-prod-table">
                        <div className="op-prod-thead">
                            <span>Produit</span><span>Catégorie</span><span>Prix</span><span>Stock</span><span>Dispo</span><span>Actions</span>
                        </div>
                        {filtered.length === 0
                            ? <div className="op-empty">Aucun produit trouvé.</div>
                            : filtered.map(p => (
                                <div className="op-prod-row" key={p.id}>
                                    <div className="op-prod-name">
                                        {p.imageUrl && (
                                            <img src={p.imageUrl} alt="" className="op-prod-thumb"
                                                onError={e => e.currentTarget.style.display='none'}/>
                                        )}
                                        <div>
                                            <div style={{fontWeight:700,fontSize:'.88rem'}}>{p.name}</div>
                                            {p.popular && <span className="op-popular-badge">⭐ Vedette</span>}
                                        </div>
                                    </div>
                                    <span className="op-prod-cat">{categories[p.category]?.name || p.category}</span>
                                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,color:'var(--red2)'}}>{p.price}€</span>
                                    <span style={{fontSize:'.82rem',color:'var(--text2)'}}>{p.stock}</span>
                                    <button className={`op-stock-toggle ${p.inStock ? 'in' : 'out'}`} onClick={() => toggleStock(p.id)}>
                                        {p.inStock ? '✓ Stock' : '✗ Épuisé'}
                                    </button>
                                    <div className="op-prod-actions">
                                        <button className="op-action-btn edit" onClick={() => { setIsNew(false); setEditingProd(p); }}>Modifier</button>
                                        <button className="op-action-btn delete" onClick={() => handleDelete(p.id, p.name)}>Supprimer</button>
                                    </div>
                                </div>
                            ))
                        }
                    </div>

                    {editingProd !== null && (
                        <OwnerProductForm
                            prod={editingProd}
                            categories={categories}
                            onSave={handleSave}
                            onCancel={() => { setEditingProd(null); setIsNew(false); }}
                        />
                    )}
                </div>
            );
        });

        // ── Onglet Commandes
        const OwnerTabOrders = React.memo(function OwnerTabOrders({ showToast }) {
            const [orders, setOrders] = useState(() => {
                try { return JSON.parse(localStorage.getItem('ral_orders') || '[]').reverse(); } catch { return []; }
            });
            const [filter, setFilter] = useState('all');

            const filtered = useMemo(() =>
                filter === 'all' ? orders : orders.filter(o => o.status === filter),
                [orders, filter]
            );

            const STATUS_COL = { pending:'#f59e0b', processing:'#60a5fa', delivered:'#4ade80', cancelled:'#f87171' };

            const updateStatus = useCallback((id, status) => {
                setOrders(prev => {
                    const updated = prev.map(o => o.id === id ? { ...o, status } : o);
                    try { localStorage.setItem('ral_orders', JSON.stringify([...updated].reverse())); } catch {}
                    return updated;
                });
                showToast('Statut → ' + status);
            }, [showToast]);

            const revenue = useMemo(() => orders.reduce((s, o) => s + (o.total || 0), 0), [orders]);

            return (
                <div className="op-panel">
                    <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap',marginBottom:'1rem',alignItems:'center'}}>
                        {[['all','Toutes'],['pending','En attente'],['processing','En traitement'],['delivered','Livrées'],['cancelled','Annulées']].map(([v,l]) => (
                            <button key={v} className={`cat-btn${filter===v?' active':''}`} onClick={() => setFilter(v)}>{l}</button>
                        ))}
                        <span style={{marginLeft:'auto',fontSize:'.8rem',color:'var(--muted)'}}>
                            {orders.length} cmd · {revenue.toFixed(2)}€
                        </span>
                    </div>
                    {filtered.length === 0
                        ? <div className="op-empty">Aucune commande.</div>
                        : <div className="op-orders-full">
                            {filtered.map((o, i) => {
                                const col = STATUS_COL[o.status] || '#f59e0b';
                                return (
                                    <div className="op-order-card" key={o.id || i}>
                                        <div className="op-order-card-head">
                                            <span className="cph-oc-id-val">{o.id}</span>
                                            <span style={{fontSize:'.78rem',color:'var(--muted)'}}>{o.date}</span>
                                            <span style={{marginLeft:'auto',fontFamily:'Syne,sans-serif',fontWeight:800}}>{(o.total||0).toFixed(2)}€</span>
                                        </div>
                                        <div style={{fontSize:'.82rem',color:'var(--text2)',padding:'.25rem 0'}}>
                                            {o.email || '—'} · {(o.items||[]).map(i => i.name + ' ×' + i.quantity).join(', ')}
                                        </div>
                                        <div className="op-order-card-foot">
                                            <span className="op-order-status" style={{color:col,background:col+'18',border:'1px solid '+col+'28'}}>{o.status||'pending'}</span>
                                            <select className="form-input" style={{maxWidth:160,padding:'.3rem .7rem',fontSize:'.78rem'}}
                                                value={o.status || 'pending'}
                                                onChange={e => updateStatus(o.id, e.target.value)}>
                                                <option value="pending">En attente</option>
                                                <option value="processing">En traitement</option>
                                                <option value="delivered">Livré</option>
                                                <option value="cancelled">Annulé</option>
                                            </select>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    }
                </div>
            );
        });

        // ── Onglet Clients
        const OwnerTabClients = React.memo(function OwnerTabClients() {
            const clients = useMemo(() => {
                try {
                    const orders = JSON.parse(localStorage.getItem('ral_orders') || '[]');
                    const map = {};
                    orders.forEach(o => {
                        if (!o.email) return;
                        if (!map[o.email]) map[o.email] = { email: o.email, orders: [], total: 0 };
                        map[o.email].orders.push(o);
                        map[o.email].total += o.total || 0;
                    });
                    return Object.values(map).sort((a, b) => b.total - a.total);
                } catch { return []; }
            }, []);

            return (
                <div className="op-panel">
                    <div className="op-section-title"><IconUsers size={16}/> Clients ({clients.length})</div>
                    {clients.length === 0
                        ? <div className="op-empty">Aucun client enregistré.</div>
                        : <div className="op-clients-list">
                            {clients.map(c => (
                                <div className="op-client-card" key={c.email}>
                                    <div className="op-client-avatar">{c.email[0].toUpperCase()}</div>
                                    <div className="op-client-info">
                                        <div className="op-client-email">{c.email}</div>
                                        <div className="op-client-meta">
                                            {c.orders.length} commande{c.orders.length > 1 ? 's' : ''} · {c.total.toFixed(2)}€
                                        </div>
                                        <div className="op-client-products">
                                            {[...new Set(c.orders.flatMap(o => (o.items||[]).map(i => i.name)))].join(', ')}
                                        </div>
                                    </div>
                                    <div className="op-client-right">
                                        <div className="op-client-total">{c.total.toFixed(2)}€</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    }
                </div>
            );
        });

        // ── Onglet Promos
        const OwnerTabPromos = React.memo(function OwnerTabPromos({ showToast }) {
            const [promos,   setPromos]   = useState(() => { try { return JSON.parse(localStorage.getItem('ral_promos')||'[]'); } catch { return []; } });
            const [code,     setCode]     = useState('');
            const [discount, setDiscount] = useState('10');
            const [type,     setType]     = useState('percent');
            const [maxUses,  setMaxUses]  = useState('100');

            const save = useCallback(list => {
                setPromos(list);
                try { localStorage.setItem('ral_promos', JSON.stringify(list)); } catch {}
            }, []);

            const add = () => {
                const c = code.trim().toUpperCase();
                if (!c) { showToast('Code requis', 'error'); return; }
                if (promos.find(p => p.code === c)) { showToast('Code déjà existant', 'error'); return; }
                save([...promos, { id: Date.now(), code: c, discount: parseFloat(discount)||10, type, maxUses: parseInt(maxUses)||100, uses: 0, active: true }]);
                setCode('');
                showToast('Code "' + c + '" créé !');
            };

            const toggle = useCallback(id => save(promos.map(p => p.id===id ? {...p, active:!p.active} : p)), [promos, save]);
            const remove = useCallback(id => { if(confirm('Supprimer ce code ?')) save(promos.filter(p => p.id !== id)); }, [promos, save]);

            return (
                <div className="op-panel">
                    <div className="op-section-title"><IconStar size={16}/> Codes promotionnels</div>
                    <div className="op-promo-create">
                        <div className="form-group" style={{margin:0,flex:1,minWidth:120}}>
                            <label className="form-label">Code</label>
                            <input type="text" className="form-input" placeholder="PROMO20"
                                value={code} onChange={e => setCode(e.target.value.toUpperCase())}
                                onKeyDown={e => e.key==='Enter' && add()}/>
                        </div>
                        <div className="form-group" style={{margin:0,flex:1,minWidth:110}}>
                            <label className="form-label">Type</label>
                            <select className="form-input" value={type} onChange={e => setType(e.target.value)}>
                                <option value="percent">% réduction</option>
                                <option value="fixed">€ fixe</option>
                            </select>
                        </div>
                        <div className="form-group" style={{margin:0,width:90}}>
                            <label className="form-label">Valeur</label>
                            <input type="number" className="form-input" min="1" value={discount}
                                onChange={e => setDiscount(e.target.value)}/>
                        </div>
                        <div className="form-group" style={{margin:0,width:110}}>
                            <label className="form-label">Max utilisations</label>
                            <input type="number" className="form-input" min="1" value={maxUses}
                                onChange={e => setMaxUses(e.target.value)}/>
                        </div>
                        <button className="btn-primary" style={{alignSelf:'flex-end'}} onClick={add}>+ Créer</button>
                    </div>
                    {promos.length === 0
                        ? <div className="op-empty" style={{marginTop:'1rem'}}>Aucun code promo créé.</div>
                        : <div className="op-promo-list" style={{marginTop:'1rem'}}>
                            <div className="op-promo-thead">
                                <span>Code</span><span>Réduction</span><span>Utilisations</span><span>Statut</span><span>Action</span>
                            </div>
                            {promos.map(p => (
                                <div className="op-promo-row" key={p.id}>
                                    <span className="op-promo-code">{p.code}</span>
                                    <span style={{color:'var(--red2)',fontWeight:700}}>{p.discount}{p.type==='percent'?'%':'€'}</span>
                                    <span style={{fontSize:'.82rem',color:'var(--text2)'}}>{p.uses}/{p.maxUses}</span>
                                    <button className={'op-stock-toggle '+(p.active?'in':'out')} onClick={() => toggle(p.id)}>
                                        {p.active ? '✓ Actif' : '✗ Inactif'}
                                    </button>
                                    <button className="op-action-btn delete" onClick={() => remove(p.id)}>Supprimer</button>
                                </div>
                            ))}
                        </div>

                    .amb-b2{
                        width:700px;height:700px;top:35%;right:-14%;
                        background:radial-gradient(circle,rgba(185,28,28,.7) 0%,transparent 70%);
                        animation:blobDrift 24s var(--ease-out) infinite reverse;
                        animation-delay:-9s;
                    }
                    .amb-b3{
                        width:450px;height:450px;bottom:-8%;left:28%;
                        background:radial-gradient(circle,rgba(120,15,15,.6) 0%,transparent 70%);
                        animation:blobDrift 20s var(--ease-out) infinite;
                        animation-delay:-15s;
                    }
                    @keyframes blobDrift{
                        0%,100%{transform:translate(0,0) scale(1)}
                        33%{transform:translate(30px,-20px) scale(1.08)}
                        66%{transform:translate(-15px,25px) scale(.96)}
                    }

                    /* Fine grid overlay */
                    body::before{
                        content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
                        background-image:
                            linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
                            linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
                        background-size:72px 72px;
                        mask-image:linear-gradient(to bottom,black 0%,transparent 55%);
                    }
                    .app{position:relative;z-index:1}

                    /* ================================================================
                       BUTTONS
                    ================================================================ */
                    .btn-primary{
                        display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
                        padding:.7rem 1.6rem;border-radius:var(--radius-sm);
                        background:linear-gradient(135deg,var(--red),#b91c1c);
                        color:#fff;font-size:.9rem;font-weight:600;
                        border:1px solid rgba(255,255,255,.1);
                        box-shadow:0 4px 20px rgba(220,38,38,.35),inset 0 1px 0 rgba(255,255,255,.12);
                        transition:all .22s var(--ease-out);
                        position:relative;overflow:hidden;
                    }
                    .btn-primary::before{
                        content:'';position:absolute;inset:0;
                        background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);
                        opacity:0;transition:opacity .2s;
                    }
                    .btn-primary:hover{
                        transform:translateY(-2px);
                        box-shadow:0 8px 30px rgba(220,38,38,.5),inset 0 1px 0 rgba(255,255,255,.15);
                    }
                    .btn-primary:hover::before{opacity:1}
                    .btn-primary:active{transform:translateY(0);box-shadow:0 2px 10px rgba(220,38,38,.3)}
                    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
                    .btn-primary.btn-large{padding:.85rem 2.2rem;font-size:.95rem}
                    .btn-primary.btn-full{width:100%;justify-content:center}

                    .btn-outline{
                        display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
                        padding:.7rem 1.6rem;border-radius:var(--radius-sm);
                        background:var(--surface);border:1px solid var(--border2);
                        color:var(--text2);font-size:.9rem;font-weight:500;
                        transition:all .22s var(--ease-out);
                    }
                    .btn-outline:hover{background:var(--surface2);border-color:var(--border3);color:var(--text)}
                    .btn-outline:disabled{opacity:.4;cursor:not-allowed}

                    .btn-ghost{
                        display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
                        padding:.7rem 1.6rem;border-radius:var(--radius-sm);
                        background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.22);
                        color:rgba(148,166,255,.9);font-size:.9rem;font-weight:500;
                        transition:all .22s var(--ease-out);
                    }
                    .btn-ghost:hover{background:rgba(88,101,242,.18);border-color:rgba(88,101,242,.38);color:#fff}

                    /* ================================================================
                       NAVBAR
                    ================================================================ */
                    .navbar{
                        position:fixed;top:42px;left:50%;transform:translateX(-50%);
                        width:calc(100% - 2.5rem);max-width:1180px;
                        z-index:1000;
                        background:rgba(2,2,4,.5);
                        backdrop-filter:blur(32px) saturate(180%);
                        -webkit-backdrop-filter:blur(32px) saturate(180%);
                        border:1px solid rgba(255,255,255,.08);
                        border-radius:var(--radius-xl);
                        transition:all .3s var(--ease-out);
                    }
                    .navbar.scrolled{
                        background:rgba(2,2,4,.85);
                        border-color:rgba(255,255,255,.12);
                        box-shadow:0 12px 50px rgba(0,0,0,.6),0 0 0 1px rgba(220,38,38,.05),var(--glow-red);
                    }
                    .nav-inner{
                        display:flex;align-items:center;gap:.75rem;
                        padding:.6rem 1.1rem;
                    }
                    .nav-logo{
                        display:flex;align-items:center;margin-right:.5rem;flex-shrink:0;
                        transition:opacity .2s;
                    }
                    .nav-logo:hover{opacity:.8}
                    .nav-logo-img{height:32px;width:auto;object-fit:contain}
                    .nav-logo-text{
                        font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:900;
                        background:linear-gradient(135deg,#fff 25%,var(--red2) 100%);
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .nav-links{display:flex;align-items:center;gap:.2rem;flex:1}
                    .nav-link{
                        padding:.4rem .85rem;border-radius:var(--radius-sm);
                        font-size:.86rem;font-weight:500;color:var(--text2);
                        transition:all .2s;position:relative;
                    }
                    .nav-link:hover{color:var(--text)}
                    .nav-link.active{color:var(--text)}
                    .nav-link.active::after{
                        content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
                        width:20px;height:2px;border-radius:99px;
                        background:linear-gradient(90deg,var(--red),var(--red2));
                    }
                    .nav-actions{display:flex;align-items:center;gap:.4rem;margin-left:auto}
                    .nav-panel-btn{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.4rem .9rem;border-radius:var(--radius-sm);
                        font-size:.84rem;font-weight:500;color:var(--text2);
                        background:var(--red-soft);border:1px solid rgba(220,38,38,.2);
                        transition:all .2s;
                    }
                    .nav-panel-btn:hover,.nav-panel-btn.active{
                        background:rgba(220,38,38,.16);color:var(--text);border-color:rgba(220,38,38,.38);
                        box-shadow:0 0 20px rgba(220,38,38,.12);
                    }
                    .nav-discord{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.4rem .9rem;border-radius:var(--radius-sm);
                        font-size:.84rem;font-weight:500;color:rgba(148,166,255,.85);
                        background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.22);
                        transition:all .2s;
                    }
                    .nav-discord:hover{background:rgba(88,101,242,.2);color:#fff;border-color:rgba(88,101,242,.4)}
                    .nav-cart{
                        position:relative;display:flex;align-items:center;justify-content:center;
                        width:38px;height:38px;border-radius:var(--radius-sm);
                        background:var(--surface);border:1px solid var(--border);
                        color:var(--text2);transition:all .2s;
                    }
                    .nav-cart:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
                    .cart-badge{
                        position:absolute;top:-5px;right:-5px;
                        min-width:18px;height:18px;padding:0 4px;
                        background:var(--red);border-radius:99px;
                        font-size:.66rem;font-weight:700;
                        display:flex;align-items:center;justify-content:center;
                        color:#fff;border:2px solid var(--bg);
                        animation:badgePop .28s var(--ease-spring) both;
                    }
                    @keyframes badgePop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
                    .nav-burger{
                        display:none;width:38px;height:38px;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);border:1px solid var(--border);
                        background:var(--surface);color:var(--text2);
                    }

                    /* ================================================================
                       HERO
                    ================================================================ */
                    .hero{
                        position:relative;min-height:100vh;
                        display:flex;flex-direction:column;align-items:center;justify-content:center;
                        overflow:hidden;padding:140px 1.5rem 5rem;
                    }
                    .hero-canvas{
                        position:absolute;inset:0;width:100%;height:100%;
                        pointer-events:none;z-index:0;opacity:.7;
                    }
                    .hero-grid{
                        position:absolute;inset:0;pointer-events:none;z-index:0;
                        background-image:
                            linear-gradient(rgba(220,38,38,.05) 1px,transparent 1px),
                            linear-gradient(90deg,rgba(220,38,38,.05) 1px,transparent 1px);
                        background-size:90px 90px;
                        mask-image:radial-gradient(ellipse 85% 75% at 50% 50%,black,transparent);
                    }
                    .hero-orb{
                        position:absolute;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);
                    }
                    .hero-orb-1{
                        width:700px;height:700px;top:-15%;left:-18%;
                        background:radial-gradient(circle,rgba(220,38,38,.2) 0%,transparent 70%);
                        animation:blobDrift 18s var(--ease-out) infinite;
                    }
                    .hero-orb-2{
                        width:550px;height:550px;bottom:-5%;right:-12%;
                        background:radial-gradient(circle,rgba(180,25,25,.16) 0%,transparent 70%);
                        animation:blobDrift 22s var(--ease-out) infinite reverse;
                    }
                    .hero-inner{
                        position:relative;z-index:1;
                        max-width:860px;width:100%;
                        display:flex;flex-direction:column;align-items:center;text-align:center;gap:2rem;
                    }
                    .hero-eyebrow{
                        display:inline-flex;align-items:center;gap:.55rem;
                        padding:.45rem 1.2rem;border-radius:99px;
                        background:rgba(220,38,38,.09);border:1px solid rgba(220,38,38,.22);
                        font-size:.78rem;font-weight:500;color:rgba(255,255,255,.65);
                        letter-spacing:.06em;text-transform:uppercase;
                        animation:fadeInDown .6s var(--ease-out) forwards;
                    }
                    .eyebrow-dot{
                        width:7px;height:7px;border-radius:50%;background:var(--red2);
                        box-shadow:0 0 10px var(--red2);
                        animation:pulse 2.2s ease-in-out infinite;
                    }
                    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
                    .hero-h1{
                        display:flex;flex-direction:column;align-items:center;gap:.2rem;
                        animation:fadeInUp .7s .1s var(--ease-out) forwards;
                    }
                    .hero-brand{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(5rem,20vw,11rem);
                        font-weight:900;letter-spacing:-.04em;line-height:.9;
                        background:linear-gradient(165deg,#fff 20%,rgba(255,255,255,.85) 45%,var(--red2) 75%,var(--red3) 100%);
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        filter:drop-shadow(0 0 60px rgba(220,38,38,.25));
                    }
                    .hero-sub{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(1.4rem,4vw,2.4rem);
                        font-weight:700;letter-spacing:-.02em;
                        color:rgba(255,255,255,.55);line-height:1.2;
                    }
                    .hero-sub em{
                        font-style:normal;color:rgba(255,255,255,.85);
                    }
                    @keyframes fadeInDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
                    @keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
                    .hero-desc{
                        font-size:clamp(.95rem,2vw,1.1rem);color:var(--text2);
                        line-height:1.75;max-width:560px;
                        animation:fadeInUp .7s .2s var(--ease-out) forwards;
                    }
                    .hero-actions{
                        display:flex;align-items:center;gap:1rem;flex-wrap:wrap;justify-content:center;
                        animation:fadeInUp .7s .3s var(--ease-out) forwards;
                    }
                    .hero-stats{
                        display:flex;align-items:center;gap:0;
                        border:1px solid var(--border);border-radius:var(--radius-xl);
                        background:rgba(255,255,255,.025);backdrop-filter:blur(20px);
                        overflow:hidden;
                        animation:fadeInUp .7s .4s var(--ease-out) forwards;
                    }
                    .hero-stat-item{
                        display:flex;flex-direction:column;align-items:center;gap:.2rem;
                        padding:.85rem 1.8rem;position:relative;
                    }
                    .hero-stat-item:not(:last-child)::after{
                        content:'';position:absolute;right:0;top:20%;bottom:20%;
                        width:1px;background:var(--border);
                    }
                    .hsn{
                        font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:900;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        line-height:1;
                    }
                    .hsl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
                    .hero-scroll-hint{
                        position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
                        display:flex;flex-direction:column;align-items:center;gap:.5rem;
                        opacity:.3;animation:bounce 2.5s ease-in-out infinite;
                    }
                    .scroll-line{width:1.5px;height:40px;background:linear-gradient(to bottom,transparent,var(--red2),transparent)}
                    @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

                    /* ================================================================
                       SECTIONS
                    ================================================================ */
                    .section{padding:5rem 0}
                    .section-head{text-align:center;margin-bottom:3.5rem}
                    .section-label{
                        display:inline-block;
                        font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
                        color:var(--red2);margin-bottom:.7rem;
                    }
                    .section-title{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(1.8rem,4vw,2.8rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1.1;
                        margin-bottom:.6rem;
                    }
                    .section-title em{
                        font-style:normal;
                        background:linear-gradient(135deg,var(--red2),var(--red3));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .section-sub{font-size:.95rem;color:var(--text2);line-height:1.65;max-width:520px;margin:0 auto}

                    /* ================================================================
                       FEATURES GRID
                    ================================================================ */
                    .features-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem}
                    .feat-card{
                        padding:1.8rem 1.5rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        position:relative;overflow:hidden;
                        transition:all .28s var(--ease-out);
                    }
                    .feat-card::before{
                        content:'';position:absolute;inset:0;
                        background:linear-gradient(135deg,rgba(220,38,38,.06) 0%,transparent 55%);
                        opacity:0;transition:opacity .3s;
                    }
                    .feat-card:hover{border-color:rgba(220,38,38,.28);transform:translateY(-4px);box-shadow:var(--shadow-red)}
                    .feat-card:hover::before{opacity:1}
                    .feat-icon{
                        width:48px;height:48px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);margin-bottom:1.2rem;
                        transition:box-shadow .3s;
                    }
                    .feat-card:hover .feat-icon{box-shadow:0 0 20px rgba(220,38,38,.25)}
                    .feat-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:.5rem}
                    .feat-desc{font-size:.86rem;color:var(--text2);line-height:1.65}

                    /* ================================================================
                       HOW IT WORKS
                    ================================================================ */
                    .hiw-section{
                        background:linear-gradient(180deg,transparent,rgba(220,38,38,.025),transparent);
                    }
                    .hiw-grid{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;position:relative;
                    }
                    .hiw-card{
                        position:relative;padding:2.2rem 1.8rem;
                        border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        transition:all .3s var(--ease-out);overflow:hidden;
                    }
                    .hiw-card::before{
                        content:'';position:absolute;inset:0;border-radius:inherit;
                        background:linear-gradient(145deg,rgba(220,38,38,.07) 0%,transparent 55%);
                        opacity:0;transition:opacity .3s;
                    }
                    .hiw-card:hover{border-color:rgba(220,38,38,.3);transform:translateY(-5px);box-shadow:var(--shadow-red)}
                    .hiw-card:hover::before{opacity:1}
                    .hiw-number{
                        font-family:'Syne',sans-serif;font-size:5rem;font-weight:900;
                        color:rgba(220,38,38,.07);line-height:1;
                        position:absolute;top:.6rem;right:1.2rem;
                        pointer-events:none;user-select:none;
                        transition:color .3s;
                    }
                    .hiw-card:hover .hiw-number{color:rgba(220,38,38,.12)}
                    .hiw-icon-wrap{
                        width:56px;height:56px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);margin-bottom:1.4rem;
                        transition:all .3s;
                    }
                    .hiw-card:hover .hiw-icon-wrap{background:rgba(220,38,38,.18);box-shadow:0 0 24px rgba(220,38,38,.2)}
                    .hiw-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:.65rem}
                    .hiw-desc{font-size:.88rem;color:var(--text2);line-height:1.7}
                    .hiw-arrow{
                        position:absolute;top:50%;right:-1.5rem;transform:translateY(-50%);
                        font-size:1.4rem;color:rgba(220,38,38,.35);z-index:2;pointer-events:none;
                    }

                    /* ================================================================
                       TESTIMONIALS
                    ================================================================ */
                    .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
                    .testi-card{
                        padding:1.8rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:1rem;
                        transition:all .28s var(--ease-out);
                        position:relative;overflow:hidden;
                    }
                    .testi-card::before{
                        content:'"';position:absolute;top:.5rem;right:1.2rem;
                        font-family:'Syne',sans-serif;font-size:4rem;font-weight:900;
                        color:rgba(220,38,38,.06);line-height:1;pointer-events:none;
                    }
                    .testi-card:hover{border-color:rgba(220,38,38,.2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
                    .testi-stars{display:flex;gap:.2rem;color:var(--gold)}
                    .testi-text{font-size:.92rem;color:var(--text2);line-height:1.7;font-style:italic;flex:1}
                    .testi-author{display:flex;align-items:center;gap:.9rem;margin-top:auto;padding-top:.8rem;border-top:1px solid var(--border)}
                    .testi-avatar{
                        width:38px;height:38px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;flex-shrink:0;
                        font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;
                        background:linear-gradient(135deg,rgba(220,38,38,.3),rgba(185,28,28,.5));
                        border:1px solid rgba(220,38,38,.3);color:#fff;
                    }
                    .testi-name{font-weight:700;font-size:.88rem}
                    .testi-role{font-size:.76rem;color:var(--muted)}

                    /* ================================================================
                       CTA BAND
                    ================================================================ */
                    .cta-band{
                        margin:2rem 0;padding:4rem 0;
                        background:linear-gradient(145deg,rgba(220,38,38,.1) 0%,rgba(185,28,28,.06) 100%);
                        border-top:1px solid rgba(220,38,38,.14);border-bottom:1px solid rgba(220,38,38,.14);
                        position:relative;overflow:hidden;
                    }
                    .cta-band::before{
                        content:'';position:absolute;inset:0;
                        background:radial-gradient(ellipse 60% 100% at 50% 50%,rgba(220,38,38,.05),transparent);
                    }
                    .cta-band-inner{
                        position:relative;z-index:1;
                        display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;
                    }
                    .cta-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.5rem,3.5vw,2.2rem);
                        font-weight:900;letter-spacing:-.03em;margin-bottom:.4rem;
                    }
                    .cta-sub{font-size:.95rem;color:var(--text2)}

                    /* ================================================================
                       FAQ
                    ================================================================ */
                    .faq-section{padding-bottom:6rem}
                    .faq-list{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:.6rem}
                    .faq-item{
                        border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .25s;
                    }
                    .faq-item.open{border-color:rgba(220,38,38,.28)}
                    .faq-q{
                        width:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem;
                        padding:1.15rem 1.4rem;text-align:left;
                        font-size:.93rem;font-weight:600;color:var(--text);transition:background .2s;
                    }
                    .faq-q:hover{background:rgba(255,255,255,.025)}
                    .faq-item.open .faq-q{color:var(--red2)}
                    .faq-a-wrap{overflow:hidden;transition:max-height .4s var(--ease-out)}
                    .faq-a{
                        padding:.15rem 1.4rem 1.3rem;
                        font-size:.88rem;color:var(--text2);line-height:1.75;
                        border-top:1px solid rgba(255,255,255,.05);
                    }

                    /* ================================================================
                       PRODUCT GRID & CARDS
                    ================================================================ */
                    .products-hero{
                        padding:140px 0 2.5rem;position:relative;overflow:hidden;
                        background:linear-gradient(180deg,rgba(220,38,38,.04) 0%,transparent 100%);
                    }
                    .ph-glow{
                        position:absolute;bottom:0;left:50%;transform:translateX(-50%);
                        width:600px;height:2px;
                        background:linear-gradient(90deg,transparent,rgba(220,38,38,.4),transparent);
                    }
                    .ph-inner{display:flex;flex-direction:column;gap:.7rem}
                    .ph-title{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(2rem,5vw,3.2rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1;
                    }
                    .ph-title em{
                        font-style:normal;
                        background:linear-gradient(135deg,var(--red2),var(--red3));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .ph-desc{font-size:.95rem;color:var(--text2);max-width:500px}
                    .ph-stats{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
                    .ph-stat{font-size:.82rem;color:var(--text2);display:flex;align-items:center;gap:.4rem}
