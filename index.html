        // ============================================================================
        // COMPOSANT PRINCIPAL
        // ============================================================================
        function DigitalShop() {
            const [currentPage, setCurrentPage] = useState('home');
            const [cart, setCart] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedVariant, setSelectedVariant] = useState(0);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [checkoutEmail, setCheckoutEmail] = useState('');
            const [emailError, setEmailError] = useState('');
            const [checkoutDiscordId, setCheckoutDiscordId] = useState('');

            const [orderConfirmed, setOrderConfirmed] = useState(false);

            const [orderIdError, setOrderIdError] = useState('');
            const [isCategoryTransitioning, setIsCategoryTransitioning] = useState(false);
            const [toast, setToast] = useState(null); // { message, type }

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 2800);
            };
            const [isScrolled, setIsScrolled] = useState(false);

            const handleCategoryChange = (key) => {
                if (key === selectedCategory) return;
                setIsCategoryTransitioning(true);
                setSelectedCategory(key);
                setTimeout(() => setIsCategoryTransitioning(false), 320);
            };

            // Détection du scroll pour la navbar
            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                setSelectedVariant(0);
            }, [selectedProduct]);

            // ============================================================================
            // ANALYTICS
            // ============================================================================
            const trackEvent = (eventName, eventData = {}) => {
                if (window.gtag) {
                    window.gtag('event', eventName, eventData);
                }
            };

            // ============================================================================
            // FONCTIONS DE GESTION DU PANIER
            // ============================================================================
            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                if (existingItem) {
                    setCart(cart.map(item =>
                        item.id === product.id
                            ? { ...item, quantity: item.quantity + 1 }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
                showToast(`✅ ${product.name} ajouté au panier`);
                trackEvent('add_to_cart', {
                    product_id: product.id,
                    product_name: product.name,
                    product_price: product.price,
                    product_category: product.category
                });
            };

            const removeFromCart = (productId) => {
                setCart(cart.filter(item => item.id !== productId));
            };

            const updateQuantity = (productId, newQuantity) => {
                if (newQuantity === 0) {
                    removeFromCart(productId);
                } else {
                    setCart(cart.map(item =>
                        item.id === productId
                            ? { ...item, quantity: newQuantity }
                            : item
                    ));
                }
            };

            const getTotalPrice = () => {
                return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
            };

            const getTotalItems = () => {
                return cart.reduce((total, item) => total + item.quantity, 0);
            };

            const validateEmail = (email) => {
                const normalized = String(email || '').trim().toLowerCase();
                // Validation email stricte (format standard + TLD min 2 chars)
                const emailRegex = /^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i;
                if (!emailRegex.test(normalized)) return false;
                const domain = normalized.split('@')[1] || '';
                const tld = domain.split('.').pop() || '';
                return tld.length >= 2;
            };

            const handleCheckoutEmail = (value) => {
                const normalized = String(value || '').trim();
                setCheckoutEmail(normalized);
                if (normalized && !validateEmail(normalized)) {
                    setEmailError('Adresse email invalide');
                } else {
                    setEmailError('');
                }
            };

            const validateDiscordId = (value) => /^\d{17,20}$/.test(String(value || '').trim());

            const handleCheckoutDiscordId = (value) => {
                const normalized = String(value || '').trim();
                setCheckoutDiscordId(normalized);
                if (!normalized) {
                    setDiscordIdError('');
                    return;
                }
                setDiscordIdError(validateDiscordId(normalized) ? '' : 'ID Discord invalide (17 à 20 chiffres)');
            };

            // ============================================================================
            // GÉNÉRATION ID DE COMMANDE
            // ============================================================================
            const generateOrderId = () => {
                const chars = '0123456789ABCDEF';
                let id = 'RAL-';
                for (let i = 0; i < 8; i++) {
                    id += chars[Math.floor(Math.random() * 16)];
                }
                return id;
            };

            const registerOrderWithBot = async (newOrderId, product, total, email, discordId) => {
                try {
                    const apiBaseUrl = String(SITE_CONFIG.botApiUrl || '').trim().replace(/\/$/, '');
                    const endpoint = apiBaseUrl ? `${apiBaseUrl}/api/register-order` : '/api/register-order';

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Secret': SITE_CONFIG.botApiSecret,
                        },
                        body: JSON.stringify({ orderId: newOrderId, product, total, email, discordId }),
                    });

                    let json = {};
                    try {
                        json = await response.json();
                    } catch (_) {
                        json = {};
                    }

                    if (!response.ok) {
                        return {
                            ok: false,
                            status: response.status,
                            error: json.error || `Erreur API (${response.status})`,
                        };
                    }

                    return { ok: json.success === true, status: response.status, error: json.error || null };
                } catch (err) {
                    console.error('Erreur enregistrement commande:', err);
                    return { ok: false, error: 'Impossible de contacter le bot/API.' };
                }
            };

            // ============================================================================
            // PAIEMENT PAYPAL.ME
            // ============================================================================
            const getPayPalMeUrl = () => {
                const link = SITE_CONFIG.paypalMeLink.trim();
                if (!link || link.includes('TON_PSEUDO')) return '';

                const amount = getTotalPrice().toFixed(2);
                return `${link.replace(/\/$/, '')}/${amount}`;
            };

            const handlePayPalMeCheckout = async () => {
                if (!checkoutEmail || !validateEmail(checkoutEmail)) {
                    setEmailError('Adresse email invalide');
                    alert('Veuillez entrer une adresse email valide avant de payer.');
                    return;
                }

                const paypalUrl = getPayPalMeUrl();
                if (!paypalUrl) {
                    alert('Ajoute ton lien PayPal.Me dans paypalMeLink avant de lancer les paiements.');
                    return;
                }

                // Générer et enregistrer l'ID de commande (avec retry collision)
                const productSummary = cart.map(item => `${item.name} x${item.quantity}`).join(', ');
                const total = getTotalPrice().toFixed(2);
                let newOrderId = '';
                let registrationResult = { ok: false, error: 'Erreur inconnue' };

                for (let attempt = 0; attempt < 5; attempt++) {
                    const candidateId = generateOrderId();
                    const result = await registerOrderWithBot(
                        candidateId,
                        productSummary,
                        parseFloat(total),
                        checkoutEmail,
                        checkoutDiscordId
                    );
                    if (result.ok) {
                        newOrderId = candidateId;
                        registrationResult = result;
                        break;
                    }
                    // 409 = ID déjà existant, on retente avec un nouvel ID.
                    if (result.status !== 409) {
                        registrationResult = result;
                        break;
                    }
                    registrationResult = result;
                }

                if (!newOrderId) {
                    alert(
                        "Impossible d'enregistrer ta commande dans le bot. " +
                        "Aucun ID valide n'a été créé. Merci de réessayer dans quelques secondes.\n\n" +
                        `Détail: ${registrationResult.error || 'Erreur inconnue'}`
                    );
                    return;
                }

                setOrderId(newOrderId);

                // Ouvrir PayPal
                const a = document.createElement('a');
                a.href = paypalUrl;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                setCurrentPage('confirmation');

                    value: getTotalPrice(),
                    currency: 'EUR',

                        item_name: item.name,

            // ============================================================================
            // NAVIGATION ET HEADER

            return (

                    <div className="ambient-layer" aria-hidden="true">

                        <span className="ambient-blob ambient-blob-2"></span>

                    </footer>

                    {/* Styles CSS intégrés */}
                    <style>{`

                        /* ====================================================
                           RESET & ROOT — RΔL PREMIUM 2026
                        ==================================================== */
                        *, *::before, *::after {
                            margin: 0;
                            padding: 0;
                            box-sizing: border-box;
                        }

                        :root {
                            --bg: #050407;
                            --bg2: #080610;
                            --surface: rgba(255,255,255,0.042);
                            --surface-md: rgba(255,255,255,0.068);
                            --surface-lg: rgba(255,255,255,0.09);
                            --line: rgba(255,255,255,0.08);
                            --line-md: rgba(255,255,255,0.13);
                            --line-red: rgba(220,38,38,0.38);
                            --line-red-soft: rgba(220,38,38,0.18);
                            --text: #f0f0f4;
                            --text-2: #c8c8d4;
                            --muted: #8a8a9a;
                            --muted-2: #6a6a7a;
                            /* Reds */
                            --r1: #dc2626;
                            --r2: #b91c1c;
                            --r3: #991b1b;
                            --r4: #7f1d1d;
                            --r-soft: rgba(220,38,38,0.12);
                            --r-glow: rgba(220,38,38,0.22);
                            --r-glow-lg: rgba(220,38,38,0.34);
                            /* Gradients */
                            --grad-red: linear-gradient(135deg, #ef4444 0%, #b91c1c 55%, #7f1d1d 100%);
                            --grad-red-soft: linear-gradient(135deg, rgba(239,68,68,0.18) 0%, rgba(127,29,29,0.06) 100%);
                            --grad-surface: linear-gradient(180deg, rgba(255,255,255,0.072) 0%, rgba(255,255,255,0.022) 100%);
                            --grad-surface-hover: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.038) 100%);
                            /* Shadows */
                            --shadow-sm: 0 4px 16px rgba(0,0,0,0.28);
                            --shadow: 0 12px 40px rgba(0,0,0,0.42);
                            --shadow-lg: 0 24px 70px rgba(0,0,0,0.55);
                            --shadow-red: 0 0 32px rgba(220,38,38,0.18);
                            --shadow-red-lg: 0 0 60px rgba(220,38,38,0.28);
                            /* Radius */
                            --r-xs: 6px;
                            --r-sm: 10px;
                            --r-md: 14px;
                            --r-lg: 20px;
                            --r-xl: 28px;
                            /* Legacy compat */
                            --radius: 14px;
                            --shadow-compat: 0 24px 70px rgba(0,0,0,0.42);
                        }

                        /* ====================================================
                           BASE
                        ==================================================== */
                        html { scroll-behavior: smooth; }

                        body {
                            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                            background:
                                radial-gradient(ellipse 80% 40% at 50% -10%, rgba(220,38,38,0.22) 0%, transparent 100%),
                                radial-gradient(ellipse 50% 30% at 5% 20%, rgba(153,27,27,0.18) 0%, transparent 100%),
                                radial-gradient(ellipse 60% 35% at 95% 30%, rgba(100,8,20,0.28) 0%, transparent 100%),
                                radial-gradient(ellipse 70% 50% at 50% 100%, rgba(30,0,8,0.35) 0%, transparent 100%),
                                linear-gradient(180deg, #050407 0%, #07050d 50%, #050407 100%);
                            color: var(--text);
                            overflow-x: hidden;
                            min-height: 100vh;
                            text-rendering: geometricPrecision;
                            -webkit-font-smoothing: antialiased;
                        }

                        .app {
                            min-height: 100vh;
                            position: relative;
                        }

                        .ambient-layer {
                            position: fixed;
                            inset: 0;
                            z-index: 0;
                            pointer-events: none;
                            overflow: hidden;
                        }
                        .ambient-blob {
                            position: absolute;
                            border-radius: 999px;
                            filter: blur(72px);
                            opacity: 0.22;
                            mix-blend-mode: screen;
                            animation: blobDrift 18s ease-in-out infinite;
                        }
                        .ambient-blob-1 {
                            width: 440px;
                            height: 440px;
                            top: 8%;
                            left: -8%;
                            background: radial-gradient(circle, rgba(239,68,68,0.62) 0%, transparent 68%);
                        }
                        .ambient-blob-2 {
                            width: 520px;
                            height: 520px;
                            top: 44%;
                            right: -12%;
                            background: radial-gradient(circle, rgba(185,28,28,0.58) 0%, transparent 70%);
                            animation-delay: -6s;
                        }
                        .ambient-blob-3 {
                            width: 360px;
                            height: 360px;
                            bottom: -8%;
                            left: 28%;
                            background: radial-gradient(circle, rgba(147,20,20,0.52) 0%, transparent 68%);
                            animation-delay: -11s;
                        }
                        .ambient-line {
                            position: absolute;
                            width: 140%;
                            height: 1px;
                            left: -20%;
                            background: linear-gradient(90deg, transparent, rgba(239,68,68,0.22), transparent);
                            opacity: 0.35;
                            transform: rotate(-12deg);
                            animation: lineSweep 14s linear infinite;
                        }
                        .ambient-line-1 { top: 24%; }
                        .ambient-line-2 { top: 62%; animation-delay: -7s; }
                        @keyframes blobDrift {
                            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
                            50% { transform: translate3d(18px, -22px, 0) scale(1.08); }
                        }
                        @keyframes lineSweep {
                            0% { transform: translateX(-15%) rotate(-12deg); opacity: 0.16; }
                            50% { transform: translateX(10%) rotate(-12deg); opacity: 0.35; }
                            100% { transform: translateX(25%) rotate(-12deg); opacity: 0.16; }
                        }

                        /* Animated noise grain overlay */
                        .app::before {
                            content: '';
                            position: fixed;
                            inset: 0;
                            pointer-events: none;
                            z-index: 0;
                            background-image:
                                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
                            background-size: 72px 72px;
                            mask-image: linear-gradient(to bottom, black, transparent 72%);
                            opacity: 0.6;
                        }

                        /* Ambient sweep */
                        .app::after {
                            content: '';
                            position: fixed;
                            inset: 0;
                            pointer-events: none;
                            z-index: 0;
                            background:
                                linear-gradient(125deg, transparent 0%, rgba(255,255,255,0.025) 46%, transparent 58%),
                                radial-gradient(circle at 50% 0%, rgba(220,38,38,0.1), transparent 32rem);
                            animation: ambientSweep 14s ease-in-out infinite;
                            mix-blend-mode: screen;
                        }

                        @keyframes ambientSweep {
                            0%, 100% { transform: translateX(-6%) scale(1); opacity: 0.4; }
                            50% { transform: translateX(6%) scale(1.04); opacity: 0.7; }
                        }

                        /* ====================================================
                           SCROLLBAR
                        ==================================================== */
                        ::-webkit-scrollbar { width: 6px; }
                        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
                        ::-webkit-scrollbar-thumb {
                            background: linear-gradient(180deg, #dc2626, #7f1d1d);
                            border-radius: 3px;
                        }
                        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

                        /* ====================================================
                           TYPOGRAPHY
                        ==================================================== */
                        h1,h2,h3,h4,h5,h6 {
                            font-weight: 700;
                            line-height: 1.1;
                            letter-spacing: -0.025em;
                            color: var(--text);
                        }

                        p { color: var(--text-2); line-height: 1.65; }

                        /* ====================================================
                           NAVIGATION — FLOATING PILL
                        ==================================================== */
                        .navbar {
                            position: fixed;
                            top: 16px;
                            left: 50%;
                            transform: translateX(-50%);
                            width: min(1360px, calc(100% - 40px));
                            z-index: 1000;
                            background: rgba(6,4,10,0.7);
                            backdrop-filter: blur(28px) saturate(180%);
                            -webkit-backdrop-filter: blur(28px) saturate(180%);
                            border: 1px solid rgba(255,255,255,0.09);
                            border-radius: 18px;
                            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
                            box-shadow: 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
                        }

                        .navbar.scrolled {
                            background: rgba(5,3,9,0.88);
                            border-color: rgba(220,38,38,0.2);
                            box-shadow: 0 24px 70px rgba(0,0,0,0.5), 0 0 0 1px rgba(220,38,38,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
                        }

                        .nav-container {
                            padding: 0.7rem 1.1rem;
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            gap: 1rem;
                        }

                        .nav-logo {
                            display: flex;
                            align-items: center;
                            cursor: pointer;
                            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
                        }
                        .nav-logo:hover {
                            transform: scale(1.07);
                            filter: drop-shadow(0 0 12px rgba(220,38,38,0.55));
                        }
                        .nav-logo-img {
                            width: 44px;
                            height: 44px;
                            object-fit: contain;
                            border-radius: 50%;
                        }

                        /* Nav links pill */
                        .nav-links {
                            display: flex;
                            gap: 0.2rem;
                            padding: 0.25rem;
                            background: rgba(255,255,255,0.04);
                            border: 1px solid rgba(255,255,255,0.07);
                            border-radius: 12px;
                        }
                        .nav-links a {
                            color: var(--muted);

                            font-weight: 600;
                            font-size: 0.88rem;

                            color: var(--text);

                        .discord-nav-btn {

                            box-shadow: 0 8px 24px rgba(88,101,242,0.18);
                        }

                        /* Cart button */
                        .cart-btn {
                            position: relative;
                            background: rgba(255,255,255,0.07);
                            border: 1px solid rgba(255,255,255,0.11);
                            color: var(--text-2);

                        }

                            display: none;
                            background: none;

                           MAIN CONTENT
                        ==================================================== */
                        .main-content {
                            min-height: 100vh;

                        .page-header p { color: var(--muted); font-size: 1.08rem; }

                            border-radius: 50%;
                            pointer-events: none;
                            filter: blur(90px);
                        }
                        .hero-orb-1 {
                            width: 700px; height: 700px;
                            top: -200px; left: -120px;
                            background: radial-gradient(circle, rgba(220,38,38,0.28) 0%, transparent 70%);
                            animation: orbPulse 10s ease-in-out infinite;
                        }
                        .hero-orb-2 {
                            width: 600px; height: 600px;
                            bottom: -120px; right: 5%;
                            background: radial-gradient(circle, rgba(153,27,27,0.2) 0%, transparent 70%);
                            animation: orbPulse 13s ease-in-out infinite reverse;
                        }
                        .hero-orb-3 {
                            width: 380px; height: 380px;
                            top: 25%; right: 28%;
                            background: radial-gradient(circle, rgba(100,8,18,0.24) 0%, transparent 70%);
                            animation: orbPulse 8s ease-in-out infinite 2.5s;
                        }
                        @keyframes orbPulse {
                            0%,100% { transform: scale(1) rotate(0deg); opacity: 0.65; }
                            50% { transform: scale(1.22) rotate(5deg); opacity: 1; }
                        }

                        /* Grid overlay */
                        .hero-grid-overlay {
                            position: absolute; inset: 0; pointer-events: none;
                            background-image:
                                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
                            background-size: 56px 56px;
                            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 90%);
                        }

                        /* Hero layout */
                        .hero-inner {
                            position: relative; z-index: 2;
                            max-width: 1380px; margin: 0 auto;
                            padding: 0 2.5rem;
                            width: 100%;
                            display: grid;
                            grid-template-columns: 1fr min(44vw, 540px);
                            gap: 5rem;
                            align-items: center;
                            min-height: 100vh;
                        }

                        .hero-content {
                            display: flex;
                            flex-direction: column;
                            gap: 0;
                        }

                        /* Hero badge */
                        .hero-badge {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.65rem;
                            background: rgba(220,38,38,0.09);
                            border: 1px solid rgba(220,38,38,0.28);
                            padding: 0.42rem 1.2rem;
                            border-radius: 999px;
                            color: #fca5a5;
                            font-size: 0.82rem;
                            font-weight: 600;
                            letter-spacing: 0.02em;
                            margin-bottom: 2.5rem;
                            width: fit-content;
                            animation: fadeInDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
                            box-shadow: 0 0 24px rgba(220,38,38,0.1);
                        }
                        .hero-badge-dot {
                            width: 7px; height: 7px;
                            border-radius: 50%;
                            background: #ef4444;
                            box-shadow: 0 0 10px rgba(239,68,68,0.9);
                            animation: blink 2.2s ease-in-out infinite;
                        }
                        @keyframes blink {
                            0%,100% { opacity: 1; box-shadow: 0 0 10px rgba(239,68,68,0.9); }
                            50% { opacity: 0.25; box-shadow: 0 0 4px rgba(239,68,68,0.4); }
                        }
                        @keyframes fadeInDown {
                            from { opacity: 0; transform: translateY(-20px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        @keyframes fadeInUp {
                            from { opacity: 0; transform: translateY(20px); }
                            to { opacity: 1; transform: translateY(0); }
                        }

                        /* Hero title */
                        .hero-title {
                            display: flex; flex-direction: column;
                            margin-bottom: 2rem;
                            animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
                        }
                        .hero-title-ral {
                            font-size: clamp(5rem, 14vw, 10rem);
                            font-weight: 900;
                            line-height: 0.85;
                            letter-spacing: -0.06em;
                            background: linear-gradient(135deg,
                                #ffffff 0%,
                                #ffffff 20%,
                                #fca5a5 40%,
                                #ef4444 60%,
                                #b91c1c 80%,
                                #7f1d1d 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                            filter: drop-shadow(0 0 40px rgba(220,38,38,0.3));
                        }
                        .hero-title-sub {
                            font-size: clamp(1.6rem, 3.5vw, 3rem);
                            font-weight: 700;
                            color: var(--text-2);
                            letter-spacing: -0.03em;
                            line-height: 1.15;
                            margin-top: 0.3rem;
                        }

                        /* Hero description */
                        .hero-description {
                            color: var(--muted);
                            font-size: clamp(1rem, 1.4vw, 1.2rem);
                            line-height: 1.7;
                            max-width: 540px;
                            margin-bottom: 2.5rem;
                            animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s both;
                        }

                        /* Hero CTAs */
                        .hero-cta {
                            display: flex;
                            gap: 1rem;
                            margin-bottom: 3.5rem;
                            animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.3s both;
                            flex-wrap: wrap;
                        }

                        /* Stats row */
                        .hero-stats-row {
                            display: flex;
                            align-items: center;
                            gap: 1.5rem;
                            animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.4s both;
                        }
                        .hero-stat {
                            display: flex;
                            flex-direction: column;
                            gap: 0.1rem;
                        }
                        .hero-stat-num {
                            font-size: 1.6rem;
                            font-weight: 800;
                            letter-spacing: -0.04em;
                            background: linear-gradient(135deg, #ffffff 0%, #fca5a5 60%, #ef4444 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }
                        .hero-stat-lbl {
                            font-size: 0.75rem;
                            font-weight: 500;
                            color: var(--muted);
                            letter-spacing: 0.04em;
                            text-transform: uppercase;
                        }
                        .hero-stat-divider {
                            width: 1px; height: 36px;
                            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.18), transparent);
                        }

                        /* Hero visual — right column */
                        .hero-visual {
                            position: relative;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            min-height: 460px;
                            animation: fadeInUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s both;
                        }

                        /* Rotating rings */
                        .visual-ring {
                            position: absolute;
                            border-radius: 50%;
                            border: 1px solid rgba(220,38,38,0.18);
                            animation: ringRotate 18s linear infinite;
                        }
                        .visual-ring-1 {
                            width: 400px; height: 400px;
                            border-color: rgba(220,38,38,0.14);
                            box-shadow: 0 0 60px rgba(220,38,38,0.06), inset 0 0 60px rgba(220,38,38,0.04);
                        }
                        .visual-ring-2 {
                            width: 280px; height: 280px;
                            border-color: rgba(220,38,38,0.22);
                            animation-duration: 12s;
                            animation-direction: reverse;
                        }
                        @keyframes ringRotate {
                            from { transform: rotate(0deg); }
                            to { transform: rotate(360deg); }
                        }

                        /* Center hexagon logo */
                        .visual-center-logo {
                            position: absolute;
                            z-index: 5;
                        }
                        .vcl-hexagon {
                            width: 120px; height: 120px;
                            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 100%),
                                        linear-gradient(135deg, #ef4444 0%, #7f1d1d 100%);
                            border: 1px solid rgba(248,113,113,0.4);
                            border-radius: 28px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 1.8rem;
                            font-weight: 900;
                            color: white;
                            letter-spacing: -0.06em;
                            box-shadow:
                                0 0 60px rgba(220,38,38,0.35),
                                inset 0 1px 0 rgba(255,255,255,0.2);
                            animation: logoPulse 4s ease-in-out infinite;
                        }
                        @keyframes logoPulse {
                            0%,100% { box-shadow: 0 0 60px rgba(220,38,38,0.35), inset 0 1px 0 rgba(255,255,255,0.2); }
                            50% { box-shadow: 0 0 90px rgba(220,38,38,0.55), inset 0 1px 0 rgba(255,255,255,0.25); }
                        }

                        /* Floating panels */
                        .visual-panel {
                            position: absolute;
                            background: rgba(8,6,14,0.82);
                            backdrop-filter: blur(20px);
                            border: 1px solid rgba(255,255,255,0.1);
                            border-radius: 14px;
                            padding: 1rem 1.4rem;
                            display: flex;
                            flex-direction: column;
                            gap: 0.2rem;
                            box-shadow: 0 18px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
                        }
                        .visual-panel strong { font-size: 0.92rem; font-weight: 700; color: var(--text); }
                        .visual-panel small { font-size: 0.72rem; color: var(--muted); }
                        .visual-kicker { font-size: 0.7rem; color: var(--r1); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

                        .visual-panel-main { bottom: 30px; left: -20px; min-width: 170px; z-index: 4; animation: panelFloat 7s ease-in-out infinite; }
                        .visual-panel-top { top: 40px; right: -10px; z-index: 4; animation: panelFloat 5.5s ease-in-out infinite 1s; }
                        .visual-panel-bottom { bottom: 100px; right: -30px; z-index: 4; animation: panelFloat 6s ease-in-out infinite 0.5s; }
                        .visual-panel-right { top: 50%; right: -20px; transform: translateY(-50%); z-index: 4; animation: panelFloat 8s ease-in-out infinite 1.5s; flex-direction: row; align-items: center; gap: 0.6rem; }
                        .vpr-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.8); animation: blink 2s ease-in-out infinite; }
                        @keyframes panelFloat {
                            0%,100% { transform: translateY(0); }
                            50% { transform: translateY(-10px); }
                        }
                        .visual-panel-right { animation: panelFloatRight 8s ease-in-out infinite 1.5s; }
                        @keyframes panelFloatRight {
                            0%,100% { transform: translateY(-50%); }
                            50% { transform: translateY(calc(-50% - 10px)); }
                        }

                        /* Hero scroll hint */
                        .hero-scroll-hint {
                            position: absolute;
                            bottom: 2.5rem;
                            left: 50%;
                            transform: translateX(-50%);
                            z-index: 3;
                            opacity: 0.5;
                        }
                        .scroll-arrow {
                            width: 22px; height: 22px;
                            border-right: 2px solid rgba(255,255,255,0.5);
                            border-bottom: 2px solid rgba(255,255,255,0.5);
                            transform: rotate(45deg);
                            animation: scrollBounce 2s ease-in-out infinite;
                        }
                        @keyframes scrollBounce {
                            0%,100% { transform: rotate(45deg) translateY(0); }
                            50% { transform: rotate(45deg) translateY(6px); }
                        }

                        @keyframes toastIn {
                            from { opacity: 0; transform: translateX(-50%) translateY(12px); }
                            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
                        }

                        /* ====================================================
                           BUTTONS
                        ==================================================== */
                        .btn-primary {
                            background:
                                linear-gradient(135deg, rgba(255,255,255,0.16) 0%, transparent 50%),
                                var(--grad-red);
                            border: 1px solid rgba(248,113,113,0.4);
                            color: white;
                            padding: 0.88rem 2.2rem;
                            border-radius: 12px;
                            font-size: 0.98rem;
                            font-weight: 700;
                            letter-spacing: -0.01em;
                            cursor: pointer;
                            display: inline-flex;
                            align-items: center;
                            gap: 0.55rem;
                            transition: all 0.28s cubic-bezier(0.16,1,0.3,1);
                            position: relative;
                            overflow: hidden;
                            text-decoration: none;
                            box-shadow:
                                0 1px 0 rgba(255,255,255,0.15) inset,
                                0 12px 32px rgba(220,38,38,0.32);
                        }
                        .btn-primary::before {
                            content: '';
                            position: absolute; inset: 0;
                            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
                            transform: translateX(-120%) skewX(-20deg);
                            transition: transform 0.75s ease;
                        }
                        .btn-primary:hover {
                            transform: translateY(-3px) scale(1.02);
                            box-shadow: 0 18px 50px rgba(220,38,38,0.42), 0 1px 0 rgba(255,255,255,0.2) inset;
                            border-color: rgba(248,113,113,0.6);
                        }
                        .btn-primary:hover::before { transform: translateX(120%) skewX(-20deg); }
                        .btn-primary:active { transform: scale(0.98); }

                        .btn-primary.btn-large {
                            padding: 1rem 2.5rem;
                            font-size: 1.05rem;
                            border-radius: 13px;
                        }

                        .btn-discord-hero {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.6rem;
                            background: rgba(88,101,242,0.1);
                            border: 1px solid rgba(88,101,242,0.28);
                            color: #b8bcff;
                            padding: 0.88rem 2rem;
                            border-radius: 12px;
                            font-size: 0.98rem;
                            font-weight: 700;
                            cursor: pointer;
                            text-decoration: none;
                            transition: all 0.28s ease;
                            letter-spacing: -0.01em;
                        }
                        .btn-discord-hero:hover {
                            background: rgba(88,101,242,0.2);
                            border-color: rgba(88,101,242,0.5);
                            color: #fff;
                            transform: translateY(-3px);
                            box-shadow: 0 12px 32px rgba(88,101,242,0.2);
                        }

                        .btn-secondary {
                            background: rgba(255,255,255,0.055);
                            border: 1px solid rgba(255,255,255,0.12);
                            color: var(--text);
                            padding: 0.88rem 2rem;
                            border-radius: 12px;
                            font-size: 0.98rem;
                            font-weight: 600;
                            cursor: pointer;
                            display: inline-flex;
                            align-items: center;
                            gap: 0.5rem;
                            transition: all 0.28s ease;
                            letter-spacing: -0.01em;
                        }
                        .btn-secondary:hover {
                            background: rgba(255,255,255,0.09);
                            border-color: rgba(255,255,255,0.2);
                            transform: translateY(-2px);
                        }

                        button:disabled { opacity: 0.5; cursor: not-allowed; }
                        button:active:not(:disabled) { transform: scale(0.97); }

                        /* ====================================================
                           FEATURES
                        ==================================================== */
                        .features {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                            gap: 1.5rem;
                            margin: 4.5rem 0;
                        }

                        .feature-card {
                            background: var(--grad-surface);
                            border: 1px solid var(--line);
                            border-radius: var(--r-lg);
                            padding: 2.2rem;
                            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
                            position: relative;
                            overflow: hidden;
                            box-shadow: var(--shadow-sm);
                        }
                        .feature-card::before {
                            content: '';
                            position: absolute; inset: 0;
                            background: radial-gradient(circle at 0% 0%, rgba(220,38,38,0.14), transparent 55%);
                            opacity: 0;
                            transition: opacity 0.35s ease;
                        }
                        .feature-card::after {
                            content: '';
                            position: absolute;
                            top: 0; left: 0; right: 0;
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(220,38,38,0.35), transparent);
                            opacity: 0;
                            transition: opacity 0.35s ease;
                        }
                        .feature-card:hover {
                            background: var(--grad-surface-hover);
                            border-color: var(--line-red-soft);
                            transform: translateY(-10px);
                            box-shadow: var(--shadow), var(--shadow-red);
                        }
                        .feature-card:hover::before { opacity: 1; }
                        .feature-card:hover::after { opacity: 1; }

                        .feature-icon {
                            width: 56px; height: 56px;
                            margin-bottom: 1.5rem;
                            background:
                                linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%),
                                var(--grad-red);
                            border: 1px solid rgba(248,113,113,0.38);
                            border-radius: 14px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 1.4rem;
                            box-shadow: 0 8px 24px rgba(220,38,38,0.22);
                        }
                        .feature-card h3 {
                            font-size: 1.15rem;
                            margin-bottom: 0.75rem;
                            color: var(--text);
                        }
                        .feature-card p { color: var(--muted); font-size: 0.94rem; line-height: 1.65; }

                        /* ====================================================
                           SECTION HEADERS
                        ==================================================== */
                        .section-header {
                            text-align: center;
                            margin-bottom: 3rem;
                        }
                        .section-header h2 {
                            font-size: clamp(1.9rem, 3.5vw, 3rem);
                            background: linear-gradient(135deg, #ffffff 0%, #e8e8f8 60%, #c8c8d8 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                            margin-bottom: 0.75rem;
                        }
                        .section-header p { color: var(--muted); font-size: 1.05rem; }

                        /* ====================================================
                           TESTIMONIALS
                        ==================================================== */
                        .testimonials { margin: 5rem 0; }

                        .testimonials-grid {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                            gap: 1.5rem;
                        }

                        .testimonial-card {
                            background: var(--grad-surface);
                            border: 1px solid var(--line);
                            border-radius: var(--r-lg);
                            padding: 2rem;
                            box-shadow: var(--shadow-sm);
                            transition: all 0.3s ease;
                            position: relative;
                            overflow: hidden;
                        }
                        .testimonial-card::before {
                            content: '"';
                            position: absolute;
                            top: 1rem; right: 1.5rem;
                            font-size: 5rem;
                            font-weight: 900;
                            color: rgba(220,38,38,0.08);
                            line-height: 1;
                            font-family: Georgia, serif;
                        }
                        .testimonial-card:hover {
                            border-color: var(--line-red-soft);
                            transform: translateY(-5px);
                            box-shadow: var(--shadow), var(--shadow-red);
                        }
                        .testimonial-stars { margin-bottom: 1rem; font-size: 0.9rem; }
                        .testimonial-card p {
                            color: var(--text-2);
                            font-style: italic;
                            margin-bottom: 1.5rem;
                            line-height: 1.7;
                            font-size: 0.97rem;
                        }
                        .testimonial-author {
                            display: flex;
                            align-items: center;
                            gap: 0.85rem;
                        }
                        .author-avatar {
                            width: 38px; height: 38px;
                            background: var(--grad-red);
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                            font-weight: 800;
                            font-size: 0.88rem;
                            box-shadow: 0 4px 12px rgba(220,38,38,0.3);
                        }
                        .testimonial-author span { color: var(--muted); font-size: 0.88rem; font-weight: 500; }

                        /* ====================================================
                           POPULAR SECTION
                        ==================================================== */
                        .popular-section { margin: 5rem 0; }

                        /* Section header with link */
                        .section-header {
                            display: flex;
                            align-items: baseline;
                            justify-content: space-between;
                            text-align: left;
                            margin-bottom: 2.5rem;
                        }
                        .section-header h2 { margin: 0; }
                        .section-header p { display: none; }

                        .link-btn {
                            background: none;
                            border: none;
                            color: var(--r1);
                            cursor: pointer;
                            font-weight: 600;
                            font-size: 0.9rem;
                            display: flex;
                            align-items: center;
                            gap: 0.3rem;
                            transition: all 0.2s ease;
                            white-space: nowrap;
                            padding: 0;
                        }
                        .link-btn:hover { color: #fca5a5; gap: 0.5rem; }

                        /* ====================================================
                           CATALOG SHOWCASE DIVIDER
                        ==================================================== */
                        .catalog-showcase {
                            display: grid;
                            grid-template-columns: 1fr auto 1fr;
                            align-items: center;
                            gap: 1rem;
                            max-width: 900px;
                            margin: -0.5rem auto 2.5rem;
                            color: #f87171;
                            font-size: 0.72rem;
                            font-weight: 900;
                            letter-spacing: 0.1em;
                            text-transform: uppercase;
                        }
                        .showcase-line {
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(220,38,38,0.4), transparent);
                        }
                        .showcase-pill {
                            padding: 0.45rem 1rem;
                            border-radius: 999px;
                            background: rgba(220,38,38,0.1);
                            border: 1px solid rgba(220,38,38,0.24);
                        }

                        /* ====================================================
                           CATEGORY FILTERS
                        ==================================================== */
                        .category-filter {
                            display: flex;
                            flex-wrap: wrap;
                            gap: 0.5rem;
                            margin-bottom: 2.5rem;
                            padding: 0.55rem;
                            border: 1px solid rgba(255,255,255,0.08);
                            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
                            border-radius: 16px;
                            backdrop-filter: blur(10px);
                            -webkit-backdrop-filter: blur(10px);
                        }
                        .category-btn {
                            background: rgba(255,255,255,0.05);
                            border: 1px solid rgba(255,255,255,0.09);
                            color: var(--muted);
                            padding: 0.55rem 1.2rem;
                            border-radius: 999px;
                            font-size: 0.86rem;
                            font-weight: 600;
                            cursor: pointer;
                            transition: all 0.25s ease;
                            letter-spacing: -0.01em;
                            position: relative;
                            overflow: hidden;
                        }
                        .category-btn:hover {
                            background: rgba(220,38,38,0.1);
                            border-color: rgba(220,38,38,0.25);
                            color: var(--text);
                            transform: translateY(-1px);
                        }
                        .category-btn.active {
                            background: linear-gradient(135deg, rgba(239,68,68,0.22) 0%, rgba(127,29,29,0.14) 100%);
                            border-color: rgba(220,38,38,0.45);
                            color: #fca5a5;
                            box-shadow: 0 0 20px rgba(220,38,38,0.12);
                        }
                        .category-btn.active::after {
                            content: '';
                            position: absolute;
                            left: 10%;
                            right: 10%;
                            bottom: 3px;
                            height: 2px;
                            border-radius: 999px;
                            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
                            animation: categoryPulse 1.6s ease-in-out infinite;
                        }
                        @keyframes categoryPulse {
                            0%, 100% { opacity: 0.35; transform: scaleX(0.88); }
                            50% { opacity: 1; transform: scaleX(1); }
                        }

                        /* ====================================================
                           PRODUCT GRID & CARDS
                        ==================================================== */
                        .product-grid {
                            display: grid;
                            grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
                            gap: 1.35rem;
                            margin-top: 1.5rem;
                        }
                        .product-grid.transitioning .product-card {
                            animation: categoryGridIn 0.34s cubic-bezier(0.16,1,0.3,1) both;
                        }
                        .product-grid.transitioning .product-card:nth-child(2n) { animation-delay: 0.03s; }
                        .product-grid.transitioning .product-card:nth-child(3n) { animation-delay: 0.05s; }
                        @keyframes categoryGridIn {
                            0% { opacity: 0; transform: translateY(14px) scale(0.985); }
                            100% { opacity: 1; transform: translateY(0) scale(1); }
                        }

                        .product-card {
                            background:
                                var(--grad-surface),
                                radial-gradient(circle at 20% 0%, rgba(220,38,38,0.08), transparent 50%);
                            border: 1px solid var(--line);
                            border-radius: var(--r-lg);
                            padding: 1.5rem;
                            cursor: pointer;
                            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
                            position: relative;
                            overflow: hidden;
                            min-height: 285px;
                            box-shadow: var(--shadow-sm);
                        }

                        /* Shimmer on hover */
                        .product-card::after {
                            content: '';
                            position: absolute; inset: 0;
                            background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.09) 50%, transparent 65%);
                            transform: translateX(-130%) skewX(-15deg);
                            transition: transform 0.8s ease;
                            pointer-events: none;
                        }
                        /* Top accent line */
                        .product-card::before {
                            content: '';
                            position: absolute;
                            top: 0; left: 0; right: 0;
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
                            transition: all 0.35s ease;
                        }

                        .product-card:hover {
                            background:
                                var(--grad-surface-hover),
                                radial-gradient(circle at 20% 0%, rgba(220,38,38,0.14), transparent 55%);
                            transform: translateY(-10px);
                            border-color: rgba(220,38,38,0.3);
                            box-shadow: var(--shadow), 0 0 40px rgba(220,38,38,0.1);
                        }
                        .product-card:hover::after { transform: translateX(130%) skewX(-15deg); }
                        .product-card:hover::before {
                            background: linear-gradient(90deg, transparent, rgba(220,38,38,0.4), transparent);
                        }

                        /* Popular badge */
                        .popular-badge {
                            position: absolute;
                            top: 1rem; right: 1rem;
                            background: var(--grad-red);
                            color: white;
                            padding: 0.32rem 0.85rem;
                            border-radius: 999px;
                            font-size: 0.72rem;
                            font-weight: 700;
                            letter-spacing: 0.02em;
                            display: flex;
                            align-items: center;
                            gap: 0.3rem;
                            box-shadow: 0 4px 14px rgba(220,38,38,0.35);
                            z-index: 2;
                        }

                        /* Product image */
                        .product-image {
                            width: 100%;
                            height: 152px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 2rem;
                            font-weight: 900;
                            color: rgba(255,255,255,0.5);
                            margin-bottom: 1.2rem;
                            border-radius: 12px;
                            background:
                                radial-gradient(circle at 50% 0%, rgba(220,38,38,0.24), transparent 60%),
                                linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
                            border: 1px solid rgba(255,255,255,0.08);
                            overflow: hidden;
                            position: relative;
                            transition: all 0.4s ease;
                        }
                        .product-image::after {
                            content: '';
                            position: absolute; inset: 0;
                            background:
                                linear-gradient(to top, rgba(5,4,7,0.7) 0%, transparent 50%),
                                linear-gradient(to bottom, rgba(5,4,7,0.55) 0%, transparent 45%);
                            z-index: 2;
                            pointer-events: none;
                        }
                        .product-image img {
                            width: 100%; height: 100%;
                            object-fit: cover;
                            object-position: center center;
                            display: block;
                            transform: scale(1.06);
                            transition: transform 0.5s ease;
                            z-index: 1;
                            position: relative;
                        }
                        .product-image img.is-hidden { display: none; }
                        .product-image span {
                            position: absolute;
                            z-index: 3;
                            font-size: 2rem;
                            font-weight: 800;
                            color: rgba(255,255,255,0.45);
                        }
                        .product-image span.image-fallback { opacity: 0; }
                        .product-card:hover .product-image img { transform: scale(1.12); }

                        .product-image.large {
                            height: 360px;
                            border-radius: 16px;
                        }
                        .product-image.compact {
                            width: 64px; height: 64px;
                            min-width: 64px;
                            margin: 0;
                            border-radius: 10px;
                            font-size: 1.1rem;
                        }

                        /* Stock badge */
                        .stock-badge {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.4rem;
                            font-size: 0.74rem;
                            font-weight: 600;
                            padding: 0.25rem 0.75rem;
                            border-radius: 999px;
                            margin-bottom: 0.75rem;
                        }
                        .stock-badge.in-stock {
                            background: rgba(34,197,94,0.1);
                            border: 1px solid rgba(34,197,94,0.22);
                            color: #4ade80;
                        }
                        .stock-badge.out-stock {
                            background: rgba(239,68,68,0.1);
                            border: 1px solid rgba(239,68,68,0.22);
                            color: #f87171;
                        }
                        .stock-dot {
                            width: 6px; height: 6px;
                            border-radius: 50%;
                            background: currentColor;
                        }
                        .in-stock .stock-dot {
                            box-shadow: 0 0 6px rgba(74,222,128,0.8);
                            animation: blink 2.5s ease-in-out infinite;
                        }

                        /* Product card text */
                        .product-name {
                            font-size: 1.02rem;
                            font-weight: 700;
                            margin-bottom: 0.4rem;
                            color: var(--text);
                            line-height: 1.3;
                        }
                        .product-description {
                            color: var(--muted);
                            font-size: 0.84rem;
                            line-height: 1.5;
                            margin-bottom: auto;
                        }
                        .product-footer {
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            margin-top: 1.2rem;
                            padding-top: 1rem;
                            border-top: 1px solid rgba(255,255,255,0.06);
                        }
                        .price-amount {
                            font-size: 1.3rem;
                            font-weight: 800;
                            letter-spacing: -0.04em;
                            background: linear-gradient(135deg, #ffffff 0%, #fca5a5 55%, #ef4444 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }

                        /* Add to cart button */
                        .btn-add-cart {
                            width: 40px; height: 40px;
                            background:
                                linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 50%),
                                var(--grad-red);
                            border: 1px solid rgba(248,113,113,0.35);
                            border-radius: 10px;
                            color: white;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 1.1rem;
                            transition: all 0.28s cubic-bezier(0.16,1,0.3,1);
                            box-shadow: 0 4px 14px rgba(220,38,38,0.28);
                        }
                        .btn-add-cart:hover {
                            transform: scale(1.12) rotate(5deg);
                            box-shadow: 0 8px 22px rgba(220,38,38,0.42);
                        }

                        /* ====================================================
                           PRODUCT DETAIL
                        ==================================================== */
                        .back-btn {
                            background:
                                linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.05) 100%),
                                rgba(9,7,14,0.72);
                            border: 1px solid rgba(255,255,255,0.2);
                            color: var(--text);
                            padding: 0.62rem 1.05rem;
                            border-radius: 12px;
                            cursor: pointer;
                            font-size: 0.86rem;
                            font-weight: 700;
                            display: inline-flex;
                            align-items: center;
                            gap: 0.5rem;
                            margin-bottom: 0;
                            transition: all 0.22s ease;
                            letter-spacing: 0.01em;
                            text-transform: uppercase;
                            backdrop-filter: blur(10px);

                            box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05) inset;
                        }
                        .page-content-with-back .back-btn {
                            position: sticky;
                            top: 96px;

                        }
                        .back-btn:hover {
                            background:
                                linear-gradient(135deg, rgba(239,68,68,0.18) 0%, rgba(127,29,29,0.12) 100%),
                                rgba(12,8,16,0.82);
                            border-color: rgba(239,68,68,0.36);
                            color: #fff;

                            box-shadow: 0 12px 28px rgba(0,0,0,0.36), 0 0 26px rgba(220,38,38,0.18);
                        }
                        .product-detail-page {
                            padding-top: 8.8rem;
                            padding-bottom: 4.2rem;
                        }
                        .back-btn-wrap {
                            display: flex;
                            justify-content: flex-start;
                            margin-bottom: 2.1rem;
                        }

                        .product-detail {
                            display: grid;
                            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                            gap: 3rem;
                            align-items: start;
                            margin-bottom: 2.6rem;

                        .product-detail-image { position: relative; }
                        .popular-badge-large {
                            display: inline-flex;

                            background: var(--grad-red);

                            padding: 0.45rem 1.1rem;

                        .product-features {
                            margin-bottom: 2rem;

                        .product-features h3 {
                            font-size: 1rem;

                            letter-spacing: 0.06em;
                            font-size: 0.8rem;
                        }
                        .product-features ul { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
                        .product-features li {
                            display: flex;

                            color: var(--text-2);
                            font-size: 0.96rem;
                        }
                        .product-features li::before {
                            content: '✓';
                            width: 22px; height: 22px;
                            min-width: 22px;
                            background: rgba(220,38,38,0.14);
                            border: 1px solid rgba(220,38,38,0.28);
                            border-radius: 6px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: #f87171;
                            font-size: 0.75rem;
                            font-weight: 800;
                        }

                        .product-variants { margin: 1.5rem 0; }
                        .product-variants h3 {
                            font-size: 1rem;
                            margin-bottom: 1rem;
                        }
                        .variant-option {
                            display: flex;
                            align-items: center;
                            gap: 0.85rem;
                            padding: 0.85rem 1.2rem;
                            margin-bottom: 0.5rem;
                            border-radius: 11px;
                            border: 1px solid rgba(255,255,255,0.09);
                            background: rgba(255,255,255,0.04);

                            border-color: rgba(220,38,38,0.28);
