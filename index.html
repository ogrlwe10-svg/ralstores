                    .op-tab{
                        display:flex;align-items:center;gap:.4rem;flex:1;justify-content:center;
                        padding:.55rem 1rem;border-radius:var(--radius);
                        font-size:.84rem;font-weight:500;color:var(--text2);
                        transition:all .2s;border:1px solid transparent;
                    }
                    .op-tab:hover{color:var(--text);background:var(--surface2)}
                    .op-tab.active{
                        background:rgba(88,101,242,.12);border-color:rgba(88,101,242,.25);
                        color:rgba(148,166,255,.95);box-shadow:0 0 16px rgba(88,101,242,.08);
                    }
                    .op-tab-badge{
                        min-width:18px;height:18px;padding:0 5px;border-radius:99px;
                        background:rgba(245,158,11,.25);color:#f59e0b;
                        font-size:.67rem;font-weight:800;
                        display:inline-flex;align-items:center;justify-content:center;
                    }
                    .op-panel{
                        animation:phFadeIn .24s var(--ease-out) both;
                        contain:layout paint;
                    }

                    /* Stats grid */
                    .op-stats-grid{
                        display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem;
                        margin-bottom:2rem;
                    }
                    .op-stat-card{
                        padding:1.4rem 1.2rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:.5rem;
                        transition:border-color .2s,transform .2s;
                    }
                    .op-stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
                    .op-stat-icon{
                        width:42px;height:42px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                    }
                    .op-stat-val{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:900;line-height:1;color:var(--text)}
                    .op-stat-label{font-size:.75rem;color:var(--muted)}

                    /* Section title */
                    .op-section-title{
                        display:flex;align-items:center;gap:.5rem;
                        font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;
                        text-transform:uppercase;letter-spacing:.08em;color:var(--text2);
                        margin-bottom:.85rem;
                    }
                    .op-empty{
                        padding:2rem;text-align:center;color:var(--muted);font-size:.88rem;
                        border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);
                    }

                    /* Orders mini table */
                    .op-orders-mini{display:flex;flex-direction:column;gap:.4rem}
                    .op-order-row{
                        display:grid;grid-template-columns:130px 160px 1fr 70px 110px 120px;
                        gap:.75rem;align-items:center;
                        padding:.7rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                        font-size:.8rem;
                        transition:border-color .2s;
                    }
                    .op-order-row:hover{border-color:var(--border2)}
                    .op-order-id{font-family:'Syne',monospace;font-weight:700;color:var(--red2);letter-spacing:.04em}
                    .op-order-email{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
                    .op-order-items{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
                    .op-order-total{font-weight:700;color:var(--text)}
                    .op-order-status{
                        padding:.2rem .6rem;border-radius:99px;
                        font-size:.68rem;font-weight:700;text-align:center;
                    }
                    .op-order-date{color:var(--muted);font-size:.73rem}

                    /* Panel topbar */
                    .op-panel-topbar{
                        display:flex;align-items:center;justify-content:space-between;gap:1rem;
                        margin-bottom:1.2rem;flex-wrap:wrap;
                    }

                    /* Products table */
                    .op-prod-table{
                        display:flex;flex-direction:column;gap:.4rem;
                        max-height:min(68vh,760px);overflow:auto;overscroll-behavior:contain;
                        padding-right:.2rem;scrollbar-gutter:stable;
                    }
                    .op-prod-thead{
                        display:grid;grid-template-columns:2fr 1fr .7fr .6fr 1fr 1.2fr;
                        gap:.75rem;padding:.5rem 1rem;
                        font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
                    }
                    .op-prod-row{
                        display:grid;grid-template-columns:2fr 1fr .7fr .6fr 1fr 1.2fr;
                        gap:.75rem;align-items:center;
                        padding:.8rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .op-prod-row:hover{border-color:var(--border2)}
                    .op-prod-name{display:flex;align-items:center;gap:.65rem}
                    .op-prod-thumb{width:36px;height:36px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
                    .op-popular-badge{
                        font-size:.62rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;
                        background:rgba(245,158,11,.15);color:#f59e0b;display:inline-block;margin-top:.2rem;
                    }
                    .op-prod-cat{font-size:.8rem;color:var(--text2)}
                    .op-stock-toggle{
                        padding:.26rem .65rem;border-radius:99px;font-size:.72rem;font-weight:700;cursor:pointer;
                        transition:all .2s;border:1px solid;
                    }
                    .op-stock-toggle.in{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.22);color:rgb(134,239,172)}
                    .op-stock-toggle.out{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2);color:var(--red2)}
                    .op-prod-actions{display:flex;gap:.4rem}
                    .op-action-btn{
                        padding:.28rem .7rem;border-radius:var(--radius-sm);
                        font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid;transition:all .2s;
                    }
                    .op-action-btn.edit{
                        background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.22);color:rgba(147,197,253,.9);
                    }
                    .op-action-btn.edit:hover{background:rgba(96,165,250,.18)}
                    .op-action-btn.delete{
                        background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2);color:var(--red2);
                    }
                    .op-action-btn.delete:hover{background:rgba(239,68,68,.18)}

                    /* Product form modal */
                    .op-form-overlay{
                        position:fixed;inset:0;z-index:20000;
                        background:rgba(0,0,0,.72);backdrop-filter:blur(6px);
                        display:flex;align-items:center;justify-content:center;padding:1.5rem;
                        overscroll-behavior:contain;
                    }
                    .op-form-modal{
                        width:100%;max-width:640px;max-height:90vh;overflow-y:auto;
                        border-radius:var(--radius-xl);background:var(--bg);border:1px solid var(--border2);
                        padding:2rem;box-shadow:0 30px 90px rgba(0,0,0,.55);
                        scrollbar-width:thin;scrollbar-color:var(--border) transparent;
                    }
                    .op-form-head{
                        display:flex;align-items:center;justify-content:space-between;
                        margin-bottom:1.5rem;
                    }
                    .op-form-head h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
                    .op-close-btn{
                        width:34px;height:34px;display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);border:1px solid var(--border);color:var(--muted);
                        transition:all .2s;
                    }
                    .op-close-btn:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.28);color:var(--red2)}
                    .op-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem 1.2rem}
                    .op-form-actions{
                        display:flex;gap:.7rem;justify-content:flex-end;
                        margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--border);
                    }

                    /* Orders full */
                    .op-orders-full{
                        display:flex;flex-direction:column;gap:.65rem;
                        max-height:min(68vh,760px);overflow:auto;overscroll-behavior:contain;
                        padding-right:.2rem;scrollbar-gutter:stable;
                    }
                    .op-order-card{
                        padding:1rem 1.2rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .op-order-card:hover{border-color:rgba(220,38,38,.2)}
                    .op-order-card-head{display:flex;align-items:center;gap:.9rem;flex-wrap:wrap;margin-bottom:.3rem}
                    .op-order-card-foot{display:flex;align-items:center;gap:.7rem;margin-top:.6rem;flex-wrap:wrap}

                    /* Design */
                    .op-design-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
                    .op-design-card{
                        padding:1.5rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .op-design-card h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;margin-bottom:1rem}
                    .op-arch-box{
                        border-radius:var(--radius);background:rgba(0,0,0,.35);border:1px solid var(--border);
                        overflow:auto;margin-top:.7rem;
                    }
                    .op-arch-pre{
                        font-size:.73rem;line-height:1.7;color:rgba(148,166,255,.8);
                        padding:1.2rem;white-space:pre-wrap;word-break:break-word;
                        font-family:'Courier New',monospace;
                    }

                    /* Security */
                    .op-security-info{
                        display:flex;flex-direction:column;gap:.45rem;
                        padding:1.2rem;border-radius:var(--radius);
                        background:rgba(34,197,94,.035);border:1px solid rgba(34,197,94,.15);
                        margin-bottom:1.2rem;
                    }
                    .op-sec-item{display:flex;align-items:center;gap:.6rem;font-size:.86rem;color:rgba(134,239,172,.85)}
                    .op-logs{
                        display:flex;flex-direction:column;gap:.35rem;
                        max-height:min(52vh,520px);overflow:auto;overscroll-behavior:contain;
                        padding-right:.2rem;scrollbar-gutter:stable;
                    }
                    .op-log-row{
                        display:grid;grid-template-columns:160px 200px 1fr;gap:1rem;
                        padding:.55rem .9rem;border-radius:var(--radius-sm);
                        background:var(--surface);border:1px solid var(--border);font-size:.78rem;
                    }
                    .op-log-ts{color:var(--muted)}
                    .op-log-email{color:var(--text2)}
                    .op-log-action.ok{color:rgb(134,239,172)}
                    .op-log-action.warn{color:#f59e0b}

                    /* ── Clients ── */
                    .op-clients-list{
                        display:flex;flex-direction:column;gap:.55rem;
                        max-height:min(68vh,760px);overflow:auto;overscroll-behavior:contain;
                        padding-right:.2rem;scrollbar-gutter:stable;
                    }
                    .op-client-card{
                        display:flex;align-items:center;gap:1rem;
                        padding:1rem 1.2rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .op-client-card:hover{border-color:rgba(220,38,38,.2)}
                    .op-client-avatar{
                        width:42px;height:42px;border-radius:50%;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;
                        background:linear-gradient(135deg,rgba(220,38,38,.2),rgba(185,28,28,.35));
                        border:1px solid rgba(220,38,38,.25);color:#fff;
                    }
                    .op-client-info{flex:1;min-width:0}
                    .op-client-email{font-weight:700;font-size:.9rem;color:var(--text)}
                    .op-client-meta{font-size:.78rem;color:var(--text2);margin:.15rem 0}
                    .op-client-products{
                        font-size:.74rem;color:var(--muted);
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
                    }
                    .op-client-right{text-align:right;flex-shrink:0}
                    .op-client-total{
                        font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .op-client-status{
                        font-size:.7rem;color:var(--muted);text-transform:uppercase;
                        letter-spacing:.05em;margin-top:.2rem;
                    }

                    /* ── Promos ── */
                    .op-promo-create{
                        display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
                        padding:1.2rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        margin-bottom:1.2rem;
                    }
                    .op-promo-list{
                        display:flex;flex-direction:column;gap:.4rem;
                        max-height:min(58vh,620px);overflow:auto;overscroll-behavior:contain;
                        padding-right:.2rem;scrollbar-gutter:stable;
                    }
                    .op-promo-thead{
                        display:grid;grid-template-columns:140px 100px 120px 100px 100px;
                        gap:.75rem;padding:.45rem 1rem;
                        font-size:.7rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:.08em;color:var(--muted);
                    }
                    .op-promo-row{
                        display:grid;grid-template-columns:140px 100px 120px 100px 100px;
                        gap:.75rem;align-items:center;
                        padding:.75rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                        font-size:.85rem;transition:border-color .2s;
                    }
                    .op-promo-row:hover{border-color:var(--border2)}
                    .op-promo-code{
                        font-family:'Syne',monospace;font-weight:800;font-size:.9rem;
                        color:var(--text);letter-spacing:.08em;
                    }
                    .op-promo-note{
                        display:flex;align-items:center;gap:.45rem;margin-top:1rem;
                        font-size:.78rem;color:var(--muted);
                        padding:.65rem;border-radius:var(--radius-sm);
                        background:rgba(255,255,255,.025);border:1px solid var(--border);
                    }

                    @media(max-width:900px){
                        .op-prod-thead,.op-prod-row{grid-template-columns:1fr 1fr}
                        .op-prod-thead span:nth-child(n+3){display:none}
                        .op-prod-row>span:nth-child(n+3):not(:last-child){display:none}
                        .op-order-row{grid-template-columns:110px 1fr 70px 90px}
                        .op-order-row>span:nth-child(3),.op-order-row>span:nth-child(6){display:none}
                        .op-design-grid{grid-template-columns:1fr}
                        .op-form-grid{grid-template-columns:1fr}
                    }
                    @media(max-width:600px){
                        .op-tabs{gap:.25rem}
                        .op-tab{font-size:.76rem;padding:.48rem .5rem}
                        .op-tab span{display:none}
                        .op-order-row{grid-template-columns:1fr 1fr}
                        .op-log-row{grid-template-columns:1fr 1fr}
                        .op-log-row .op-log-ts{display:none}
                        .op-promo-thead,.op-promo-row{grid-template-columns:1fr 1fr}
                        .op-promo-thead span:nth-child(n+3){display:none}
                        .op-client-products{display:none}
                        .op-form-overlay{align-items:flex-start;padding:1rem}
                        .op-form-modal{max-height:calc(100vh - 2rem);padding:1.25rem}
                    }

                    /* ================================================================
                       NAV PANEL BUTTON (extra)
                    ================================================================ */
                    .drawer-link-badge{
                        margin-left:auto;font-size:.64rem;font-weight:700;
                        background:linear-gradient(135deg,#f59e0b,#d97706);
                        color:#fff;padding:.14rem .48rem;border-radius:99px;
                    }

                    /* ================================================================
                       RESPONSIVE
                    ================================================================ */
                    @media(max-width:1100px){
                        .product-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
                        .features-grid{grid-template-columns:repeat(2,1fr)}
                        .testi-grid{grid-template-columns:repeat(2,1fr)}
                        .footer-grid{grid-template-columns:1fr 1fr;gap:2rem}
                    }
                    @media(max-width:1024px){
                        .detail-layout{grid-template-columns:1fr}
                        .detail-img-col{position:static}
                        .detail-meta-cards{grid-template-columns:repeat(3,1fr)}
                        .cart-layout{grid-template-columns:1fr}
                        .cart-summary-col{position:static}
                        .checkout-layout{grid-template-columns:1fr}
                        .checkout-summary-col{position:static}
                        .hiw-grid{grid-template-columns:1fr;gap:1.1rem}
                        .hiw-arrow{display:none}
                    }
                    @media(max-width:900px){
                        .cph-support-grid{grid-template-columns:1fr}
                    }
                    @media(max-width:768px){
                        .ticker-bar{height:24px}
                        .ticker-item{font-size:.62rem;padding:0 1.4rem}
                        .navbar{top:34px;width:calc(100% - 1.2rem);border-radius:18px}
                        .nav-links{display:none}
                        .nav-burger{display:flex}
                        .nav-discord span{display:none}
                        .nav-panel-btn span{display:none}
                        .hero{padding:120px 1.2rem 3.5rem}
                        .hero-stats{flex-wrap:wrap}
                        .hero-actions{flex-direction:column;align-items:stretch}
                        .hero-actions .btn-primary,.hero-actions .btn-ghost{justify-content:center}
                        .section{padding:3.5rem 0}
                        .testi-grid{grid-template-columns:1fr}
                        .features-grid{grid-template-columns:repeat(2,1fr)}
                        .product-grid{grid-template-columns:repeat(2,1fr);gap:.9rem}
                        .detail-extra-grid{grid-template-columns:1fr}
                        .detail-meta-cards{grid-template-columns:1fr}
                        .confirm-steps{grid-template-columns:1fr;gap:.75rem}
                        .footer-grid{grid-template-columns:1fr;gap:2rem}
                        .footer-bottom{flex-direction:column;gap:.5rem;text-align:center}
                        .cta-band-inner{flex-direction:column;text-align:center}
                        .cart-item{grid-template-columns:74px 1fr;grid-template-rows:auto auto auto}
                        .ci-qty,.ci-total,.ci-remove{grid-column:span 2}
                        .page-wrap{padding:110px 0 5rem}
                        .cph-header{flex-direction:column;text-align:center;padding:1.3rem 1.2rem}
                        .cph-tab{font-size:.78rem;padding:.52rem .5rem}
                        .cph-email-form{flex-direction:column}
                    }
                    @media(max-width:480px){
                        .product-grid{grid-template-columns:1fr 1fr;gap:.65rem}
                        .pcard-img-wrap{height:148px}
                        .features-grid{grid-template-columns:1fr}
                        .confirm-box{padding:1.5rem 1rem}
                        .hero-brand{font-size:5.5rem}
                        .cat-filter{flex-wrap:nowrap;overflow-x:auto;padding-bottom:.3rem}
                        .cat-filter::-webkit-scrollbar{height:0}
                    }
                `}</style>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalShop/>);
</script>
</body>
</html>
