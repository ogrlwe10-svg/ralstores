                        background:rgba(220,38,38,.22);color:var(--red2);
                        font-size:.68rem;font-weight:800;
                        display:inline-flex;align-items:center;justify-content:center;
                    }
                    .cph-tab.active .cph-tab-count{background:rgba(220,38,38,.4);color:#fff}

                    /* Panel content */
                    .cph-panel{animation:phFadeIn .35s var(--ease-out) both}

                    /* Orders list */
                    .cph-orders-head{
                        display:flex;align-items:center;justify-content:space-between;
                        margin-bottom:1rem;font-size:.85rem;font-weight:600;color:var(--text2);
                    }
                    .cph-clear-btn{
                        font-size:.76rem;color:var(--muted);padding:.28rem .7rem;
                        border-radius:var(--radius-sm);border:1px solid var(--border);background:none;
                        transition:all .2s;
                    }
                    .cph-clear-btn:hover{border-color:rgba(239,68,68,.38);color:var(--red2)}

                    .cph-order-card{
                        border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .22s,box-shadow .22s;
                        animation:phFadeIn .4s var(--ease-out) both;
                    }
                    .cph-order-card:hover{border-color:rgba(220,38,38,.22);box-shadow:0 8px 30px rgba(0,0,0,.3)}
                    .cph-oc-top{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem .75rem;flex-wrap:wrap}
                    .cph-oc-id{display:flex;align-items:center;gap:.5rem}
                    .cph-oc-id-label{
                        font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
                        color:var(--muted);padding:.14rem .5rem;border-radius:4px;
                        background:rgba(255,255,255,.045);border:1px solid var(--border);
                    }
                    .cph-oc-id-val{font-family:'Syne',monospace;font-size:.95rem;font-weight:800;color:var(--red2);letter-spacing:.04em}
                    .cph-oc-status{
                        display:inline-flex;align-items:center;gap:.4rem;
                        font-size:.7rem;font-weight:700;padding:.24rem .72rem;border-radius:99px;
                        margin-left:auto;
                    }
                    .cph-oc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
                    .cph-oc-products{display:flex;flex-direction:column;gap:.32rem;padding:0 1.2rem .75rem}
                    .cph-oc-item{
                        display:flex;align-items:center;justify-content:space-between;gap:1rem;
                        font-size:.85rem;color:var(--text2);padding:.38rem .7rem;
                        border-radius:var(--radius-sm);background:rgba(255,255,255,.018);
                    }
                    .cph-oc-item-price{color:var(--muted);font-size:.77rem;white-space:nowrap;flex-shrink:0}
                    .cph-oc-footer{
                        display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
                        padding:.6rem 1.2rem;border-top:1px solid var(--border);
                        font-size:.77rem;color:var(--muted);
                    }
                    .cph-oc-total{margin-left:auto;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:var(--text)}
                    .cph-oc-actions{
                        display:flex;gap:.5rem;padding:.72rem 1.2rem;
                        border-top:1px solid rgba(255,255,255,.035);
                    }
                    .cph-oc-action-btn{
                        display:inline-flex;align-items:center;gap:.4rem;
                        padding:.36rem .85rem;border-radius:var(--radius-sm);
                        font-size:.77rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;
                    }
                    .cph-oc-action-btn.discord{
                        background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.22);
                        color:rgba(148,166,255,.9);text-decoration:none;
                    }
                    .cph-oc-action-btn.discord:hover{background:rgba(88,101,242,.2);color:#fff}
                    .cph-oc-action-btn.copy{background:var(--surface);border:1px solid var(--border);color:var(--text2)}
                    .cph-oc-action-btn.copy:hover{background:var(--surface2);color:var(--text)}
                    .cph-oc-action-btn.copy.copied{
                        background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.28);color:rgb(74,222,128);
                    }

                    /* Empty state */
                    .cph-empty{
                        text-align:center;padding:4rem 2rem;
                        display:flex;flex-direction:column;align-items:center;gap:1.1rem;
                    }
                    .cph-empty-icon{
                        width:72px;height:72px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:var(--surface);border:1px solid var(--border);color:var(--muted);
                    }
                    .cph-empty h3{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
                    .cph-empty p{font-size:.9rem;color:var(--muted);max-width:360px;line-height:1.65}
                    .cph-empty-hint{
                        display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--muted);
                        padding:.6rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                    }

                    /* Spinner */
                    .cph-spinner{
                        width:16px;height:16px;border-radius:50%;
                        border:2px solid rgba(255,255,255,.2);border-top-color:#fff;
                        animation:spin .65s linear infinite;display:inline-block;
                    }
                    @keyframes spin{to{transform:rotate(360deg)}}

                    /* Support tab */
                    .cph-support-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
                    .cph-support-col{display:flex;flex-direction:column;gap:1rem}
                    .cph-sub-title{
                        display:flex;align-items:center;gap:.5rem;
                        font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:.2rem;
                    }
                    .cph-faq-list{display:flex;flex-direction:column;gap:.45rem}
                    .cph-faq-item{
                        border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .2s;
                    }
                    .cph-faq-item[open]{border-color:rgba(220,38,38,.24)}
                    .cph-faq-q{
                        padding:.82rem 1rem;font-size:.87rem;font-weight:600;cursor:pointer;
                        list-style:none;transition:background .2s;color:var(--text);
                    }
                    .cph-faq-q:hover{background:rgba(255,255,255,.025)}
                    .cph-faq-item[open] .cph-faq-q{color:var(--red2)}
                    .cph-faq-a{padding:.5rem 1rem 1rem;font-size:.84rem;color:var(--text2);line-height:1.65;border-top:1px solid rgba(255,255,255,.05)}
                    .cph-support-link{
                        display:flex;align-items:center;gap:.9rem;padding:1rem 1.1rem;
                        border-radius:var(--radius-lg);text-decoration:none;transition:all .22s;
                    }
                    .cph-support-link.discord{
                        background:rgba(88,101,242,.09);border:1px solid rgba(88,101,242,.2);color:rgba(148,166,255,.9);
                    }
                    .cph-support-link.discord:hover{background:rgba(88,101,242,.17);color:#fff;border-color:rgba(88,101,242,.35)}
                    .cph-support-link strong{display:block;font-size:.88rem;font-weight:700}
                    .cph-support-link span{display:block;font-size:.75rem;opacity:.6;margin-top:.1rem}
                    .cph-message-form{display:flex;flex-direction:column;gap:.9rem}
                    .cph-textarea{resize:vertical;min-height:100px;line-height:1.55}
                    .cph-last-card{
                        padding:.9rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .cph-sent-box{
                        text-align:center;padding:2.5rem 1rem;
                        display:flex;flex-direction:column;align-items:center;gap:.8rem;
                        border-radius:var(--radius-xl);background:var(--surface);border:1px solid var(--border);
                    }
                    .cph-sent-icon{
                        width:60px;height:60px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.28);color:rgb(74,222,128);
                    }
                    .cph-sent-box h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
                    .cph-sent-box p{font-size:.86rem;color:var(--text2)}

                    /* ================================================================
                       NAV PANEL BUTTON (extra)
                    ================================================================ */
                    .drawer-link-badge{
                        margin-left:auto;font-size:.64rem;font-weight:700;
                        background:linear-gradient(135deg,#f59e0b,#d97706);
                        color:#fff;padding:.14rem .48rem;border-radius:99px;
                    }

                    /* ================================================================
                       RESPONSIVE
                    ================================================================ */
                    @media(max-width:1100px){
                        .product-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
                        .features-grid{grid-template-columns:repeat(2,1fr)}
                        .testi-grid{grid-template-columns:repeat(2,1fr)}
                        .footer-grid{grid-template-columns:1fr 1fr;gap:2rem}
                    }
                    @media(max-width:1024px){
                        .detail-layout{grid-template-columns:1fr}
                        .detail-img-col{position:static}
                        .detail-meta-cards{grid-template-columns:repeat(3,1fr)}
                        .cart-layout{grid-template-columns:1fr}
                        .cart-summary-col{position:static}
                        .checkout-layout{grid-template-columns:1fr}
                        .checkout-summary-col{position:static}
                        .hiw-grid{grid-template-columns:1fr;gap:1.1rem}
                        .hiw-arrow{display:none}
                    }
                    @media(max-width:900px){
                        .cph-support-grid{grid-template-columns:1fr}
                    }
                    @media(max-width:768px){
                        .ticker-bar{height:24px}
                        .ticker-item{font-size:.62rem;padding:0 1.4rem}
                        .navbar{top:34px;width:calc(100% - 1.2rem);border-radius:18px}
                        .nav-links{display:none}
                        .nav-burger{display:flex}
                        .nav-discord span{display:none}
                        .nav-panel-btn span{display:none}
                        .hero{padding:120px 1.2rem 3.5rem}
                        .hero-stats{flex-wrap:wrap}
                        .hero-actions{flex-direction:column;align-items:stretch}
                        .hero-actions .btn-primary,.hero-actions .btn-ghost{justify-content:center}
                        .section{padding:3.5rem 0}
                        .testi-grid{grid-template-columns:1fr}
                        .features-grid{grid-template-columns:repeat(2,1fr)}
                        .product-grid{grid-template-columns:repeat(2,1fr);gap:.9rem}
                        .detail-extra-grid{grid-template-columns:1fr}
                        .detail-meta-cards{grid-template-columns:1fr}
                        .confirm-steps{grid-template-columns:1fr;gap:.75rem}
                        .footer-grid{grid-template-columns:1fr;gap:2rem}
                        .footer-bottom{flex-direction:column;gap:.5rem;text-align:center}
                        .cta-band-inner{flex-direction:column;text-align:center}
                        .cart-item{grid-template-columns:74px 1fr;grid-template-rows:auto auto auto}
                        .ci-qty,.ci-total,.ci-remove{grid-column:span 2}
                        .page-wrap{padding:110px 0 5rem}
                        .cph-header{flex-direction:column;text-align:center;padding:1.3rem 1.2rem}
                        .cph-tab{font-size:.78rem;padding:.52rem .5rem}
                        .cph-email-form{flex-direction:column}
                    }
                    @media(max-width:480px){
                        .product-grid{grid-template-columns:1fr 1fr;gap:.65rem}
                        .pcard-img-wrap{height:148px}
                        .features-grid{grid-template-columns:1fr}
                        .confirm-box{padding:1.5rem 1rem}
                        .hero-brand{font-size:5.5rem}
                        .cat-filter{flex-wrap:nowrap;overflow-x:auto;padding-bottom:.3rem}
                        .cat-filter::-webkit-scrollbar{height:0}
                    }
                `}</style>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalShop/>);
</script>
</body>
</html>
