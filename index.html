<script>
    // Custom cursor
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{
        mx=e.clientX;my=e.clientY;
        dot.style.left=mx+'px';dot.style.top=my+'px';
    });
    function animRing(){
        rx+=(mx-rx)*.14;ry+=(my-ry)*.14;
        ring.style.left=rx+'px';ring.style.top=ry+'px';
        requestAnimationFrame(animRing);
    }
    animRing();

    // Loader removal
    window.addEventListener('load',()=>{
        setTimeout(()=>{
            document.getElementById('ral-loader').classList.add('hidden');
        },1500);
    });

    // Ticker
    const tickerItems = [
        '36+ Produits Premium','Livraison via Discord','Paiement PayPal Sécurisé',
        'Support 24/7','Accès Instantanés','Netflix · Spotify · VPN · Gaming · IA',
        'Satisfaction Garantie','Commandez en 2 minutes','Nouveau — Catégorie Gaming',
    ];
    const track = document.getElementById('ticker-track');
    if(track){
        const doubled = [...tickerItems,...tickerItems];
        doubled.forEach(item=>{
            const span=document.createElement('span');
            span.className='ticker-item';
            span.innerHTML=`<span class="ticker-dot"></span>${item}`;
            track.appendChild(span);
        });
    }

    // Card 3D tilt
    document.addEventListener('mousemove', e=>{
        document.querySelectorAll('.pcard').forEach(card=>{
            const rect=card.getBoundingClientRect();
            const x=e.clientX-rect.left, y=e.clientY-rect.top;
            if(x>=0&&x<=rect.width&&y>=0&&y<=rect.height){
                const cx=rect.width/2, cy=rect.height/2;
                const rx_=((y-cy)/cy)*6;
                const ry_=-((x-cx)/cx)*6;
                card.style.transform=`translateY(-6px) scale(1.01) perspective(600px) rotateX(${rx_}deg) rotateY(${ry_}deg)`;
            } else {
                card.style.transform='';
            }
        });
    });

    // Magnetic buttons
    function initMagnetic(){
        document.querySelectorAll('.btn-primary').forEach(btn=>{
            btn.addEventListener('mousemove',e=>{
                const rect=btn.getBoundingClientRect();
                const x=(e.clientX-rect.left-rect.width/2)*.22;
                const y=(e.clientY-rect.top-rect.height/2)*.22;
                btn.style.transform=`translate(${x}px,${y}px) translateY(-2px)`;
            });
            btn.addEventListener('mouseleave',()=>{ btn.style.transform=''; });
        });
    }
    document.addEventListener('DOMContentLoaded', initMagnetic);
    window.__ralMagneticInit = initMagnetic;

    // Animated counter
    function animateCounter(el, target, duration=1200){
        const start = performance.now();
        const isFloat = String(target).includes('.');
        function step(now){
            const progress = Math.min((now-start)/duration, 1);
            const ease = 1-Math.pow(1-progress, 3);
            const val = target * ease;
            el.textContent = isFloat ? val.toFixed(1) : Math.round(val);
            if(progress<1) requestAnimationFrame(step);
            else el.textContent = target;
        }
        requestAnimationFrame(step);
    }
    window.__animateCounters = function(){
        document.querySelectorAll('[data-counter]').forEach(el=>{
            const target = parseFloat(el.dataset.counter);
            const io = new IntersectionObserver(entries=>{
                if(entries[0].isIntersecting){ animateCounter(el,target); io.disconnect(); }
            });
            io.observe(el);
        });
    };
</script>

    // ============================================================================
    // COMPOSANT PRINCIPAL
    // ============================================================================
    function DigitalShop() {
        const [currentPage, setCurrentPage] = useState('home');
        const [cart, setCart] = useState([]);
        const [selectedCategory, setSelectedCategory] = useState('all');
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [selectedVariant, setSelectedVariant] = useState(0);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [checkoutEmail, setCheckoutEmail] = useState('');
        const [emailError, setEmailError] = useState('');
        const [checkoutDiscordId, setCheckoutDiscordId] = useState('');
        const [discordIdError, setDiscordIdError] = useState('');
        const [orderConfirmed, setOrderConfirmed] = useState(false);
        const [orderId, setOrderId] = useState('');
        const [isCategoryTransitioning, setIsCategoryTransitioning] = useState(false);
        const [toast, setToast] = useState(null);
        const [isScrolled, setIsScrolled] = useState(false);
        const [customerOrderId, setCustomerOrderId] = useState('');
        const canvasRef = useRef(null);

        // Scroll reveal observer — robuste
        useEffect(() => {
            window.scrollTo({top:0, behavior:'smooth'});
            let io;
            const timer = setTimeout(() => {
                const els = Array.from(document.querySelectorAll('.reveal, .reveal-left, .reveal-scale'));
                if(!els.length) return;

                // Force-visible fallback après 800ms pour éviter les cartes bloquées
                const fallback = setTimeout(() => {
                    els.forEach(el => el.classList.add('visible'));
                }, 800);

                io = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            const delay = parseInt(e.target.dataset.delay || 0);
                            setTimeout(() => e.target.classList.add('visible'), delay);
                            io.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.01, rootMargin: '0px 0px 60px 0px' });

                els.forEach(el => io.observe(el));
                if(window.__ralMagneticInit) window.__ralMagneticInit();
                if(window.__animateCounters) window.__animateCounters();

                // cleanup fallback si tout s'est déclenché normalement
                const clearFallback = () => clearTimeout(fallback);
                window.addEventListener('ralRevealDone', clearFallback, {once:true});
            }, 80);

            return () => {
                clearTimeout(timer);
                if(io) io.disconnect();
            };
        }, [currentPage]);

        // Scroll navbar
        useEffect(() => {
            const h = () => setIsScrolled(window.scrollY > 30);
            window.addEventListener('scroll', h);
            return () => window.removeEventListener('scroll', h);
        }, []);

        // Canvas particles (hero only)
        useEffect(() => {
            if (currentPage !== 'home') return;
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let W = canvas.width = canvas.offsetWidth;
            let H = canvas.height = canvas.offsetHeight;
            const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; };
            window.addEventListener('resize', resize);

            const N = 55;
            const pts = Array.from({length:N}, () => ({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
                r: Math.random()*1.6+.4,
            }));

            let raf;
            const draw = () => {
                ctx.clearRect(0,0,W,H);
                for(let i=0;i<N;i++){
                    pts[i].x += pts[i].vx;
                    pts[i].y += pts[i].vy;
                    if(pts[i].x<0||pts[i].x>W) pts[i].vx*=-1;
                    if(pts[i].y<0||pts[i].y>H) pts[i].vy*=-1;

                    ctx.beginPath();
                    ctx.arc(pts[i].x, pts[i].y, pts[i].r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(220,38,38,.55)';
                    ctx.fill();

                    for(let j=i+1;j<N;j++){
                        const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if(dist < 110){
                            ctx.beginPath();
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.strokeStyle = `rgba(220,38,38,${(.18*(1-dist/110)).toFixed(3)})`;
                            ctx.lineWidth = .7;
                            ctx.stroke();
                        }
                    }
                }
                raf = requestAnimationFrame(draw);
            };
            draw();
            return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
        }, [currentPage]);

        useEffect(() => { setSelectedVariant(0); }, [selectedProduct]);

        const showToast = (message, type='success') => {
            setToast({message, type});
            setTimeout(() => setToast(null), 2800);
        };

        const handleCategoryChange = (key) => {
            if(key === selectedCategory) return;
            setIsCategoryTransitioning(true);
            setSelectedCategory(key);
            setTimeout(() => setIsCategoryTransitioning(false), 320);
        };

        const trackEvent = (name, data={}) => { if(window.gtag) window.gtag('event', name, data); };

        // ── CART ──
        const addToCart = (product) => {
            const existing = cart.find(i => i.id === product.id);
            if(existing) setCart(cart.map(i => i.id===product.id ? {...i, quantity:i.quantity+1} : i));
            else setCart([...cart, {...product, quantity:1}]);
            showToast(`${product.name} ajouté au panier`);
            trackEvent('add_to_cart', {product_id:product.id, product_name:product.name, product_price:product.price});
        };
        const removeFromCart = id => setCart(cart.filter(i => i.id !== id));
        const updateQuantity = (id, q) => q===0 ? removeFromCart(id) : setCart(cart.map(i => i.id===id ? {...i, quantity:q} : i));
        const getTotalPrice = () => cart.reduce((t,i) => t + i.price*i.quantity, 0);
        const getTotalItems = () => cart.reduce((t,i) => t + i.quantity, 0);

        const validateEmail = (email) => {
            const n = String(email||'').trim().toLowerCase();
            const re = /^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i;
            if(!re.test(n)) return false;
            return (n.split('@')[1]||'').split('.').pop().length >= 2;
        };
        const handleCheckoutEmail = (v) => {
            const n = String(v||'').trim();
            setCheckoutEmail(n);
            setEmailError(n && !validateEmail(n) ? 'Adresse email invalide' : '');
        };
        const validateDiscordId = (v) => /^\d{17,20}$/.test(String(v||'').trim());
        const handleCheckoutDiscordId = (v) => {
            const n = String(v||'').trim();
            setCheckoutDiscordId(n);
            setDiscordIdError(!n ? '' : validateDiscordId(n) ? '' : 'ID Discord invalide (17-20 chiffres)');
        };

        const generateOrderId = () => {
            let id = 'RAL-';
            for(let i=0;i<8;i++) id += '0123456789ABCDEF'[Math.floor(Math.random()*16)];
            return id;
        };

        const registerOrderWithBot = async (newOrderId, product, total, email, discordId) => {
            try {
                const base = String(SITE_CONFIG.botApiUrl||'').trim().replace(/\/$/,'');
                const endpoint = base ? `${base}/api/register-order` : '/api/register-order';
                const response = await fetch(endpoint, {
                    method:'POST',
                    headers:{'Content-Type':'application/json','X-API-Secret':SITE_CONFIG.botApiSecret},
                    body: JSON.stringify({orderId:newOrderId,product,total,email,discordId}),
                });
                let json = {};
                try { json = await response.json(); } catch(_) {}
                if(!response.ok) return {ok:false, status:response.status, error:json.error||`Erreur API (${response.status})`};
                return {ok:json.success===true, status:response.status, error:json.error||null};
            } catch(err) {
                return {ok:false, error:'Impossible de contacter le bot/API.'};
            }
        };

        const getPayPalMeUrl = () => {
            const link = SITE_CONFIG.paypalMeLink.trim();
            if(!link || link.includes('TON_PSEUDO')) return '';
            return `${link.replace(/\/$/,'/')}${getTotalPrice().toFixed(2)}`;
        };

        const handlePayPalMeCheckout = async () => {
            if(!checkoutEmail || !validateEmail(checkoutEmail)) {
                setEmailError('Adresse email invalide');
                alert('Veuillez entrer une adresse email valide avant de payer.');
                return;
            }
            const paypalUrl = getPayPalMeUrl();
            if(!paypalUrl) { alert('Ajoute ton lien PayPal.Me dans paypalMeLink.'); return; }

            const productSummary = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
            const total = getTotalPrice().toFixed(2);
            let newOrderId = '', registrationResult = {ok:false, error:'Erreur inconnue'};

            for(let attempt=0;attempt<5;attempt++){
                const candidateId = generateOrderId();
                const result = await registerOrderWithBot(candidateId, productSummary, parseFloat(total), checkoutEmail, checkoutDiscordId);
                if(result.ok) { newOrderId = candidateId; registrationResult = result; break; }
                if(result.status !== 409) { registrationResult = result; break; }
                registrationResult = result;
            }

            if(!newOrderId) {
                alert(`Impossible d'enregistrer ta commande. Réessaie dans quelques secondes.\n\nDétail: ${registrationResult.error||'Erreur inconnue'}`);
                return;
            }
            setOrderId(newOrderId);

            // ── Sauvegarder dans localStorage pour le panel ──
            try {
                const existing = JSON.parse(localStorage.getItem('ral_orders') || '[]');
                const newOrder = {
                    id: newOrderId,
                    date: new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
                    items: cart.map(i => ({name:i.name, price:i.price, quantity:i.quantity, variantLabel:i.variantLabel||null})),
                    total: parseFloat(total),
                    email: checkoutEmail,
                    status: 'pending',
                };
                localStorage.setItem('ral_orders', JSON.stringify([...existing, newOrder]));
            } catch(_) {}

            const a = document.createElement('a');
            a.href = paypalUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);

            setOrderConfirmed(true);
            setCurrentPage('confirmation');
            trackEvent('paypalme_redirect', {value:getTotalPrice(), currency:'EUR', items:cart.map(i=>({item_id:i.id,item_name:i.name,quantity:i.quantity,price:i.price}))});
        };

        const filteredProducts = selectedCategory === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === selectedCategory);

        const getInitials = (name) => name.replace(/[+]/g,' ').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();

        // ── PRODUCT IMAGE ──
        const ProductImage = ({product, large=false, compact=false}) => (
            <div className={`prod-img ${large?'large':''} ${compact?'compact':''}`}>
                {product.imageUrl && (
                    <img src={product.imageUrl} alt={product.name} loading="lazy"
                         onError={e => e.currentTarget.parentElement.classList.add('no-img')} />
                )}
                <span className="prod-img-fallback">{getInitials(product.name)}</span>
            </div>
        );

        // ── STOCK BADGE ──
        const StockBadge = ({product}) => (
            <div className={`stock-pill ${product.inStock ? 'in' : 'out'}`}>
                <span className="stock-dot-pulse"></span>
                {product.inStock ? `${product.stock} en stock` : 'Épuisé'}
            </div>
        );

        const IconChevron = ({size=16,open=false}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                 style={{transform:open?'rotate(180deg)':'none',transition:'transform .3s ease'}}>
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        );

        // ── FAQ SECTION ──
        const FaqSection = () => {
            const [openIdx, setOpenIdx] = useState(null);
            const faqs = [
                {q:'Comment se déroule la livraison ?', a:"Après votre achat, rejoignez notre serveur Discord et ouvrez un ticket. Notre équipe traitera votre commande rapidement et vous remettra votre accès en privé, généralement en moins de quelques minutes."},
                {q:'Quels modes de paiement acceptez-vous ?', a:"Nous acceptons uniquement PayPal via PayPal.Me pour l'instant. C'est rapide, sécurisé et universel. Le paiement s'effectue directement depuis la page de checkout."},
                {q:'Les accès sont-ils vraiment permanents (Lifetime) ?', a:"Oui, les produits étiquetés \"Lifetime\" sont des accès dont la durée de vie est indéterminée. Nous ne pouvons pas garantir à 100% que les plateformes tierces ne modifieront jamais leurs conditions, mais nous faisons tout pour maintenir ces accès le plus longtemps possible."},
                {q:"Que faire si mon accès ne fonctionne plus ?", a:"Ouvrez simplement un ticket sur notre serveur Discord en mentionnant votre ID de commande. Notre support analysera le problème et proposera une solution (remplacement, remboursement, etc.) dans les meilleurs délais."},
                {q:"Est-ce légal et sécurisé ?", a:"RΔL Store vend des accès légalement obtenus. Votre sécurité est notre priorité : nous ne stockons aucune donnée bancaire, le paiement est géré par PayPal, et les livraisons se font en ticket privé sur Discord."},
            ];
            return (
                <section className="section faq-section">
                    <div className="container">
                        <div className="section-head reveal">
                            <div className="section-label">FAQ</div>
                            <h2 className="section-title">Questions fréquentes</h2>
                            <p className="section-sub">Tout ce que vous devez savoir avant de commander</p>
                        </div>
                        <div className="faq-list reveal">
                            {faqs.map((f,i) => (
                                <div className={`faq-item ${openIdx===i?'open':''}`} key={i}>
                                    <button className="faq-q" onClick={() => setOpenIdx(openIdx===i ? null : i)}>
                                        <span>{f.q}</span>
                                        <IconChevron size={18} open={openIdx===i}/>
                                    </button>
                                    <div className="faq-a-wrap" style={{maxHeight: openIdx===i ? '300px' : '0'}}>
                                        <div className="faq-a">{f.a}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ── PRODUCT CARD ──
        const ProductCard = ({product, delay=0}) => (
            <article
                className={`pcard${product.inStock ? '' : ' pcard-out'}`}
                style={{animationDelay:`${delay}ms`}}
                onClick={() => { setSelectedProduct(product); setCurrentPage('product-detail'); }}
                aria-label={product.name}
            >
                {product.popular && <div className="pcard-popular"><IconStar size={11}/>HOT</div>}
                {!product.inStock && <div className="pcard-out-overlay">Épuisé</div>}

                <div className="pcard-img-wrap">
                    <ProductImage product={product} />
                </div>

                <div className="pcard-body">
                    <div className="pcard-top">
                        <StockBadge product={product} />
                        <span className="pcard-cat">{CATEGORIES[product.category]?.icon || '◆'}</span>
                    </div>
                    <h3 className="pcard-name">{product.name}</h3>
                    <p className="pcard-desc">{product.description}</p>
                    <div className="pcard-footer">
                        <div className="pcard-price">

                                {step:'02', icon:<IconCard size={24}/>, title:'Payer via PayPal', desc:'Payez en quelques clics via PayPal.Me. Votre commande est enregistrée instantanément.'},
                                {step:'03', icon:<IconDiscord size={24}/>, title:'Récupérer sur Discord', desc:'Rejoignez notre serveur, ouvrez un ticket et récupérez votre accès en quelques minutes.'},

                vpn:       {emoji:'⬡', desc:'Naviguez en sécurité et sans limites'},
                education: {emoji:'◆', desc:'Apprenez et progressez avec les meilleurs outils'},

                                        : CATEGORIES[selectedCategory].name}

                                <p className="ph-desc">{current.desc}</p>

                                    <span className="ph-stat"><strong>{filteredProducts.length}</strong> produits</span>

                            <IconBack size={16}/> Retour au catalogue

                            <div className="detail-img-col reveal-left">

                                        <div className="detail-popular-badge">
                                            <IconStar size={14}/> Populaire
                                        </div>
                                    )}

                                <div className="detail-meta-cards">
                                    {[
                                        {icon:<IconZap size={16}/>, label:'Livraison', val:'Via Discord'},
                                        {icon:<IconShield size={16}/>, label:'Qualité', val:'Garantie'},
                                        {icon:<IconLock size={16}/>, label:'Paiement', val:'PayPal sécurisé'},
                                    ].map((m,i) => (
                                        <div className="detail-meta-card" key={i}>

                                            </div>
                                        </div>

                                </div>

                                                           onChange={() => setSelectedVariant(i)} hidden/>

                                        </div>
                                    </div>

                                                id: selectedProduct.variantIds ? selectedProduct.variantIds[selectedVariant] : selectedProduct.id,
                                                name: selectedProduct.name,
                                                price: selectedProduct.variants ? selectedProduct.variants[selectedVariant].price : selectedProduct.price,
                                                imageUrl: selectedProduct.imageUrl,
                                                variantLabel: selectedProduct.variants ? selectedProduct.variants[selectedVariant].label : null,

                                        <span>{getTotalPrice().toFixed(2)}€</span>

                                        <IconCard size={18}/> Procéder au paiement

                                    <div className="secure-note">
                                        <IconLock size={14}/> Paiement PayPal sécurisé · Récupération Discord
                                    </div>
                                </div>

                        </div>
                    )}

            </div>

                                <p className="oid-label">Ton ID de commande</p>
                                <div className="oid-value">{orderId}</div>
                                <p className="oid-hint">Sélectionne et copie cet ID — tu en auras besoin sur Discord pour obtenir le rôle <strong>Client</strong> via <strong>"Claim Customer Role"</strong>.</p>
                                <button className="btn-copy" onClick={() => navigator.clipboard.writeText(orderId).then(() => showToast('ID copié !'))}>
                                    Copier l'ID
                                </button>
                            </div>
                        )}

                        <div className="confirm-steps">
                            {[
                                {icon:<IconUsers size={22}/>, title:'Rejoindre le Discord', desc:'Entrez sur le serveur RΔL'},
                                {icon:<IconPackage size={22}/>, title:'Claim Customer Role', desc:'Utilisez votre ID de commande'},
                                {icon:<IconShield size={22}/>, title:'Ouvrir un ticket', desc:'Le support vous livre votre produit'},
                            ].map((s,i) => (
                                <div className="confirm-step" key={i}>
                                    <div className="cs-icon">{s.icon}</div>
                                    <h3 className="cs-title">{s.title}</h3>
                                    <p className="cs-desc">{s.desc}</p>
                                </div>
                            ))}
                        </div>

                        <div className="confirm-actions">
                            <button className="btn-primary" onClick={() => { setCurrentPage('home'); setOrderConfirmed(false); setOrderId(''); }}>
                                Retour à l'accueil
                            </button>
                            <button className="btn-outline" onClick={() => setCurrentPage('products')}>
                                Continuer mes achats
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ============================================================================
        // CUSTOMER PANEL PAGE — implémentation complète
        // ============================================================================
        const CustomerPanelPage = () => {
            const [activeTab, setActiveTab]       = useState('orders');
            const [inputId,   setInputId]         = useState('');
            const [lookupResult, setLookupResult] = useState(null);
            const [lookupLoading, setLookupLoading] = useState(false);
            const [savedOrders, setSavedOrders]   = useState([]);
            const [supportMsg,  setSupportMsg]    = useState('');
            const [supportSent, setSupportSent]   = useState(false);
            const [notifEmail,  setNotifEmail]    = useState('');
            const [notifSaved,  setNotifSaved]    = useState(false);

            // ── Charger les commandes depuis localStorage ──
            useEffect(() => {
                try {
                    const raw = localStorage.getItem('ral_orders');
                    if (raw) setSavedOrders(JSON.parse(raw));
                } catch(_) {}
                try {
                    const mail = localStorage.getItem('ral_notif_email');
                    if (mail) setNotifEmail(mail);
                } catch(_) {}
            }, []);

            // ── Lookup commande ──
            const handleLookup = () => {
                const id = inputId.trim().toUpperCase();
                if (!id) return;
                setLookupLoading(true);
                setLookupResult(null);
                setTimeout(() => {
                    const found = savedOrders.find(o => o.id === id);
                    if (found) {
                        setLookupResult({ found: true, order: found });
                    } else {
                        setLookupResult({ found: false, id });
                    }
                    setLookupLoading(false);
                }, 900);
            };

            // ── Enregistrer email notif ──
            const saveNotif = () => {
                try { localStorage.setItem('ral_notif_email', notifEmail); } catch(_) {}
                setNotifSaved(true);
                setTimeout(() => setNotifSaved(false), 3000);
            };

            const STATUS_MAP = {
                pending:    { label:'En attente',   color:'#f59e0b', bg:'rgba(245,158,11,.12)', border:'rgba(245,158,11,.25)' },
                processing: { label:'En traitement',color:'#60a5fa', bg:'rgba(96,165,250,.1)',  border:'rgba(96,165,250,.25)' },
                delivered:  { label:'Livré',         color:'#4ade80', bg:'rgba(74,222,128,.1)',  border:'rgba(74,222,128,.25)' },
                cancelled:  { label:'Annulé',        color:'#f87171', bg:'rgba(248,113,113,.1)', border:'rgba(248,113,113,.25)' },
            };

            const TABS = [
                { id:'orders',   label:'Mes commandes', icon:<IconHistory size={15}/> },
                { id:'lookup',   label:'Rechercher',    icon:<IconZap size={15}/>     },
                { id:'support',  label:'Support',       icon:<IconShield size={15}/>  },
                { id:'settings', label:'Paramètres',    icon:<IconUser size={15}/>    },
            ];

            return (
                <div className="page-wrap">
                    <div className="container">

                        {/* ── Panel header ── */}
                        <div className="cph-header">
                            <div className="cph-avatar">
                                <IconUser size={28}/>
                            </div>
                            <div className="cph-info">
                                <div className="cph-greeting">Bienvenue dans votre</div>
                                <h1 className="cph-title">Espace <em>Client</em></h1>
                                <p className="cph-sub">Gérez vos commandes, accès et support RΔL</p>
                            </div>
                            <div className="cph-stats">
                                <div className="cph-stat-item">
                                    <span className="cph-stat-n">{savedOrders.length}</span>
                                    <span className="cph-stat-l">Commandes</span>
                                </div>
                                <div className="cph-stat-sep"/>
                                <div className="cph-stat-item">
                                    <span className="cph-stat-n">{savedOrders.filter(o=>o.status==='delivered').length}</span>
                                    <span className="cph-stat-l">Livrées</span>
                                </div>
                                <div className="cph-stat-sep"/>
                                <div className="cph-stat-item">
                                    <span className="cph-stat-n">{savedOrders.reduce((t,o)=>t+(o.total||0),0).toFixed(2)}€</span>
                                    <span className="cph-stat-l">Total dépensé</span>
                                </div>
                            </div>
                        </div>

                        {/* ── Tabs ── */}
                        <div className="cph-tabs">
                            {TABS.map(t => (
                                <button key={t.id}
                                    className={`cph-tab ${activeTab===t.id?'active':''}`}
                                    onClick={() => setActiveTab(t.id)}>
                                    {t.icon}{t.label}
                                </button>
                            ))}
                        </div>

                        {/* ══════════════ TAB : MES COMMANDES ══════════════ */}
                        {activeTab === 'orders' && (
                            <div className="cph-panel">
                                {savedOrders.length === 0 ? (
                                    <div className="cph-empty">
                                        <div className="cph-empty-icon"><IconPackage size={36}/></div>
                                        <h3>Aucune commande enregistrée</h3>
                                        <p>Vos commandes passées sur ce navigateur apparaîtront ici automatiquement après le paiement.</p>
                                        <div className="cph-empty-hint">
                                            <IconZap size={14}/>
                                            Vous avez déjà commandé ? Utilisez l'onglet <strong>Rechercher</strong> avec votre ID de commande.
                                        </div>
                                        <button className="btn-primary" onClick={() => setCurrentPage('products')}>
                                            <IconPackage size={16}/> Découvrir la boutique
                                        </button>
                                    </div>
                                ) : (
                                    <div className="cph-orders-list">
                                        <div className="cph-orders-head">
                                            <span>{savedOrders.length} commande{savedOrders.length>1?'s':''} enregistrée{savedOrders.length>1?'s':''}</span>
                                            <button className="cph-clear-btn" onClick={() => { if(confirm('Effacer l\'historique local ?')){ localStorage.removeItem('ral_orders'); setSavedOrders([]); } }}>
                                                Effacer l'historique
                                            </button>
                                        </div>
                                        {savedOrders.slice().reverse().map((order, i) => {
                                            const s = STATUS_MAP[order.status] || STATUS_MAP.pending;
                                            return (
                                                <div className="cph-order-card" key={i} style={{animationDelay:`${i*50}ms`}}>
                                                    <div className="cph-oc-top">
                                                        <div className="cph-oc-id">
                                                            <span className="cph-oc-id-label">ID</span>
                                                            <span className="cph-oc-id-val">{order.id}</span>
                                                        </div>
                                                        <div className="cph-oc-status" style={{background:s.bg, border:`1px solid ${s.border}`, color:s.color}}>
                                                            <span className="cph-oc-dot" style={{background:s.color}}/>
                                                            {s.label}
                                                        </div>
                                                    </div>
                                                    <div className="cph-oc-products">
                                                        {(order.items||[]).map((item,j) => (
                                                            <div className="cph-oc-item" key={j}>
                                                                <span>{item.name}{item.variantLabel ? ` — ${item.variantLabel}` : ''}</span>
                                                                <span className="cph-oc-item-price">×{item.quantity} · {(item.price*item.quantity).toFixed(2)}€</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="cph-oc-footer">
                                                        <span className="cph-oc-date">{order.date}</span>
                                                        <span className="cph-oc-email">{order.email}</span>
                                                        <span className="cph-oc-total">{(order.total||0).toFixed(2)}€</span>
                                                    </div>
                                                    <div className="cph-oc-actions">
                                                        <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="cph-oc-action-btn discord">
                                                            <IconDiscord size={14}/> Ouvrir un ticket
                                                        </a>
                                                        <button className="cph-oc-action-btn copy"
                                                            onClick={() => navigator.clipboard.writeText(order.id).then(()=>showToast('ID copié !'))}>
                                                            Copier l'ID
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ══════════════ TAB : RECHERCHER ══════════════ */}
                        {activeTab === 'lookup' && (
                            <div className="cph-panel">
                                <div className="cph-lookup-wrap">
                                    <div className="cph-lookup-icon-big"><IconZap size={32}/></div>
                                    <h2 className="cph-lookup-title">Rechercher une commande</h2>
                                    <p className="cph-lookup-sub">Entrez votre ID de commande (format : RAL-XXXXXXXX) pour retrouver son statut.</p>

                                    <div className="cph-lookup-box">
                                        <input
                                            type="text"
                                            className="form-input cph-lookup-input"
                                            placeholder="RAL-A3F9B2C1"
                                            value={inputId}
                                            onChange={e => { setInputId(e.target.value.toUpperCase()); setLookupResult(null); }}
                                            onKeyDown={e => e.key==='Enter' && handleLookup()}
                                            maxLength={13}
                                        />
                                        <button className="btn-primary" onClick={handleLookup} disabled={lookupLoading || inputId.length < 4}>
                                            {lookupLoading ? <span className="cph-spinner"/> : <><IconZap size={15}/> Rechercher</>}
                                        </button>
                                    </div>

                                    {lookupResult && (
                                        <div className={`cph-lookup-result ${lookupResult.found?'found':'not-found'}`}>
                                            {lookupResult.found ? (
                                                <>
                                                    <div className="clr-header">
                                                        <div className="clr-check"><IconCheck size={18}/></div>
                                                        <div>
                                                            <div className="clr-title">Commande trouvée</div>
                                                            <div className="clr-id">{lookupResult.order.id}</div>
                                                        </div>
                                                        {(() => {
                                                            const s = STATUS_MAP[lookupResult.order.status] || STATUS_MAP.pending;
                                                            return <div className="cph-oc-status" style={{background:s.bg,border:`1px solid ${s.border}`,color:s.color,marginLeft:'auto'}}>
                                                                <span className="cph-oc-dot" style={{background:s.color}}/>{s.label}
                                                            </div>;
                                                        })()}
                                                    </div>
                                                    <div className="clr-detail">
                                                        <span>Email : {lookupResult.order.email}</span>
                                                        <span>Date : {lookupResult.order.date}</span>
                                                        <span>Total : {(lookupResult.order.total||0).toFixed(2)}€</span>
                                                    </div>
                                                </>
                                            ) : (
                                                <>
                                                    <div className="clr-notfound-icon"><IconX size={22}/></div>
                                                    <div className="clr-notfound-title">Commande introuvable</div>
                                                    <p>L'ID <strong>{lookupResult.id}</strong> n'est pas dans cet historique. Rejoignez Discord pour vérifier avec le support.</p>
                                                    <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="btn-primary" style={{marginTop:'.75rem',display:'inline-flex'}}>
                                                        <IconDiscord size={15}/> Contacter le support
                                                    </a>
                                                </>
                                            )}
                                        </div>
                                    )}

                                    <div className="cph-lookup-tip">
                                        <IconLock size={13}/>
                                        L'historique est stocké localement dans ce navigateur. Sur un autre appareil, utilisez Discord pour retrouver votre commande.
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ══════════════ TAB : SUPPORT ══════════════ */}
                        {activeTab === 'support' && (
                            <div className="cph-panel">
                                <div className="cph-support-grid">
                                    {/* FAQ rapide */}
                                    <div className="cph-support-col">
                                        <h2 className="cph-sub-title"><IconShield size={18}/> Centre d'aide</h2>
                                        <div className="cph-faq-list">
                                            {[
                                                {q:'Comment récupérer mon accès ?', a:"Rejoignez notre Discord, ouvrez un ticket et donnez votre ID de commande. L'équipe traitera votre demande rapidement."},
                                                {q:"Mon accès ne fonctionne plus", a:"Ouvrez un ticket Discord avec votre ID de commande. Nous proposons un remplacement ou remboursement selon les cas."},
                                                {q:"Délai de livraison moyen ?",   a:"La plupart des accès sont livrés dans les 5 à 30 minutes après validation de votre paiement PayPal."},
                                                {q:"Puis-je commander plusieurs produits ?", a:"Oui, ajoutez tous vos produits au panier et payez en une seule fois. Chaque accès sera traité dans le même ticket."},
                                            ].map((f,i) => (
                                                <details key={i} className="cph-faq-item">
                                                    <summary className="cph-faq-q">{f.q}</summary>
                                                    <p className="cph-faq-a">{f.a}</p>
                                                </details>
                                            ))}
                                        </div>

                                        <div className="cph-support-links">
                                            <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="cph-support-link discord">
                                                <IconDiscord size={18}/> <div><strong>Ouvrir un ticket Discord</strong><span>Réponse en moins de 30 min</span></div>
                                            </a>
                                        </div>
                                    </div>

                                    {/* Message direct */}
                                    <div className="cph-support-col">
                                        <h2 className="cph-sub-title"><IconBell size={18}/> Laisser un message</h2>
                                        {!supportSent ? (
                                            <div className="cph-message-form">
                                                <div className="form-group">
                                                    <label className="form-label">ID de commande (optionnel)</label>
                                                    <input type="text" className="form-input" placeholder="RAL-XXXXXXXX"
                                                        defaultValue={savedOrders[0]?.id||''}/>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label">Sujet</label>
                                                    <select className="form-input">
                                                        <option>Problème d'accès</option>
                                                        <option>Question sur un produit</option>
                                                        <option>Remboursement</option>
                                                        <option>Autre</option>
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label">Message</label>
                                                    <textarea className="form-input cph-textarea"
                                                        placeholder="Décrivez votre problème..."
                                                        value={supportMsg}
                                                        onChange={e => setSupportMsg(e.target.value)}
                                                        rows={4}/>
                                                </div>
                                                <button className="btn-primary btn-full"
                                                    onClick={() => { if(supportMsg.trim()){ setSupportSent(true); } }}>
                                                    <IconZap size={15}/> Envoyer via Discord
                                                </button>
                                                <p className="cph-msg-note">Le message sera transmis sur le serveur Discord RΔL.</p>
                                            </div>
                                        ) : (
                                            <div className="cph-sent-box">
                                                <div className="cph-sent-icon"><IconCheck size={26}/></div>
                                                <h3>Message envoyé !</h3>
                                                <p>Notre équipe vous répondra sur Discord dans les meilleurs délais.</p>
                                                <button className="btn-outline" onClick={() => { setSupportSent(false); setSupportMsg(''); }}>
                                                    Nouveau message
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ══════════════ TAB : PARAMÈTRES ══════════════ */}
                        {activeTab === 'settings' && (
                            <div className="cph-panel">
                                <div className="cph-settings-grid">
                                    <div className="cph-settings-card">
                                        <div className="cph-settings-icon"><IconBell size={20}/></div>
                                        <h3>Notifications par email</h3>
                                        <p>Recevez un email de confirmation à chaque nouvelle commande.</p>
                                        <div className="cph-notif-row">
                                            <input type="email" className="form-input" placeholder="votre@email.com"
                                                value={notifEmail} onChange={e => { setNotifEmail(e.target.value); setNotifSaved(false); }}/>
                                            <button className="btn-primary" onClick={saveNotif} disabled={!notifEmail}>
                                                {notifSaved ? <><IconCheck size={14}/> Sauvegardé</> : 'Sauvegarder'}
                                            </button>
                                        </div>
                                    </div>

                                    <div className="cph-settings-card">
                                        <div className="cph-settings-icon"><IconHistory size={20}/></div>
                                        <h3>Données locales</h3>
                                        <p>Votre historique de commandes est stocké dans ce navigateur. {savedOrders.length} commande{savedOrders.length!==1?'s':''} enregistrée{savedOrders.length!==1?'s':''}.</p>
                                        <button className="btn-outline cph-danger-btn"
                                            onClick={() => { if(confirm('Effacer tout l\'historique local ?')){ localStorage.removeItem('ral_orders'); setSavedOrders([]); setActiveTab('orders'); } }}>
                                            <IconX size={14}/> Effacer les données
                                        </button>
                                    </div>

                                    <div className="cph-settings-card">
                                        <div className="cph-settings-icon"><IconDiscord size={20}/></div>
                                        <h3>Connexion Discord</h3>
                                        <p>Associez votre compte Discord pour un suivi amélioré de vos commandes. <em>(Disponible prochainement)</em></p>
                                        <button className="btn-ghost" disabled style={{opacity:.45,cursor:'not-allowed'}}>
                                            <IconDiscord size={14}/> Connecter Discord — Bientôt
                                        </button>
                                    </div>

                                    <div className="cph-settings-card">
                                        <div className="cph-settings-icon"><IconShield size={20}/></div>
                                        <h3>Confidentialité</h3>
                                        <p>Aucune donnée personnelle n'est envoyée à nos serveurs depuis ce panel. Tout reste dans votre navigateur.</p>
                                        <div className="cph-privacy-pills">
                                            <span className="cph-privacy-pill"><IconCheck size={12}/> 100% local</span>
                                            <span className="cph-privacy-pill"><IconCheck size={12}/> Aucun tracking</span>
                                            <span className="cph-privacy-pill"><IconCheck size={12}/> Open source</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        // ============================================================================
        // MAIN RENDER
        // ============================================================================
        return (
            <div className="app">
                {/* Ambient background */}
                <div className="ambient" aria-hidden="true">
                    <div className="amb-blob amb-b1"/>
                    <div className="amb-blob amb-b2"/>
                    <div className="amb-blob amb-b3"/>
                </div>

                {/* DRAWER OVERLAY (mobile) */}
                <div className={`drawer-overlay ${mobileMenuOpen?'open':''}`} onClick={() => setMobileMenuOpen(false)}/>
                <nav className={`drawer ${mobileMenuOpen?'open':''}`} aria-label="Menu mobile">
                    <div className="drawer-head">
                        <span className="drawer-logo">RΔL</span>
                        <button className="drawer-close" onClick={() => setMobileMenuOpen(false)} aria-label="Fermer"><IconX size={16}/></button>
                    </div>
                    <div className="drawer-nav">
                        {[
                            {page:'home',           label:'Accueil',      icon:<IconZap size={15}/>},
                            {page:'products',       label:'Boutique',     icon:<IconPackage size={15}/>},
                            {page:'cart',           label:`Panier ${getTotalItems()>0?`(${getTotalItems()})`:''} `, icon:<IconCart size={15}/>},
                            {page:'customer-panel', label:'Mon espace',   icon:<IconUser size={15}/>, badge:'Bientôt'},
                        ].map(({page,label,icon,badge}) => (
                            <button key={page} className={`drawer-link ${currentPage===page?'active':''}`}
                                    onClick={() => { setCurrentPage(page); setMobileMenuOpen(false); }}>
                                <span className="drawer-link-icon">{icon}</span>
                                {label}
                                {badge && <span className="drawer-link-badge">{badge}</span>}
                            </button>
                        ))}
                    </div>
                    <div className="drawer-footer">
                        <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="drawer-discord"
                           onClick={() => setMobileMenuOpen(false)}>
                            <IconDiscord size={16}/> Rejoindre le Discord
                        </a>
                    </div>
                </nav>

                {/* NAVBAR */}
                <nav className={`navbar ${isScrolled ? 'scrolled' : ''}`}>
                    <div className="nav-inner">
                        <button className="nav-logo" onClick={() => setCurrentPage('home')} aria-label="Accueil">
                            <img src="https://i.ibb.co/TDm3Tmy9/image-2026-05-09-181103364.png" alt="RΔL" className="nav-logo-img" onError={e => { e.currentTarget.style.display='none'; e.currentTarget.nextSibling.style.display='block'; }}/>
                            <span className="nav-logo-text" style={{display:'none'}}>RΔL</span>
                        </button>

                        <div className="nav-links">
                            {[['home','Accueil'],['products','Boutique']].map(([p,l]) => (
                                <button key={p} className={`nav-link ${currentPage===p?'active':''}`}
                                        onClick={() => setCurrentPage(p)}>
                                    {l}
                                </button>
                            ))}
                        </div>

                        <div className="nav-actions">
                            <button
                                className={`nav-panel-btn ${currentPage==='customer-panel'?'active':''}`}
                                onClick={() => setCurrentPage('customer-panel')}
                                title="Espace Client"
                            >
                                <IconUser size={16}/>
                                <span>Mon espace</span>
                                <span className="nav-panel-badge">Bientôt</span>
                            </button>
                            <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="nav-discord">
                                <IconDiscord size={16}/> <span>Discord</span>
                            </a>
                            <button className="nav-cart" onClick={() => setCurrentPage('cart')} aria-label="Panier">
                                <IconCart size={19}/>
                                {getTotalItems() > 0 && <span className="cart-badge">{getTotalItems()}</span>}
                            </button>
                            <button className="nav-burger" onClick={() => setMobileMenuOpen(!mobileMenuOpen)} aria-label="Menu">
                                <IconMenu size={20}/>
                            </button>
                        </div>
                    </div>
                </nav>

                {/* PAGES */}
                <main>
                    <div key={currentPage} className="page-transition-enter">
                        {currentPage === 'home'            && <HomePage/>}
                        {currentPage === 'products'        && <ProductsPage/>}
                        {currentPage === 'product-detail'  && <ProductDetailPage/>}
                        {currentPage === 'cart'            && <CartPage/>}
                        {currentPage === 'checkout'        && <CheckoutPage/>}
                        {currentPage === 'confirmation'    && <ConfirmationPage/>}
                        {currentPage === 'customer-panel'  && <CustomerPanelPage/>}
                    </div>
                </main>

                {/* TOAST */}
                {toast && (
                    <div className={`toast ${toast.type}`}>
                        {toast.type==='success' && <IconCheck size={15}/>}
                        {toast.message}
                    </div>
                )}

                {/* FOOTER */}
                <footer className="footer">
                    <div className="footer-glow" aria-hidden="true"/>
                    <div className="container">
                        <div className="footer-grid">

                {/* ── CSS ── */}
                <style>{`
                    /* ================================================================
                       TOKENS
                    ================================================================ */
                    :root {
                        --bg:       #030306;
                        --bg2:      #080610;
                        --surface:  rgba(255,255,255,.04);
                        --surface2: rgba(255,255,255,.08);
                        --border:   rgba(255,255,255,.08);
                        --border2:  rgba(255,255,255,.13);
                        --red:      #dc2626;

                    }

                    /* ================================================================
                       BASE
                    ================================================================ */
                    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

                    html{scroll-behavior:smooth}

                    body{
                        font-family:'Outfit',system-ui,sans-serif;
                        background:var(--bg);
                        color:var(--text);
                        overflow-x:hidden;
                        min-height:100vh;
                        -webkit-font-smoothing:antialiased;
                    }

                    img{max-width:100%;display:block}
                    button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
                    a{color:inherit;text-decoration:none}
                    input,textarea{font-family:inherit}

                    .container{
                        max-width:1280px;
                        margin:0 auto;
                        padding:0 1.5rem;
                    }

                    /* ================================================================
                       AMBIENT BACKGROUND
                    ================================================================ */
                    .ambient{
                        position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
                    }
                    .amb-blob{
                        position:absolute;border-radius:50%;
                        filter:blur(80px);opacity:.18;
                        animation:blobDrift 20s ease-in-out infinite;
                    }
                    .amb-b1{
                        width:500px;height:500px;top:-5%;left:-8%;
                        background:radial-gradient(circle,rgba(220,38,38,.7) 0%,transparent 70%);
                    }
                    .amb-b2{
                        width:600px;height:600px;top:40%;right:-10%;
                        background:radial-gradient(circle,rgba(185,28,28,.6) 0%,transparent 70%);
                        animation-delay:-8s;
                    }
                    .amb-b3{
                        width:400px;height:400px;bottom:-5%;left:30%;
                        background:radial-gradient(circle,rgba(127,20,20,.55) 0%,transparent 70%);
                        animation-delay:-14s;
                    }
                    @keyframes blobDrift{
                        0%,100%{transform:translate(0,0) scale(1)}
                        50%{transform:translate(20px,-25px) scale(1.1)}
                    }

                    /* Subtle grid overlay */
                    body::before{
                        content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
                        background-image:
                            linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
                            linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
                        background-size:64px 64px;
                        mask-image:linear-gradient(to bottom,black 0%,transparent 60%);

                    .app{position:relative;z-index:1}

                    /* ================================================================
                       NAVBAR
                    ================================================================ */
                    .navbar{
                        position:fixed;top:46px;left:50%;transform:translateX(-50%);

                        z-index:1000;
                        background:rgba(3,3,6,.55);

                    .nav-links.open{
                        position:absolute;top:calc(100% + .6rem);left:0;right:0;

                    /* ================================================================
                       HERO
                    ================================================================ */

                        mask-image:radial-gradient(ellipse 80% 70% at 50% 50%,black,transparent);
                    }
                    .hero-orb{

                        filter:blur(100px);

                    .hero-orb-1{

                        animation:blobDrift 16s ease-in-out infinite;
                    }
                    .hero-orb-2{
                        width:500px;height:500px;bottom:0;right:-10%;

                        animation:blobDrift 20s ease-in-out infinite reverse;
                    }
                    .hero-inner{
                        position:relative;z-index:1;

                        display:flex;flex-direction:column;align-items:center;text-align:center;gap:1.8rem;
                    }
                    .hero-eyebrow{
                        display:inline-flex;align-items:center;gap:.55rem;
                        padding:.45rem 1.1rem;border-radius:99px;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);
                        font-size:.8rem;font-weight:500;color:rgba(255,255,255,.7);

                    .eyebrow-dot{

                    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.3)}}
                    .hero-h1{
                        display:flex;flex-direction:column;align-items:center;gap:.3rem;

                    .hero-brand{
                        font-family:'Syne',sans-serif;

                    .hero-desc{

                    .hsn{

                    @keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
                    @keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
                    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

                    /* ================================================================
                       BUTTONS
                    ================================================================ */
                    .btn-primary{
                        display:inline-flex;align-items:center;gap:.55rem;

                    .btn-primary:hover::before{opacity:1}

                    /* ================================================================

                    ================================================================ */

                    }

                        display:flex;flex-direction:column;
                        border-radius:var(--radius-lg);overflow:hidden;
                        background:var(--surface);border:1px solid var(--border);
                        cursor:pointer;position:relative;
                        transition:transform .28s cubic-bezier(.25,.46,.45,.94),box-shadow .28s ease,border-color .28s ease;
                        will-change:transform;
                        animation:cardReveal .5s cubic-bezier(.25,.46,.45,.94) both;
