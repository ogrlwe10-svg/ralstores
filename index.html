                            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36), 0 0 34px rgba(220, 38, 38, 0.13);
                        }

                        .product-card:hover::after {
                            transform: translateX(120%);
                        }

                        .popular-badge {
                            position: absolute;
                            top: 1rem;
                            right: 1rem;
                            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
                            color: white;
                            padding: 0.5rem 1rem;
                            border-radius: 999px;
                            font-size: 0.8rem;
                            font-weight: 600;
                            display: flex;
                            align-items: center;
                            gap: 0.25rem;
                        }

                        .product-image {
                            width: 100%;
                            height: 148px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 2.2rem;
                            font-weight: 900;
                            color: #fff;
                            margin-bottom: 1.25rem;
                            border-radius: 12px;
                            background:
                                radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.28), transparent 55%),
                                linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.025));
                            border: 1px solid rgba(255, 255, 255, 0.105);
                            overflow: hidden;
                            position: relative;
                            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
                            transition: all 0.35s ease;
                        }

                        /* Overlay pour masquer le texte dans les images */
                        .product-image::after {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background:
                                linear-gradient(to top, rgba(5,5,10,0.75) 0%, transparent 45%),
                                linear-gradient(to bottom, rgba(5,5,10,0.65) 0%, transparent 40%);
                            z-index: 2;
                            pointer-events: none;
                        }

                        .product-image::before {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background:
                                linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.06), transparent);
                            background-size: 100% 100%;
                            opacity: 0.55;
                            z-index: 3;
                        }

                        .product-image img {
                            width: 100%;
                            height: 100%;
                            object-fit: cover;
                            object-position: center 30%;
                            display: block;
                            transform: scale(1.08);
                            transition: transform 0.45s ease, filter 0.45s ease;
                            z-index: 1;
                            position: relative;
                        }

                        .product-card:hover .product-image img {
                            transform: scale(1.15);
                        }

                        .product-image img.is-hidden {
                            display: none;
                        }

                        .product-image span {
                            position: relative;
                            z-index: 1;
                            text-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
                        }

                        .product-image .image-fallback {
                            display: none;
                        }

                        .product-image img.is-hidden + .image-fallback {
                            display: block;
                        }

                        .product-image.large {
                            width: min(100%, 420px);
                            height: 310px;
                            margin: 0 auto 1.5rem;
                            font-size: 4.2rem;
                        }

                        .product-image.compact {
                            width: 48px;
                            height: 48px;
                            min-width: 48px;
                            margin: 0;
                            border-radius: 10px;
                            font-size: 0.95rem;
                        }

                        .product-card:hover .product-image {
                            border-color: rgba(248, 113, 113, 0.38);
                            transform: translateY(-2px);
                        }

                        .product-card:hover .product-image img {
                            transform: scale(1.08);
                            filter: saturate(1.15) contrast(1.05);
                        }

                        .stock-badge {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.45rem;
                            width: fit-content;
                            margin-bottom: 0.85rem;
                            padding: 0.4rem 0.65rem;
                            border-radius: 999px;
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            background: rgba(255, 255, 255, 0.05);
                            color: #d4d4d8;
                            font-size: 0.78rem;
                            font-weight: 800;
                        }

                        .stock-badge.in-stock {
                            color: #bbf7d0;
                            border-color: rgba(34, 197, 94, 0.26);
                            background: rgba(34, 197, 94, 0.08);
                        }

                        .stock-badge.out-stock {
                            color: #fecaca;
                            border-color: rgba(248, 113, 113, 0.32);
                            background: rgba(220, 38, 38, 0.1);
                        }

                        .stock-dot {
                            width: 7px;
                            height: 7px;
                            border-radius: 50%;
                            background: currentColor;
                            box-shadow: 0 0 14px currentColor;
                        }

                        .product-name {
                            font-size: 1.25rem;
                            margin-bottom: 0.5rem;
                        }

                        .product-description {
                            color: var(--muted);
                            font-size: 0.9rem;
                            line-height: 1.5;
                            margin-bottom: 1.5rem;
                            min-height: 42px;
                        }

                        .product-footer {
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                        }

                        .product-price {
                            display: flex;
                            align-items: baseline;
                            gap: 0.25rem;
                        }

                        .price-amount {
                            font-size: 1.5rem;
                            font-weight: 700;
                            color: #f87171;
                        }

                        .btn-add-cart {
                            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
                            border: none;
                            color: white;
                            padding: 0.75rem;
                            border-radius: 8px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                        }

                        .btn-add-cart:hover {
                            transform: scale(1.14) rotate(-3deg);
                            box-shadow: 0 10px 24px rgba(220, 38, 38, 0.3);
                        }

                        .btn-add-cart:disabled:hover {
                            transform: none;
                            box-shadow: none;
                        }

                        /* ============================================
                           CATEGORY FILTER
                        ============================================ */
                        .category-filter {
                            display: flex;
                            gap: 0.6rem;
                            margin-bottom: 3rem;
                            flex-wrap: wrap;
                            padding: 0.45rem;
                            width: fit-content;
                            max-width: 100%;
                            background: rgba(255, 255, 255, 0.035);
                            border: 1px solid rgba(255, 255, 255, 0.075);
                            border-radius: 14px;
                        }

                        .category-btn {
                            background: transparent;
                            border: 1px solid transparent;
                            color: #e4e4e7;
                            padding: 0.72rem 1rem;
                            border-radius: 10px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            font-weight: 600;
                            font-size: 0.92rem;
                        }

                        .category-btn:hover {
                            background: rgba(255, 255, 255, 0.075);
                            border-color: rgba(248, 113, 113, 0.28);
                            transform: translateY(-2px);
                        }

                        .category-btn.active {
                            background:
                                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 40%),
                                linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
                            color: white;
                            border-color: rgba(248, 113, 113, 0.52);
                            box-shadow: 0 12px 26px rgba(220, 38, 38, 0.24);
                        }

                        /* ============================================
                           PRODUCT DETAIL
                        ============================================ */
                        .back-btn {
                            background: none;
                            border: none;
                            color: #dc2626;
                            cursor: pointer;
                            font-size: 1rem;
                            margin-bottom: 2rem;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            transition: color 0.2s ease;
                        }

                        .back-btn:hover {
                            color: #b91c1c;
                        }

                        .product-detail {
                            display: grid;
                            grid-template-columns: 1fr 1fr;
                            gap: 4rem;
                            align-items: start;
                            padding: 2rem;
                            background: var(--surface);
                            border: 1px solid var(--line);
                            border-radius: 14px;
                            box-shadow: var(--shadow);
                        }

                        .product-detail-image {
                            position: relative;
                            text-align: center;
                            min-height: 360px;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            border-radius: 12px;
                            background:
                                radial-gradient(circle at center, rgba(239, 68, 68, 0.16), transparent 54%),
                                rgba(255, 255, 255, 0.035);
                            border: 1px solid rgba(255, 255, 255, 0.075);
                        }

                        .popular-badge-large {
                            display: inline-flex;
                            align-items: center;
                            gap: 0.5rem;
                            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
                            color: white;
                            padding: 0.75rem 1.5rem;
                            border-radius: 999px;
                            font-weight: 600;
                        }

                        .product-detail-info h1 {
                            font-size: 2.5rem;
                            margin-bottom: 1rem;
                        }

                        .product-detail-description {
                            color: #a1a1aa;
                            font-size: 1.1rem;
                            line-height: 1.6;
                            margin: 1rem 0 2rem;
                        }

                        .product-features {
                            margin-bottom: 2rem;
                        }

                        .product-features h3 {
                            font-size: 1.25rem;
                            margin-bottom: 1rem;
                        }

                        .product-features ul {
                            list-style: none;
                        }

                        .product-features li {
                            display: flex;
                            align-items: center;
                            gap: 0.75rem;
                            margin-bottom: 0.75rem;
                            color: #a1a1aa;
                        }

                        .product-features li svg {
                            color: #10b981;
                            flex-shrink: 0;
                        }

                        .product-detail-footer {
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            padding-top: 2rem;
                            border-top: 1px solid rgba(255, 255, 255, 0.1);
                        }

                        .product-detail-price {
                            display: flex;
                            flex-direction: column;
                            gap: 0.25rem;
                        }

                        .price-label {
                            color: #a1a1aa;
                            font-size: 0.9rem;
                        }

                        .price-amount-large {
                            font-size: 2.5rem;
                            font-weight: 800;
                            color: #dc2626;
                        }

                        .btn-large {
                            padding: 1.25rem 2.5rem;
                            font-size: 1.1rem;
                        }

                        /* ============================================
                           CART
                        ============================================ */
                        .empty-cart {
                            text-align: center;
                            padding: 4rem 2rem;
                            color: #71717a;
                        }

                        .empty-cart svg {
                            color: #374151;
                            margin-bottom: 2rem;
                        }

                        .empty-cart h2 {
                            font-size: 2rem;
                            margin-bottom: 1rem;
                        }

                        .empty-cart p {
                            margin-bottom: 2rem;
                        }

                        .cart-content {
                            display: grid;
                            grid-template-columns: minmax(0, 1fr) 380px;
                            gap: 1.5rem;
                            align-items: start;
                        }

                        .cart-items {
                            display: flex;
                            flex-direction: column;
                            gap: 1rem;
                        }

                        .cart-item {
                            display: grid;
                            grid-template-columns: auto 1fr auto auto auto;
                            gap: 1rem;
                            align-items: center;
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.026)),
                                radial-gradient(circle at 0% 0%, rgba(239, 68, 68, 0.1), transparent 38%);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 1.5rem;
                            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
                            transition: all 0.25s ease;
                        }

                        .cart-item:hover {
                            border-color: var(--line-red);
                            transform: translateY(-3px);
                        }

                        .cart-item-info h3 {
                            margin-bottom: 0.25rem;
                        }

                        .cart-item-info p {
                            color: #a1a1aa;
                            font-size: 0.9rem;
                        }

                        .cart-item-quantity {
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            background: rgba(0, 0, 0, 0.18);
                            border: 1px solid rgba(255, 255, 255, 0.08);
                            border-radius: 9px;
                            padding: 0.25rem;
                        }

                        .cart-item-quantity button {
                            background: none;
                            border: none;
                            color: #e4e4e7;
                            width: 30px;
                            height: 30px;
                            border-radius: 6px;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            transition: background 0.2s ease;
                        }

                        .cart-item-quantity button:hover {
                            background: rgba(255, 255, 255, 0.1);
                        }

                        .cart-item-total {
                            font-weight: 600;
                            color: #f87171;
                        }

                        .cart-item-remove {
                            background: none;
                            border: none;
                            color: #ef4444;
                            cursor: pointer;
                            padding: 0.5rem;
                            border-radius: 6px;
                            transition: background 0.2s ease;
                        }

                        .cart-item-remove:hover {
                            background: rgba(239, 68, 68, 0.1);
                        }

                        .cart-summary {
                            position: sticky;
                            top: 118px;
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.078), rgba(255, 255, 255, 0.03)),
                                radial-gradient(circle at top, rgba(239, 68, 68, 0.14), transparent 58%);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 2rem;
                            height: fit-content;
                            box-shadow: var(--shadow);
                        }

                        .cart-summary h2 {
                            margin-bottom: 1.5rem;
                        }

                        .summary-line {
                            display: flex;
                            justify-content: space-between;
                            margin-bottom: 1rem;
                            color: #a1a1aa;
                        }

                        .free-tag {
                            color: #10b981;
                            font-weight: 600;
                        }

                        .summary-divider {
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.16), transparent);
                            margin: 1.2rem 0;
                        }

                        .summary-total {
                            display: flex;
                            justify-content: space-between;
                            font-size: 1.25rem;
                            font-weight: 700;
                            margin-bottom: 2rem;
                        }

                        .btn-checkout {
                            width: 100%;
                            margin-bottom: 1rem;
                        }

                        .secure-badge {
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.5rem;
                            color: #a1a1aa;
                            font-size: 0.9rem;
                        }

                        /* ============================================
                           CHECKOUT
                        ============================================ */
                        .checkout-container {
                            display: grid;
                            grid-template-columns: minmax(0, 1fr) 360px;
                            gap: 1.5rem;
                            align-items: start;
                        }

                        .checkout-form {
                            display: flex;
                            flex-direction: column;
                            gap: 2rem;
                        }

                        .checkout-section {
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.078), rgba(255, 255, 255, 0.03)),
                                radial-gradient(circle at top left, rgba(239, 68, 68, 0.11), transparent 46%);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 1.85rem;
                            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.25);
                            position: relative;
                            overflow: hidden;
                        }

                        .checkout-section::before {
                            content: '';
                            position: absolute;
                            left: 0;
                            top: 0;
                            right: 0;
                            height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(248, 113, 113, 0.45), transparent);
                        }

                        .checkout-section h2 {
                            margin-bottom: 0.5rem;
                        }

                        .section-description {
                            color: #a1a1aa;
                            margin-bottom: 1.5rem;
                        }

                        .form-group {
                            margin-bottom: 1rem;
                        }

                        .form-group label {
                            display: block;
                            margin-bottom: 0.5rem;
                            font-weight: 600;
                        }

                        .input-field {
                            width: 100%;
                            background: rgba(0, 0, 0, 0.28);
                            border: 1px solid rgba(255, 255, 255, 0.13);
                            border-radius: 10px;
                            padding: 1rem;
                            color: #e4e4e7;
                            font-size: 1rem;
                            transition: all 0.2s ease;
                        }

                        .input-field:focus {
                            outline: none;
                            border-color: rgba(248, 113, 113, 0.72);
                            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.13), inset 0 1px 0 rgba(255, 255, 255, 0.08);
                            background: rgba(0, 0, 0, 0.34);
                        }

                        .discord-order-box {
                            display: grid;
                            grid-template-columns: auto 1fr;
                            gap: 1rem;
                            align-items: start;
                            padding: 1.15rem;
                            margin-bottom: 1rem;
                            background:
                                linear-gradient(135deg, rgba(220, 38, 38, 0.16), rgba(255, 255, 255, 0.035));
                            border: 1px solid rgba(248, 113, 113, 0.28);
                            border-radius: 10px;
                        }

                        .discord-order-icon {
                            width: 52px;
                            height: 52px;
                            border-radius: 8px;
                            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: #fff;
                        }

                        .discord-order-box h3 {
                            margin-bottom: 0.45rem;
                        }

                        .discord-order-box p {
                            color: #d4d4d8;
                            line-height: 1.6;
                        }

                        .discord-order-btn {
                            width: 100%;
                            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
                            color: white;
                            border: none;
                            padding: 1rem;
                            border-radius: 8px;
                            font-size: 1rem;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.5rem;
                            transition: all 0.2s ease;
                        }

                        .discord-order-btn:hover {
                            transform: translateY(-2px);
                            box-shadow: 0 14px 34px rgba(220, 38, 38, 0.28);
                        }

                        .paypalme-btn {
                            width: 100%;
                            max-width: 420px;
                            min-height: 52px;
                            border: none;
                            border-radius: 10px;
                            background:
                                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 42%),
                                linear-gradient(135deg, #ef4444 0%, #b91c1c 58%, #7f1d1d 100%);
                            color: #fff;
                            font-size: 1rem;
                            font-weight: 800;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.55rem;
                            box-shadow: 0 18px 42px rgba(220, 38, 38, 0.28);
                            transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
                            position: relative;
                            overflow: hidden;
                        }

                        .paypalme-btn::before {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
                            transform: translateX(-120%) skewX(-18deg);
                            transition: transform 0.7s ease;
                        }

                        .paypalme-btn:hover {
                            transform: translateY(-3px) scale(1.01);
                            box-shadow: 0 24px 58px rgba(220, 38, 38, 0.36);
                            filter: saturate(1.08);
                        }

                        .paypalme-btn:hover::before {
                            transform: translateX(120%) skewX(-18deg);
                        }

                        .payment-info {
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 0.5rem;
                            color: #a1a1aa;
                            font-size: 0.9rem;
                            margin-top: 1rem;
                        }

                        .checkout-summary {
                            position: sticky;
                            top: 118px;
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.078), rgba(255, 255, 255, 0.03)),
                                radial-gradient(circle at top right, rgba(239, 68, 68, 0.13), transparent 60%);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 2rem;
                            height: fit-content;
                            box-shadow: var(--shadow);
                        }

                        .checkout-items {
                            margin-bottom: 2rem;
                        }

                        .checkout-item {
                            display: flex;
                            justify-content: space-between;
                            gap: 1rem;
                            margin-bottom: 0.85rem;
                            color: var(--muted);
                            font-size: 0.95rem;
                        }

                        .checkout-total {
                            display: flex;
                            justify-content: space-between;
                            font-size: 1.25rem;
                            font-weight: 700;
                            margin-bottom: 1rem;
                        }

                        .total-amount {
                            color: #f87171;
                        }

                        .delivery-info {
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            color: #a1a1aa;
                            font-size: 0.9rem;
                        }

                        /* ============================================
                           CONFIRMATION
                        ============================================ */
                        .confirmation-container {
                            max-width: 800px;
                            margin: 0 auto;
                            text-align: center;
                            padding: 4rem 2rem;
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.028)),
                                radial-gradient(circle at top, rgba(16, 185, 129, 0.13), transparent 48%),
                                radial-gradient(circle at bottom, rgba(239, 68, 68, 0.1), transparent 55%);
                            border: 1px solid var(--line);
                            border-radius: 16px;
                            box-shadow: var(--shadow);
                        }

                        .confirmation-icon {
                            margin-bottom: 2rem;
                        }

                        .success-checkmark {
                            width: 120px;
                            height: 120px;
                            margin: 0 auto;
                            background:
                                linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 40%),
                                linear-gradient(135deg, #10b981 0%, #047857 100%);
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                            animation: scaleIn 0.5s ease, successGlow 2.8s ease-in-out infinite;
                            box-shadow: 0 0 46px rgba(16, 185, 129, 0.28);
                        }

                        @keyframes scaleIn {
                            from {
                                transform: scale(0);
                            }
                            to {
                                transform: scale(1);
                            }
                        }

                        @keyframes successGlow {
                            0%, 100% { box-shadow: 0 0 34px rgba(16, 185, 129, 0.24); }
                            50% { box-shadow: 0 0 62px rgba(16, 185, 129, 0.38); }
                        }

                        .confirmation-title {
                            font-size: 2.5rem;
                            margin-bottom: 1rem;
                        }

                        .confirmation-message {
                            color: #a1a1aa;
                            font-size: 1.1rem;
                            line-height: 1.6;
                            margin-bottom: 3rem;
                        }

                        .order-reference {
                            display: block;
                            margin-top: 1rem;
                            color: #fca5a5;
                            font-size: 0.95rem;
                            font-weight: 700;
                        }

                        .confirmation-details {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                            gap: 2rem;
                            margin-bottom: 3rem;
                        }

                        .detail-card {
                            background: rgba(255, 255, 255, 0.055);
                            border: 1px solid var(--line);
                            border-radius: var(--radius);
                            padding: 2rem;
                            transition: all 0.25s ease;
                        }

                        .detail-card:hover {
                            transform: translateY(-4px);
                            border-color: var(--line-red);
                        }

                        .detail-card svg {
                            color: #dc2626;
                            margin-bottom: 1rem;
                        }

                        .detail-card h3 {
                            font-size: 1.1rem;
                            margin-bottom: 0.5rem;
                        }

                        .detail-card p {
                            color: #a1a1aa;
                            font-size: 0.9rem;
                        }

                        .confirmation-actions {
                            display: flex;
                            gap: 1rem;
                            justify-content: center;
                        }

                        /* ============================================
                           FOOTER
                        ============================================ */
                        .footer {
                            background:
                                linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(0, 0, 0, 0.28)),
                                rgba(10, 10, 15, 0.5);
                            border-top: 1px solid rgba(255, 255, 255, 0.08);
                            padding: 4rem 2rem 2rem;
                            margin-top: 4rem;
                        }

                        .footer-content {
                            max-width: 1400px;
                            margin: 0 auto;
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                            gap: 3rem;
                            margin-bottom: 2rem;
                        }

                        .footer-section h3 {
                            font-size: 1.25rem;
                            margin-bottom: 1rem;
                        }

                        .footer-section h4 {
                            font-size: 1rem;
                            margin-bottom: 1rem;
                            color: #a1a1aa;
                        }

                        .footer-section a {
                            display: block;
                            color: #a1a1aa;
                            text-decoration: none;
                            margin-bottom: 0.5rem;
                            transition: color 0.2s ease;
                        }

                        .footer-section a:hover {
                            color: #dc2626;
                        }

                        .payment-icons {
                            display: flex;
                            gap: 1rem;
                            margin-bottom: 1rem;
                        }

                        .footer-secure {
                            color: #a1a1aa;
                            font-size: 0.9rem;
                        }

                        .footer-bottom {
                            max-width: 1400px;
                            margin: 0 auto;
                            padding-top: 2rem;
                            border-top: 1px solid rgba(255, 255, 255, 0.05);
                            text-align: center;
                            color: #71717a;
                        }

                        /* ============================================
                           RESPONSIVE
                        ============================================ */
                        @media (max-width: 768px) {
                            .navbar {
                                top: 10px;
                                width: calc(100% - 24px);
                            }

                            .nav-container {
                                padding: 0.65rem 0.75rem;
                            }

                            .nav-links {
                                display: none;
                            }

                            .mobile-menu-btn {
                                display: block;
                            }

                            .nav-links.open {
                                position: absolute;
                                top: calc(100% + 0.6rem);
                                left: 0;
                                right: 0;
                                background: rgba(10, 10, 15, 0.96);
                                backdrop-filter: blur(20px);
                                flex-direction: column;
                                padding: 0.65rem;
                                border: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 12px;
                                box-shadow: var(--shadow);
                            }

                            .discord-nav-btn span { display: none; }

                            .main-content {
                                padding-top: 0;
                            }

                            .hero-inner {
                                grid-template-columns: 1fr;
                                min-height: 100vh;
                                padding: 100px 1.5rem 3rem;
                                gap: 3rem;
                            }

                            .hero-visual {
                                display: none;
                            }

                            .hero-title-ral {
                                font-size: clamp(3.5rem, 16vw, 6rem);
                            }

                            .hero-title-sub {
                                font-size: clamp(1.4rem, 5vw, 2rem);
                            }

                            .hero-stats-row {
                                gap: 1rem;
                                flex-wrap: wrap;
                            }

                            .page-content {
                                padding: 2rem 1rem;
                            }

                            .features {
                                grid-template-columns: 1fr;
                            }

                            .product-detail {
                                grid-template-columns: 1fr;
                                gap: 2rem;
                                padding: 1rem;
                            }

                            .cart-content,
                            .checkout-container {
                                grid-template-columns: 1fr;
                                gap: 2rem;
                            }

                            .cart-summary,
                            .checkout-summary {
                                position: static;
                            }

                            .cart-item {
                                grid-template-columns: auto 1fr;
                            }

                            .cart-item-quantity,
                            .cart-item-total,
                            .cart-item-remove {
                                grid-column: span 2;
                                width: fit-content;
                            }

                            .confirmation-actions {
                                flex-direction: column;
                            }

                            .hero-cta {
                                flex-direction: column;
                                align-items: stretch;
                            }

                            .category-filter {
                                justify-content: center;
                                width: 100%;
                            }
                        }

                        /* ============================================
                           SCROLLBAR
                        ============================================ */
                        ::-webkit-scrollbar {
                            width: 8px;
                        }

                        ::-webkit-scrollbar-track {
                            background: rgba(255, 255, 255, 0.05);
                        }

                        ::-webkit-scrollbar-thumb {
                            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
                            border-radius: 4px;
                        }

                        ::-webkit-scrollbar-thumb:hover {
                            background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
                        }

                        /* States et micro-interactions */
                        button:active {
                            transform: scale(0.98);
                        }

                        .empty-state {
                            text-align: center;
                            padding: 4rem 2rem;
                            color: #71717a;
                        }

                        .product-variants {
                            margin: 20px 0;
                        }

                        .product-variants h3 {
                            margin-bottom: 10px;
                            font-size: 18px;
                        }

                        .variant-option {
                            display: block;
                            margin: 5px 0;
                            cursor: pointer;
                        }

                        .variant-option input {
                            margin-right: 10px;
                        }

                        .loading {
                            text-align: center;
                            padding: 50px;
                            font-size: 18px;
                        }

                        .input-error {
                            border-color: #ef4444 !important;
                            background-color: #fef2f2;
                        }

                        .error-message {
                            color: #ef4444;
                            font-size: 12px;
                            margin-top: 4px;
                        }

                        .payment-warning {
                            background-color: #fef3c7;
                            border: 1px solid #fbbf24;
                            color: #92400e;
                            padding: 12px;
                            border-radius: 8px;
                            margin: 10px 0;
                            font-size: 14px;
                        }

                        button:disabled {
                            opacity: 0.6;
                            cursor: not-allowed;
                        }

                    `}</style>
                </div>
            );
        }

        // Rendu de l'application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DigitalShop />);
    </script>
</body>
</html>
