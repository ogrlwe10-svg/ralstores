                            {[['home','Accueil'],['products','Boutique']].map(([p,l]) => (
                                <button key={p} className={`nav-link ${currentPage===p?'active':''}`}
                                        onClick={() => setCurrentPage(p)}>
                                    {l}
                                </button>
                            ))}
                        </div>

                        <div className="nav-actions">
                            <button
                                className={`nav-panel-btn ${currentPage==='customer-panel'?'active':''}`}
                                onClick={() => setCurrentPage('customer-panel')}
                                title="Espace Client"
                            >
                                <IconUser size={16}/>
                                <span>Mon espace</span>
                                
                            </button>
                            <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="nav-discord">
                                <IconDiscord size={16}/> <span>Discord</span>
                            </a>
                            <button className="nav-cart" onClick={() => setCurrentPage('cart')} aria-label="Panier">
                                <IconCart size={19}/>
                                {getTotalItems() > 0 && <span className="cart-badge">{getTotalItems()}</span>}
                            </button>
                            <button className="nav-burger" onClick={() => setMobileMenuOpen(!mobileMenuOpen)} aria-label="Menu">
                                <IconMenu size={20}/>
                            </button>
                        </div>
                    </div>
                </nav>

                {/* PAGES */}
                <main>
                    <div key={currentPage} className="page-transition-enter">
                        {currentPage === 'home'            && <HomePage/>}
                        {currentPage === 'products'        && <ProductsPage/>}
                        {currentPage === 'product-detail'  && <ProductDetailPage/>}
                        {currentPage === 'cart'            && <CartPage/>}
                        {currentPage === 'checkout'        && <CheckoutPage/>}
                        {currentPage === 'confirmation'    && <ConfirmationPage/>}
                        {currentPage === 'customer-panel'  && <CustomerPanelPage/>}
                    </div>
                </main>

                {/* TOAST */}
                {toast && (
                    <div className={`toast ${toast.type}`}>
                        {toast.type==='success' && <IconCheck size={15}/>}
                        {toast.message}
                    </div>
                )}

                {/* FOOTER */}
                <footer className="footer">
                    <div className="footer-glow" aria-hidden="true"/>
                    <div className="container">
                        <div className="footer-grid">
                            <div className="footer-brand">
                                <div className="footer-logo">RΔL</div>
                                <p className="footer-tagline">Accès numériques premium, livrés instantanément via Discord.</p>
                                <a href="https://discord.gg/Mm6QaTcAN" target="_blank" rel="noopener noreferrer" className="footer-discord">
                                    <IconDiscord size={15}/> Rejoindre le Discord
                                </a>
                            </div>
                            <div className="footer-col">
                                <h4 className="footer-col-title">Produits</h4>
                                {['Streaming','VPN','Réseaux sociaux','IA & Outils','Musique','Éducation'].map(t => (
                                    <button key={t} className="footer-link" onClick={() => {
                                        const key = {Streaming:'streaming',VPN:'vpn','Réseaux sociaux':'social','IA & Outils':'ai',Musique:'music','Éducation':'education'}[t] || 'all';
                                        setSelectedCategory(key); setCurrentPage('products');
                                    }}>{t}</button>
                                ))}
                            </div>
                            <div className="footer-col">
                                <h4 className="footer-col-title">Informations</h4>
                                {['Conditions d\'utilisation','Politique de confidentialité','FAQ','Contact'].map(t => (
                                    <span key={t} className="footer-link">{t}</span>
                                ))}
                            </div>
                            <div className="footer-col">
                                <h4 className="footer-col-title">Paiement & Livraison</h4>
                                <div className="footer-badges">
                                    <div className="footer-badge"><IconCard size={15}/> PayPal</div>
                                    <div className="footer-badge"><IconDiscord size={15}/> Discord</div>
                                    <div className="footer-badge"><IconShield size={15}/> Sécurisé</div>
                                    <div className="footer-badge"><IconZap size={15}/> Instantané</div>
                                </div>
                            </div>
                        </div>
                        <div className="footer-bottom">
                            <span>© 2026 RΔL Store. Tous droits réservés.</span>
                            <span>Premium Digital Market</span>
                        </div>
                    </div>
                </footer>

                {/* ── CSS ── */}
                <style>{`
                    /* ================================================================
                       DESIGN TOKENS
                    ================================================================ */
                    :root {
                        --bg:         #020204;
                        --bg2:        #070510;
                        --surface:    rgba(255,255,255,.038);
                        --surface2:   rgba(255,255,255,.07);
                        --surface3:   rgba(255,255,255,.11);
                        --border:     rgba(255,255,255,.07);
                        --border2:    rgba(255,255,255,.13);
                        --border3:    rgba(255,255,255,.2);
                        --red:        #dc2626;
                        --red2:       #ef4444;
                        --red3:       #ff6b6b;
                        --red-glow:   rgba(220,38,38,.28);
                        --red-soft:   rgba(220,38,38,.09);
                        --text:       #f0f0f5;
                        --text2:      #9898b0;
                        --muted:      #55556a;
                        --gold:       #f59e0b;
                        --discord:    #5865f2;
                        --green:      #22c55e;

                        --radius-xs:  6px;
                        --radius-sm:  10px;
                        --radius:     16px;
                        --radius-lg:  24px;
                        --radius-xl:  32px;

                        --shadow:     0 8px 32px rgba(0,0,0,.5);
                        --shadow-lg:  0 24px 80px rgba(0,0,0,.6);
                        --shadow-red: 0 0 50px rgba(220,38,38,.2);
                        --glow-red:   0 0 80px rgba(220,38,38,.12);

                        --ease-out:   cubic-bezier(.25,.46,.45,.94);
                        --ease-spring:cubic-bezier(.25,1.5,.5,1);
                    }

                    /* ================================================================
                       BASE RESET & TYPOGRAPHY
                    ================================================================ */
                    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
                    html{scroll-behavior:smooth}
                    body{
                        font-family:'Outfit',system-ui,sans-serif;
                        background:var(--bg);color:var(--text);
                        overflow-x:hidden;min-height:100vh;
                        -webkit-font-smoothing:antialiased;
                        -moz-osx-font-smoothing:grayscale;
                    }
                    img{max-width:100%;display:block}
                    button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
                    a{color:inherit;text-decoration:none}
                    input,textarea,select{font-family:inherit}
                    select{appearance:none;-webkit-appearance:none}

                    .container{max-width:1300px;margin:0 auto;padding:0 1.5rem}

                    /* ================================================================
                       AMBIENT BACKGROUND
                    ================================================================ */
                    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
                    .amb-blob{
                        position:absolute;border-radius:50%;
                        filter:blur(100px);opacity:.15;
                        will-change:transform;
                    }
                    .amb-b1{
                        width:600px;height:600px;top:-10%;left:-12%;
                        background:radial-gradient(circle,rgba(220,38,38,.85) 0%,transparent 70%);
                        animation:blobDrift 18s var(--ease-out) infinite;
                    }
                    .amb-b2{
                        width:700px;height:700px;top:35%;right:-14%;
                        background:radial-gradient(circle,rgba(185,28,28,.7) 0%,transparent 70%);
                        animation:blobDrift 24s var(--ease-out) infinite reverse;
                        animation-delay:-9s;
                    }
                    .amb-b3{
                        width:450px;height:450px;bottom:-8%;left:28%;
                        background:radial-gradient(circle,rgba(120,15,15,.6) 0%,transparent 70%);
                        animation:blobDrift 20s var(--ease-out) infinite;
                        animation-delay:-15s;
                    }
                    @keyframes blobDrift{
                        0%,100%{transform:translate(0,0) scale(1)}
                        33%{transform:translate(30px,-20px) scale(1.08)}
                        66%{transform:translate(-15px,25px) scale(.96)}
                    }

                    /* Fine grid overlay */
                    body::before{
                        content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
                        background-image:
                            linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
                            linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
                        background-size:72px 72px;
                        mask-image:linear-gradient(to bottom,black 0%,transparent 55%);
                    }
                    .app{position:relative;z-index:1}

                    /* ================================================================
                       BUTTONS
                    ================================================================ */
                    .btn-primary{
                        display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
                        padding:.7rem 1.6rem;border-radius:var(--radius-sm);
                        background:linear-gradient(135deg,var(--red),#b91c1c);
                        color:#fff;font-size:.9rem;font-weight:600;
                        border:1px solid rgba(255,255,255,.1);
                        box-shadow:0 4px 20px rgba(220,38,38,.35),inset 0 1px 0 rgba(255,255,255,.12);
                        transition:all .22s var(--ease-out);
                        position:relative;overflow:hidden;
                    }
                    .btn-primary::before{
                        content:'';position:absolute;inset:0;
                        background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);
                        opacity:0;transition:opacity .2s;
                    }
                    .btn-primary:hover{
                        transform:translateY(-2px);
                        box-shadow:0 8px 30px rgba(220,38,38,.5),inset 0 1px 0 rgba(255,255,255,.15);
                    }
                    .btn-primary:hover::before{opacity:1}
                    .btn-primary:active{transform:translateY(0);box-shadow:0 2px 10px rgba(220,38,38,.3)}
                    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
                    .btn-primary.btn-large{padding:.85rem 2.2rem;font-size:.95rem}
                    .btn-primary.btn-full{width:100%;justify-content:center}

                    .btn-outline{
                        display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
                        padding:.7rem 1.6rem;border-radius:var(--radius-sm);
                        background:var(--surface);border:1px solid var(--border2);
                        color:var(--text2);font-size:.9rem;font-weight:500;
                        transition:all .22s var(--ease-out);
                    }
                    .btn-outline:hover{background:var(--surface2);border-color:var(--border3);color:var(--text)}
                    .btn-outline:disabled{opacity:.4;cursor:not-allowed}

                    .btn-ghost{
                        display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
                        padding:.7rem 1.6rem;border-radius:var(--radius-sm);
                        background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.22);
                        color:rgba(148,166,255,.9);font-size:.9rem;font-weight:500;
                        transition:all .22s var(--ease-out);
                    }
                    .btn-ghost:hover{background:rgba(88,101,242,.18);border-color:rgba(88,101,242,.38);color:#fff}

                    /* ================================================================
                       NAVBAR
                    ================================================================ */
                    .navbar{
                        position:fixed;top:42px;left:50%;transform:translateX(-50%);
                        width:calc(100% - 2.5rem);max-width:1180px;
                        z-index:1000;
                        background:rgba(2,2,4,.5);
                        backdrop-filter:blur(32px) saturate(180%);
                        -webkit-backdrop-filter:blur(32px) saturate(180%);
                        border:1px solid rgba(255,255,255,.08);
                        border-radius:var(--radius-xl);
                        transition:all .3s var(--ease-out);
                    }
                    .navbar.scrolled{
                        background:rgba(2,2,4,.85);
                        border-color:rgba(255,255,255,.12);
                        box-shadow:0 12px 50px rgba(0,0,0,.6),0 0 0 1px rgba(220,38,38,.05),var(--glow-red);
                    }
                    .nav-inner{
                        display:flex;align-items:center;gap:.75rem;
                        padding:.6rem 1.1rem;
                    }
                    .nav-logo{
                        display:flex;align-items:center;margin-right:.5rem;flex-shrink:0;
                        transition:opacity .2s;
                    }
                    .nav-logo:hover{opacity:.8}
                    .nav-logo-img{height:32px;width:auto;object-fit:contain}
                    .nav-logo-text{
                        font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:900;
                        background:linear-gradient(135deg,#fff 25%,var(--red2) 100%);
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .nav-links{display:flex;align-items:center;gap:.2rem;flex:1}
                    .nav-link{
                        padding:.4rem .85rem;border-radius:var(--radius-sm);
                        font-size:.86rem;font-weight:500;color:var(--text2);
                        transition:all .2s;position:relative;
                    }
                    .nav-link:hover{color:var(--text)}
                    .nav-link.active{color:var(--text)}
                    .nav-link.active::after{
                        content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
                        width:20px;height:2px;border-radius:99px;
                        background:linear-gradient(90deg,var(--red),var(--red2));
                    }
                    .nav-actions{display:flex;align-items:center;gap:.4rem;margin-left:auto}
                    .nav-panel-btn{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.4rem .9rem;border-radius:var(--radius-sm);
                        font-size:.84rem;font-weight:500;color:var(--text2);
                        background:var(--red-soft);border:1px solid rgba(220,38,38,.2);
                        transition:all .2s;
                    }
                    .nav-panel-btn:hover,.nav-panel-btn.active{
                        background:rgba(220,38,38,.16);color:var(--text);border-color:rgba(220,38,38,.38);
                        box-shadow:0 0 20px rgba(220,38,38,.12);
                    }
                    .nav-discord{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.4rem .9rem;border-radius:var(--radius-sm);
                        font-size:.84rem;font-weight:500;color:rgba(148,166,255,.85);
                        background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.22);
                        transition:all .2s;
                    }
                    .nav-discord:hover{background:rgba(88,101,242,.2);color:#fff;border-color:rgba(88,101,242,.4)}
                    .nav-cart{
                        position:relative;display:flex;align-items:center;justify-content:center;
                        width:38px;height:38px;border-radius:var(--radius-sm);
                        background:var(--surface);border:1px solid var(--border);
                        color:var(--text2);transition:all .2s;
                    }
                    .nav-cart:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
                    .cart-badge{
                        position:absolute;top:-5px;right:-5px;
                        min-width:18px;height:18px;padding:0 4px;
                        background:var(--red);border-radius:99px;
                        font-size:.66rem;font-weight:700;
                        display:flex;align-items:center;justify-content:center;
                        color:#fff;border:2px solid var(--bg);
                        animation:badgePop .28s var(--ease-spring) both;
                    }
                    @keyframes badgePop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
                    .nav-burger{
                        display:none;width:38px;height:38px;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);border:1px solid var(--border);
                        background:var(--surface);color:var(--text2);
                    }

                    /* ================================================================
                       HERO
                    ================================================================ */
                    .hero{
                        position:relative;min-height:100vh;
                        display:flex;flex-direction:column;align-items:center;justify-content:center;
                        overflow:hidden;padding:140px 1.5rem 5rem;
                    }
                    .hero-canvas{
                        position:absolute;inset:0;width:100%;height:100%;
                        pointer-events:none;z-index:0;opacity:.7;
                    }
                    .hero-grid{
                        position:absolute;inset:0;pointer-events:none;z-index:0;
                        background-image:
                            linear-gradient(rgba(220,38,38,.05) 1px,transparent 1px),
                            linear-gradient(90deg,rgba(220,38,38,.05) 1px,transparent 1px);
                        background-size:90px 90px;
                        mask-image:radial-gradient(ellipse 85% 75% at 50% 50%,black,transparent);
                    }
                    .hero-orb{
                        position:absolute;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);
                    }
                    .hero-orb-1{
                        width:700px;height:700px;top:-15%;left:-18%;
                        background:radial-gradient(circle,rgba(220,38,38,.2) 0%,transparent 70%);
                        animation:blobDrift 18s var(--ease-out) infinite;
                    }
                    .hero-orb-2{
                        width:550px;height:550px;bottom:-5%;right:-12%;
                        background:radial-gradient(circle,rgba(180,25,25,.16) 0%,transparent 70%);
                        animation:blobDrift 22s var(--ease-out) infinite reverse;
                    }
                    .hero-inner{
                        position:relative;z-index:1;
                        max-width:860px;width:100%;
                        display:flex;flex-direction:column;align-items:center;text-align:center;gap:2rem;
                    }
                    .hero-eyebrow{
                        display:inline-flex;align-items:center;gap:.55rem;
                        padding:.45rem 1.2rem;border-radius:99px;
                        background:rgba(220,38,38,.09);border:1px solid rgba(220,38,38,.22);
                        font-size:.78rem;font-weight:500;color:rgba(255,255,255,.65);
                        letter-spacing:.06em;text-transform:uppercase;
                        animation:fadeInDown .7s var(--ease-out) both;
                    }
                    .eyebrow-dot{
                        width:7px;height:7px;border-radius:50%;background:var(--red2);
                        box-shadow:0 0 10px var(--red2);
                        animation:pulse 2.2s ease-in-out infinite;
                    }
                    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
                    .hero-h1{
                        display:flex;flex-direction:column;align-items:center;gap:.2rem;
                        animation:fadeInUp .85s .15s var(--ease-out) both;
                    }
                    .hero-brand{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(5rem,20vw,11rem);
                        font-weight:900;letter-spacing:-.04em;line-height:.9;
                        background:linear-gradient(165deg,#fff 20%,rgba(255,255,255,.85) 45%,var(--red2) 75%,var(--red3) 100%);
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        filter:drop-shadow(0 0 60px rgba(220,38,38,.25));
                    }
                    .hero-sub{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(1.4rem,4vw,2.4rem);
                        font-weight:700;letter-spacing:-.02em;
                        color:rgba(255,255,255,.55);line-height:1.2;
                    }
                    .hero-sub em{
                        font-style:normal;color:rgba(255,255,255,.85);
                    }
                    @keyframes fadeInDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
                    @keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
                    .hero-desc{
                        font-size:clamp(.95rem,2vw,1.1rem);color:var(--text2);
                        line-height:1.75;max-width:560px;
                        animation:fadeInUp .85s .3s var(--ease-out) both;
                    }
                    .hero-actions{
                        display:flex;align-items:center;gap:1rem;flex-wrap:wrap;justify-content:center;
                        animation:fadeInUp .85s .45s var(--ease-out) both;
                    }
                    .hero-stats{
                        display:flex;align-items:center;gap:0;
                        border:1px solid var(--border);border-radius:var(--radius-xl);
                        background:rgba(255,255,255,.025);backdrop-filter:blur(20px);
                        overflow:hidden;
                        animation:fadeInUp .85s .6s var(--ease-out) both;
                    }
                    .hero-stat-item{
                        display:flex;flex-direction:column;align-items:center;gap:.2rem;
                        padding:.85rem 1.8rem;position:relative;
                    }
                    .hero-stat-item:not(:last-child)::after{
                        content:'';position:absolute;right:0;top:20%;bottom:20%;
                        width:1px;background:var(--border);
                    }
                    .hsn{
                        font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:900;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        line-height:1;
                    }
                    .hsl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
                    .hero-scroll-hint{
                        position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
                        display:flex;flex-direction:column;align-items:center;gap:.5rem;
                        opacity:.3;animation:bounce 2.5s ease-in-out infinite;
                    }
                    .scroll-line{width:1.5px;height:40px;background:linear-gradient(to bottom,transparent,var(--red2),transparent)}
                    @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

                    /* ================================================================
                       SECTIONS
                    ================================================================ */
                    .section{padding:5rem 0}
                    .section-head{text-align:center;margin-bottom:3.5rem}
                    .section-label{
                        display:inline-block;
                        font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
                        color:var(--red2);margin-bottom:.7rem;
                    }
                    .section-title{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(1.8rem,4vw,2.8rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1.1;
                        margin-bottom:.6rem;
                    }
                    .section-title em{
                        font-style:normal;
                        background:linear-gradient(135deg,var(--red2),var(--red3));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .section-sub{font-size:.95rem;color:var(--text2);line-height:1.65;max-width:520px;margin:0 auto}

                    /* ================================================================
                       FEATURES GRID
                    ================================================================ */
                    .features-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem}
                    .feat-card{
                        padding:1.8rem 1.5rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        position:relative;overflow:hidden;
                        transition:all .28s var(--ease-out);
                    }
                    .feat-card::before{
                        content:'';position:absolute;inset:0;
                        background:linear-gradient(135deg,rgba(220,38,38,.06) 0%,transparent 55%);
                        opacity:0;transition:opacity .3s;
                    }
                    .feat-card:hover{border-color:rgba(220,38,38,.28);transform:translateY(-4px);box-shadow:var(--shadow-red)}
                    .feat-card:hover::before{opacity:1}
                    .feat-icon{
                        width:48px;height:48px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);margin-bottom:1.2rem;
                        transition:box-shadow .3s;
                    }
                    .feat-card:hover .feat-icon{box-shadow:0 0 20px rgba(220,38,38,.25)}
                    .feat-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:.5rem}
                    .feat-desc{font-size:.86rem;color:var(--text2);line-height:1.65}

                    /* ================================================================
                       HOW IT WORKS
                    ================================================================ */
                    .hiw-section{
                        background:linear-gradient(180deg,transparent,rgba(220,38,38,.025),transparent);
                    }
                    .hiw-grid{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;position:relative;
                    }
                    .hiw-card{
                        position:relative;padding:2.2rem 1.8rem;
                        border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        transition:all .3s var(--ease-out);overflow:hidden;
                    }
                    .hiw-card::before{
                        content:'';position:absolute;inset:0;border-radius:inherit;
                        background:linear-gradient(145deg,rgba(220,38,38,.07) 0%,transparent 55%);
                        opacity:0;transition:opacity .3s;
                    }
                    .hiw-card:hover{border-color:rgba(220,38,38,.3);transform:translateY(-5px);box-shadow:var(--shadow-red)}
                    .hiw-card:hover::before{opacity:1}
                    .hiw-number{
                        font-family:'Syne',sans-serif;font-size:5rem;font-weight:900;
                        color:rgba(220,38,38,.07);line-height:1;
                        position:absolute;top:.6rem;right:1.2rem;
                        pointer-events:none;user-select:none;
                        transition:color .3s;
                    }
                    .hiw-card:hover .hiw-number{color:rgba(220,38,38,.12)}
                    .hiw-icon-wrap{
                        width:56px;height:56px;border-radius:var(--radius);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);margin-bottom:1.4rem;
                        transition:all .3s;
                    }
                    .hiw-card:hover .hiw-icon-wrap{background:rgba(220,38,38,.18);box-shadow:0 0 24px rgba(220,38,38,.2)}
                    .hiw-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:.65rem}
                    .hiw-desc{font-size:.88rem;color:var(--text2);line-height:1.7}
                    .hiw-arrow{
                        position:absolute;top:50%;right:-1.5rem;transform:translateY(-50%);
                        font-size:1.4rem;color:rgba(220,38,38,.35);z-index:2;pointer-events:none;
                    }

                    /* ================================================================
                       TESTIMONIALS
                    ================================================================ */
                    .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
                    .testi-card{
                        padding:1.8rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:1rem;
                        transition:all .28s var(--ease-out);
                        position:relative;overflow:hidden;
                    }
                    .testi-card::before{
                        content:'"';position:absolute;top:.5rem;right:1.2rem;
                        font-family:'Syne',sans-serif;font-size:4rem;font-weight:900;
                        color:rgba(220,38,38,.06);line-height:1;pointer-events:none;
                    }
                    .testi-card:hover{border-color:rgba(220,38,38,.2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
                    .testi-stars{display:flex;gap:.2rem;color:var(--gold)}
                    .testi-text{font-size:.92rem;color:var(--text2);line-height:1.7;font-style:italic;flex:1}
                    .testi-author{display:flex;align-items:center;gap:.9rem;margin-top:auto;padding-top:.8rem;border-top:1px solid var(--border)}
                    .testi-avatar{
                        width:38px;height:38px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;flex-shrink:0;
                        font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;
                        background:linear-gradient(135deg,rgba(220,38,38,.3),rgba(185,28,28,.5));
                        border:1px solid rgba(220,38,38,.3);color:#fff;
                    }
                    .testi-name{font-weight:700;font-size:.88rem}
                    .testi-role{font-size:.76rem;color:var(--muted)}

                    /* ================================================================
                       CTA BAND
                    ================================================================ */
                    .cta-band{
                        margin:2rem 0;padding:4rem 0;
                        background:linear-gradient(145deg,rgba(220,38,38,.1) 0%,rgba(185,28,28,.06) 100%);
                        border-top:1px solid rgba(220,38,38,.14);border-bottom:1px solid rgba(220,38,38,.14);
                        position:relative;overflow:hidden;
                    }
                    .cta-band::before{
                        content:'';position:absolute;inset:0;
                        background:radial-gradient(ellipse 60% 100% at 50% 50%,rgba(220,38,38,.05),transparent);
                    }
                    .cta-band-inner{
                        position:relative;z-index:1;
                        display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;
                    }
                    .cta-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.5rem,3.5vw,2.2rem);
                        font-weight:900;letter-spacing:-.03em;margin-bottom:.4rem;
                    }
                    .cta-sub{font-size:.95rem;color:var(--text2)}

                    /* ================================================================
                       FAQ
                    ================================================================ */
                    .faq-section{padding-bottom:6rem}
                    .faq-list{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:.6rem}
                    .faq-item{
                        border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        overflow:hidden;transition:border-color .25s;
                    }
                    .faq-item.open{border-color:rgba(220,38,38,.28)}
                    .faq-q{
                        width:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem;
                        padding:1.15rem 1.4rem;text-align:left;
                        font-size:.93rem;font-weight:600;color:var(--text);transition:background .2s;
                    }
                    .faq-q:hover{background:rgba(255,255,255,.025)}
                    .faq-item.open .faq-q{color:var(--red2)}
                    .faq-a-wrap{overflow:hidden;transition:max-height .4s var(--ease-out)}
                    .faq-a{
                        padding:.15rem 1.4rem 1.3rem;
                        font-size:.88rem;color:var(--text2);line-height:1.75;
                        border-top:1px solid rgba(255,255,255,.05);
                    }

                    /* ================================================================
                       PRODUCT GRID & CARDS
                    ================================================================ */
                    .products-hero{
                        padding:140px 0 2.5rem;position:relative;overflow:hidden;
                        background:linear-gradient(180deg,rgba(220,38,38,.04) 0%,transparent 100%);
                    }
                    .ph-glow{
                        position:absolute;bottom:0;left:50%;transform:translateX(-50%);
                        width:600px;height:2px;
                        background:linear-gradient(90deg,transparent,rgba(220,38,38,.4),transparent);
                    }
                    .ph-inner{display:flex;flex-direction:column;gap:.7rem}
                    .ph-title{
                        font-family:'Syne',sans-serif;
                        font-size:clamp(2rem,5vw,3.2rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1;
                    }
                    .ph-title em{
                        font-style:normal;
                        background:linear-gradient(135deg,var(--red2),var(--red3));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .ph-desc{font-size:.95rem;color:var(--text2);max-width:500px}
                    .ph-stats{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
                    .ph-stat{font-size:.82rem;color:var(--text2);display:flex;align-items:center;gap:.4rem}
                    .ph-stat.in{color:rgba(134,239,172,.85)}
                    .ph-stat.out{color:rgba(252,165,165,.75)}
                    .ph-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
                    .ph-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
                    .ph-dot.in{background:var(--green)}
                    .ph-dot.out{background:var(--red2)}
                    .ph-stat strong{font-weight:700;color:var(--text)}

                    /* Sticky filter */
                    .filter-bar{
                        position:sticky;top:86px;z-index:100;
                        padding:.85rem 0;
                        background:rgba(2,2,4,.7);backdrop-filter:blur(20px);
                        border-bottom:1px solid var(--border);
                    }
                    .filter-inner{overflow-x:auto;padding-bottom:2px}
                    .filter-inner::-webkit-scrollbar{height:0}
                    .cat-filter{display:flex;gap:.4rem;width:max-content;min-width:100%}
                    .cat-btn{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.42rem .95rem;border-radius:99px;
                        font-size:.82rem;font-weight:500;white-space:nowrap;
                        background:var(--surface);border:1px solid var(--border);color:var(--text2);
                        transition:all .2s;
                    }
                    .cat-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
                    .cat-btn.active{
                        background:rgba(220,38,38,.14);border-color:rgba(220,38,38,.38);
                        color:#fff;box-shadow:0 0 20px rgba(220,38,38,.14);
                    }
                    .cat-icon{font-size:.82rem;line-height:1}
                    .cat-count{
                        font-size:.68rem;font-weight:700;
                        padding:.1rem .4rem;border-radius:99px;
                        background:rgba(255,255,255,.07);color:var(--muted);
                    }
                    .cat-btn.active .cat-count{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}

                    /* Product grid */
                    .products-grid-wrap{padding:2rem 0 5rem}
                    .product-grid{
                        display:grid;
                        grid-template-columns:repeat(auto-fill,minmax(225px,1fr));
                        gap:1.2rem;
                    }
                    @keyframes cardReveal{
                        from{opacity:0;transform:translateY(24px) scale(.96)}
                        to{opacity:1;transform:none}
                    }
                    @keyframes cardRevealFast{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}

                    .pcard{
                        display:flex;flex-direction:column;
                        border-radius:var(--radius-lg);overflow:hidden;
                        background:var(--surface);border:1px solid var(--border);
                        cursor:pointer;position:relative;
                        transition:transform .3s var(--ease-out),box-shadow .3s,border-color .3s;
                        will-change:transform;
                        animation:cardReveal .5s var(--ease-out) both;
                    }
                    .product-grid.transitioning .pcard{animation:cardRevealFast .25s var(--ease-out) both}
                    .pcard:hover{
                        transform:translateY(-7px) scale(1.012);
                        border-color:rgba(220,38,38,.35);
                        box-shadow:0 24px 70px rgba(0,0,0,.55),0 0 0 1px rgba(220,38,38,.12),0 0 60px rgba(220,38,38,.08);
                    }
                    .pcard-out{opacity:.55}
                    .pcard-popular{
                        position:absolute;top:.75rem;left:.75rem;z-index:2;
                        display:flex;align-items:center;gap:.28rem;padding:.28rem .65rem;border-radius:99px;
                        font-size:.67rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
                        background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
                        box-shadow:0 2px 14px rgba(245,158,11,.45);
                    }
                    .pcard-out-overlay{
                        position:absolute;inset:0;z-index:3;
                        background:rgba(2,2,4,.6);backdrop-filter:blur(4px);
                        display:flex;align-items:center;justify-content:center;
                        font-family:'Syne',sans-serif;font-size:.85rem;font-weight:800;
                        color:rgba(252,165,165,.8);letter-spacing:.14em;text-transform:uppercase;
                        border-radius:var(--radius-lg);
                    }
                    .pcard-img-wrap{height:175px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.018)}
                    .prod-img{
                        width:100%;height:100%;position:relative;
                        background:rgba(255,255,255,.035);display:flex;align-items:center;justify-content:center;
                    }
                    .prod-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease-out)}
                    .pcard:hover .prod-img img{transform:scale(1.1)}
                    .prod-img.no-img img{display:none}
                    .prod-img-fallback{
                        position:absolute;font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:900;
                        color:rgba(255,255,255,.1);letter-spacing:.04em;pointer-events:none;user-select:none;
                    }
                    .prod-img:not(.no-img) .prod-img-fallback{display:none}
                    .prod-img.large{height:340px}
                    .prod-img.compact{width:74px;height:74px;flex-shrink:0;border-radius:var(--radius)}
                    .prod-img.compact img{border-radius:var(--radius)}

                    .pcard-body{padding:1rem 1.1rem 1.1rem;display:flex;flex-direction:column;flex:1;gap:.5rem}
                    .pcard-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
                    .pcard-cat{font-size:.88rem;color:var(--muted)}
                    .stock-pill{
                        display:inline-flex;align-items:center;gap:.38rem;
                        font-size:.7rem;font-weight:600;letter-spacing:.03em;padding:.2rem .58rem;border-radius:99px;
                    }
                    .stock-pill.in{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.2);color:rgba(134,239,172,.9)}
                    .stock-pill.out{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.17);color:rgba(252,165,165,.85)}
                    .stock-dot-pulse{width:5px;height:5px;border-radius:50%;background:currentColor}
                    .stock-pill.in .stock-dot-pulse{animation:stockPulse 2.2s ease-in-out infinite}
                    @keyframes stockPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}60%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
                    .pcard-name{
                        font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;line-height:1.3;color:var(--text);
                        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
                    }
                    .pcard-desc{
                        font-size:.79rem;color:var(--text2);line-height:1.55;
                        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;
                    }
                    .pcard-footer{
                        display:flex;align-items:center;justify-content:space-between;
                        margin-top:auto;padding-top:.55rem;border-top:1px solid var(--border);
                    }
                    .pcard-price{
                        font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:900;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .pcard-btn{
                        width:34px;height:34px;border-radius:var(--radius-sm);
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                        color:var(--red2);transition:all .2s;
                    }
                    .pcard-btn:hover:not(:disabled){
                        background:var(--red);border-color:var(--red);color:#fff;
                        box-shadow:0 4px 20px rgba(220,38,38,.45);transform:scale(1.12);
                    }
                    .pcard-btn:disabled{opacity:.28;cursor:not-allowed}

                    /* ================================================================
                       PAGE LAYOUT
                    ================================================================ */
                    .page-wrap{padding:140px 0 6rem;min-height:100vh}
                    .page-header{text-align:center;margin-bottom:3rem}
                    .page-title{
                        font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3rem);
                        font-weight:900;letter-spacing:-.04em;margin-bottom:.5rem;
                    }
                    .page-sub{font-size:1rem;color:var(--text2)}
                    .back-btn{
                        display:inline-flex;align-items:center;gap:.45rem;margin-bottom:2.5rem;
                        font-size:.84rem;font-weight:500;color:var(--text2);
                        padding:.38rem .85rem;border-radius:var(--radius-sm);
                        border:1px solid var(--border);background:var(--surface);transition:all .2s;
                    }
                    .back-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
                    .empty-state{
                        text-align:center;padding:5rem 2rem;color:var(--muted);
                        display:flex;flex-direction:column;align-items:center;gap:1.2rem;
                    }
                    .empty-icon-big{font-size:3rem;opacity:.25}

                    /* ================================================================
                       PRODUCT DETAIL
                    ================================================================ */
                    .detail-layout{
                        display:grid;grid-template-columns:1fr 1.15fr;gap:4rem;align-items:start;
                        margin-bottom:3rem;
                    }
                    .detail-img-col{display:flex;flex-direction:column;gap:1.2rem;position:sticky;top:110px}
                    .detail-img-wrap{
                        border-radius:var(--radius-xl);overflow:hidden;position:relative;
                        border:1px solid var(--border);
                    }
                    .detail-popular-badge{
                        position:absolute;top:1rem;left:1rem;
                        display:flex;align-items:center;gap:.35rem;padding:.3rem .8rem;border-radius:99px;
                        font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
                        background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
                        box-shadow:0 2px 14px rgba(245,158,11,.4);
                    }
                    .detail-meta-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
                    .detail-meta-card{
                        display:flex;align-items:center;gap:.7rem;
                        padding:.8rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .dmc-icon{
                        width:32px;height:32px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);background:rgba(220,38,38,.1);color:var(--red2);
                    }
                    .dmc-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
                    .dmc-val{font-size:.82rem;font-weight:600;color:var(--text)}

                    .detail-info-col{display:flex;flex-direction:column;gap:1.5rem}
                    .detail-header{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
                    .detail-category{
                        font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
                        color:var(--red2);padding:.22rem .7rem;border-radius:99px;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);
                    }
                    .detail-title{
                        font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);
                        font-weight:900;letter-spacing:-.04em;line-height:1.1;
                    }
                    .detail-desc{font-size:.95rem;color:var(--text2);line-height:1.7}
                    .detail-features{
                        padding:1.4rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .detail-features-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;margin-bottom:.9rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
                    .detail-features-list{list-style:none;display:flex;flex-direction:column;gap:.55rem}
                    .detail-feat-item{display:flex;align-items:center;gap:.7rem;font-size:.9rem}
                    .feat-check{
                        width:22px;height:22px;border-radius:50%;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22);color:rgb(74,222,128);
                    }
                    .detail-variants{display:flex;flex-direction:column;gap:.7rem}
                    .variant-list{display:flex;flex-direction:column;gap:.5rem}
                    .variant-opt{
                        display:flex;align-items:center;justify-content:space-between;
                        padding:.75rem 1rem;border-radius:var(--radius);cursor:pointer;
                        background:var(--surface);border:1px solid var(--border);
                        transition:all .2s;
                    }
                    .variant-opt:hover{border-color:var(--border2);background:var(--surface2)}
                    .variant-opt.active{border-color:rgba(220,38,38,.4);background:rgba(220,38,38,.07)}
                    .variant-label{font-size:.9rem;font-weight:500}
                    .variant-price{font-family:'Syne',sans-serif;font-weight:800;color:var(--red2)}
                    .detail-buy{
                        display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
                        padding:1.4rem;border-radius:var(--radius-lg);
                        background:rgba(220,38,38,.05);border:1px solid rgba(220,38,38,.15);
                    }
                    .detail-price-wrap{display:flex;flex-direction:column;gap:.15rem}
                    .detail-price-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
                    .detail-price{
                        font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:900;letter-spacing:-.04em;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        line-height:1;
                    }
                    .detail-extra-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
                    .detail-extra-card{
                        padding:1.4rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .detail-extra-card:hover{border-color:rgba(220,38,38,.2)}
                    .detail-extra-card h3{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;margin-bottom:.55rem}
                    .detail-extra-card p{font-size:.85rem;color:var(--text2);line-height:1.65}

                    /* ================================================================
                       CART
                    ================================================================ */
                    .cart-layout{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
                    .cart-items-col{display:flex;flex-direction:column;gap:.75rem}
                    .cart-item{
                        display:grid;grid-template-columns:74px 1fr auto auto auto;
                        gap:1rem;align-items:center;
                        padding:1.1rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        transition:border-color .2s;
                    }
                    .cart-item:hover{border-color:rgba(220,38,38,.18)}
                    .ci-info{display:flex;flex-direction:column;gap:.22rem}
                    .ci-name{font-weight:600;font-size:.9rem;line-height:1.3}
                    .ci-variant{font-size:.78rem;color:var(--text2)}
                    .ci-unit{font-size:.8rem;color:var(--muted)}
                    .ci-qty{
                        display:flex;align-items:center;gap:.4rem;
                        background:var(--surface);border:1px solid var(--border);
                        border-radius:var(--radius-sm);padding:.2rem;
                    }
                    .ci-qty button{
                        width:28px;height:28px;display:flex;align-items:center;justify-content:center;
                        border-radius:6px;font-size:1.1rem;font-weight:500;color:var(--text2);transition:all .15s;
                    }
                    .ci-qty button:hover{background:var(--surface2);color:var(--text)}
                    .ci-qty span{font-weight:700;min-width:22px;text-align:center;font-size:.9rem}
                    .ci-total{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;min-width:55px;text-align:right}
                    .ci-remove{
                        width:30px;height:30px;display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);color:var(--muted);transition:all .15s;
                    }
                    .ci-remove:hover{background:rgba(239,68,68,.12);color:var(--red2)}
                    .cart-summary-col{position:sticky;top:106px}
                    .cart-summary-card{
                        padding:1.7rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:1rem;
                    }
                    .summary-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
                    .summary-row{display:flex;justify-content:space-between;align-items:center;font-size:.9rem;color:var(--text2)}
                    .free-badge{
                        font-size:.73rem;font-weight:700;padding:.18rem .55rem;border-radius:99px;
                        background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:rgb(74,222,128);
                    }
                    .summary-sep{height:1px;background:var(--border);margin:.15rem 0}
                    .summary-total{font-weight:700;color:var(--text);font-size:1rem}
                    .secure-note{
                        display:flex;align-items:center;gap:.5rem;
                        font-size:.77rem;color:var(--muted);
                        padding:.65rem;border-radius:var(--radius-sm);
                        background:rgba(255,255,255,.025);border:1px solid var(--border);
                    }
                    .empty-cart{
                        text-align:center;padding:5rem 2rem;
                        display:flex;flex-direction:column;align-items:center;gap:1.2rem;
                    }
                    .empty-icon{
                        width:82px;height:82px;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;
                        background:var(--surface);border:1px solid var(--border);color:var(--muted);
                    }
                    .empty-cart h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
                    .empty-cart p{color:var(--muted)}

                    /* ================================================================
                       CHECKOUT
                    ================================================================ */
                    .checkout-layout{display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start}
                    .checkout-form-col{display:flex;flex-direction:column;gap:1.25rem}
                    .checkout-card{
                        padding:1.8rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .checkout-section-title{
                        font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:.3rem;
                    }
                    .checkout-hint{font-size:.84rem;color:var(--muted);margin-bottom:1.2rem;line-height:1.55}
                    .form-group{display:flex;flex-direction:column;gap:.42rem;margin-bottom:1rem}
                    .form-group:last-child{margin-bottom:0}
                    .form-label{font-size:.81rem;font-weight:600;color:var(--text2)}
                    .optional{color:var(--muted);font-weight:400}
                    .form-input{
                        padding:.75rem 1rem;border-radius:var(--radius);
                        background:rgba(255,255,255,.035);border:1px solid var(--border);
                        color:var(--text);font-size:.9rem;outline:none;width:100%;
                        transition:border-color .2s,box-shadow .2s;
                    }
                    .form-input::placeholder{color:var(--muted)}
                    .form-input:focus{border-color:rgba(220,38,38,.48);box-shadow:0 0 0 3px rgba(220,38,38,.07)}
                    .form-input.input-error{border-color:rgba(239,68,68,.5)}
                    .form-error{font-size:.77rem;color:var(--red2)}
                    .payment-method-box{
                        display:flex;align-items:center;gap:1rem;
                        padding:1rem;border-radius:var(--radius);margin-bottom:1.2rem;
                        background:rgba(220,38,38,.055);border:1px solid rgba(220,38,38,.18);
                    }
                    .pmb-icon{
                        width:40px;height:40px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:var(--radius-sm);background:rgba(220,38,38,.14);color:var(--red2);
                    }
                    .pmb-name{font-weight:700;font-size:.92rem}
                    .pmb-desc{font-size:.79rem;color:var(--muted)}
                    .pmb-check{
                        margin-left:auto;width:22px;height:22px;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        border-radius:50%;background:rgba(34,197,94,.14);color:rgb(74,222,128);
                    }
                    .payment-note{
                        display:flex;align-items:center;gap:.45rem;
                        font-size:.79rem;color:var(--muted);margin-top:.8rem;
                    }
                    .checkout-summary-col{position:sticky;top:106px}
                    .checkout-summary-card{
                        padding:1.6rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        display:flex;flex-direction:column;gap:.7rem;
                    }
                    .co-item{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;padding:.32rem 0}
                    .co-name{color:var(--text2)}
                    .co-price{font-weight:700;color:var(--text)}
                    .co-total-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0}
                    .co-total-price{
                        font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:900;
                        background:linear-gradient(135deg,#fff,var(--red2));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .co-note{
                        display:flex;align-items:center;gap:.45rem;font-size:.77rem;color:var(--muted);
                        padding:.6rem;border-radius:var(--radius-sm);
                        background:rgba(255,255,255,.025);border:1px solid var(--border);
                    }

                    /* ================================================================
                       CONFIRMATION
                    ================================================================ */
                    .confirm-box{
                        max-width:700px;margin:0 auto;text-align:center;
                        padding:3rem 2rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .confirm-icon{
                        width:78px;height:78px;border-radius:50%;margin:0 auto 1.5rem;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.28);
                        color:rgb(74,222,128);box-shadow:0 0 40px rgba(34,197,94,.14);
                        animation:confirmPop .55s var(--ease-spring) both;
                    }
                    @keyframes confirmPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
                    .confirm-title{
                        font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;
                        letter-spacing:-.04em;margin-bottom:.8rem;
                    }
                    .confirm-msg{font-size:.93rem;color:var(--text2);line-height:1.75;margin-bottom:1.5rem}
                    .order-id-box{
                        max-width:440px;margin:0 auto 2rem;
                        padding:1.6rem;border-radius:var(--radius-lg);
                        background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.28);text-align:center;
                    }
                    .oid-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem}
                    .oid-value{
                        font-family:'Syne',monospace;font-size:1.9rem;font-weight:900;
                        letter-spacing:.08em;color:var(--red2);user-select:all;margin-bottom:.5rem;
                    }
                    .oid-hint{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:1rem}
                    .btn-copy{
                        padding:.42rem 1.3rem;border-radius:var(--radius-sm);
                        background:rgba(220,38,38,.16);border:1px solid rgba(220,38,38,.28);
                        color:#fff;font-size:.82rem;font-weight:600;transition:all .2s;
                    }
                    .btn-copy:hover{background:rgba(220,38,38,.28);border-color:rgba(220,38,38,.5)}
                    .confirm-steps{
                        display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;
                        margin:2rem 0;text-align:center;
                    }
                    .confirm-step{
                        padding:1.3rem;border-radius:var(--radius-lg);
                        background:rgba(255,255,255,.025);border:1px solid var(--border);
                    }
                    .cs-icon{
                        width:46px;height:46px;border-radius:50%;margin:0 auto .85rem;
                        display:flex;align-items:center;justify-content:center;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:var(--red2);
                    }
                    .cs-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;margin-bottom:.3rem}
                    .cs-desc{font-size:.8rem;color:var(--muted)}
                    .confirm-actions{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}

                    /* ================================================================
                       TOAST
                    ================================================================ */
                    .toast{
                        position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:9999;
                        display:flex;align-items:center;gap:.6rem;
                        padding:.8rem 1.7rem;border-radius:var(--radius);
                        font-weight:600;font-size:.88rem;white-space:nowrap;
                        backdrop-filter:blur(24px);
                        animation:toastIn .38s var(--ease-spring) both;
                        box-shadow:var(--shadow);
                    }
                    .toast.success{background:rgba(20,83,45,.35);border:1px solid rgba(34,197,94,.32);color:rgb(187,247,208)}
                    .toast.error{background:rgba(120,28,28,.35);border:1px solid rgba(239,68,68,.32);color:rgb(254,202,202)}
                    @keyframes toastIn{
                        from{transform:translateX(-50%) translateY(24px);opacity:0}
                        to{transform:translateX(-50%) translateY(0);opacity:1}
                    }

                    /* ================================================================
                       FOOTER
                    ================================================================ */
                    .footer{
                        position:relative;padding:5.5rem 0 2rem;
                        background:linear-gradient(180deg,transparent,rgba(0,0,0,.25));
                        border-top:1px solid var(--border);margin-top:6rem;overflow:hidden;
                    }
                    .footer-glow{
                        position:absolute;top:0;left:10%;right:10%;height:1px;
                        background:linear-gradient(90deg,transparent,rgba(220,38,38,.45),transparent);
                    }
                    .footer-grid{
                        display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem;
                    }
                    .footer-logo{
                        font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:900;
                        background:linear-gradient(135deg,#fff 30%,var(--red2) 100%);
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                        margin-bottom:.8rem;
                    }
                    .footer-tagline{font-size:.88rem;color:var(--text2);line-height:1.65;margin-bottom:1.3rem}
                    .footer-discord{
                        display:inline-flex;align-items:center;gap:.5rem;
                        padding:.52rem 1.1rem;border-radius:var(--radius-sm);
                        font-size:.83rem;font-weight:600;
                        background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.24);
                        color:rgba(148,166,255,.9);transition:all .2s;
                    }
                    .footer-discord:hover{background:rgba(88,101,242,.2);color:#fff;border-color:rgba(88,101,242,.42)}
                    .footer-col-title{
                        font-family:'Syne',sans-serif;font-size:.78rem;font-weight:800;
                        text-transform:uppercase;letter-spacing:.1em;color:var(--text2);
                        margin-bottom:1rem;
                    }
                    .footer-link{
                        display:block;font-size:.86rem;color:var(--muted);
                        margin-bottom:.6rem;cursor:pointer;
                        transition:color .2s;background:none;border:none;text-align:left;
                        padding:0;font-family:inherit;
                    }
                    .footer-link:hover{color:var(--text)}
                    .footer-badges{display:flex;flex-direction:column;gap:.5rem}
                    .footer-badge{
                        display:flex;align-items:center;gap:.55rem;padding:.5rem .8rem;
                        border-radius:var(--radius-sm);font-size:.82rem;font-weight:500;color:var(--text2);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .footer-bottom{
                        display:flex;align-items:center;justify-content:space-between;
                        padding-top:1.8rem;border-top:1px solid var(--border);
                        font-size:.8rem;color:var(--muted);
                    }

                    /* ================================================================
                       CUSTOMER PANEL
                    ================================================================ */
                    @keyframes phFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

                    /* Login screen */
                    .cph-login-wrap{
                        max-width:480px;margin:0 auto;padding:3rem 1rem;
                        display:flex;flex-direction:column;align-items:center;gap:1.3rem;text-align:center;
                        animation:phFadeIn .5s var(--ease-out) both;
                    }
                    .cph-login-icon{
                        width:76px;height:76px;border-radius:50%;
                        background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.22);
                        display:flex;align-items:center;justify-content:center;
                        color:var(--red2);margin-bottom:.3rem;
                        box-shadow:0 0 40px rgba(220,38,38,.1);
                    }
                    .cph-title{
                        font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,2.8rem);
                        font-weight:900;letter-spacing:-.04em;
                    }
                    .cph-title em{
                        font-style:normal;
                        background:linear-gradient(135deg,var(--red2),var(--red3));
                        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                    }
                    .cph-sub{font-size:.95rem;color:var(--text2);line-height:1.65;max-width:400px}
                    .cph-email-form{display:flex;gap:.5rem;width:100%;max-width:420px}
                    .cph-email-input{flex:1;min-width:0}
                    .cph-login-hint{
                        display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;justify-content:center;
                        font-size:.82rem;color:var(--muted);
                        padding:.65rem 1rem;border-radius:var(--radius);
                        background:var(--surface);border:1px solid var(--border);
                    }
                    .cph-login-privacy{
                        font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.38rem;
                    }
                    .cph-inline-link{
                        background:none;border:none;color:var(--red2);cursor:pointer;
                        font-size:inherit;padding:0;font-family:inherit;
                    }
                    .cph-inline-link:hover{text-decoration:underline}

                    /* Results header */
                    .cph-header{
                        display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
                        padding:1.8rem 2rem;border-radius:var(--radius-xl);
                        background:var(--surface);border:1px solid var(--border);
                        margin-bottom:1.5rem;
                        animation:phFadeIn .4s var(--ease-out) both;
                    }
                    .cph-avatar{
                        width:56px;height:56px;border-radius:50%;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        background:linear-gradient(135deg,rgba(220,38,38,.2),rgba(185,28,28,.3));
                        border:1px solid rgba(220,38,38,.3);color:var(--red2);
                        box-shadow:0 0 24px rgba(220,38,38,.12);
                    }
                    .cph-info{flex:1;min-width:0}
                    .cph-greeting{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
                    .cph-email-display{
                        font-family:'Syne',sans-serif;font-size:clamp(1rem,3vw,1.4rem);font-weight:800;
                        color:var(--text);word-break:break-all;margin:.15rem 0;
                    }
                    .cph-pending-badge{
                        display:inline-flex;align-items:center;gap:.4rem;
                        padding:.38rem .9rem;border-radius:var(--radius-sm);
                        font-size:.78rem;font-weight:700;
                        background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
                        color:#f59e0b;text-decoration:none;transition:all .2s;
                    }
                    .cph-pending-badge:hover{background:rgba(245,158,11,.2)}

                    /* Tabs */
                    .cph-tabs{
                        display:flex;gap:.4rem;
                        padding:.4rem;border-radius:var(--radius-lg);
                        background:var(--surface);border:1px solid var(--border);
                        margin-bottom:1.5rem;
                        animation:phFadeIn .45s .05s var(--ease-out) both;
                    }
                    .cph-tab{
                        display:flex;align-items:center;gap:.4rem;
                        padding:.55rem 1rem;border-radius:var(--radius);
                        font-size:.85rem;font-weight:500;color:var(--text2);
                        transition:all .2s;border:1px solid transparent;flex:1;justify-content:center;
                    }
                    .cph-tab:hover{color:var(--text);background:var(--surface2)}
                    .cph-tab.active{
                        background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.25);
                        color:var(--text);box-shadow:0 0 16px rgba(220,38,38,.08);
                    }
                    .cph-tab-count{
                        min-width:19px;height:19px;padding:0 5px;border-radius:99px;
