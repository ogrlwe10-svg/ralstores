<script>
    // Custom cursor
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{
        mx=e.clientX;my=e.clientY;
        dot.style.left=mx+'px';dot.style.top=my+'px';
    });
    function animRing(){
        rx+=(mx-rx)*.14;ry+=(my-ry)*.14;
        ring.style.left=rx+'px';ring.style.top=ry+'px';
        requestAnimationFrame(animRing);
    }
    animRing();

    // Loader removal
    window.addEventListener('load',()=>{
        setTimeout(()=>{
            document.getElementById('ral-loader').classList.add('hidden');
        },1500);
    });

    // Ticker
    const tickerItems = [
        '36+ Produits Premium','Livraison via Discord','Paiement PayPal Sécurisé',
        'Support 24/7','Accès Instantanés','Netflix · Spotify · VPN · Gaming · IA',
        'Satisfaction Garantie','Commandez en 2 minutes','Nouveau — Catégorie Gaming',
    ];
    const track = document.getElementById('ticker-track');
    if(track){
        const doubled = [...tickerItems,...tickerItems];
        doubled.forEach(item=>{
            const span=document.createElement('span');
            span.className='ticker-item';
            span.innerHTML=`<span class="ticker-dot"></span>${item}`;
            track.appendChild(span);
        });
    }

    // Card 3D tilt — throttled to avoid re-render interference
    (function(){
        let tiltRaf = null;
        document.addEventListener('mousemove', e=>{
            if(tiltRaf) return;
            tiltRaf = requestAnimationFrame(()=>{
                tiltRaf = null;
                document.querySelectorAll('.pcard').forEach(card=>{
                    const rect=card.getBoundingClientRect();
                    const x=e.clientX-rect.left, y=e.clientY-rect.top;
                    if(x>=0&&x<=rect.width&&y>=0&&y<=rect.height){
                        const cx=rect.width/2, cy=rect.height/2;
                        const rx_=((y-cy)/cy)*5;
                        const ry_=-((x-cx)/cx)*5;
                        card.style.transform=`translateY(-7px) scale(1.012) perspective(700px) rotateX(${rx_}deg) rotateY(${ry_}deg)`;
                    } else {
                        if(card.style.transform) card.style.transform='';
                    }
                });
            });
        },{passive:true});
    })();

    // Magnetic buttons
    function initMagnetic(){
        document.querySelectorAll('.btn-primary').forEach(btn=>{
            btn.addEventListener('mousemove',e=>{
                const rect=btn.getBoundingClientRect();
                const x=(e.clientX-rect.left-rect.width/2)*.22;
                const y=(e.clientY-rect.top-rect.height/2)*.22;
                btn.style.transform=`translate(${x}px,${y}px) translateY(-2px)`;
            });
            btn.addEventListener('mouseleave',()=>{ btn.style.transform=''; });
        });
    }
    document.addEventListener('DOMContentLoaded', initMagnetic);
    window.__ralMagneticInit = initMagnetic;

    // Animated counter
    function animateCounter(el, target, duration=1200){
        const start = performance.now();
        const isFloat = String(target).includes('.');
        function step(now){
            const progress = Math.min((now-start)/duration, 1);
            const ease = 1-Math.pow(1-progress, 3);
            const val = target * ease;
            el.textContent = isFloat ? val.toFixed(1) : Math.round(val);
            if(progress<1) requestAnimationFrame(step);
            else el.textContent = target;
        }
        requestAnimationFrame(step);
    }
    window.__animateCounters = function(){
        document.querySelectorAll('[data-counter]').forEach(el=>{
            const target = parseFloat(el.dataset.counter);
            const io = new IntersectionObserver(entries=>{
                if(entries[0].isIntersecting){ animateCounter(el,target); io.disconnect(); }
            });
            io.observe(el);
        });
    };
</script>

    const decodeTokenPayload = (value) => {
        const normalized = String(value || '').replace(/-/g, '+').replace(/_/g, '/');

    // ============================================================================
    // COMPOSANT PRINCIPAL
    // ============================================================================
    function DigitalShop() {
        const [currentPage, setCurrentPageState] = useState('home');
        const pageScrollPositions = useRef({});
        const setCurrentPage = useCallback((nextPageOrUpdater) => {
            setCurrentPageState(prev => {
                const nextPage = typeof nextPageOrUpdater === 'function' ? nextPageOrUpdater(prev) : nextPageOrUpdater;
                if (!nextPage || nextPage === prev) return prev;
                pageScrollPositions.current[prev] = window.scrollY || 0;
                return nextPage;
            });
        }, []);
        const [cart, setCart] = useState([]);
        const [selectedCategory, setSelectedCategory] = useState('all');
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [selectedVariant, setSelectedVariant] = useState(0);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [checkoutEmail, setCheckoutEmail] = useState('');
        const [emailError, setEmailError] = useState('');
        const [checkoutDiscordId, setCheckoutDiscordId] = useState('');
        const [discordIdError, setDiscordIdError] = useState('');
        const [orderConfirmed, setOrderConfirmed] = useState(false);
        const [orderId, setOrderId] = useState('');
        const [toast, setToast] = useState(null);
        const [isScrolled, setIsScrolled] = useState(false);
        const [customerOrderId, setCustomerOrderId] = useState('');
        const canvasRef = useRef(null);
        const toastTimerRef = useRef(null);
        const isScrolledRef = useRef(false);

        // ── OWNER STATE ──
        const [ownerSession, setOwnerSession] = useState(() => {
            try {
                const t = sessionStorage.getItem('ral_owner_token');
                return verifyOwnerToken(t) ? t : null;
            } catch { return null; }
        });
        const [products, setProducts]     = useState(() => {
            try {
                const saved = JSON.parse(localStorage.getItem('ral_products') || 'null');
                return Array.isArray(saved) && saved.length ? saved : PRODUCTS;
            } catch { return PRODUCTS; }
        });
        const ownerData = ownerSession ? verifyOwnerToken(ownerSession) : null;
        const isOwner = !!ownerData;

        const showToast = useCallback((message, type='success') => {
            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
            setToast({message, type});
            toastTimerRef.current = setTimeout(() => {
                setToast(null);
                toastTimerRef.current = null;
            }, 2800);
        }, []);

        useEffect(() => () => {
            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        }, []);

        const ownerLogout = useCallback(() => {
            try { fetch('/api/owner-auth', {method:'DELETE', credentials:'same-origin'}).catch(() => {}); } catch {}
            sessionStorage.removeItem('ral_owner_token');
            setOwnerSession(null);
            setCurrentPage('home');
            showToast('Session owner terminée');
        }, [showToast]);

        useEffect(() => {
            try { localStorage.setItem('ral_products', JSON.stringify(products)); } catch {}
        }, [products]);

        // Page scroll restore
        useEffect(() => {
            const top = pageScrollPositions.current[currentPage] || 0;
            requestAnimationFrame(() => window.scrollTo({top, behavior:'auto'}));
        }, [currentPage]);

        // Scroll navbar
        useEffect(() => {
            let ticking = false;
            const h = () => {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    ticking = false;
                    const next = window.scrollY > 30;
                    if (isScrolledRef.current !== next) {
                        isScrolledRef.current = next;
                        setIsScrolled(next);
                    }
                });
            };
            h();
            window.addEventListener('scroll', h, {passive:true});
            return () => window.removeEventListener('scroll', h);
        }, []);

        // Canvas particles (hero only)
        useEffect(() => {
            if (currentPage !== 'home') return;
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let W = canvas.width = canvas.offsetWidth;
            let H = canvas.height = canvas.offsetHeight;
            const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; };
            window.addEventListener('resize', resize);

            const N = 55;
            const pts = Array.from({length:N}, () => ({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
                r: Math.random()*1.6+.4,
            }));

            let raf;
            const draw = () => {
                ctx.clearRect(0,0,W,H);
                for(let i=0;i<N;i++){
                    pts[i].x += pts[i].vx;
                    pts[i].y += pts[i].vy;
                    if(pts[i].x<0||pts[i].x>W) pts[i].vx*=-1;
                    if(pts[i].y<0||pts[i].y>H) pts[i].vy*=-1;

                    ctx.beginPath();
                    ctx.arc(pts[i].x, pts[i].y, pts[i].r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(220,38,38,.55)';
                    ctx.fill();

                    for(let j=i+1;j<N;j++){
                        const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if(dist < 110){
                            ctx.beginPath();
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.strokeStyle = `rgba(220,38,38,${(.18*(1-dist/110)).toFixed(3)})`;
                            ctx.lineWidth = .7;
                            ctx.stroke();
                        }
                    }
                }
                raf = requestAnimationFrame(draw);
            };
            draw();
            return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
        }, [currentPage]);

        useEffect(() => { setSelectedVariant(0); }, [selectedProduct]);

        const handleCategoryChange = (key) => {
            if(key === selectedCategory) return;
            setSelectedCategory(key);
        };

        // ── CART ──
        const addToCart = useCallback((product) => {
            setCart(prev => {
                const existing = prev.find(i => i.id === product.id);
                return existing
                    ? prev.map(i => i.id===product.id ? {...i, quantity:i.quantity+1} : i)
                    : [...prev, {...product, quantity:1}];
            });
            showToast(`${product.name} ajouté au panier`);
            if(window.gtag) window.gtag('event','add_to_cart',{product_id:product.id,product_name:product.name,product_price:product.price});
        }, [showToast]);
        const removeFromCart = useCallback(id => setCart(prev => prev.filter(i => i.id !== id)), []);
        const updateQuantity = useCallback((id, q) => {
            if(q===0) setCart(prev => prev.filter(i => i.id !== id));
            else setCart(prev => prev.map(i => i.id===id ? {...i, quantity:q} : i));
        }, []);
        const getTotalPrice = () => cart.reduce((t,i) => t + i.price*i.quantity, 0);
        const getTotalItems = () => cart.reduce((t,i) => t + i.quantity, 0);

        const validateEmail = useCallback((email) => {
            const n = String(email||'').trim().toLowerCase();
            const re = /^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i;
            if(!re.test(n)) return false;
            return (n.split('@')[1]||'').split('.').pop().length >= 2;
        }, []);
        const handleCheckoutEmail = useCallback((v) => {
            setCheckoutEmail(v);
            setEmailError(v && !validateEmail(v) ? 'Adresse email invalide' : '');
        }, [validateEmail]);
        const validateDiscordId = useCallback((v) => /^\d{17,20}$/.test(String(v||'').trim()), []);
        const handleCheckoutDiscordId = useCallback((v) => {
            setCheckoutDiscordId(v);
            setDiscordIdError(v && !/^\d{17,20}$/.test(v.trim()) ? 'ID Discord invalide (17-20 chiffres)' : '');
        }, []);

        const generateOrderId = () => {
            let id = 'RAL-';
            for(let i=0;i<8;i++) id += '0123456789ABCDEF'[Math.floor(Math.random()*16)];
            return id;
        };

        const registerOrderWithBot = async (newOrderId, product, total, email, discordId) => {
            // ⚠️ NE JAMAIS exposer d'API secret au frontend!
            // On appelle le backend Vercel qui relaye vers l'API bot avec le secret
            try {
                const response = await fetch('/api/register-order', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    credentials:'same-origin',
                    body: JSON.stringify({orderId:newOrderId,product,total,email,discordId}),
                });
                let json = {};
                try { json = await response.json(); } catch(_) {}
                if(!response.ok) return {ok:false, status:response.status, error:json.error||`Erreur API (${response.status})`};
                return {ok:json.success===true, status:response.status, error:json.error||null};
            } catch(err) {
                return {ok:false, error:'Impossible de contacter le serveur.'};
            }
        };

        const getPayPalMeUrl = () => {
            const link = SITE_CONFIG.paypalMeLink.trim();
            if(!link || link.includes('TON_PSEUDO')) return '';
            return `${link.replace(/\/$/,'/')}${getTotalPrice().toFixed(2)}`;
        };

        const handlePayPalMeCheckout = async (emailOverride, discordOverride) => {
            const email = emailOverride || checkoutEmail;
            const discord = discordOverride !== undefined ? discordOverride : checkoutDiscordId;
            if(!email || !validateEmail(email)) {
                showToast('Adresse email invalide', 'error');
                return;
            }
            const paypalUrl = getPayPalMeUrl();
            if(!paypalUrl) { alert('Ajoute ton lien PayPal.Me dans paypalMeLink.'); return; }

            const productSummary = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
            const total = getTotalPrice().toFixed(2);
            let newOrderId = '', registrationResult = {ok:false, error:'Erreur inconnue'};

            for(let attempt=0;attempt<5;attempt++){
                const candidateId = generateOrderId();
                const result = await registerOrderWithBot(candidateId, productSummary, parseFloat(total), email, discord);
                if(result.ok) { newOrderId = candidateId; registrationResult = result; break; }
                if(result.status !== 409) { registrationResult = result; break; }
                registrationResult = result;
            }

            // Si le bot est indisponible, on génère quand même un ID local et on continue
            if(!newOrderId) {
                newOrderId = generateOrderId();
                showToast('Commande enregistrée localement — paiement en cours...', 'success');
            }
            setOrderId(newOrderId);

            // ── Sauvegarder dans localStorage pour le panel ──
            try {
                const existing = JSON.parse(localStorage.getItem('ral_orders') || '[]');
                const newOrder = {
                    id: newOrderId,
                    date: new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
                    items: cart.map(i => ({name:i.name, price:i.price, quantity:i.quantity, variantLabel:i.variantLabel||null})),
                    total: parseFloat(total),
                    email: email,
                    status: 'pending',
                };
                localStorage.setItem('ral_orders', JSON.stringify([...existing, newOrder]));
            } catch(_) {}

            const a = document.createElement('a');
            a.href = paypalUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);

            setOrderConfirmed(true);
            setCurrentPage('confirmation');
            trackEvent('paypalme_redirect', {value:getTotalPrice(), currency:'EUR', items:cart.map(i=>({item_id:i.id,item_name:i.name,quantity:i.quantity,price:i.price}))});
        };

        const filteredProducts = useMemo(() => selectedCategory === 'all' ? products : products.filter(p => p.category === selectedCategory), [products, selectedCategory]);

        const getInitials = (name) => name.replace(/[+]/g,' ').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();

        // ── PRODUCT IMAGE ──
        const ProductImage = ({product, large=false, compact=false}) => (
            <div className={`prod-img ${large?'large':''} ${compact?'compact':''}`}>

        // ── STOCK BADGE ──
        const StockBadge = ({product}) => (

                <span className="stock-dot-pulse"></span>

            </div>

        const IconChevron = ({size=16,open=false}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                 style={{transform:open?'rotate(180deg)':'none',transition:'transform .3s ease'}}>
                <polyline points="6 9 12 15 18 9"/>

        // ── FAQ SECTION ──
        const FaqSection = () => {
            const [openIdx, setOpenIdx] = useState(null);
            const faqs = [
                {q:'Comment se déroule la livraison ?', a:"Après votre achat, rejoignez notre serveur Discord et ouvrez un ticket. Notre équipe traitera votre commande rapidement et vous remettra votre accès en privé, généralement en moins de quelques minutes."},
                {q:'Quels modes de paiement acceptez-vous ?', a:"Nous acceptons uniquement PayPal via PayPal.Me pour l'instant. C'est rapide, sécurisé et universel. Le paiement s'effectue directement depuis la page de checkout."},

        // ============================================================================
        // OWNER LOGIN PAGE — Authentification sécurisée
        // ============================================================================
        function OwnerLoginPage() {
            const [email,    setEmail]    = useState('');
            const [pwd,      setPwd]      = useState('');
            const [error,    setError]    = useState('');
            const [loading,  setLoading]  = useState(false);
            const [attempts, setAttempts] = useState(0);
            const [locked,   setLocked]   = useState(false);

            // Rate limiting côté client (doublé côté serveur en prod)
            useEffect(() => {
                const a = parseInt(sessionStorage.getItem('ral_owner_attempts') || '0');
                const lockTs = parseInt(sessionStorage.getItem('ral_owner_lock') || '0');
                if (lockTs && Date.now() < lockTs) setLocked(true);
                setAttempts(a);
            }, []);

            const handleSubmit = async () => {
                if (locked) return;
                if (!email.trim()) { setError('Email requis'); return; }

                const newAttempts = attempts + 1;
                setAttempts(newAttempts);
                sessionStorage.setItem('ral_owner_attempts', String(newAttempts));

                if (newAttempts >= OWNER_CONFIG.maxAttempts) {
                    const lockUntil = Date.now() + OWNER_CONFIG.lockoutDuration;
                    sessionStorage.setItem('ral_owner_lock', String(lockUntil));
                    setLocked(true);
                    setError(`Trop de tentatives. Réessayez dans 15 minutes.`);
                    return;
                }

                setLoading(true);
                setError('');

                // Simulate network delay (en prod: vrai appel API)
                await new Promise(r => setTimeout(r, 800));

                const emailLower = email.trim().toLowerCase();
                if (!OWNER_CONFIG.whitelistedEmails.includes(emailLower)) {
                    setLoading(false);
                    setError(`Accès refusé. Email non autorisé. (${OWNER_CONFIG.maxAttempts - newAttempts} tentatives restantes)`);
                    // Log tentative suspecte
                    console.warn('[SECURITY] Tentative accès owner refusée:', emailLower, new Date().toISOString());
                    return;
                }

                // Auth OK — générer token
                const token = generateOwnerToken(emailLower);
                sessionStorage.setItem('ral_owner_token', token);
                sessionStorage.removeItem('ral_owner_attempts');
                sessionStorage.removeItem('ral_owner_lock');
                setOwnerSession(token);
                setLoading(false);
                setCurrentPage('owner-panel');
                showToast('Bienvenue, Owner !', 'success');
                console.info('[SECURITY] Connexion owner réussie:', emailLower, new Date().toISOString());
            };

            const remaining = Math.max(0, OWNER_CONFIG.maxAttempts - attempts);

            return (
                <div className="page-wrap">
                    <div className="container">
                        <div className="owner-login-wrap">
                            <div className="owner-login-card">
                                <div className="owner-login-icon">
                                    <IconShield size={32}/>
                                </div>
                                <h1 className="owner-login-title">Owner Panel</h1>
                                <p className="owner-login-sub">Accès réservé aux fondateurs RΔL.<br/>Vérification d'identité requise.</p>

                                {locked ? (
                                    <div className="owner-error-box">
                                        <IconShield size={16}/>
                                        Accès temporairement bloqué. Trop de tentatives.
                                    </div>
                                ) : (
                                    <>
                                        <div className="form-group" style={{width:'100%'}}>
                                            <label className="form-label">Email Owner</label>
                                            <input
                                                type="text"
                                                inputMode="email"
                                                autoComplete="off"
                                                placeholder="owner@ralstore.fr"
                                                value={email}
                                                onChange={e => { setEmail(e.target.value); setError(''); }}
                                                onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                                                className={`form-input ${error ? 'input-error' : ''}`}
                                                disabled={loading}
                                            />
                                        </div>
                                        {error && (
                                            <div className="owner-error-box">
                                                <IconX size={14}/>
                                                {error}
                                            </div>
                                        )}
                                        {attempts > 0 && !error && (
                                            <p style={{fontSize:'.75rem',color:'var(--muted)'}}>
                                                {remaining} tentative{remaining !== 1 ? 's' : ''} restante{remaining !== 1 ? 's' : ''}
                                            </p>
                                        )}
                                        <button
                                            className="btn-primary btn-full"
                                            onClick={handleSubmit}
                                            disabled={loading || !email.trim()}
                                            style={{marginTop:'.5rem'}}
                                        >
                                            {loading ? <span className="cph-spinner"/> : <><IconShield size={15}/> Vérifier l'accès</>}
                                        </button>
                                    </>
                                )}

                                <div className="owner-login-footer">
                                    <IconLock size={12}/>
                                    Accès protégé · Logs activés · Anti brute-force
                                </div>

                                <button
                                    className="btn-outline"
                                    style={{marginTop:'1rem',fontSize:'.82rem'}}
                                    onClick={() => setCurrentPage('home')}

                                    ← Retour au site

                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // OWNER PANEL PAGE — Dashboard complet
        // ============================================================================
        function OwnerPanelPage() {
            const [activeTab,    setActiveTab]    = useState('dashboard');
            const [editProduct,  setEditProduct]  = useState(null);
            const [orders,       setOrders]       = useState([]);
            const [logs,         setLogs]         = useState([]);
            const [siteTheme,    setSiteTheme]    = useState({ primaryColor: '#dc2626', accentColor: '#ef4444' });
            const [bannerText,   setBannerText]   = useState('36+ Produits Premium · Livraison via Discord · Paiement PayPal Sécurisé');
            const [savingTheme,  setSavingTheme]  = useState(false);
            const [newProduct,   setNewProduct]   = useState({
                name:'', category:'streaming', price:'', description:'', stock:'', imageUrl:'', features:'', popular:false, inStock:true
            });
            const [showAddForm,  setShowAddForm]  = useState(false);

            useEffect(() => {
                // Charger commandes depuis localStorage
                try {
                    const raw = JSON.parse(localStorage.getItem('ral_orders') || '[]');
                    setOrders(raw.slice().reverse());
                } catch {}
                // Log d'accès
                const newLog = { time: new Date().toLocaleString('fr-FR'), email: ownerData?.email, action: 'Accès Owner Panel', ip: 'client' };
                setLogs(prev => [newLog, ...prev.slice(0, 49)]);
            }, []);

            const saveTheme = () => {
                setSavingTheme(true);
                document.documentElement.style.setProperty('--red', siteTheme.primaryColor);
                document.documentElement.style.setProperty('--red2', siteTheme.accentColor);
                setTimeout(() => { setSavingTheme(false); showToast('Thème appliqué !'); }, 600);
            };

            const deleteProduct = (id) => {
                if (!confirm('Supprimer ce produit ?')) return;
                setProducts(prev => prev.filter(p => p.id !== id));
                showToast('Produit supprimé');
            };

            const saveProduct = (updated) => {
                setProducts(prev => prev.map(p => p.id === updated.id ? updated : p));
                setEditProduct(null);
                showToast('Produit mis à jour');
            };

            const addProduct = () => {
                if (!newProduct.name || !newProduct.price) { showToast('Nom et prix requis', 'error'); return; }
                const p = {
                    ...newProduct,
                    id: Date.now(),
                    price: parseFloat(newProduct.price) || 0,
                    stock: parseInt(newProduct.stock) || 0,
                    features: newProduct.features.split(',').map(f => f.trim()).filter(Boolean),
                };
                setProducts(prev => [p, ...prev]);
                setNewProduct({ name:'', category:'streaming', price:'', description:'', stock:'', imageUrl:'', features:'', popular:false, inStock:true });
                setShowAddForm(false);
                showToast('Produit ajouté !');
            };

            const updateOrderStatus = (id, status) => {
                const updated = orders.map(o => o.id === id ? {...o, status} : o);
                setOrders(updated);
                try { localStorage.setItem('ral_orders', JSON.stringify([...updated].reverse())); } catch {}
                showToast('Statut mis à jour');
            };

            const totalRevenue = orders.reduce((s, o) => s + (o.total || 0), 0);
            const pendingCount = orders.filter(o => o.status === 'pending' || o.status === 'processing').length;
            const deliveredCount = orders.filter(o => o.status === 'delivered').length;

            const STATUS_OPTS = ['pending', 'processing', 'delivered', 'cancelled'];
            const STATUS_LABELS = { pending: 'En attente', processing: 'En traitement', delivered: 'Livré', cancelled: 'Annulé' };
            const STATUS_COLORS = { pending: '#f59e0b', processing: '#60a5fa', delivered: '#4ade80', cancelled: '#f87171' };

            const TABS = [
                { id:'dashboard', label:'Dashboard',  icon:<IconZap size={15}/> },
                { id:'products',  label:'Produits',   icon:<IconPackage size={15}/> },
                { id:'orders',    label:'Commandes',  icon:<IconHistory size={15}/>, count: pendingCount },
                { id:'design',    label:'Design',     icon:<IconStar size={15}/> },
                { id:'security',  label:'Sécurité',   icon:<IconShield size={15}/> },
            ];

            return (
                <div className="page-wrap">
                    <div className="container">

                        {/* Header */}
                        <div className="owner-header">
                            <div className="owner-header-icon"><IconShield size={26}/></div>
                            <div>
                                <div style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)'}}>Connecté en tant que</div>
                                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'1.1rem'}}>{ownerData?.email}</div>
                                <div style={{fontSize:'.75rem',color:'var(--gold)',display:'flex',alignItems:'center',gap:'.3rem',marginTop:'.1rem'}}>
                                    <IconStar size={11}/> OWNER · Session active
                                </div>
                            </div>
                            <button className="btn-outline" style={{marginLeft:'auto',fontSize:'.8rem'}} onClick={ownerLogout}>
                                <IconX size={14}/> Déconnexion
                            </button>
                        </div>

                        {/* Tabs */}
                        <div className="cph-tabs" style={{marginBottom:'1.5rem'}}>
                            {TABS.map(t => (
                                <button key={t.id} className={`cph-tab ${activeTab===t.id?'active':''}`} onClick={() => setActiveTab(t.id)}>
                                    {t.icon}{t.label}
                                    {t.count > 0 && <span className="cph-tab-count">{t.count}</span>}
                                </button>
                            ))}
                        </div>

                        {/* ── DASHBOARD ── */}
                        {activeTab === 'dashboard' && (
                            <div className="owner-panel">
                                <div className="owner-stats-grid">
                                    {[
                                        { label:'Commandes', value: orders.length, color:'var(--red2)', sub:'Total enregistrées' },
                                        { label:'En attente', value: pendingCount, color:'#f59e0b', sub:'À traiter' },
                                        { label:'Livrées', value: deliveredCount, color:'#4ade80', sub:'Complétées' },
                                        { label:'Revenus', value: totalRevenue.toFixed(2)+'€', color:'var(--gold)', sub:'Total encaissé' },
                                        { label:'Produits', value: products.length, color:'#60a5fa', sub:'Catalogue actif' },
                                        { label:'En stock', value: products.filter(p=>p.inStock).length, color:'#4ade80', sub:'Disponibles' },
                                    ].map((s,i) => (
                                        <div className="owner-stat-card" key={i}>
                                            <div className="owner-stat-value" style={{color:s.color}}>{s.value}</div>
                                            <div className="owner-stat-label">{s.label}</div>
                                            <div className="owner-stat-sub">{s.sub}</div>
                                        </div>
                                    ))}
                                </div>

                                {orders.length > 0 && (
                                    <div className="owner-section">
                                        <h2 className="owner-section-title"><IconHistory size={16}/> Commandes récentes</h2>
                                        {orders.slice(0,5).map((o,i) => (
                                            <div className="owner-order-row" key={i}>
                                                <span className="cph-oc-id-val" style={{fontSize:'.82rem'}}>{o.id}</span>
                                                <span style={{color:'var(--text2)',fontSize:'.82rem',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.email}</span>
                                                <span style={{color:'var(--text2)',fontSize:'.8rem'}}>{(o.total||0).toFixed(2)}€</span>
                                                <span style={{fontSize:'.72rem',fontWeight:700,padding:'.2rem .6rem',borderRadius:'99px',background:`rgba(${s2rgb(STATUS_COLORS[o.status]||'#f59e0b')},.12)`,color:STATUS_COLORS[o.status]||'#f59e0b',border:`1px solid rgba(${s2rgb(STATUS_COLORS[o.status]||'#f59e0b')},.25)`}}>
                                                    {STATUS_LABELS[o.status]||o.status}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── PRODUITS ── */}
                        {activeTab === 'products' && (
                            <div className="owner-panel">
                                <div className="owner-section-header">
                                    <h2 className="owner-section-title"><IconPackage size={16}/> Catalogue ({products.length} produits)</h2>
                                    <button className="btn-primary" onClick={() => setShowAddForm(f => !f)}>
                                        {showAddForm ? <><IconX size={14}/> Annuler</> : <>+ Ajouter un produit</>}
                                    </button>
                                </div>

                                {showAddForm && (
                                    <div className="owner-add-form">
                                        <h3 className="owner-form-title">Nouveau produit</h3>
                                        <div className="owner-form-grid">
                                            {[
                                                ['Nom',        'name',        'text',   'Netflix Lifetime'],
                                                ['Prix (€)',   'price',       'number', '2.50'],
                                                ['Stock',      'stock',       'number', '100'],
                                                ['Image URL',  'imageUrl',    'text',   'https://...'],
                                                ['Description','description', 'text',   'Description courte'],
                                                ['Features',   'features',    'text',   'Feature 1, Feature 2'],
                                            ].map(([label, key, type, placeholder]) => (
                                                <div className="form-group" key={key}>
                                                    <label className="form-label">{label}</label>
                                                    <input type={type} className="form-input" placeholder={placeholder}
                                                        value={newProduct[key]}
                                                        onChange={e => setNewProduct(prev => ({...prev, [key]: e.target.value}))}/>
                                                </div>
                                            ))}
                                            <div className="form-group">
                                                <label className="form-label">Catégorie</label>
                                                <select className="form-input" value={newProduct.category}
                                                    onChange={e => setNewProduct(prev => ({...prev, category: e.target.value}))}>
                                                    {Object.entries(CATEGORIES).filter(([k]) => k !== 'all').map(([k,v]) => (
                                                        <option key={k} value={k}>{v.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="form-group" style={{display:'flex',gap:'1rem',alignItems:'center',paddingTop:'1rem'}}>
                                                <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.88rem'}}>
                                                    <input type="checkbox" checked={newProduct.inStock}
                                                        onChange={e => setNewProduct(prev => ({...prev, inStock: e.target.checked}))}/>
                                                    En stock
                                                </label>
                                                <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.88rem'}}>
                                                    <input type="checkbox" checked={newProduct.popular}
                                                        onChange={e => setNewProduct(prev => ({...prev, popular: e.target.checked}))}/>
                                                    Populaire (HOT)
                                                </label>
                                            </div>
                                        </div>
                                        <button className="btn-primary" onClick={addProduct}>
                                            <IconCheck size={14}/> Ajouter au catalogue
                                        </button>
                                    </div>
                                )}

                                <div className="owner-products-list">
                                    {products.map(p => (
                                        <div className="owner-product-row" key={p.id}>
                                            <div className="owner-product-img">
                                                {p.imageUrl ? <img src={p.imageUrl} alt={p.name} onError={e => e.target.style.display='none'}/> : <span>{p.name[0]}</span>}
                                            </div>
                                            <div className="owner-product-info">
                                                <div className="owner-product-name">{p.name}</div>
                                                <div className="owner-product-meta">
                                                    <span style={{color:'var(--red2)',fontWeight:700}}>{p.price}€</span>
                                                    <span>·</span>
                                                    <span style={{color: p.inStock ? '#4ade80' : '#f87171', fontSize:'.78rem'}}>{p.inStock ? `${p.stock} en stock` : 'Épuisé'}</span>
                                                    <span>·</span>
                                                    <span style={{color:'var(--muted)',fontSize:'.78rem'}}>{CATEGORIES[p.category]?.name || p.category}</span>
                                                    {p.popular && <span style={{fontSize:'.68rem',background:'rgba(245,158,11,.15)',color:'#f59e0b',padding:'.1rem .45rem',borderRadius:'99px',border:'1px solid rgba(245,158,11,.3)'}}>HOT</span>}
                                                </div>
                                            </div>
                                            <div style={{display:'flex',gap:'.4rem',flexShrink:0}}>
                                                <button className="owner-action-btn edit" onClick={() => setEditProduct({...p})}>
                                                    ✏️ Modifier
                                                </button>
                                                <button className="owner-action-btn delete" onClick={() => deleteProduct(p.id)}>
                                                    🗑️
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* EDIT MODAL */}
                                {editProduct && (
                                    <div className="owner-modal-overlay" onClick={e => e.target === e.currentTarget && setEditProduct(null)}>
                                        <div className="owner-modal">
                                            <div className="owner-modal-head">
                                                <h2>Modifier — {editProduct.name}</h2>
                                                <button onClick={() => setEditProduct(null)}><IconX size={18}/></button>
                                            </div>
                                            <div className="owner-form-grid">
                                                {[
                                                    ['Nom',         'name',        'text'],
                                                    ['Prix (€)',    'price',       'number'],
                                                    ['Stock',       'stock',       'number'],
                                                    ['Image URL',   'imageUrl',    'text'],
                                                    ['Description', 'description', 'text'],
                                                ].map(([label, key, type]) => (
                                                    <div className="form-group" key={key}>
                                                        <label className="form-label">{label}</label>
                                                        <input type={type} className="form-input"
                                                            value={editProduct[key] || ''}
                                                            onChange={e => setEditProduct(prev => ({...prev, [key]: e.target.value}))}/>
                                                    </div>
                                                ))}
                                                <div className="form-group">
                                                    <label className="form-label">Catégorie</label>
                                                    <select className="form-input" value={editProduct.category}
                                                        onChange={e => setEditProduct(prev => ({...prev, category: e.target.value}))}>
                                                        {Object.entries(CATEGORIES).filter(([k]) => k !== 'all').map(([k,v]) => (
                                                            <option key={k} value={k}>{v.name}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div className="form-group" style={{display:'flex',gap:'1rem',alignItems:'center',paddingTop:'.5rem'}}>
                                                    <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.88rem'}}>
                                                        <input type="checkbox" checked={!!editProduct.inStock}
                                                            onChange={e => setEditProduct(prev => ({...prev, inStock: e.target.checked}))}/>
                                                        En stock
                                                    </label>
                                                    <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.88rem'}}>
                                                        <input type="checkbox" checked={!!editProduct.popular}
                                                            onChange={e => setEditProduct(prev => ({...prev, popular: e.target.checked}))}/>
                                                        Populaire
                                                    </label>
                                                </div>
                                            </div>
                                            <div style={{display:'flex',gap:'.8rem',marginTop:'1.5rem'}}>
                                                <button className="btn-primary" onClick={() => saveProduct(editProduct)}>
                                                    <IconCheck size={14}/> Sauvegarder
                                                </button>
                                                <button className="btn-outline" onClick={() => setEditProduct(null)}>Annuler</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── COMMANDES ── */}
                        {activeTab === 'orders' && (
                            <div className="owner-panel">
                                <h2 className="owner-section-title"><IconHistory size={16}/> Toutes les commandes ({orders.length})</h2>
                                {orders.length === 0 ? (
                                    <div className="cph-empty">
                                        <div className="cph-empty-icon"><IconPackage size={32}/></div>
                                        <h3>Aucune commande</h3>
                                        <p>Les commandes apparaîtront ici dès qu'un client paie.</p>
                                    </div>
                                ) : (
                                    <div className="owner-orders-table">
                                        {orders.map((o,i) => (
                                            <div className="owner-order-card" key={i}>
                                                <div className="owner-oc-top">
                                                    <span className="cph-oc-id-val">{o.id}</span>
                                                    <span style={{color:'var(--text2)',fontSize:'.82rem'}}>{o.email}</span>
                                                    <span style={{color:'var(--text2)',fontSize:'.8rem'}}>{o.date}</span>
                                                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,color:'var(--red2)'}}>{(o.total||0).toFixed(2)}€</span>
                                                </div>
                                                <div style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.5rem 1.2rem .8rem',flexWrap:'wrap'}}>
                                                    {(o.items||[]).map((item,j) => (
                                                        <span key={j} style={{fontSize:'.78rem',color:'var(--text2)',background:'rgba(255,255,255,.04)',padding:'.18rem .6rem',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)'}}>
                                                            {item.name} ×{item.quantity}
                                                        </span>
                                                    ))}
                                                    <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'.5rem'}}>
                                                        <select className="form-input" style={{padding:'.3rem .6rem',fontSize:'.78rem',width:'auto'}}
                                                            value={o.status||'pending'}
                                                            onChange={e => updateOrderStatus(o.id, e.target.value)}>
                                                            {STATUS_OPTS.map(s => <option key={s} value={s}>{STATUS_LABELS[s]}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── DESIGN ── */}
                        {activeTab === 'design' && (
                            <div className="owner-panel">
                                <h2 className="owner-section-title"><IconStar size={16}/> Personnalisation du site</h2>
                                <div className="owner-design-grid">
                                    <div className="owner-design-card">
                                        <h3>Couleurs du thème</h3>
                                        <div className="form-group">
                                            <label className="form-label">Couleur principale</label>
                                            <div style={{display:'flex',gap:'.6rem',alignItems:'center'}}>
                                                <input type="color" value={siteTheme.primaryColor}
                                                    onChange={e => setSiteTheme(prev => ({...prev, primaryColor: e.target.value}))}
                                                    style={{width:'48px',height:'38px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'none',cursor:'pointer'}}/>
                                                <input type="text" className="form-input" value={siteTheme.primaryColor}
                                                    onChange={e => setSiteTheme(prev => ({...prev, primaryColor: e.target.value}))}
                                                    style={{flex:1}}/>
                                            </div>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Couleur accent</label>
                                            <div style={{display:'flex',gap:'.6rem',alignItems:'center'}}>
                                                <input type="color" value={siteTheme.accentColor}
                                                    onChange={e => setSiteTheme(prev => ({...prev, accentColor: e.target.value}))}
                                                    style={{width:'48px',height:'38px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'none',cursor:'pointer'}}/>
                                                <input type="text" className="form-input" value={siteTheme.accentColor}
                                                    onChange={e => setSiteTheme(prev => ({...prev, accentColor: e.target.value}))}
                                                    style={{flex:1}}/>
                                            </div>
                                        </div>
                                        <button className="btn-primary" onClick={saveTheme} disabled={savingTheme}>
                                            {savingTheme ? <span className="cph-spinner"/> : <><IconCheck size={14}/> Appliquer le thème</>}
                                        </button>
                                    </div>

                                    <div className="owner-design-card">
                                        <h3>Bannière ticker</h3>
                                        <div className="form-group">
                                            <label className="form-label">Texte de la bannière</label>
                                            <textarea className="form-input cph-textarea" rows={3}
                                                value={bannerText}
                                                onChange={e => setBannerText(e.target.value)}/>
                                        </div>
                                        <button className="btn-primary" onClick={() => showToast('Bannière mise à jour (rechargement requis)')}>
                                            <IconCheck size={14}/> Mettre à jour
                                        </button>
                                        <p style={{fontSize:'.76rem',color:'var(--muted)',marginTop:'.5rem'}}>
                                            Séparez les items avec · pour le ticker défilant.
                                        </p>
                                    </div>

                                    <div className="owner-design-card">
                                        <h3>Prévisualisation couleurs</h3>
                                        <div style={{display:'flex',flexDirection:'column',gap:'.6rem'}}>
                                            <div style={{padding:'1rem',borderRadius:'var(--radius)',background:`${siteTheme.primaryColor}15`,border:`1px solid ${siteTheme.primaryColor}40`,color:siteTheme.primaryColor,fontWeight:700,textAlign:'center'}}>
                                                Bouton primaire
                                            </div>
                                            <div style={{padding:'.5rem 1rem',borderRadius:99,background:`${siteTheme.primaryColor}12`,border:`1px solid ${siteTheme.primaryColor}25`,color:siteTheme.accentColor,fontSize:'.78rem',textAlign:'center'}}>
                                                Badge accent
                                            </div>
                                            <div style={{fontSize:'.82rem',color:'var(--text2)'}}>
                                                Primaire : <code style={{color:siteTheme.primaryColor}}>{siteTheme.primaryColor}</code><br/>
                                                Accent : <code style={{color:siteTheme.accentColor}}>{siteTheme.accentColor}</code>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── SECURITE ── */}
                        {activeTab === 'security' && (
                            <div className="owner-panel">
                                <h2 className="owner-section-title"><IconShield size={16}/> Sécurité & Logs</h2>
                                <div className="owner-security-grid">
                                    <div className="owner-security-card">
                                        <h3><IconShield size={16}/> Session active</h3>
                                        <div className="owner-security-row">
                                            <span>Email</span><span style={{color:'var(--red2)',fontWeight:600}}>{ownerData?.email}</span>
                                        </div>
                                        <div className="owner-security-row">
                                            <span>Rôle</span><span style={{color:'var(--gold)',fontWeight:700}}>OWNER</span>
                                        </div>
                                        <div className="owner-security-row">
                                            <span>Connecté à</span><span style={{color:'var(--text2)',fontSize:'.8rem'}}>{new Date(ownerData?.iat||Date.now()).toLocaleString('fr-FR')}</span>
                                        </div>
                                        <div className="owner-security-row">
                                            <span>Expire à</span><span style={{color:'var(--text2)',fontSize:'.8rem'}}>{new Date(ownerData?.exp||Date.now()).toLocaleString('fr-FR')}</span>
                                        </div>
                                        <button className="btn-outline" style={{marginTop:'.8rem',fontSize:'.82rem',color:'var(--red2)',borderColor:'rgba(239,68,68,.3)'}} onClick={ownerLogout}>
                                            <IconX size={13}/> Terminer la session
                                        </button>
                                    </div>

                                    <div className="owner-security-card">
                                        <h3><IconLock size={16}/> Protections actives</h3>
                                        {[
                                            ['Rate limiting', `Max ${OWNER_CONFIG.maxAttempts} tentatives`],
                                            ['Lockout', '15min après échec'],
                                            ['Token expiry', '1h de session'],
                                            ['Whitelist email', `${OWNER_CONFIG.whitelistedEmails.length} email(s) autorisé(s)`],
                                            ['Session storage', 'Token non persistant'],
                                            ['Log activité', 'Accès tracés'],
                                        ].map(([k,v],i) => (
                                            <div className="owner-security-row" key={i}>
                                                <span style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
                                                    <span style={{color:'#4ade80',fontSize:'.7rem'}}>✓</span>{k}
                                                </span>
                                                <span style={{color:'var(--text2)',fontSize:'.78rem'}}>{v}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="owner-security-card" style={{gridColumn:'span 2'}}>

            const handleEmailSubmit = () => {

                setError('');
                // Simulate secure check (same delay regardless of result — prevents timing attacks)
                setTimeout(() => {
                    setLoading(false);
                    const isAllowed = OWNER_CONFIG.whitelistedEmails.includes(e);
                    if (isAllowed) {
                        // Log attempt
                        const logs = JSON.parse(sessionStorage.getItem('ral_owner_log') || '[]');
                        logs.push({ ts: new Date().toISOString(), email: e, action: 'email_ok', ip: 'client' });
                        sessionStorage.setItem('ral_owner_log', JSON.stringify(logs.slice(-50)));
                        setStep('pin');
                    } else {
                        const newAttempts = attempts + 1;
                        setAttempts(newAttempts);
                        if (newAttempts >= MAX_ATTEMPTS) {
                            const lockUntil = Date.now() + OWNER_CONFIG.lockoutDuration;
                            sessionStorage.setItem('ral_owner_lock', String(lockUntil));

                        body: JSON.stringify({email: emailValue, pin: pinValue}),

                                                    <div style={{fontWeight:700,fontSize:'.88rem'}}>{p.name}</div>
                                                    {p.popular && <span className="op-popular-badge">⭐ Vedette</span>}
                                                </div>
                                            </div>
                                            <span className="op-prod-cat">{CATEGORIES[p.category]?.name||p.category}</span>
                                            <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,color:'var(--red2)'}}>{p.price}€</span>
                                            <span style={{fontSize:'.82rem',color:'var(--text2)'}}>{p.stock}</span>
                                            <button className={`op-stock-toggle ${p.inStock?'in':'out'}`} onClick={() => toggleStock(p.id)}>
                                                {p.inStock ? '✓ En stock' : '✗ Épuisé'}
                                            </button>
                                            <div className="op-prod-actions">
                                                <button className="op-action-btn edit" onClick={() => setEditingProd(p)}>Modifier</button>
                                                <button className="op-action-btn delete" onClick={() => deleteProduct(p.id)}>Supprimer</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {(editingProd || newProd) && (
                                    <ProductForm
                                        prod={editingProd || newProd}
                                        onSave={saveProduct}
                                        onCancel={() => { setEditingProd(null); setNewProd(null); }}
                                    />
                                )}
                            </div>
                        )}

                        {/* ════════ COMMANDES ════════ */}
                        {tab === 'orders' && (
                            <div className="op-panel">
                                <div className="op-section-title"><IconHistory size={16}/> Toutes les commandes ({savedOrders.length})</div>
                                {savedOrders.length === 0 ? (
                                    <div className="op-empty">Aucune commande enregistrée.</div>
                                ) : (
                                    <div className="op-orders-full">
                                        {[...savedOrders].reverse().map((o,i) => {
                                            const STATUS_COL = { pending:'#f59e0b', processing:'#60a5fa', delivered:'#4ade80', cancelled:'#f87171' };
                                            const col = STATUS_COL[o.status]||'#f59e0b';
                                            return (
                                                <div className="op-order-card" key={i}>
                                                    <div className="op-order-card-head">
                                                        <span className="cph-oc-id-val">{o.id}</span>
                                                        <span style={{fontSize:'.8rem',color:'var(--muted)'}}>{o.date}</span>
                                                        <span style={{marginLeft:'auto',fontFamily:'Syne,sans-serif',fontWeight:800}}>{(o.total||0).toFixed(2)}€</span>
                                                    </div>
                                                    <div style={{fontSize:'.83rem',color:'var(--text2)',padding:'.3rem 0'}}>
                                                        {o.email||'Email non renseigné'} · {(o.items||[]).map(i=>`${i.name} ×${i.quantity}`).join(', ')}
                                                    </div>
                                                    <div className="op-order-card-foot">
                                                        <span className="op-order-status" style={{color:col,background:`${col}18`,border:`1px solid ${col}28`}}>{o.status||'pending'}</span>

                                                            defaultValue={o.status||'pending'}
                                                            onChange={e => updateOrderStatus(o.id, e.target.value)}>
                                                            <option value="pending">En attente</option>
                                                            <option value="processing">En traitement</option>
                                                            <option value="delivered">Livré</option>
                                                            <option value="cancelled">Annulé</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ════════ CLIENTS ════════ */}
                        {tab === 'clients' && (
                            <div className="op-panel">
                                <div className="op-section-title"><IconUsers size={16}/> Clients ({(() => { const emails = [...new Set(savedOrders.map(o=>o.email).filter(Boolean))]; return emails.length; })()})</div>

                                    <div className="op-empty">Aucun client enregistré.</div>
                                ) : (() => {
                                    const clientMap = {};
                                    savedOrders.forEach(o => {
                                        if(!o.email) return;
                                        if(!clientMap[o.email]) clientMap[o.email] = { email:o.email, orders:[], total:0 };
                                        clientMap[o.email].orders.push(o);
                                        clientMap[o.email].total += o.total||0;
                                    });
                                    return (
                                        <div className="op-clients-list">
                                            {Object.values(clientMap).sort((a,b)=>b.total-a.total).map((c,i) => (
                                                <div className="op-client-card" key={i}>
                                                    <div className="op-client-avatar">{c.email[0].toUpperCase()}</div>
                                                    <div className="op-client-info">
                                                        <div className="op-client-email">{c.email}</div>
                                                        <div className="op-client-meta">{c.orders.length} commande{c.orders.length>1?'s':''} · {c.total.toFixed(2)}€ dépensés</div>
                                                        <div className="op-client-products">{[...new Set(c.orders.flatMap(o=>(o.items||[]).map(i=>i.name)))].join(', ')}</div>
                                                    </div>
                                                    <div className="op-client-right">
                                                        <div className="op-client-total">{c.total.toFixed(2)}€</div>
                                                        <div className="op-client-status">{c.orders[c.orders.length-1]?.status||'pending'}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* ════════ PROMOS ════════ */}
                        {tab === 'promo' && (
                                <div className="op-panel">
                                    <div className="op-section-title"><IconStar size={16}/> Codes promotionnels</div>
                                    <div className="op-promo-create">
                                        <input type="text" className="form-input" placeholder="Code (ex: SUMMER20)"
                                            value={newPromo.code} onChange={e=>setNewPromo(p=>({...p,code:normalizePromoCode(e.target.value)}))}
                                            style={{maxWidth:'180px'}}/>
                                        <select className="form-input" style={{maxWidth:'130px'}} value={newPromo.type} onChange={e=>setNewPromo(p=>({...p,type:e.target.value}))}>
                                            <option value="percent">% réduction</option>
                                            <option value="fixed">€ fixe</option>
                                        </select>
                                        <input type="number" className="form-input" style={{maxWidth:'100px'}} min="1" max="100"
                                            value={newPromo.discount} onChange={e=>setNewPromo(p=>({...p,discount:parseFloat(e.target.value)||0}))}
                                            placeholder="Valeur"/>
                                        <input type="number" className="form-input" style={{maxWidth:'110px'}} min="1"
                                            value={newPromo.maxUses} onChange={e=>setNewPromo(p=>({...p,maxUses:parseInt(e.target.value)||100}))}
                                            placeholder="Max. utilisations"/>
